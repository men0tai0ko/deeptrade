      const _emptySpec  = (slot?.specialType) || sh.shelves[idx]?.specialType;
      const _emptyDef   = getShelfSpecialDef(_emptySpec || null);
      const _trendNow2  = gs.shop.trend?.type && Date.now() < gs.shop.trend?.endsAt;
      const _trendHit2  = _emptySpec && _trendNow2 && _emptySpec === gs.shop.trend?.type;
      const _emptyClass = `shelfSlot${_emptySpec ? " special-"+_emptySpec : ""}`;
      const _emptyLabel = _emptySpec
        ? `<div style="font-size:9px;font-weight:700;color:${_trendHit2?'var(--gold)':'var(--text-mid)'};margin-top:2px">${_emptyDef.icon} ${_emptyDef.label}${_trendHit2?" 🔥":""}</div>` : "";
      if(el.className !== _emptyClass || !el.querySelector(".shelfEmpty")) {
        el.className = _emptyClass;
        el.onclick = () => openListModal(idx);
        el.innerHTML = `<div class="shelfEmpty">+</div><div class="shelfEmptyText">タップして陳列</div>${_emptyLabel}`;
      }
    }
  });

  // 総売上更新（list-header内のspan）
  const salesEl = sc.querySelector(".list-header span[data-sales]");
  if(salesEl) salesEl.textContent = `${sh.totalSales.toLocaleString()}個`;

}

function openBulkUnlistModal() {
  const listedSlots = gs.shop.shelves
    .map((s, idx) => ({ slot: s, idx }))
    .filter(({ slot }) => slot?.item);

  if(listedSlots.length === 0) return;

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.cssText = "max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";
  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  const RARITY_ORDER = RARITY_ORDER_MAP; // S77: グローバル定数を参照
  const TYPE_LABEL   = { weapon:"武器", sub:"サブ", head:"ヘルム", body:"トップス", cloak:"マント",
    legs:"ボトムス", arms:"グローブ", feet:"ブーツ", neck:"ネック", bracelet:"ブレスレット",
    ring:"リング", seal:"印章", consumable:"消耗品", material:"素材" };

  // フィルター状態
  const selRarities = new Set();
  const selTypes    = new Set();
  const selected    = new Set(listedSlots.map(s => s.idx)); // デフォルト全選択

  // 存在するレアリティ・種類を収集
  const rarityKeys = [...new Set(listedSlots.map(s => s.slot.item.rarity))]
    .sort((a,b) => (RARITY_ORDER[a]||0)-(RARITY_ORDER[b]||0));
  const typeKeys = [...new Set(listedSlots.map(s => ITEM_MASTER[s.slot.item.itemId]?.type).filter(Boolean))];

  const RARITY_COLOR = { normal:"var(--text-subtle)", rare:"var(--info)", epic:"var(--epic)", legendary:"var(--legendary-bright)" };
  const BTN = "padding:4px 10px;border-radius:10px;font-size:11px;cursor:pointer;border:1px solid var(--border-dark);background:transparent;color:var(--muted)";

  const render = () => {
    // フィルター適用
    const filtered = listedSlots.filter(({ slot }) => {
      const item = slot.item;
      const type = ITEM_MASTER[item.itemId]?.type;
      if(selRarities.size > 0 && !selRarities.has(item.rarity)) return false;
      if(selTypes.size > 0 && !selTypes.has(type)) return false;
      return true;
    });

    const rarityBtns = rarityKeys.map(rk =>
      `<button onclick="window._bulkUnlistFilter('rarity','${rk}')"
        style="${BTN};color:${selRarities.has(rk)?RARITY_COLOR[rk]:'var(--text-mid)'};
          border-color:${selRarities.has(rk)?RARITY_COLOR[rk]:'var(--border-dark)'};
          background:${selRarities.has(rk)?'var(--surface-deep)':'transparent'}">
        ${rk[0].toUpperCase()}
      </button>`
    ).join('');

    const typeBtns = typeKeys.map(tk =>
      `<button onclick="window._bulkUnlistFilter('type','${tk}')"
        style="${BTN};${selTypes.has(tk)?'border-color:var(--accent);color:var(--accent);background:#0a1a2a':''}">
        ${TYPE_LABEL[tk]||tk}
      </button>`
    ).join('');

    const rows = filtered.map(({ slot, idx }) => {
      const item    = slot.item;
      const m       = ITEM_MASTER[item.itemId];
      const r       = RARITY_MASTER[item.rarity];
      const isUnid  = !item.identified;
      const isSel   = selected.has(idx);
      const specDef = getShelfSpecialDef(slot.specialType);
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-list);cursor:pointer"
        onclick="window._bulkUnlistToggle(${idx})">
        <div style="width:20px;height:20px;border:2px solid ${isSel?'var(--info)':'var(--text-disabled)'};border-radius:4px;
          background:${isSel?'#0a1a3a':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${isSel?'<span style="color:var(--info);font-size:12px">✓</span>':''}
        </div>
        <div style="font-size:20px;flex-shrink:0">${isUnid?'❓':m.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:700;color:${r.color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
            ${isUnid?'未鑑定品':m.name}
          </div>
          <div style="font-size:10px;color:var(--muted)">${r.label}${slot.specialType?' · '+specDef.icon+specDef.label:''}</div>
        </div>
        <div style="font-size:11px;color:var(--gold);flex-shrink:0">${itemPrice(item).toLocaleString()}G</div>
      </div>`;
    }).join('');

    const selCount = filtered.filter(({idx}) => selected.has(idx)).length;
    const allFiltered = filtered.every(({idx}) => selected.has(idx));

    mc.innerHTML = `
      <div style="flex-shrink:0;padding:14px 16px 8px;border-bottom:1px solid var(--border)">
        <div class="modal-title" style="text-align:center;margin-bottom:8px">📥 一括取り下げ</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">
          <button onclick="window._bulkUnlistAll()"
            style="padding:3px 8px;border-radius:10px;font-size:11px;cursor:pointer;border:1px solid var(--danger);background:transparent;color:var(--danger)">
            全棚
          </button>
          ${[...new Set(gs.shop.shelves.filter(s=>s?.item&&s?.specialType).map(s=>s.specialType))].map(t=>{
            const def=getShelfSpecialDef(t);
            return `<button onclick="window._bulkUnlistBySpecial('${t}')"
              style="padding:3px 8px;border-radius:10px;font-size:11px;cursor:pointer;border:1px solid var(--border-subtle);background:transparent;color:var(--muted)">
              ${def.icon}${def.label}
            </button>`;
          }).join('')}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px">${rarityBtns}${typeBtns}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:11px">
          <span style="color:var(--muted)">${selCount}件選択</span>
          <button onclick="window._bulkUnlistSelectAll()"
            style="background:none;border:none;color:var(--accent2);font-size:11px;cursor:pointer;padding:2px 6px">
            ${allFiltered&&filtered.length>0?'全解除':'全選択'}
          </button>
        </div>
      </div>
      <div id="bulkUnlistScroll" style="flex:1;overflow-y:auto;padding:0 16px">
        ${rows.length>0?rows:'<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px">該当なし</div>'}
      </div>
      <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border)">
        <button class="btn btn-secondary" style="width:100%;margin-bottom:6px;
          border-color:${selCount>0?'var(--danger)':'var(--border-dark)'};color:${selCount>0?'var(--danger)':'var(--text-disabled)'}"
          id="bulkUnlistConfirm" ${selCount===0?'disabled':''}>
          📥 ${selCount}件を取り下げる
        </button>
        <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
      </div>
    `;

    mc.querySelector("#bulkUnlistConfirm")?.addEventListener("click", () => {
      let count = 0;
      filtered.filter(({idx}) => selected.has(idx)).forEach(({slot, idx}) => {
        gs.inventory.push(slot.item);
        // specialTypeを保持してitemのみクリア
        gs.shop.shelves[idx] = slot.specialType
          ? { item: null, specialType: slot.specialType }
          : null;
        selected.delete(idx);
        count++;
      });
      addShopLog("info", `📥 ${count}個のアイテムを棚から取り下げた`);
      saveGame(); render();
      // 取り下げ後に残った出品品がなければ閉じる
      if(!gs.shop.shelves.some(s => s?.item)) { overlay.remove(); window.render?.(); return; }
      window.render?.();
    });
  };

  window._bulkUnlistAll = () => {
    listedSlots.forEach(({idx}) => selected.add(idx));
    selRarities.clear(); selTypes.clear();
    render();
  };
  window._bulkUnlistBySpecial = (specialType) => {
    selRarities.clear(); selTypes.clear();
    listedSlots.forEach(({slot, idx}) => {
      if(slot.specialType === specialType) selected.add(idx);
      else selected.delete(idx);
    });
    render();
  };
  window._bulkUnlistFilter = (type, val) => {
    const target = type === "rarity" ? selRarities : selTypes;
    if(target.has(val)) target.delete(val); else target.add(val);
    render();
  };
  window._bulkUnlistToggle = (idx) => {
    if(selected.has(idx)) selected.delete(idx); else selected.add(idx);
    render();
  };
  window._bulkUnlistSelectAll = () => {
    const filtered = listedSlots.filter(({ slot }) => {
      const item = slot.item;
      const type = ITEM_MASTER[item.itemId]?.type;
      if(selRarities.size > 0 && !selRarities.has(item.rarity)) return false;
      if(selTypes.size > 0 && !selTypes.has(type)) return false;
      return true;
    });
    const allSel = filtered.every(({idx}) => selected.has(idx));
    if(allSel) filtered.forEach(({idx}) => selected.delete(idx));
    else filtered.forEach(({idx}) => selected.add(idx));
    render();
  };

  render();
}

function openShelfSettingsModal() {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.cssText = "max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";
  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  // 初回のみフル描画、以降はスクロールエリアのみ差分更新
  const buildRows = () => {
    const sh = gs.shop;
    const trendNow = sh.trend?.type && Date.now() < sh.trend?.endsAt;
    const trendType = sh.trend?.type;
    const typeChips = (slotIdx) => SHELF_SPECIAL_TYPES.map(t => {
      const cur = sh.shelves[slotIdx]?.specialType ?? null;
      const isCur = cur === (t.id || null);
      const isFlowing = trendNow && t.id && t.id === trendType;
      return `<button onclick="window._shelfSetType(${slotIdx},'${t.id||''}')"
        style="padding:3px 8px;border-radius:10px;font-size:10px;cursor:pointer;
          border:1px solid ${isCur?'var(--accent2)':isFlowing?'#ffaa00':'var(--border-dark)'};
          background:${isCur?'#1a0a2e':isFlowing?'#1a1000':'transparent'};
          color:${isCur?'var(--accent2)':isFlowing?'var(--gold)':'var(--text-mid)'}">
        ${t.icon}${t.label}${isFlowing?' 🔥':''}
      </button>`;
    }).join('');
    return sh.shelves.map((slot, idx) => {
      const specDef = getShelfSpecialDef(slot?.specialType ?? null);
      const hasItem = slot?.item;
      const itemName = hasItem ? (ITEM_MASTER[slot.item.itemId]?.name || '？') : '空き';
      const isFlowing = trendNow && specDef.id && specDef.id === trendType;
      return `<div style="padding:10px 0;border-bottom:1px solid var(--border-list)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="font-size:18px;flex-shrink:0">${specDef.icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:700;color:${isFlowing?'var(--gold)':'var(--text)'}">
              棚${idx+1}：${specDef.label}${isFlowing?' 🔥 流行中！':''}
            </div>
            <div style="font-size:10px;color:var(--muted)">${hasItem?itemName:'空き棚'}</div>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${typeChips(idx)}</div>
      </div>`;
    }).join('');
  };

  const renderModal = () => {
    const allChips = SHELF_SPECIAL_TYPES.map(t =>
      `<button onclick="window._shelfSetAll('${t.id||''}')"
        style="padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;
          border:1px solid var(--border-subtle);background:var(--surface-deep);color:var(--accent2)">
        ${t.icon}${t.label}
      </button>`
    ).join('');

    // 初回フル描画
    mc.innerHTML = `
      <div style="flex-shrink:0;padding:14px 16px 8px;border-bottom:1px solid var(--border);background:var(--card)">
        <div class="modal-title" style="margin-bottom:8px">🏪 棚の特化設定</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px">一括設定</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px">${allChips}</div>
        <div style="font-size:10px;color:var(--text-faint)">一致で売値+${SHELF_SPECIAL_BONUS.sellPct}% / 速度+${SHELF_SPECIAL_BONUS.speedPct}%
          <span style="color:var(--gold)">（流行一致で売値+30% / 速度+100%）</span></div>
      </div>
      <div id="shelfSettingsScroll" style="flex:1;overflow-y:auto;padding:0 16px">${buildRows()}</div>
      <div style="flex-shrink:0;padding:10px 16px 14px;border-top:1px solid var(--border);background:var(--card)">
        <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
      </div>
    `;
  };

  // スクロール位置を保持してスクロールエリアのみ差分更新
  const updateRows = () => {
    const scrollEl = mc.querySelector('#shelfSettingsScroll');
    if(!scrollEl) { renderModal(); return; }
    const scrollTop = scrollEl.scrollTop;
    scrollEl.innerHTML = buildRows();
    scrollEl.scrollTop = scrollTop;
  };

  window._shelfSetType = (idx, typeId) => {
    if(gs.shop.shelves[idx] === null || gs.shop.shelves[idx] === undefined) {
      gs.shop.shelves[idx] = { item: null, specialType: typeId || null };
    } else {
      gs.shop.shelves[idx].specialType = typeId || null;
      if(gs.shop.shelves[idx]?.item) gs.shop.shelves[idx].sellDuration = calcSellDuration(gs.shop.shelves[idx].item);
    }
    saveGame();
    updateRows(); // スクロールエリアのみ差分更新（スクロール位置保持）
  };

  window._shelfSetAll = (typeId) => {
    gs.shop.shelves.forEach((slot, idx) => {
      if(gs.shop.shelves[idx] === null || gs.shop.shelves[idx] === undefined) {
        gs.shop.shelves[idx] = { item: null, specialType: typeId || null };
      } else {
        gs.shop.shelves[idx].specialType = typeId || null;
        if(gs.shop.shelves[idx]?.item) gs.shop.shelves[idx].sellDuration = calcSellDuration(gs.shop.shelves[idx].item);
      }
    });
    saveGame();
    updateRows();
  };

  renderModal();
}

function openListModal(slotIdx) {
  const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));
  const emptySlots = gs.shop.shelves.filter(s => s === null || (s && !s.item)).length;
  if(emptySlots === 0) {
    setInventoryMsg("damage", "✕ 空きの棚がありません");
    render();
    return;
  }

  // 棚の特化タイプを取得（特定棚への陳列の場合）
  const targetSpecial = (slotIdx !== null && gs.shop.shelves[slotIdx]?.specialType)
    ? gs.shop.shelves[slotIdx].specialType : null;
  const targetSpecialDef = getShelfSpecialDef(targetSpecial);

  // ロック済み・装備中・素材/消耗品を除外
  const sellable = gs.inventory.filter(i => {
    const m = ITEM_MASTER[i.itemId];
    if(!m || !m.basePrice || equippedUids.has(i.uid) || !EQUIP_TYPES.has(m.type) || i.locked) return false;
    // 特化設定がある棚への陳列は対応種類のみ表示
    if(targetSpecial && targetSpecialDef.itemTypes.length > 0) {
      return targetSpecialDef.itemTypes.includes(m.type);
    }
    return true;
  });
  // 陳列中でないものに絞る
  const shelfUids = new Set(gs.shop.shelves.filter(s => s && s.item).map(s => s.item.uid));
  const available = sellable.filter(i => !shelfUids.has(i.uid));

  if(available.length === 0) {
    setInventoryMsg("damage", "✕ 陳列できるアイテムがありません（ロック中は除外）");
    render();
    return;
  }

  const maxSelect = Math.min(emptySlots, available.length);
  const selected = new Set();

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };

  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.overflowY = "hidden";  // 内側の#listItemScrollに一本化

  // 等級・種別の選択肢を事前計算
  const rarityOrder = ["normal","rare","epic","legendary"];
  const rarityKeys  = rarityOrder.filter(rk => available.some(i => i.identified && i.rarity === rk));
  const hasUnidentified = available.some(i => !i.identified); // 未鑑定品の有否
  const typeOrder   = ["weapon","head","body","legs","arms","feet","neck","bracelet","ring","consumable"];
  const typeKeys    = typeOrder.filter(tk => available.some(i => ITEM_MASTER[i.itemId]?.type === tk));
  const TYPE_ICON   = { weapon:"🗡", sub:"🛡", head:"🪖", body:"🥋", legs:"👖", arms:"🧤",
                        feet:"👟", neck:"📿", bracelet:"🔮", ring:"💍", consumable:"🧪", seal:"🔴" };
  const TYPE_COLOR = EQUIP_TYPE_COLOR; // S73: グローバル定数を参照
  const RARITY_SHORT = RARITY_SHORT_LABEL; // S76: グローバル定数を参照

  // フィルター・ソート状態（"unidentified" も rarity キーとして扱う）
  const activeRarities = new Set();
  const activeTypes    = new Set();
  let   sortEnhFirst   = false; // trueで強化済み優先

  // ボタンサイズ共通スタイル
  const BTN = 'display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;font-size:14px;cursor:pointer;border:1px solid var(--border-subtle);background:var(--btn-default);transition:background 0.1s,border 0.1s';

  // 骨格を初回のみ生成（未鑑定ボタンを末尾に追加）
  const rarityBtns = [
    ...rarityKeys.map(rk => {
      const rc = RARITY_MASTER[rk];
      return `<button data-filter="rarity:${rk}" title="${rc?.label||rk}"
        style="${BTN};color:${rc?.color||'var(--text-white)'};font-weight:700;font-size:12px"
        >${RARITY_SHORT[rk]||rk[0].toUpperCase()}</button>`;
    }),
    // 未鑑定ボタン：未鑑定品がある場合のみ表示
    ...(hasUnidentified
      ? [`<button data-filter="rarity:unidentified" title="未鑑定のみ表示"
          style="${BTN};color:var(--text-mid);font-weight:700;font-size:11px;border-style:dashed">❓</button>`]
      : []),
  ].join('');

  const typeBtns = typeKeys.map(tk =>
    `<button data-filter="type:${tk}" title="${tk}" style="${BTN};color:${TYPE_COLOR[tk]||'var(--text-light)'}">${TYPE_ICON[tk]||tk[0]}</button>`
  ).join('');

  mc.style.cssText = "max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";
  mc.innerHTML = `
    <div style="flex-shrink:0;padding:14px 16px 8px;border-bottom:1px solid var(--border)">
      <div class="modal-title" style="text-align:center;margin-bottom:4px">一括出品${targetSpecial?` <span style="font-size:11px;color:var(--accent2)">${targetSpecialDef.icon}${targetSpecialDef.label}専用</span>`:""}</div>
      <div id="listSelectCount" style="font-size:11px;color:var(--muted);margin-bottom:6px;text-align:center"></div>
      <div style="background:var(--surface-alt);border-radius:6px;padding:4px 6px">
        <div style="display:flex;align-items:center;gap:3px;margin-bottom:3px">
          <button data-filter="select" title="表示中を上から選択" style="${BTN};font-size:14px">✅</button>
          <button data-filter="clear"  title="選択解除"           style="${BTN};font-size:14px">❌</button>
          <div style="width:1px;height:20px;background:var(--border-dark);margin:0 2px;flex-shrink:0"></div>
          <div style="display:flex;flex-wrap:nowrap;overflow-x:auto;gap:3px;scrollbar-width:none">
            ${rarityBtns}
            <button data-filter="rarity:all" title="全レアリティ表示"
              style="${BTN};color:var(--muted);font-weight:700;font-size:11px">全</button>
          </div>
        </div>
        <div style="display:flex;flex-wrap:nowrap;overflow-x:auto;gap:3px;scrollbar-width:none;margin-bottom:3px">${typeBtns}</div>
        <div style="display:flex;align-items:center;gap:3px;padding-top:2px;border-top:1px solid var(--bg-mid)">
          <span style="font-size:10px;color:var(--muted);flex-shrink:0">並替</span>
          <button data-sort="enh_desc" title="強化済み優先" style="${BTN};font-size:11px;font-weight:700;color:var(--success)">⚒↑</button>
          <button data-sort="enh_asc"  title="通常優先"     style="${BTN};font-size:11px;font-weight:700;color:var(--muted)">⚒↓</button>
        </div>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;" id="listItemScroll"></div>
    <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border)">
      <button id="listConfirmBtn" class="btn btn-gold" style="width:100%;margin-bottom:6px">🏪 0個を出品</button>
      <button id="listCancelBtn" class="btn btn-secondary" style="width:100%">閉じる</button>
    </div>
  `;
  const scroll     = mc.querySelector("#listItemScroll");
  const countEl    = mc.querySelector("#listSelectCount");
  const confirmBtn = mc.querySelector("#listConfirmBtn");

  // フィルターバーのアクティブ表示を更新
  const refreshFilterUI = () => {
    mc.querySelectorAll("[data-filter]").forEach(btn => {
      const f = btn.dataset.filter;
      const isActive =
        (f.startsWith("rarity:") && f !== "rarity:all" && activeRarities.has(f.slice(7))) ||
        (f.startsWith("type:")   && activeTypes.has(f.slice(5)));
      const isAllActive = f === "rarity:all" && activeRarities.size === 0 && activeTypes.size === 0;
      // 未鑑定ボタン特別スタイル
      if(f === "rarity:unidentified") {
        const isUnidActive = activeRarities.has("unidentified");
        btn.style.background  = isUnidActive ? 'var(--bg-darker)' : 'var(--surface-deep)';
        btn.style.borderColor = isUnidActive ? 'var(--text-mid)' : 'var(--border-subtle)';
        btn.style.borderStyle = isUnidActive ? 'solid' : 'dashed';
        return;
      }
      btn.style.background  = (isActive||isAllActive) ? 'var(--filter-active)' : 'var(--surface-deep)';
      btn.style.borderColor = (isActive||isAllActive) ? 'var(--accent)' : 'var(--border-dark)';
    });
    mc.querySelectorAll("[data-sort]").forEach(btn => {
      const s = btn.dataset.sort;
      const isActive = (s === "enh_desc" && sortEnhFirst) || (s === "enh_asc" && !sortEnhFirst);
      btn.style.background  = isActive ? '#1a2a1a' : 'var(--surface-deep)';
      btn.style.borderColor = isActive ? '#44cc44' : 'var(--border-dark)';
    });
  };

  // フィルター・ソートバー：イベント委譲
  mc.addEventListener("click", e => {
    const fb = e.target.closest("[data-filter]");
    const sb = e.target.closest("[data-sort]");
    if(!fb && !sb) return;

    if(sb) {
      // ソートボタン
      sortEnhFirst = (sb.dataset.sort === "enh_desc");
      refreshFilterUI();
      renderModal();
      return;
    }

    const f = fb.dataset.filter;
    if(f === "clear") {
      // 全選択解除のみ（フィルターは変えない）
      selected.clear();
    } else if(f === "select") {
      // 現在の表示順で上から maxSelect 件を選択
      selected.clear();
      getFiltered().forEach(i => { if(selected.size < maxSelect) selected.add(i.uid); });
    } else if(f === "rarity:all") {
      // 全フィルター解除（レアリティ・部位ともリセット）
      activeRarities.clear();
      activeTypes.clear();
    } else if(f.startsWith("rarity:")) {
      // レアリティフィルター切り替え（選択は変えない）
      const rk = f.slice(7);
      if(activeRarities.has(rk)) activeRarities.delete(rk);
      else activeRarities.add(rk);
    } else if(f.startsWith("type:")) {
      // 部位フィルター切り替え（選択は変えない）
      const tk = f.slice(5);
      if(activeTypes.has(tk)) activeTypes.delete(tk);
      else activeTypes.add(tk);
    }
    refreshFilterUI();
    renderModal();
  });

  mc.querySelector("#listCancelBtn").addEventListener("click", () => overlay.remove());

  // 現在のフィルター・ソートを適用したアイテムリストを返す
  const getFiltered = () => {
    const showUnidOnly   = activeRarities.has("unidentified");
    const hasRarityFilter = activeRarities.size > 0 && !showUnidOnly; // 通常等級フィルターがある
    const noFilter       = activeRarities.size === 0 && activeTypes.size === 0; // [全]状態

    let list = available.filter(i => {
      const isUnid = !i.identified;

      // 未鑑定フィルターが有効な場合：未鑑定のみ通過
      if(showUnidOnly) return isUnid;

      // 通常等級フィルターがある場合：未鑑定を除外（鑑定済みのみ等級フィルター適用）
      if(hasRarityFilter) {
        if(isUnid) return false; // 等級指定中は未鑑定を非表示
        if(!activeRarities.has(i.rarity)) return false;
      }

      // [全]状態（フィルターなし）：未鑑定を含む全アイテムを表示
      if(noFilter && isUnid) {
        // 部位フィルターがあれば部位チェックのみ適用
        if(activeTypes.size > 0 && !activeTypes.has(ITEM_MASTER[i.itemId]?.type)) return false;
        return true;
      }

      // 部位フィルター
      if(activeTypes.size > 0 && !activeTypes.has(ITEM_MASTER[i.itemId]?.type)) return false;
      return true;
    });
    if(sortEnhFirst) list = [...list].sort((a,b) => (b.enhLv||0) - (a.enhLv||0));
    else             list = [...list].sort((a,b) => (a.enhLv||0) - (b.enhLv||0));
    return list;
  };

  const renderModal = () => {
    // スクロール位置を保存
    const savedTop = scroll.scrollTop;

    // カウント・確定ボタンのみ更新（リフロー最小化）
    countEl.innerHTML = `選択中 <span style="color:var(--text-white);font-weight:700">${selected.size}</span> / 空き棚 <span style="color:var(--gold);font-weight:700">${emptySlots}</span>`;
    confirmBtn.textContent = `🏪 ${selected.size}個を出品`;
    confirmBtn.disabled = selected.size === 0;

    // リスト再構築（フィルター・ソート適用済みリストで描画）
    scroll.innerHTML = "";
    const filtered = getFiltered();
    if(filtered.length === 0) {
      scroll.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px">該当なし</div>';
      scroll.scrollTop = savedTop;
      return;
    }

    // 同名アイテムの連番付与用カウンタ
    const nameCount = {};
    const nameIndex = filtered.map(item => {
      const m = ITEM_MASTER[item.itemId];
      const isUnid = !item.identified;
      const key = isUnid ? `unid_${m.type}` : `${item.itemId}_${item.rarity}`;
      nameCount[key] = (nameCount[key] || 0) + 1;
      return { key, idx: nameCount[key] };
    });
    const nameDup = {};
    Object.keys(nameCount).forEach(k => { if(nameCount[k] > 1) nameDup[k] = true; });

    filtered.forEach((item, listIdx) => {
      const m = ITEM_MASTER[item.itemId];
      const r = RARITY_MASTER[item.rarity];
      const isUnid = !item.identified;
      const { key, idx: dupIdx } = nameIndex[listIdx];
      const baseName = isUnid ? "未鑑定品" : m.name;
      // 同名複数ある場合のみ連番表示
      const numBadge = nameDup[key]
        ? `<span style="color:var(--muted);font-size:11px;font-weight:400"> ⑊${dupIdx}</span>`
        : "";
      // 強化値バッジ
      const enhLv = item.enhLv || 0;
      const enhBadge = enhLv > 0
        ? `<span style="color:var(--success);font-size:11px;font-weight:400"> +${enhLv}</span>`
        : "";
      const affixBadge = "";

      const checked    = selected.has(item.uid);
      const isEnhanced = (item.enhLv || 0) > 0;
      const isFull     = !checked && selected.size >= maxSelect;
      // 未鑑定：選択不可・opacity 0.45・ポインター無効
      const rowOpacity = isFull ? "0.4" : isUnid ? "0.55" : isEnhanced ? "0.7" : "1";
      const pointerEvt = isFull ? "none" : "auto";
      // 未鑑定は等級色を出さず灰色で表示
      const nameColor  = isUnid ? "var(--text-faint)" : r.color;
      const iconClass  = isUnid ? "rarity-unidentified" : `rarity-${item.rarity}`;

      const row = document.createElement("div");
      row.style.cssText = `display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--bg-mid);cursor:pointer;opacity:${rowOpacity};pointer-events:${pointerEvt}`;
      row.innerHTML = `
        <div style="width:20px;height:20px;border:2px solid ${checked?'var(--accent)':isUnid?'var(--border-dark)':'var(--text-disabled)'};border-radius:4px;background:${checked?'var(--accent)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${checked ? '<span style="color:var(--text-white);font-size:12px;line-height:1">✓</span>' : ''}
        </div>
        <div class="itemIcon ${iconClass}" style="width:32px;height:32px;font-size:18px;flex-shrink:0">${isUnid ? "❓" : m.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;color:${nameColor};font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
            ${baseName}${isUnid ? ' <span style="font-size:10px;color:var(--text-disabled);font-weight:400">（要鑑定）</span>' : ''}${enhBadge}${affixBadge}${numBadge}${!isUnid && item.cursed ? ' <span style="color:#cc44cc">💀</span>' : ""}
          </div>
          <div style="font-size:11px;color:var(--muted)">${m.type}　${isUnid ? "?" : itemPrice(item)}G</div>
        </div>
      `;
      row.addEventListener("click", () => {
        if(selected.has(item.uid)) {
          selected.delete(item.uid);
        } else if(selected.size < maxSelect) {
          selected.add(item.uid);
        }
        renderModal();
      });
      scroll.appendChild(row);
    });

    // スクロール位置を復元
    scroll.scrollTop = savedTop;

    confirmBtn.onclick = () => {
      let listed = 0;
      for(const uid of selected) {
        const item = gs.inventory.find(i => i.uid === uid);
        if(!item) continue;
        const bestIdx = findBestShelfSlot(item);
        if(bestIdx < 0) break;
        listItem(item, bestIdx); listed++;
      }
      overlay.remove();
      setInventoryMsg("good", `✦ ${listed}個のアイテムを棚に陳列しました`);
      render();
    };
  };

  renderModal();
  overlay.appendChild(mc);
  document.body.appendChild(overlay);
  refreshFilterUI(); // DOM追加後に初期ハイライトを適用（「全」のみ）
}

// ── 所持品画面 ──
// ── 獲得品画面（冒険中のみ表示）──
function renderLoot(sc, ab) {
  const loot = gs.dungeon.loot;

  if(loot.length === 0) {
    sc.innerHTML = `<div class="emptyMsg">まだ何も拾っていない<br><span style="font-size:11px">進むとアイテムが見つかるかもしれない</span></div>`;
  } else {
    const cards = loot.map(item => {
      const m = ITEM_MASTER[item.itemId];
      const isUnid = !item.identified;
      const name = isUnid ? "未鑑定品" : itemDisplayName(item);
      const enhLv = item.enhLv || 0;
      return `<div class="invCard" style="opacity:0.85">
        <div class="invCardIcon rarity-${item.rarity}">
          ${isUnid ? "❓" : m.icon}
          ${enhLv > 0 ? `<span class="invCardEnhLv">+${enhLv}</span>` : ""}
        </div>
        <div class="invCardName">${name}</div>

    }).join("");

    sc.innerHTML = `
      <div class="list-header">

          <div style="font-size:11px;color:var(--muted)">帰還すると格納庫に移ります。倒れるとすべて失います。</div>
        </div>
        <div class="sectionTitle" style="color:var(--gold)">鞄 (${loot.length}個)</div>

        <div class="invGrid">${cards}</div>

  ab.innerHTML = gs.dungeon.combat ? `
    <div></div><div></div>
  ` : `

    <div></div>
  `;
}

// ── 格納庫画面（帰還中のみ表示）──
function toggleLock(uid, event) {
  if(event) event.stopPropagation();
  const item = gs.inventory.find(i => i.uid === uid);
  if(!item) return;
  item.locked = !item.locked;
  saveGame();
  render();
}

function renderInventory(sc, ab) {
  // 陳列済みアイテムがinventoryに残っている矛盾をリアルタイムで修復
  const _listedUids = new Set(gs.shop.shelves.filter(Boolean).map(s => s.item?.uid).filter(Boolean));
  if(_listedUids.size > 0) {
    const before = gs.inventory.length;
    gs.inventory = gs.inventory.filter(i => !_listedUids.has(i.uid));
    if(gs.inventory.length !== before) saveGame();
  }

  const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));
  let inv = gs.inventory.filter(item => !equippedUids.has(item.uid));

  if(inv.length === 0) {
    sc.innerHTML = `<div class="emptyMsg">格納庫は空<br><span style="font-size:11px">装備中のアイテムはステータスで確認できます</span></div>`;
    ab.innerHTML = gs.dungeon.active && !gs.dungeon.combat ? `
    <button class="btn btn-secondary" style="border-color:var(--green);color:var(--green)" onclick="leaveDungeon(true)">↩ 帰還する</button>
    <div></div>
  ` : `<div></div><div></div>`;
    return;
  }

  // ── ソート ──
  const RARITY_ORDER = RARITY_ORDER_MAP; // S77: グローバル定数を参照
  const TYPE_ORDER = { weapon:0, sub:1, head:2, body:3, cloak:4, legs:5, arms:6, feet:7, neck:8, bracelet:9, ring:10, seal:11, material:12, consumable:13 };
  // 未鑑定品はNormal(-1扱い)以下に固定
  const rarityVal = item => item.identified ? (RARITY_ORDER[item.rarity] ?? 0) : -1;
  const dir = invSortAsc ? 1 : -1;
  const sortFn = {
    default:     () => 0,
    rarity_desc: (a,b) => (rarityVal(b) - rarityVal(a)) * dir,
    type:        (a,b) => {
      const uA = a.identified ? 0 : 1, uB = b.identified ? 0 : 1;
      if(uA !== uB) return uA - uB;
      const ta = TYPE_ORDER[ITEM_MASTER[a.itemId]?.type] ?? 99;
      const tb = TYPE_ORDER[ITEM_MASTER[b.itemId]?.type] ?? 99;
      return ta !== tb ? (ta - tb) * dir : (rarityVal(b) - rarityVal(a)) * dir;
    },
    enh_desc:    (a,b) => {
      const uA = a.identified ? 0 : 1, uB = b.identified ? 0 : 1;
      if(uA !== uB) return uA - uB;
      return ((b.enhLv||0) - (a.enhLv||0)) * dir;
    },
    price_desc:  (a,b) => {
      const uA = a.identified ? 0 : 1, uB = b.identified ? 0 : 1;
      if(uA !== uB) return uA - uB;
      return (itemPrice(b) - itemPrice(a)) * dir;
    },
  };
  if(invSortKey !== "default") inv = [...inv].sort(sortFn[invSortKey] || (() => 0));


  // ── スタック集計 ──
  const shelfUids = new Set(gs.shop.shelves.filter(s => s && s.item).map(s => s.item.uid));
  const stackMap = new Map(); // key:"itemId_rarity" → { rep:item, uids:[] }
  const soloItems = [];       // 装備品（個別表示）

  inv.forEach(item => {
    const m = ITEM_MASTER[item.itemId];
    if(!m) return; // 廃止アイテムのガード
    if(!EQUIP_TYPES.has(m.type)) {
      const key = `${item.itemId}_${item.rarity}`;
      if(!stackMap.has(key)) stackMap.set(key, { rep: item, uids: [] });
      stackMap.get(key).uids.push(item.uid);
    } else {
      soloItems.push(item);
    }
  });

  // ── フィルター適用 ──
  const showEquip      = invFilterKey === "all" || invFilterKey === "equip";
  const showMaterial   = invFilterKey === "all" || invFilterKey === "material";
  const showConsumable = invFilterKey === "all" || invFilterKey === "consumable";

  // スタックカード生成（素材・消耗品）
  const stackCards = [...stackMap.values()]
    .filter(({ rep }) => {
      const t = ITEM_MASTER[rep.itemId]?.type;
      if(t === "consumable") return showConsumable;
      return showMaterial;
    })
    .map(({ rep, uids }) => {
      const m = ITEM_MASTER[rep.itemId];
      const count = uids.length;
      const lockedCount = uids.filter(u => gs.inventory.find(i => i.uid === u)?.locked).length;
      return `<div class="invCard" onclick="openStackDetail('${rep.itemId}','${rep.rarity}')">
        <div class="invCardIcon rarity-${rep.rarity}">
          ${m.icon}
          <span class="invCardBadge">×${count}</span>
          ${lockedCount > 0 ? `<span class="invCardLock">🔒</span>` : ""}
        </div>
        <div class="invCardName">${m.name}</div>
      </div>`;
    });

  // 装備品カード生成
  const soloCards = showEquip ? soloItems.map(item => {
    const m = ITEM_MASTER[item.itemId];
    const isUnidentified = !item.identified;
    const enhLv = item.enhLv || 0;
    const onShelf = shelfUids.has(item.uid);
    const name = isUnidentified ? "未鑑定品" : (ITEM_MASTER[item.itemId].name);
    const cursed = !isUnidentified && item.cursed;
    const locked = !!item.locked;
    const _colKey = item.itemId + "_" + item.rarity;
    const _colReg = item.identified && (gs.collection?.maxEnh ?? {})[_colKey] !== undefined;
    return `<div class="invCard${onShelf ? ' opacity-50' : ''}" onclick="openItemDetail('${item.uid}')">
      <div class="invCardIcon ${isUnidentified ? 'rarity-unidentified' : `rarity-${item.rarity}`}">
        ${isUnidentified ? "❓" : m.icon}
        ${enhLv > 0 ? `<span class="invCardEnhLv">+${enhLv}</span>` : ""}
        ${locked ? `<span class="invCardLock" onclick="toggleLock('${item.uid}',event)">🔒</span>` : `<span class="invCardLock" style="opacity:0;pointer-events:auto;cursor:pointer" onclick="toggleLock('${item.uid}',event)">🔓</span>`}
        ${cursed ? `<span class="invCardCurse">💀</span>` : ""}
        ${_colReg ? `<span style="position:absolute;bottom:1px;left:1px;font-size:8px;color:#88aaff;line-height:1">📖</span>` : ""}
      </div>
      <div class="invCardName">${name}</div>
    </div>`;
  }) : [];

  const allCards = [...stackCards, ...soloCards];

  // ── フィルタータブUI ──
  const filterDefs = [
    { key:"all",        label:"すべて" },
    { key:"equip",      label:"装備品" },
    { key:"material",   label:"素材" },
    { key:"consumable", label:"回復" },
  ];
  const filterTabs = filterDefs.map(f => `
    <button onclick="invFilterKey='${f.key}';render()"
      style="padding:4px 12px;font-size:12px;border-radius:12px;border:1px solid ${invFilterKey===f.key?'var(--accent)':'var(--border-subtle)'};background:${invFilterKey===f.key?'var(--accent-bg)':'transparent'};color:${invFilterKey===f.key?'var(--accent)':'var(--muted)'};cursor:pointer;white-space:nowrap">
      ${f.label}
    </button>`).join("");

  // ── ソートボタンUI ──
  const sortDefs = [
    { key:"default",     label:"取得順" },
    { key:"rarity_desc", label:"等級" },
    { key:"type",        label:"種類" },
    { key:"enh_desc",    label:"強化" },
    { key:"price_desc",  label:"売値" },
  ];
  const sortBtns = sortDefs.map(s => {
    const active = invSortKey === s.key;
    const arrow = active ? (invSortAsc ? " ↑" : " ↓") : "";
    const onclick = active
      ? `invSortAsc=!invSortAsc;render()`
      : `invSortKey='${s.key}';invSortAsc=false;render()`;
    return `<button onclick="${onclick}"
      style="padding:4px 10px;font-size:11px;border-radius:6px;border:1px solid ${active?'var(--accent)':'var(--border-subtle)'};background:${active?'var(--accent-bg)':'var(--bg-deep)'};color:${active?'var(--accent)':'var(--muted)'};cursor:pointer;white-space:nowrap">
      ${s.label}${arrow}
    </button>`;
  }).join("");

  sc.innerHTML = `
    <div class="list-header">
      <div style="display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding:4px 0 4px">
        ${filterTabs}
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;padding:2px 0 6px">
        ${sortBtns}
      </div>
    </div>
    <div class="list-body" style="padding:8px">
      ${allCards.length === 0
        ? `<div class="emptyMsg" style="font-size:13px">該当するアイテムがありません</div>`
        : `<div class="invGrid">${allCards.join("")}</div>`
      }
    </div>
  `;
  ab.innerHTML = `<div></div><div></div>`;
}

function openItemDetail(uid) {
  const item = gs.inventory.find(i=>i.uid===uid);
  if(!item) return;
  const m = ITEM_MASTER[item.itemId];
  const r = RARITY_MASTER[item.rarity];
  const isEquipped = Object.values(gs.equipped).includes(uid);
  const equippedSlot = Object.entries(gs.equipped).find(([s,u])=>u===uid)?.[0];
  const canEquip = EQUIP_TYPES.has(m.type);

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e=>{ if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal-content">
      <div class="modal-title">${item.identified ? `${m.icon} ${m.name}` : `❓ 未鑑定品`}</div>
      <div style="text-align:center;margin-bottom:14px">
        <span class="rarityBadge badge-${item.identified ? item.rarity : 'normal'}" style="font-size:12px;padding:4px 10px">${item.identified ? r.label : '???'}</span>
      </div>
      <div class="card" style="margin-bottom:10px">
        <div style="font-size:12px;color:var(--muted)">種別</div>
        <div style="font-size:14px;margin-top:4px">${m.type}</div>
        ${item.identified ? `
        ${m.stats&&Object.keys(m.stats).length?`
        <div style="font-size:12px;color:var(--muted);margin-top:8px">ベース補正${(item.enhLv||0)>0?` <span style="color:var(--success);font-size:10px">強化+${item.enhLv}</span>`:""}</div>
        <div style="font-size:14px;color:var(--text);margin-top:4px">${itemEffectiveStatsHtml(item)}</div>
        `:""}
        ${item.affixes&&item.affixes.length?`
        <div style="font-size:12px;color:var(--muted);margin-top:8px">ランダムOP</div>
        <div style="margin-top:4px">${item.affixes.map(a=>`<span style="display:inline-block;background:#1a1a30;border:1px solid var(--accent);color:var(--accent2);font-size:11px;padding:2px 7px;border-radius:4px;margin:2px 3px 2px 0">${a.label} +${a.val}</span>`).join("")}</div>
        `:""}
        ${item.cursed && item.curse ? `
        <div style="font-size:12px;color:var(--muted);margin-top:8px">呪い</div>
        <div style="margin-top:4px"><span style="display:inline-block;background:var(--curse-bg);border:1px solid var(--curse-border);color:var(--curse);font-size:11px;padding:3px 8px;border-radius:4px">${item.curse.icon} ${item.curse.label}（${item.curse.desc}${item.curse.val > 0 ? ` ${item.curse.val}` : ""}）</span></div>
        ` : item.identified ? `<div style="font-size:11px;color:var(--muted);margin-top:6px">呪いなし</div>` : ""}
        ` : `
        <div style="margin-top:10px;padding:10px;background:var(--unid-bg);border:1px solid var(--unid-border);border-radius:8px;text-align:center">
          <div style="color:var(--unidentified);font-size:13px;margin-bottom:4px">❓ 未鑑定</div>
          <div style="font-size:11px;color:var(--muted)">OP・呪いは不明です</div>
          ${gs.shop.level >= 2 ? `
          <div style="font-size:11px;color:var(--muted);margin-top:6px">鑑定費用: ${identifyCost(item)}G</div>
          ${gs.player.gold >= identifyCost(item)
            ? `<button class="btn btn-secondary" style="margin-top:8px;width:100%;border-color:var(--unid-border);color:var(--unidentified)" onclick="identifyItem('${uid}')">🔍 鑑定する（${identifyCost(item)}G）</button>`
            : `<button class="btn btn-secondary" style="margin-top:8px;width:100%;border-color:var(--text-disabled);color:var(--text-faint);opacity:0.5" disabled>🔍 Gold不足（${identifyCost(item)}G必要）</button>`
          }
          ` : `<div style="font-size:11px;color:var(--muted);margin-top:6px">ショップLv2で鑑定解禁</div>`}
        </div>
        `}
        ${(()=>{ const _icp=calcItemCP(item); return _icp>0?`<div style="font-size:11px;color:var(--muted);margin-top:6px">⚡ アイテムCP <span style="font-weight:700;color:var(--legendary-bright)">${_icp}</span></div>`:""; })()}
        ${UNSELLABLE_ITEMS.has(item.itemId) ? "" : `
        <div style="font-size:12px;color:var(--muted);margin-top:8px">売却価格</div>
        <div style="font-size:16px;color:var(--gold);font-weight:700;margin-top:4px">${itemPrice(item)}G${!item.identified ? '<span style="font-size:11px;color:var(--muted)">（鑑定前）</span>' : ""}</div>
        `}
      </div>
      <div class="itemActions">
        ${canEquip ? (isEquipped
          ? `<button class="btn btn-secondary" onclick="unequipItem('${equippedSlot}');document.querySelector('.modal-overlay').remove()">外す</button>`
          : `<button class="btn btn-primary" onclick="equipItemByUid('${uid}');document.querySelector('.modal-overlay').remove()">装備する</button>`
        ) : "<div></div>"}
        ${isEquipped
          ? `<button class="btn btn-gold" disabled title="装備を外してから陳列してください" style="opacity:0.35">🏪 陳列する</button>`
          : UNSELLABLE_ITEMS.has(m.itemId || item.itemId)
          ? `<button class="btn btn-secondary" disabled style="opacity:0.35">🚫 非売品</button>`
          : item.locked
          ? `<button class="btn btn-gold" disabled title="ロック中は陳列できません" style="opacity:0.35">🔒 陳列する</button>`
          : gs.shop.shelves.some(s => s && s.item && s.item.uid === uid)
          ? `<button class="btn btn-secondary" style="border-color:var(--danger);color:var(--danger)" onclick="unlistItem('${uid}')">🏪 取り下げる</button>`
          : `<button class="btn btn-gold" onclick="openShelfFromDetail('${uid}')">🏪 陳列する</button>`
        }
      </div>
      <div style="margin-top:6px">
        <button class="btn btn-secondary" style="width:100%;font-size:12px;${item.locked?'border-color:#aaaa00;color:#ffee44':''}"
          onclick="toggleLock('${uid}',event);document.querySelector('.modal-overlay').remove();openItemDetail('${uid}')">
          ${item.locked ? "🔒 ロック解除する" : "🔓 ロックする（一括出品・分解から除外）"}
        </button>
      </div>
      ${(()=>{
        if(!canEquip) return "";
        const isEquippedItem = Object.values(gs.equipped).includes(uid);
        const onShelf = gs.shop.shelves.some(s => s && s.item && s.item.uid === uid);
        const atMax   = (item.enhLv||0) >= ENHANCE_MAX;
        const canEnh  = item.identified && !isEquippedItem && !atMax;
        const canDec  = item.identified && !item.cursed && !isEquippedItem && !onShelf && !item.locked;
        const canRef  = item.identified && !item.cursed && !onShelf && !item.locked && !!REFORGE_MASTER[item.rarity] && (item.affixes||[]).length > 0;
        const canPur  = item.identified && item.cursed;
        const btnStyle = (active, color) => active
          ? `border-color:${color};color:${color};cursor:pointer`
          : `border-color:var(--border-dark);color:var(--text-disabled);cursor:not-allowed;opacity:0.4`;

        // 強化+12到達時は昇級ボタンに切り替え
        let enhBtn = "";
        if(atMax && item.identified) {
          const cond  = GRADE_UP_MASTER[item.rarity];
          const check = cond ? canGradeUp(item) : { ok:false };
          if(cond) {
            // 条件未達でもモーダルは開いて必要素材を確認できる
            enhBtn = `<button class="btn btn-secondary" style="${btnStyle(true,'var(--accent-light)')}"
              onclick="openGradeUpModal('${uid}')">✨ 昇級</button>`;
          } else {
            enhBtn = `<button class="btn btn-secondary" style="${btnStyle(false,'var(--accent-light)')}" disabled>✨ 昇級</button>`;
          }
        } else {
          enhBtn = `<button class="btn btn-secondary" style="${btnStyle(canEnh,'var(--success)')}"
            ${canEnh ? `onclick="openEnhanceModal('${uid}')"` : "disabled"}>⚒ 強化</button>`;
        }

        return `
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:10px">
          ${enhBtn}
          <button class="btn btn-secondary" style="${btnStyle(canDec,'var(--warning)')}"
            ${canDec ? `onclick="decomposeItem('${uid}')"` : "disabled"}>🔨 分解</button>
          <button class="btn btn-secondary" style="${btnStyle(canRef,'#aaccff')}"
            ${canRef ? `onclick="openReforgeModal('${uid}')"` : "disabled"}>🔮 錬成</button>
          <button class="btn btn-secondary" style="${btnStyle(canPur,'var(--curse)')}"
            ${canPur ? `onclick="openPurifyModal('${uid}')"` : "disabled"}>⛓ 解呪</button>
        </div>`;
      })()}
      <button class="btn btn-secondary" style="margin-top:8px;width:100%" onclick="document.querySelector('.modal-overlay').remove()">閉じる</button>

    </div>
  `;
  document.body.appendChild(overlay);
}

// ── スタックアイテム詳細モーダル ──
function openStackDetail(itemId, rarity) {
  const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));
  const shelfUids    = new Set(gs.shop.shelves.filter(s => s && s.item).map(s => s.item.uid));
  const allUids = gs.inventory
    .filter(i => i.itemId === itemId && i.rarity === rarity && !equippedUids.has(i.uid))
    .map(i => i.uid);
  if(allUids.length === 0) return;

  const m  = ITEM_MASTER[itemId];
  const r  = RARITY_MASTER[rarity];
  const rep = gs.inventory.find(i => i.uid === allUids[0]);
  const total = allUids.length;
  const onShelfCount = allUids.filter(u => shelfUids.has(u)).length;
  const lockedCount  = allUids.filter(u => gs.inventory.find(i => i.uid === u)?.locked).length;
  const availableUids = allUids.filter(u => !shelfUids.has(u) && !gs.inventory.find(i=>i.uid===u)?.locked);
  const available = availableUids.length;
  const unitPrice = itemPrice(rep);

  document.querySelector(".modal-overlay")?.remove();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };

  overlay.innerHTML = `
    <div class="modal-content">
      <div class="modal-title">${m.icon} ${m.name}</div>
      <div style="text-align:center;margin-bottom:10px">
        <span class="rarityBadge badge-${rarity}" style="font-size:12px;padding:4px 10px">${r.label}</span>
      </div>
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:13px">
          <span style="color:var(--muted)">所持数</span>
          <span style="font-weight:700">×${total}${onShelfCount > 0 ? `<span style="font-size:11px;color:var(--muted)">（棚出し中:${onShelfCount}）</span>` : ""}${lockedCount > 0 ? `<span style="font-size:11px;color:#ffee44">（🔒${lockedCount}）</span>` : ""}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-top:6px">
          <span style="color:var(--muted)">単価</span>
          <span style="color:var(--gold);font-weight:700">${unitPrice.toLocaleString()}G</span>
        </div>
      </div>

      ${available > 0 && !UNSELLABLE_ITEMS.has(itemId) ? `
      <div style="padding:10px;background:#0d1a0a;border:1px solid #2a6a2a;border-radius:8px;margin-bottom:10px">
        <div style="font-size:12px;color:#88cc88;margin-bottom:8px">🏪 陳列する</div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <button class="btn btn-secondary" style="padding:4px 8px;font-size:11px" id="shelfMin">Min</button>
          <button class="btn btn-secondary" style="padding:4px 10px;font-size:16px" id="shelfMinus">－</button>
          <span style="flex:1;text-align:center;font-size:16px;font-weight:700" id="shelfCount">1</span>
          <button class="btn btn-secondary" style="padding:4px 10px;font-size:16px" id="shelfPlus">＋</button>
          <button class="btn btn-secondary" style="padding:4px 8px;font-size:11px" id="shelfMax">Max</button>
        </div>
        <button class="btn btn-gold" style="width:100%" id="shelfConfirmBtn">棚に出す（<span id="shelfCountLabel">1</span>個）</button>
      </div>
      ` : UNSELLABLE_ITEMS.has(itemId) ? "" : `<div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px">陳列可能な在庫なし${lockedCount > 0 ? "（ロック中を除く）" : ""}</div>`}

      ${UNSELLABLE_ITEMS.has(itemId) ? "" : (()=>{
        const unlockBtn = lockedCount > 0 && lockedCount < total
          ? '<button class="btn btn-secondary" id="unlockAllBtn" style="flex:1;font-size:12px">🔓 全解除</button>'
          : "";
        const lockStyle = lockedCount===total ? "border-color:#aaaa00;color:#ffee44" : "";
        const lockLabel = lockedCount === total ? "🔒 全解除" : "🔒 全ロック";
        return `<div style="display:flex;gap:6px;margin-bottom:8px">
          <button class="btn btn-secondary" id="lockAllBtn" style="flex:1;font-size:12px;${lockStyle}">${lockLabel}</button>
          ${unlockBtn}
        </div>`;
      })()}

      <button class="btn btn-secondary" style="width:100%" id="stackCloseBtn">閉じる</button>
    </div>
  `;
  document.body.appendChild(overlay);

  overlay.querySelector("#stackCloseBtn").addEventListener("click", () => overlay.remove());

  overlay.querySelector("#lockAllBtn")?.addEventListener("click", () => {
    const shouldLock = lockedCount < total;
    allUids.forEach(uid => {
      const item = gs.inventory.find(i => i.uid === uid);
      if(item) item.locked = shouldLock;
    });
    saveGame();
    overlay.remove();
    render();
    openStackDetail(itemId, rarity);
  });
  overlay.querySelector("#unlockAllBtn")?.addEventListener("click", () => {
    allUids.forEach(uid => {
      const item = gs.inventory.find(i => i.uid === uid);
      if(item) item.locked = false;
    });
    saveGame();
    overlay.remove();
    render();
    openStackDetail(itemId, rarity);
  });

  if(available > 0 && !UNSELLABLE_ITEMS.has(itemId)) {
    let shelfN = 1;
    const maxShelf = Math.min(available, gs.shop.shelves.filter(s => s === null || (s && !s.item)).length);
    const shelfCountEl = overlay.querySelector("#shelfCount");
    const shelfLabelEl = overlay.querySelector("#shelfCountLabel");
    const updateShelf = () => {
      shelfN = Math.max(1, Math.min(shelfN, maxShelf));
      shelfCountEl.textContent = shelfN;
      shelfLabelEl.textContent = shelfN;
    };
    overlay.querySelector("#shelfMin").addEventListener("click",  () => { shelfN = 1; updateShelf(); });
    overlay.querySelector("#shelfMinus").addEventListener("click", () => { shelfN--; updateShelf(); });
    overlay.querySelector("#shelfPlus").addEventListener("click",  () => { shelfN++; updateShelf(); });
    overlay.querySelector("#shelfMax").addEventListener("click",  () => { shelfN = maxShelf; updateShelf(); });
    overlay.querySelector("#shelfConfirmBtn").addEventListener("click", () => {
      let listed = 0;
      for(const uid of availableUids) {
        if(listed >= shelfN) break;
        const item = gs.inventory.find(i => i.uid === uid);
        if(!item) continue;
        const emptyIdx = findBestShelfSlot(item);
        if(emptyIdx < 0) break;
        listItem(item, emptyIdx);
        listed++;
      }
      overlay.remove();
      setInventoryMsg("good", `✦ 【${m.name}】を${listed}個 棚に陳列しました`);
      render();
    });
  }
}

function openShelfFromDetail(uid) {
  document.querySelector(".modal-overlay")?.remove();
  const emptyIdx = gs.shop.shelves.findIndex(s => s === null || (s && !s.item));
  const item = gs.inventory.find(i=>i.uid===uid);
  if(!item) return;
  if(UNSELLABLE_ITEMS.has(item.itemId)) { setInventoryMsg("damage","✕ この素材は非売品です"); render(); return; }
  if(item.locked) { setInventoryMsg("damage","✕ ロック中のアイテムは出品できません"); render(); return; }
  if(emptyIdx<0) {
    setInventoryMsg("damage", "✕ 空きの棚がありません。ショップで売れるのを待ちましょう。");
    render();
    return;
  }
  const m = ITEM_MASTER[item.itemId];
  listItem(item, emptyIdx);
  setInventoryMsg("good", `✦ 【${m.name}】を棚に陳列しました`);
  render();
}

// ── ステータス画面 ──
function renderStatus(sc, ab) {
  const p = gs.player;
  const r = calcStats(gs);
  const stats = [
    {key:"str",name:"力",icon:"⚔"},
    {key:"def",name:"守",icon:"🛡"},
    {key:"agi",name:"早",icon:"💨"},
    {key:"vit",name:"体",icon:"❤"},
    {key:"int",name:"賢",icon:"✨"},
    {key:"luk",name:"運",icon:"🍀"},
  ];

  const slotLabel = Object.fromEntries(EQUIP_SLOTS.map(s=>[s.key, s.label]));
  const inDungeon = gs.dungeon.active;

  // 装備グリッド用：スロット定義（12スロット）

    { key:"sub",      icon:"🛡",  label:"サブ" },
    { key:"head",     icon:"🪖",  label:"ヘルム" },
    { key:"body",     icon:"🥋",  label:"トップス" },
    { key:"legs",     icon:"👖",  label:"ボトムス" },
    { key:"cloak",    icon:"🧣",  label:"マント" },
    { key:"arms",     icon:"🥊",  label:"グローブ" },
    { key:"feet",     icon:"👟",  label:"ブーツ" },
    { key:"neck",     icon:"📿",  label:"ネックレス" },
    { key:"bracelet", icon:"⌚",  label:"ブレスレット" },
    { key:"ring",     icon:"💍",  label:"リング" },
    { key:"seal",     icon:"🔴",  label:"印章" },
  ];

  const rarityBorder = { normal:"var(--green)", rare:"var(--info)", epic:"var(--epic)", legendary:"var(--legendary-bright)" };

  const renderSlotCell = (def) => {
    const uid  = gs.equipped[def.key];
    const item = uid ? gs.inventory.find(i => i.uid === uid) : null;
    const m    = item ? ITEM_MASTER[item.itemId] : null;

    if(!item || !m) {
      const onclick = inDungeon ? "" : `onclick="openEquipSelectModal('${def.key}')"`;
      const cursor  = inDungeon ? "cursor:default;opacity:0.35" : "cursor:pointer";
      return `<div ${onclick} style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:8px;border:1px dashed ${inDungeon ? "var(--border-dark)" : "var(--accent)"};background:var(--surface-base);${cursor}">
        <div style="font-size:26px;line-height:1;color:${inDungeon ? "var(--border-dark)" : "var(--accent)"}">${inDungeon ? def.icon : "＋"}</div>
        <div style="font-size:11px;color:var(--muted);text-align:center;line-height:1.2">${def.label}</div>
      </div>`;
    }

    const border     = rarityBorder[item.rarity] || "var(--text-disabled)";
    const enhBadge   = (item.enhLv||0) > 0 ? `<div style="font-size:10px;color:var(--success);font-weight:700;line-height:1">+${item.enhLv}</div>` : "";
    const curseBadge = (item.cursed && item.curse && item.curse.type === "bind")
      ? `<div style="font-size:10px;color:var(--curse);line-height:1">⛓</div>`
      : (item.cursed ? `<div style="font-size:10px;color:var(--epic);line-height:1">呪</div>` : "");
    const itemName   = m.name.length > 6 ? m.name.slice(0,5)+"…" : m.name;

    return `<div onclick="openUnequipModal('${def.key}','${uid}')" style="display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border-radius:8px;border:1px solid ${border};background:var(--surface-base);cursor:pointer">
      <div style="font-size:28px;line-height:1">${m.icon}</div>
      <div style="font-size:11px;color:#ddd;text-align:center;line-height:1.2;font-weight:500">${itemName}</div>
      <div style="font-size:10px;color:var(--muted);text-align:center;line-height:1">${def.label}</div>
      ${enhBadge}${curseBadge}
    </div>`;
  };

  const equipped = `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
    ${slotDefs.map(d => renderSlotCell(d)).join("")}
  </div>`;

  // タブコンテンツ生成
  const hpPct2 = p.maxHp > 0 ? (p.hp / p.maxHp * 100).toFixed(0) : 0;
  const mpPct2 = p.maxMp > 0 ? (p.mp / p.maxMp * 100).toFixed(0) : 0;
  // 冒険録効果パネル（playerContentより前に定義）
  const colSection = (() => {
    const _col = calcCollectionBonus();
    const done = gs.collection?.completed?.length || 0;
    if(done === 0) return "";
    const effects = [];
    if(_col.str > 0)         effects.push({ label:"STR",   val:"+"+_col.str });
    if(_col.def > 0)         effects.push({ label:"DEF",   val:"+"+_col.def });
    if(_col.agi > 0)         effects.push({ label:"AGI",   val:"+"+_col.agi });
    if(_col.vit > 0)         effects.push({ label:"VIT",   val:"+"+_col.vit });
    if(_col.luk > 0)         effects.push({ label:"LUK",   val:"+"+_col.luk });
    if(_col.critRate > 0)    effects.push({ label:"クリ率",  val:"+"+_col.critRate+"%" });
    if(_col.maxHpPct > 0)    effects.push({ label:"最大HP",  val:"+"+_col.maxHpPct+"%" });
    if(_col.escapeBonus > 0) effects.push({ label:"逃走率",  val:"+"+_col.escapeBonus+"%" });
    if(_col.poisonDmg > 0)   effects.push({ label:"毒ダメ",  val:"+"+_col.poisonDmg+"%" });
    if(effects.length === 0) return "";
    return `<div style="margin-top:10px;padding:8px 10px;background:var(--surface-base);border-radius:8px;border:1px solid #1e2e1e">
      <div style="font-size:10px;color:var(--muted);margin-bottom:6px">📖 冒険録（${done}/${(() => {
        const _abu = (gs.player.abyssFloorCleared||0) >= 6;
        const _abt = new Set(["void_tier","specter_tier","colossus_tier","sovereign_tier","will_tier","void_jewelry","specter_jewelry","colossus_jewelry","sovereign_jewelry","will_jewelry"]);
        return Object.entries(COLLECTION_THEME).reduce((a,[tid,th]) => {
          if(_abt.has(tid) && !_abu) return a;
          const p = (th.isAcc||th.isSlot) ? 1 : (th.acc ? 4 : 3);
          return a + p * 4 * (ENHANCE_MAX+1);
        }, 0);
      })()}達成）</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 8px">
        ${effects.map(e => `<div style="display:flex;justify-content:space-between;font-size:11px">
          <span style="color:var(--muted)">${e.label}</span>
          <span style="color:#88aaff;font-weight:700">${e.val}</span>
        </div>`).join("")}
      </div>
    </div>`;
  })();

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:12px;color:var(--muted)">スキルポイント: <span style="color:var(--gold);font-weight:700">${p.skillPoints} SP</span></span>
      <span style="font-size:12px;color:var(--muted)">転生回数: <span style="color:var(--gold);font-weight:700">${p.worldRank}</span>${p.rebirthPoints > 0 ? ` RP: <span style="color:var(--gold);font-weight:700">${p.rebirthPoints}</span>` : ""}</span>
    </div>
    <div style="display:flex;gap:12px;font-size:10px;color:var(--muted);margin-bottom:6px">
      <span><span style="color:var(--green)">(+N)</span> 装備</span>
      <span><span style="color:var(--accent2)">[+N]</span> スキル</span>
    </div>
    <div class="statGrid">
      ${stats.map(s=>{
        const base = p.base[s.key];
        const eqBon  = r.bonus[s.key];
        const skBon  = r.skillBonus[s.key];
        const eqHtml = eqBon > 0
          ? `<span style="font-size:10px;color:var(--green);margin-left:2px">(+${eqBon})</span>`
          : (eqBon < 0 ? `<span style="font-size:10px;color:var(--red);margin-left:2px">(${eqBon})</span>` : "");
        const skHtml = skBon > 0
          ? `<span style="font-size:10px;color:var(--accent2);margin-left:2px">[+${skBon}]</span>`
          : "";
        return `
        <div class="statCell">
          <div class="statName">${s.icon} ${s.name}</div>
          <div class="statValue">${base}${eqHtml}${skHtml}</div>
        </div>`;
      }).join("")}
    </div>
    ${(() => {
      // スキル・セット合計効果パネル
      const critBonus = (gs.player.skills||[]).includes("crit_up") ? 5 : 0;
      const critRate  = Math.min(60, 5 + r.total.luk*0.2 + critBonus + (r.setCritRateBonus||0) + (r.rbCritRatePct||0)).toFixed(1);
      const dmgReduce = (r.setDmgReducePct||0) + (r.skillDmgReducePct||0);
      const escapeRate = Math.min(100, 40 + r.total.agi*1.5 + (r.setEscapeBonus||0) + (r.skillEscapeBonus||0)).toFixed(0);
      const poisonDmg = ((r.skillPoisonDmgMul||0) + (r.setPoisonDmgBonus||0));
      const statusRes = r.skillStatusResist||0;
      const thornPct  = r.skillThornPct||0;
      const counterPct= r.skillCounterRate||0;

      const rows = [
        { label:"⚡ クリティカル率",   val: critRate + "%",                 show: true },
        { label:"🛡 被ダメ軽減",       val: dmgReduce + "%",                show: dmgReduce > 0 },
        { label:"💨 逃走成功率",       val: escapeRate + "%",               show: true },
        { label:"☠ 毒ダメ補正",       val: "+" + poisonDmg + "%",          show: poisonDmg > 0 },
        { label:"🧿 毒/呪いHP耐性",   val: "-" + statusRes + "%",          show: statusRes > 0 },
        { label:"🌵 棘鎧反射",         val: thornPct + "%",                 show: thornPct > 0 },
        { label:"🔄 反撃率",           val: counterPct + "%",               show: counterPct > 0 },
      ].filter(r => r.show);

      if(rows.length === 0) return "";
      return `<div style="margin-top:10px;padding:8px 10px;background:var(--surface-base);border-radius:8px;border:1px solid var(--track-bg)">
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px">⚙ スキル効果</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 8px">
          ${rows.map(row => `<div style="display:flex;justify-content:space-between;font-size:11px">
            <span style="color:var(--muted)">${row.label}</span>
            <span style="color:var(--accent2);font-weight:700">${row.val}</span>
          </div>`).join("")}
        </div>
      </div>`;
    })()}
    ${colSection}
  `;

  // セット効果表示

  const r_set = calcStats(gs);
  const setSection = (() => {
    const activeSets = r_set.setBonuses || [];
    if(activeSets.length === 0) {
      return `<div style="margin-top:12px;padding:10px;background:var(--surface-base);border-radius:8px;border:1px solid var(--bg-mid)">
        <div style="font-size:11px;color:var(--text-disabled);text-align:center">装備セットなし</div>
      </div>`;
    }
    return activeSets.map(({ set, count, activeEffects }) => {
      const maxNeed = set.effects[set.effects.length-1].need;
      const bars = set.effects.map(e => {
        const achieved = count >= e.need;
        return `<span style="display:inline-flex;align-items:center;gap:4px;margin-right:8px;margin-bottom:4px">
          <span style="font-size:10px;color:${achieved?"var(--gold)":"var(--border-subtle)"};font-weight:700">${e.need}部位</span>
          <span style="font-size:10px;color:${achieved?"#e0e0f0":"var(--text-disabled)"}">${e.desc}</span>
          ${achieved?'<span style="font-size:9px;color:#44ff88">✓</span>':''}
        </span>`;
      }).join('');
      return `<div style="margin-top:8px;padding:10px;background:var(--surface-base);border-radius:8px;border:1px solid ${count>=maxNeed?"#6a4a1a":count>=2?"#2a2a0a":"var(--border-list)"}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
          <span style="font-size:16px">${set.icon}</span>
          <span style="font-size:12px;font-weight:700;color:${count>=maxNeed?"var(--legendary-bright)":"#cccc44"}">${set.name}</span>
          <span style="font-size:10px;color:var(--muted);margin-left:auto">${count} / ${set.items.length}部位</span>
        </div>
        <div style="display:flex;flex-wrap:wrap">${bars}</div>
      </div>`;
    }).join('');
  })();

  const equipContent = equipped + `<div style="margin-top:4px"><div style="font-size:11px;color:var(--muted);margin-bottom:4px;margin-top:8px">🔗 セット効果</div>${setSection}</div>`;

  const tabs = [
    { key:"player", label:"👤 プレイヤー" },
    { key:"equip",  label:"⚔ 装備" },
  ];
  const tabBar = tabs.map(t => {
    const active = _statusTab === t.key;
    return `<button onclick="_statusTab='${t.key}';renderStatus(document.getElementById('screen'),document.getElementById('actionBar'))"
      style="flex:1;padding:8px 4px;font-size:12px;border:none;border-bottom:2px solid ${active ? "var(--accent)" : "transparent"};
             background:transparent;color:${active ? "var(--accent2)" : "var(--muted)"};cursor:pointer;font-weight:${active ? "700" : "400"}">${t.label}</button>`;
  }).join("");

  sc.innerHTML = `
    <div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:12px;gap:2px;position:sticky;top:0;background:var(--bg);z-index:10;padding-top:4px">
      ${tabBar}
    </div>
    <div class="card">
      ${_statusTab === "player" ? playerContent : equipContent}
    </div>
  `;
  ab.innerHTML = gs.dungeon.active && !gs.dungeon.combat ? `
    <button class="btn btn-secondary" style="border-color:var(--green);color:var(--green)" onclick="leaveDungeon(true)">↩ 帰還する</button>
    <div></div>
  ` : `<div></div><div></div>`;
}

// ── 装備管理モーダル（外す／持ち替え）──
function buyLootSlot() {
  const slots = gs.player.lootSlots || 0;
  if(slots >= LOOT_SLOT_UPGRADES.length) return;
  const cost = LOOT_SLOT_UPGRADES[slots];
  if(gs.player.gold < cost) { addLog("item", `✕ Gold不足（${goldSpan(cost.toLocaleString() + "G")}必要）`); return; }
  gs.player.gold -= cost;
  gs.player.lootSlots = slots + 1;
  const newLimit = getLootLimit();
  addLog("item", `🎒 鞄を大きくしました（容量 ${newLimit}枠）`);
  showGoldPop(-cost);
  saveGame();
  render();
}

function openUnequipModal(slot, uid) {
  if(gs.dungeon.active) return;
  const item = gs.inventory.find(i=>i.uid===uid);
  if(!item) return;
  const m = ITEM_MASTER[item.itemId];
  const r = RARITY_MASTER[item.rarity];
  const slotLabel = Object.fromEntries(EQUIP_SLOTS.map(s=>[s.key, s.label]));

  // 持ち替え候補：同スロット・未装備・格納庫にあるもの
  const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));
  const candidates = gs.inventory.filter(i=>{
    if(i.uid === uid) return false;
    if(equippedUids.has(i.uid)) return false;
    if(!i.identified) return false;
    const cm = ITEM_MASTER[i.itemId];
    return cm && cm.type === slot;
  });

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e=>{ if(e.target===overlay) overlay.remove(); };

  const mc = document.createElement("div");
  mc.className = "modal-content";

  // ── 現在の装備情報 ──
  const isBound = item.cursed && item.curse && item.curse.type === 'bind';
  const statsHtml = m.stats && Object.keys(m.stats).length
    ? `<div style="font-size:12px;color:var(--muted);margin-top:8px">ベース補正${(item.enhLv||0)>0?` <span style="color:var(--success);font-size:10px">強化+${item.enhLv}</span>`:""}</div>
       <div style="font-size:14px;color:var(--text);margin-top:4px">${itemEffectiveStatsHtml(item)}</div>`
    : "";
  const affixSection = item.affixes && item.affixes.length
    ? `<div style="font-size:12px;color:var(--muted);margin-top:8px">ランダムOP</div>
       <div style="margin-top:4px">${item.affixes.map(a=>`<span style="display:inline-block;background:#1a1a30;border:1px solid var(--accent);color:var(--accent2);font-size:11px;padding:2px 7px;border-radius:4px;margin:2px 3px 2px 0">${a.label} +${a.val}</span>`).join("")}</div>`
    : "";
  const curseSection = item.identified && item.cursed && item.curse
    ? `<div style="font-size:12px;color:var(--muted);margin-top:8px">呪い</div>
       <div style="margin-top:4px"><span style="display:inline-block;background:var(--curse-bg);border:1px solid var(--curse-border);color:var(--curse);font-size:11px;padding:3px 8px;border-radius:4px">${item.curse.icon} ${item.curse.label}${item.curse.val > 0 ? ` ${item.curse.val}` : ""}</span></div>`
    : (!item.identified && item.cursed
      ? `<div style="font-size:11px;color:var(--unid-border);margin-top:6px">⚠ 未鑑定（呪いの有無不明）</div>` : "");

  mc.innerHTML = `
    <div class="modal-title">${m.icon} ${m.name}</div>
    <div style="text-align:center;margin-bottom:12px">
      <span class="rarityBadge badge-${item.rarity}" style="font-size:12px;padding:4px 10px">${r.label}</span>
      ${isBound ? `<span style="display:inline-block;background:var(--curse-bg);border:1px solid var(--curse-border);color:var(--curse);font-size:11px;padding:2px 7px;border-radius:4px;margin-left:6px">⛓ 束縛</span>` : ""}
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:12px;color:var(--muted)">${slotLabel[slot]||slot} に装備中</div>
        <div style="font-size:11px;color:var(--muted)">⚡ CP <span style="font-weight:700;color:var(--legendary-bright)">${calcItemCP(item)}</span></div>
      </div>
      ${statsHtml}
      ${affixSection}
      ${curseSection}
    </div>
    ${isBound
      ? `<button class="btn btn-secondary" style="margin-bottom:12px;opacity:0.4" disabled>⛓ 束縛中（外せない）</button>`
      : `<button class="btn btn-secondary" style="margin-bottom:8px" id="unequipBtn">🔓 装備を外す</button>`
    }
    ${(()=>{
      if(!item.identified) return "";
      const _atMax  = (item.enhLv||0) >= ENHANCE_MAX;
      const _canPur = item.cursed && !!item.curse;
      const _canRef = !!REFORGE_MASTER[item.rarity] && (item.affixes||[]).length > 0 && !item.cursed && !item.locked;
      const _btnStyle = (active, color) => active
        ? `border-color:${color};color:${color};cursor:pointer`
        : `border-color:var(--border-dark);color:var(--text-disabled);cursor:not-allowed;opacity:0.4`;

      // 強化 or 昇級
      let _enhBtn = "";
      if(_atMax) {
        const _cond = GRADE_UP_MASTER[item.rarity];
        _enhBtn = _cond
          ? `<button class="btn btn-secondary" style="${_btnStyle(true,'var(--accent-light)')}" id="gradeUpBtn">✨ 昇級</button>`
          : `<button class="btn btn-secondary" style="${_btnStyle(false,'var(--accent-light)')}" disabled>✨ 昇級</button>`;
      } else {
        const _canEnh = gs.player.gold >= enhanceCost(item);
        _enhBtn = `<button class="btn btn-secondary" style="${_btnStyle(_canEnh,'var(--success)')}"
          ${_canEnh ? 'id="enhanceBtn"' : 'disabled'}>⚒ 強化</button>`;
      }

      return `<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:12px">
        ${_enhBtn}
        <button class="btn btn-secondary" style="${_btnStyle(false,'var(--warning)')}" disabled title="装備を外してから分解">🔨 分解</button>
        <button class="btn btn-secondary" style="${_btnStyle(_canRef,'#aaccff')}" id="reforgeBtn" ${_canRef?'':' disabled'}>🔮 錬成</button>
        <button class="btn btn-secondary" style="${_btnStyle(_canPur,'var(--curse)')}"
          ${_canPur ? 'id="purifyBtn"' : 'disabled'}>⛓ 解呪</button>
      </div>`;
    })()}
    ${candidates.length > 0 ? `<div class="sectionTitle" style="margin-bottom:8px">持ち替える</div>` : ""}
    <div id="candidateList"></div>
    <button class="btn btn-secondary" style="margin-top:4px" id="cancelBtn">閉じる</button>
  `;

  if(!isBound) {
    mc.querySelector("#unequipBtn").addEventListener("click", ()=>{
      unequipItem(slot);
      overlay.remove();
    });
  }
  mc.querySelector("#enhanceBtn")?.addEventListener("click", ()=>{
    overlay.remove();
    openEnhanceModal(uid, () => openUnequipModal(slot, uid));
  });
  mc.querySelector("#gradeUpBtn")?.addEventListener("click", ()=>{
    overlay.remove();
    openGradeUpModal(uid, () => openUnequipModal(slot, uid));
  });
  mc.querySelector("#purifyBtn")?.addEventListener("click", ()=>{
    overlay.remove();
    openPurifyModal(uid);
  });
  mc.querySelector("#reforgeBtn")?.addEventListener("click", ()=>{
    overlay.remove();
    openReforgeModal(uid);
  });
  mc.querySelector("#cancelBtn").addEventListener("click", ()=>overlay.remove());

  // 持ち替え候補リスト
  const list = mc.querySelector("#candidateList");
  candidates.forEach(ci=>{
    const cm = ITEM_MASTER[ci.itemId];
    const cr = RARITY_MASTER[ci.rarity];
    const ciUnid = !ci.identified;
    const ciDispName = itemDisplayName(ci);
    const ciDispIcon = ciUnid ? "❓" : cm.icon;
    const ciUnidBadge = ciUnid
      ? `<span style="display:inline-block;background:var(--unid-bg);border:1px solid var(--unid-border);color:var(--unidentified);font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px">未鑑定</span>`
      : "";
    const card = document.createElement("div");
    card.className = "itemCard";
    card.style.cursor = "pointer";
    card.style.marginBottom = "8px";

    // 現在装備との差分表示（未鑑定の場合は差分非表示）
    const curStats = itemTotalStats(item);
    const nxtStats = ciUnid ? {} : itemTotalStats(ci);
    const diffHtml = (!ciUnid && (Object.keys(curStats).length || Object.keys(nxtStats).length))
      ? Object.keys({...curStats, ...nxtStats}).map(k=>{
          const cur = curStats[k] || 0;
          const nxt = nxtStats[k] || 0;
          const diff = nxt - cur;
          const color = diff > 0 ? "var(--green)" : diff < 0 ? "var(--red)" : "var(--muted)";
          const sign  = diff > 0 ? "+" : "";
          return `<span style="color:${color};font-size:11px;margin-right:6px">${k} ${sign}${diff}</span>`;
        }).join("")
      : ciUnid ? `<span style="font-size:11px;color:var(--unid-border)">未鑑定（詳細不明）</span>` : "";

    card.innerHTML =
      `<div class="itemIcon ${ciUnid?"rarity-normal":"rarity-"+ci.rarity}">${ciDispIcon}</div>` +
      `<div class="itemInfo">` +
        `<div class="itemName" style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">${ciDispName}${ciUnidBadge}${!ciUnid?`<span class="rarityBadge badge-${ci.rarity}">${cr.label}</span>`:""}${!ciUnid?`<span style="margin-left:auto;font-size:10px;color:var(--muted);white-space:nowrap">⚡${calcItemCP(ci)}</span>`:""}</div>` +
        `<div style="margin-top:3px">${diffHtml || '<span style="font-size:11px;color:var(--muted)">補正なし</span>'}</div>` +
        (!ciUnid && affixHtml(ci) ? `<div style="margin-top:2px">${affixHtml(ci)}</div>` : "") +
        (ci.identified && ci.cursed && ci.curse
          ? `<div style="margin-top:3px"><span style="display:inline-block;background:var(--curse-bg);border:1px solid var(--curse-border);color:var(--curse);font-size:10px;padding:1px 6px;border-radius:3px">${ci.curse.icon} ${ci.curse.label}</span></div>`
          : (ciUnid && ci.cursed
            ? `<div style="margin-top:3px"><span style="display:inline-block;background:var(--unid-bg);border:1px solid var(--gold-dark);color:#ccaa00;font-size:10px;padding:1px 6px;border-radius:3px">⚠ 呪いの可能性</span></div>`
            : "")) +
      `</div>` +
      `<div style="font-size:18px;color:var(--accent)">›</div>`;

    card.addEventListener("click", ()=>{
      equipItem(ci);   // equipItem は既存スロットを自動で上書き
      overlay.remove();
    });
    list.appendChild(card);
  });

  overlay.appendChild(mc);
  document.body.appendChild(overlay);
}

// ── 装備選択モーダル（未装備スロットから呼ぶ）──
function openEquipSelectModal(slot) {
  if(gs.dungeon.active) return;
  const slotLabel = Object.fromEntries(EQUIP_SLOTS.map(s=>[s.key, s.label]));
  const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));

  // スロットキー = type名なので直接比較
  const candidates = gs.inventory.filter(i=>{
    if(equippedUids.has(i.uid)) return false;
    if(!i.identified) return false;
    const m = ITEM_MASTER[i.itemId];
    return m && m.type === slot;
  });

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e=>{ if(e.target===overlay) overlay.remove(); };

  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.cssText = "max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";

  const header = document.createElement("div");
  header.style.cssText = "flex-shrink:0;padding:16px 16px 10px;border-bottom:1px solid var(--border)";
  const title = document.createElement("div");
  title.className = "modal-title";
  title.textContent = `${slotLabel[slot]||slot}に装備する`;
  header.appendChild(title);
  mc.appendChild(header);

  const list = document.createElement("div");
  list.style.cssText = "flex:1;overflow-y:auto;padding:8px 16px";
  mc.appendChild(list);

  if(candidates.length === 0) {
    const msg = document.createElement("div");
    msg.className = "emptyMsg";
    msg.style.padding = "20px 0";
    msg.innerHTML = `装備できるアイテムがありません<br><span style="font-size:11px">冒険で${slotLabel[slot]||slot}を探そう</span>`;
    list.appendChild(msg);
  } else {
    candidates.forEach(item=>{
      const m = ITEM_MASTER[item.itemId];
      const r = RARITY_MASTER[item.rarity];
      const isUnid = !item.identified;
      const dispName = itemDisplayName(item);
      const dispIcon = isUnid ? "❓" : m.icon;
      const unidBadge = isUnid
        ? `<span style="display:inline-block;background:var(--unid-bg);border:1px solid var(--unid-border);color:var(--unidentified);font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px">未鑑定</span>`
        : "";
      const card = document.createElement("div");
      card.className = "itemCard";
      card.style.cursor = "pointer";
      card.innerHTML =
        `<div class="itemIcon ${isUnid?'rarity-unidentified':'rarity-'+item.rarity}">${dispIcon}</div>` +
        `<div class="itemInfo">` +
          `<div class="itemName">${dispName}${unidBadge}<span class="rarityBadge ${isUnid?'badge-normal':'badge-'+item.rarity}">${isUnid?'???':r.label}</span></div>` +
          `<div class="itemSub">${isUnid ? "詳細不明" : (itemEffectiveStatsText(item) || "補正なし")}</div>` +
          (!isUnid && affixHtml(item) ? `<div style="margin-top:2px">${affixHtml(item)}</div>` : "") +
          (item.identified && item.cursed && item.curse
            ? `<div style="margin-top:3px"><span style="display:inline-block;background:var(--curse-bg);border:1px solid var(--curse-border);color:var(--curse);font-size:10px;padding:1px 6px;border-radius:3px">${item.curse.icon} ${item.curse.label}</span></div>`
            : (isUnid && item.cursed
              ? `<div style="margin-top:3px"><span style="display:inline-block;background:var(--unid-bg);border:1px solid var(--gold-dark);color:#ccaa00;font-size:10px;padding:1px 6px;border-radius:3px">⚠ 呪いの可能性</span></div>`
              : "")) +
        `</div>` +
        `<div class="itemPrice">${itemPrice(item)}G</div>`;
      card.addEventListener("click", ()=>{
        equipItem(item);
        overlay.remove();
      });
      list.appendChild(card);
    });
  }

  const footer = document.createElement("div");
  footer.style.cssText = "flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border)";
  const closeBtn = document.createElement("button");
  closeBtn.className = "btn btn-secondary";
  closeBtn.style.width = "100%";
  closeBtn.textContent = "閉じる";
  closeBtn.addEventListener("click", ()=>overlay.remove());
  footer.appendChild(closeBtn);
  mc.appendChild(footer);

  overlay.appendChild(mc);
  document.body.appendChild(overlay);
}
