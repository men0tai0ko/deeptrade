// 毒ダメージ（移動・戦闘終了後に呼ぶ）
// 自動HP回復（薬草・回復薬を優先度順に1個使用）
function tryAutoHeal(logs) {
  const ah = gs.dungeon.autoHeal;
  if(!ah?.enabled) return;
  // 回復封印中は発動しない
  if((gs.dungeon.combat?._healBlockedTurns || 0) > 0) {
    if(logs) logs.push({cls:"item", msg:`🚫 回復封印中…`});
    return;
  }
  const r = calcStats(gs);
  const hpRatio = gs.player.hp / r.maxHp * 100;
  if(hpRatio > ah.threshold) return;

  const cs       = gs.dungeon.consumables || {};
  const priority = gs.dungeon.omamoriPriority || "low";
  const rarityOrder = {normal:0,rare:1,epic:2,legendary:3};

  // 薬草・回復薬のスロットを優先度順に集める
  const candidates = [];
  for(const itemId of ["herb","potion"]) {
    const slots = (cs[itemId] || []).filter(s => s.count > 0);
    if(slots.length === 0) continue;
    const sorted = [...slots].sort((a,b) =>
      priority === "low"
        ? (rarityOrder[a.rarity]||0) - (rarityOrder[b.rarity]||0)
        : (rarityOrder[b.rarity]||0) - (rarityOrder[a.rarity]||0)
    );
    candidates.push({ itemId, slot: sorted[0] });
  }
  if(candidates.length === 0) return;

  // 薬草より回復薬を優先（より多く回復できる）
  candidates.sort((a,b) => {
    const healPct = { herb:0.15, potion:0.40 };
    return healPct[b.itemId] - healPct[a.itemId];
  });

  const { itemId, slot } = candidates[0];
  const rarityMul = {normal:1.0,rare:1.3,epic:1.6,legendary:2.0}[slot.rarity] || 1.0;
  const healPct   = itemId === "herb" ? 0.15 : 0.40;
  const heal      = Math.floor(r.maxHp * healPct * rarityMul);
  gs.player.hp    = Math.min(r.maxHp, gs.player.hp + heal);

  slot.count -= 1;
  gs.dungeon.consumables[itemId] = (cs[itemId] || []).filter(s => s.count > 0);
  if(gs.dungeon.consumables[itemId].length === 0) delete gs.dungeon.consumables[itemId];

  const icon = itemId === "herb" ? "🌿" : "🧪";
  const msg  = `${icon} 自動回復発動！HP ${hpRatio.toFixed(0)}%以下 → ${healSpan(heal+" 回復")}`;
  if(logs) logs.push({ cls:"item", msg });
  else addLog("item", msg);
}

function applyPoisonDamage(logs) {
  if(!gs.dungeon.poisoned) return;
  const _pr = calcStats(gs);
  // 猛毒習熟：毒ダメ+N% / セット毒ダメボーナス
  const poisonMul = 1.0
    + ((_pr.skillPoisonDmgMul || 0) / 100)
    + ((_pr.setPoisonDmgBonus || 0) / 100)
    + ((_pr.colPoisonDmg      || 0) / 100);
  // 最大HPの3%（装備成長に比例し、高HPでも理不尽にならないよう最大HP基準に変更）
  const dmg = Math.max(1, Math.ceil(gs.player.maxHp * 0.03 * poisonMul));
  gs.player.hp = Math.max(0, gs.player.hp - dmg);
  (logs || []).push && (logs || []).push({ cls:"item", msg:`☠ 毒で ${dmgSpan(dmg + " ダメージ")}` });
  if(!logs) addLog("item", `☠ 毒で ${dmgSpan(dmg + " ダメージ")}`);
  if(gs.player.hp > 0) tryAutoHeal(logs);
}

function applyBurnDamage(logs) {
  if(!gs.dungeon.burned) return;
  const _br = calcStats(gs);
  // 熱傷：最大HPの2%（毒より軽いが毒と重複する）
  // 業炎セット2部位：burnDmgReduce%軽減
  const burnReduceMul = 1.0 - Math.min(80, (_br.setBurnDmgReduce || 0)) / 100;
  const dmg = Math.max(1, Math.ceil(gs.player.maxHp * 0.02 * burnReduceMul));
  gs.player.hp = Math.max(0, gs.player.hp - dmg);
  const reduceNote = (_br.setBurnDmgReduce || 0) > 0 ? `（${_br.setBurnDmgReduce}%軽減）` : "";
  (logs || []).push && (logs || []).push({ cls:"item", msg:`🔥 熱傷で ${dmgSpan(dmg + " ダメージ")}${reduceNote}` });
  if(!logs) addLog("item", `🔥 熱傷で ${dmgSpan(dmg + " ダメージ")}${reduceNote}`);
  if(gs.player.hp > 0) tryAutoHeal(logs);
}

// 出発前：格納庫→消耗品スロットへ1個持ち出す（鞄の枠は消費しない）
// rarity: 指定等級のアイテムを1個取り出す
function takeOutConsumable(itemId, rarity) {
  const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));
  const idx = gs.inventory.findIndex(i =>
    i.itemId === itemId && i.rarity === rarity && !equippedUids.has(i.uid)
  );
  if(idx < 0) { addLog("item", "✕ 該当アイテムがありません"); render(); return; }
  gs.inventory.splice(idx, 1);
  const arr = gs.dungeon.consumables[itemId] || [];
  const ex  = arr.find(s => s.rarity === rarity);
  if(ex) ex.count++;
  else arr.push({ count: 1, rarity });
  gs.dungeon.consumables[itemId] = arr;
  saveGame(); render();
}

// 出発前：消耗品スロット→格納庫へ1個戻す（指定等級）
function returnConsumable(itemId, rarity) {
  const arr = gs.dungeon.consumables[itemId];
  if(!arr) { addLog("item", "✕ 持ち出していません"); render(); return; }
  const slot = arr.find(s => s.rarity === rarity);
  if(!slot || slot.count <= 0) { addLog("item", "✕ 持ち出していません"); render(); return; }
  gs.inventory.push({
    uid: uuid(), itemId, rarity,
    demand:100, affixes:[], cursed:false, curse:null,
    identified: true, enhLv: 0, statOverride: null, locked: false
  });
  slot.count -= 1;
  gs.dungeon.consumables[itemId] = arr.filter(s => s.count > 0);
  if(gs.dungeon.consumables[itemId].length === 0) delete gs.dungeon.consumables[itemId];
  saveGame(); render();
}

// 指定種・等級の消耗品を全て持ち出す
function takeOutAllConsumable(itemId, rarity) {
  const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));
  const targets = gs.inventory.filter(i =>
    i.itemId === itemId && i.rarity === rarity && !equippedUids.has(i.uid)
  );
  if(targets.length === 0) return;
  targets.forEach(item => {
    const idx = gs.inventory.indexOf(item);
    if(idx < 0) return;
    gs.inventory.splice(idx, 1);
    const arr = gs.dungeon.consumables[itemId] || [];
    const ex  = arr.find(s => s.rarity === rarity);
    if(ex) ex.count++;
    else arr.push({ count: 1, rarity });
    gs.dungeon.consumables[itemId] = arr;
  });
  saveGame(); render();
}

// 指定種・等級の消耗品を全て格納庫に戻す
function returnAllConsumable(itemId, rarity) {
  const arr  = gs.dungeon.consumables[itemId];
  const slot = arr?.find(s => s.rarity === rarity);
  if(!slot || slot.count <= 0) return;
  const count = slot.count;
  for(let i = 0; i < count; i++) {
    gs.inventory.push({
      uid: uuid(), itemId, rarity,
      demand:100, affixes:[], cursed:false, curse:null,
      identified: true, enhLv: 0, statOverride: null, locked: false
    });
  }
  slot.count = 0;
  gs.dungeon.consumables[itemId] = arr.filter(s => s.count > 0);
  if(gs.dungeon.consumables[itemId].length === 0) delete gs.dungeon.consumables[itemId];
  saveGame(); render();
}


// 消耗品の使用（指定itemId・rarity）
// 効果倍率: Normal=1.0 / Rare=1.3 / Epic=1.6 / Legendary=2.0
function useConsumable(itemId, rarity) {
  if(!gs.dungeon.active) { addLog("item", "✕ 冒険中のみ使用できます"); render(); return; }
  const p = gs.player;
  const r = calcStats(gs);
  const arr  = gs.dungeon.consumables[itemId];
  const slot = arr?.find(s => s.rarity === rarity);

  if(!slot || slot.count <= 0) {
    addLog("item", "✕ 持ち出していません（出発前に準備してください）");
    render(); return;
  }

  const rarityMul   = {normal:1.0, rare:1.3, epic:1.6, legendary:2.0}[rarity] || 1.0;
  const rarityLabel = rarity !== "normal" ? `[${rarity}] ` : "";

  if(itemId === "herb") {
    const heal = Math.floor(r.maxHp * 0.15 * rarityMul);
    p.hp = Math.min(r.maxHp, p.hp + heal);
    addLog("item", `🌿 ${rarityLabel}薬草を使用。${healSpan(heal)} 回復した`);
  } else if(itemId === "potion") {
    const heal = Math.floor(r.maxHp * 0.40 * rarityMul);
    p.hp = Math.min(r.maxHp, p.hp + heal);
    addLog("item", `🧪 ${rarityLabel}回復薬を使用。${healSpan(heal)} 回復した`);
  } else if(itemId === "antidote") {
    if(!gs.dungeon.poisoned) { addLog("item", `💊 ${statusSpan("毒状態")}ではない`); render(); return; }
    gs.dungeon.poisoned = false;
    const bonus = rarity !== "normal" ? Math.floor(r.maxHp * 0.10 * rarityMul) : 0;
    if(bonus > 0) p.hp = Math.min(r.maxHp, p.hp + bonus);
    addLog("item", `💊 ${rarityLabel}解毒薬を使用。${statusSpan("毒")}を解除${bonus > 0 ? `・${healSpan(bonus)} 回復` : ""}`);
  } else if(itemId === "omamori") {
    // 潜入時に自動使用されるため戦闘中の手動使用は不可
    addLog("item", `🪬 お守りは潜入時に自動発動します（手動使用不可）`);
    render(); return;
  } else {
    addLog("item", "✕ このアイテムは使用できません"); render(); return;
  }

  slot.count -= 1;
  gs.dungeon.consumables[itemId] = arr.filter(s => s.count > 0);
  if(gs.dungeon.consumables[itemId].length === 0) delete gs.dungeon.consumables[itemId];
  document.querySelector(".modal-overlay")?.remove();
  saveGame(); render();
}

// 戦闘中のアイテム選択モーダル（等級別・アイコン枠色で等級表現）
function openCombatItemModal() {
  const cs = gs.dungeon.consumables || {};
  const RARITY_ORDER = RARITY_ORDER_MAP; // S77: グローバル定数を参照

  // 等級別に全スロットを展開（高レア順）
  const btns = Object.entries(cs).flatMap(([id, arr]) =>
    arr.filter(s => s.count > 0)
       .sort((a,b) => (RARITY_ORDER[b.rarity]||0)-(RARITY_ORDER[a.rarity]||0))
       .map(slot => {
         const m       = ITEM_MASTER[id];
         const healPct = id==="herb" ? 15 : id==="potion" ? 40 : null;
         const mul     = {normal:1.0,rare:1.3,epic:1.6,legendary:2.0}[slot.rarity]||1.0;
         const isOmamori = id === "omamori";
         const hint    = isOmamori
           ? `<span style="font-size:11px;color:var(--muted)">潜入時自動発動</span>`
           : healPct
             ? `<span style="font-size:11px;color:var(--muted)">HP +${Math.round(healPct*mul)}%</span>`
             : (slot.rarity!=="normal"
               ? `<span style="font-size:11px;color:var(--muted)">解毒+回復</span>` : `<span style="font-size:11px;color:var(--muted)">解毒</span>`);
         return `<button class="btn btn-secondary"
           style="width:100%;margin-bottom:6px;display:flex;align-items:center;gap:10px;text-align:left;padding:8px 12px"
           onclick="useConsumable('${id}','${slot.rarity}')">
           <span class="shelfIcon rarity-${slot.rarity}" style="width:36px;height:36px;font-size:20px;flex-shrink:0">${m.icon}</span>
           <span style="flex:1;font-size:13px">${m.name}</span>
           ${hint}
           <span style="color:var(--muted);font-size:12px">×${slot.count}</span>
         </button>`;
       })
  ).join("");

  if(!btns) {
    addLog("item", "持ち出した消耗品がない"); render(); return;
  }

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">🎒 アイテムを使う</div>
      ${btns}
      <button class="btn btn-secondary" style="width:100%;margin-top:4px" onclick="this.closest('.modal-overlay').remove()">キャンセル</button>
    </div>`;
  overlay.addEventListener("click", e => { if(e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// 解呪費用計算（種別で倍率が変わる）
const CURSE_AMPLIFY = {
  add:    { hp_drain:2, def_down:2, gold_loss:3, bind:0 },
  maxVal: { hp_drain:10, def_down:12, gold_loss:20, bind:0 },
};

function purifyMultiplier(curseType, curseVal) {
  const base = { hp_drain:1.5, def_down:1.5, gold_loss:2.0, bind:3.0 }[curseType] || 2.0;
  const maxVal = CURSE_AMPLIFY.maxVal[curseType] || 1;
  // 呪い値が高いほど解呪コスト増加（最大で基本倍率の2倍）
  const valRate = maxVal > 0 ? Math.min((curseVal || 0) / maxVal, 1.0) : 0;
  return base * (1 + valRate);
}
function purifyCost(item, discount=1.0) {
  const m = ITEM_MASTER[item.itemId];
  const r = RARITY_MASTER[item.rarity];
  const affixBonus = (item.affixes||[]).reduce((s,a) => s + a.val * 18, 0);
  const trueValue = Math.floor(m.basePrice * r.multi + affixBonus);
  return Math.floor(trueValue * purifyMultiplier(item.curse?.type, item.curse?.val) * discount);
}

// 解呪実行（discount: ショップ=1.0、祠=0.6）
function purifyItem(uid, discount=1.0) {
  const item = gs.inventory.find(i => i.uid === uid);
  if(!item || !item.cursed || !item.curse) return;
  const cost = purifyCost(item, discount);
  if(gs.player.gold < cost) {
    addLog("item", `Goldが足りません（必要: ${goldSpan(cost + "G")}）`);
    render(); return;
  }
  gs.player.gold -= cost;
  const purifyBonus = calcStaffBonus();
  const successAdd  = purifyBonus.purifySuccessBonus || 0;  // 成功率+
  const failSafe    = purifyBonus.purifyFailSafe    || 0;   // 大失敗率-（最低1%）
  // 基本: 大失敗5% / 失敗30% / 成功65% → 呪物師補正後
  const bigFailThresh = Math.max(1, 5 - failSafe);
  const failThresh    = bigFailThresh + Math.max(0, 30 - successAdd);
  const roll = Math.random() * 100;
  let failed = false;
  if(roll < bigFailThresh) {
    const add = CURSE_AMPLIFY.add[item.curse.type] || 0;
    if(add > 0) {
      const maxVal = CURSE_AMPLIFY.maxVal[item.curse.type] || 99;
      item.curse.val = Math.min(item.curse.val + add, maxVal);
    }
    addLog("item", `💀 解呪に大失敗！${statusSpan("呪い")}が強化されてしまった… (${goldSpan("-" + cost + "G")})`);
    failed = true;
  } else if(roll < failThresh) {
    addLog("item", `✕ 解呪に失敗…${statusSpan("呪い")}は残ったままだ (${goldSpan("-" + cost + "G")})`);
    failed = true;
  } else {
    item.cursed = false;
    item.curse = null;
    const m = ITEM_MASTER[item.itemId];
    addLog("item", `✨ 【${rarityItemSpan(m.name, item.rarity, (item.affixes||[]).length)}】の${statusSpan("呪い")}を解いた！ (${goldSpan("-" + cost + "G")})`);
  }
  saveGame();
  // 失敗・大失敗はアイテム詳細を再表示（呪いが残っているため）
  // 成功時も再表示（呪い表示を更新するため）
  document.querySelector(".modal-overlay")?.remove();
  openItemDetail(uid);
  render();
}

      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">強化すると全ステータス+1</div>
      <button class="btn btn-secondary" style="width:100%;${canAfford?'border-color:#2a8a2a;color:var(--success)':'border-color:var(--border-subtle);color:var(--text-disabled);opacity:0.5'}"

    </div>`;
  if(!atMax && overlay.querySelector("#enhExecBtn")) {
    overlay.querySelector("#enhExecBtn").addEventListener("click", () => {
      _execEnhance(uid, backFn);
    });
  }
  overlay.querySelector("#enhCancelBtn").addEventListener("click", () => {
    overlay.remove();
    if(typeof backFn === "function") backFn();
    else openItemDetail(uid);
  });
  document.body.appendChild(overlay);
}

function _execEnhance(uid, backFn) {
  const item = gs.inventory.find(i=>i.uid===uid);
  if(!item) return;
  if((item.enhLv||0) >= ENHANCE_MAX) { addLog("item","✕ 強化上限に達しています"); return; }
  const cost = enhanceCost(item);
  if(gs.player.gold < cost) { addLog("item", `✕ Gold不足（${goldSpan(cost+"G")}必要）`); return; }
  gs.player.gold -= cost;
  const currentLv = item.enhLv || 0;
  const m = ITEM_MASTER[item.itemId];
  const baseRate   = ENHANCE_SUCCESS_RATE[currentLv] ?? 30;
  const staffBonus = calcStaffBonus().enhSuccessBonus;
  const successRate = Math.min(100, baseRate + staffBonus);
  const success = Math.random() * 100 < successRate;
  showGoldPop(-cost);
  if(!success) {
    addLog("item", `⚒ 【${m.name}】の強化に失敗… +${currentLv} のまま（-${cost}G / 成功率${successRate}%）`);
    saveGame();
    _renderEnhanceModal(item.uid, backFn);
    return;
  }
  item.enhLv = currentLv + 1;
  addLog("item", `⚒ 【${m.name}】を強化！ +${item.enhLv} になった（-${cost}G / 成功率${successRate}%）`);
  if(gs.achievements?.stats) gs.achievements.stats.totalEnhance = (gs.achievements.stats.totalEnhance||0) + 1;
  if(item.cursed && item.curse && item.enhLv % 4 === 0) {
    const add = CURSE_AMPLIFY.add[item.curse.type] || 0;
    if(add > 0) {
      const maxVal = CURSE_AMPLIFY.maxVal[item.curse.type] || 99;
      const before = item.curse.val;
      item.curse.val = Math.min(item.curse.val + add, maxVal);
      if(item.curse.val > before) addLog("item", `💀 ${statusSpan("呪い")}が強まった！`);
    }
  }
  saveGame();
  render();
  if(item.enhLv >= ENHANCE_MAX) {
    document.querySelector(".modal-overlay")?.remove();
    if(typeof backFn === "function") backFn();
    else openItemDetail(uid);
  } else {
    _renderEnhanceModal(uid, backFn);
  }
}

function _execPurify(uid) {
  const item = gs.inventory.find(i => i.uid === uid);
  if(!item || !item.cursed || !item.curse) return;
  const cost = purifyCost(item, 1.0);
  if(gs.player.gold < cost) { addLog("item", `✕ Gold不足（${goldSpan(cost+"G")}必要）`); return; }
  gs.player.gold -= cost;
  const roll = Math.random() * 100;
  let resultMsg = "";
  let success = false;
  if(roll < 5) {
    const add = CURSE_AMPLIFY.add[item.curse.type] || 0;
    if(add > 0) item.curse.val = Math.min(item.curse.val + add, CURSE_AMPLIFY.maxVal[item.curse.type] || 99);
    resultMsg = `💀 大失敗！${statusSpan("呪い")}が強化された… (${goldSpan("-"+cost.toLocaleString()+"G")})`;
    addLog("item", resultMsg);
  } else if(roll < 35) {
    resultMsg = `✕ 失敗…${statusSpan("呪い")}は残ったまま (${goldSpan("-"+cost.toLocaleString()+"G")})`;
    addLog("item", resultMsg);
  } else {
    item.cursed = false;
    item.curse  = null;
    const m = ITEM_MASTER[item.itemId];
    resultMsg = `✨ 【${m.name}】の${statusSpan("呪い")}を解いた！ (${goldSpan("-"+cost.toLocaleString()+"G")})`;

    success = true;
  }

  saveGame();
  render();
  if(success) { if(gs.achievements?.stats) gs.achievements.stats.totalPurify = (gs.achievements.stats.totalPurify||0) + 1; openItemDetail(uid); } else { _renderPurifyModal(uid, resultMsg); }
}

// 昇級可否チェック。{ok, reason} を返す
// ── 分解 ──
function decomposeCost(item) {
  // トレンド・転生スキル等の変動要素を除いた固定コスト
  const m = ITEM_MASTER[item.itemId];
  const r = RARITY_MASTER[item.rarity];
  const affixBonus = (item.affixes||[]).reduce((s,a) => s + a.val * 18, 0);
  return Math.floor((m.basePrice * r.multi + affixBonus) * 0.3);
}

function decomposeItem(uid) {
  const item = gs.inventory.find(i => i.uid === uid);
  if(!item) return;

  // 条件チェック
  if(!item.identified)                            { addLog("item","✕ 未鑑定アイテムは分解できません"); return; }
  if(item.cursed)                                 { addLog("item","✕ 呪われたアイテムは分解できません"); return; }
  if(item.locked)                                 { addLog("item","✕ ロック中のアイテムは分解できません"); return; }
  if(Object.values(gs.equipped).includes(uid))    { addLog("item","✕ 装備中は分解できません"); return; }
  if(gs.shop.shelves.some(s => s && s.item && s.item.uid === uid))               { addLog("item","✕ 棚に出しているアイテムは分解できません"); return; }

  const cost = decomposeCost(item);
  if(gs.player.gold < cost) { addLog("item", `✕ Gold不足（${goldSpan(cost.toLocaleString() + "G")}必要）`); return; }

  const m = ITEM_MASTER[item.itemId];
  const rewards = buildDecomposeRewards(item);
  const rewardText = rewards.map(r => {
    const mm = ITEM_MASTER[r.itemId];
    return `${mm.icon}${mm.name}(${RARITY_MASTER[r.rarity].label})×${r.count}`;
  }).join("、");

  // 確認モーダル
  document.querySelector(".modal-overlay")?.remove();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-content" style="text-align:center">
      <div class="modal-title">🔨 分解確認 ${goldBadge()}</div>
      <div style="font-size:14px;margin-bottom:12px">【${m.name}】を分解しますか？</div>
      <div style="font-size:13px;color:var(--warning);margin-bottom:4px">費用: ${cost.toLocaleString()}G</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:20px">獲得: ${rewardText}</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1" id="decomposeCancelBtn">キャンセル</button>
        <button class="btn btn-secondary" style="flex:1;border-color:var(--danger-dark);color:var(--warning)" id="decomposeConfirmBtn">🔨 分解する</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  overlay.querySelector("#decomposeCancelBtn").addEventListener("click", () => {
    overlay.remove();
    openItemDetail(uid);
  });
  overlay.querySelector("#decomposeConfirmBtn").addEventListener("click", () => {
    overlay.remove();

    // Gold消費
    gs.player.gold -= cost;

    // アイテム削除
    gs.inventory = gs.inventory.filter(i => i.uid !== uid);

    // 素材を格納庫に追加
    for(const r of rewards) {
      for(let i = 0; i < r.count; i++) {
        gs.inventory.push({
          uid:          `mat_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
          itemId:       r.itemId,
          rarity:       r.rarity,
          identified:   true,
          cursed:       false,
          curse:        null,
          affixes:      [],
          enhLv:        0,
          statOverride: null,
        });
      }
    }

    addLog("item", `🔨【${m.name}】を分解（-${cost.toLocaleString()}G）→ ${rewardText}`);
    showGoldPop(-cost);
    saveGame();
    render();
  });
}

// 分解報酬リストを生成
function buildDecomposeRewards(item) {
  const base = DECOMPOSE_MASTER[item.rarity] || [];
  const bonus = Math.floor((item.enhLv || 0) / 4); // +4ごとに+1個（最初の素材に加算）
  const rewards = base.map((r, idx) => ({
    itemId: r.itemId,
    rarity: materialRarity(r.itemId),
    count:  r.count + (idx === 0 ? bonus : 0),
  }));
  return rewards;
}

function canGradeUp(item) {
  if(!item.identified)               return { ok:false, reason:"未鑑定は昇級不可" };
  const cond = GRADE_UP_MASTER[item.rarity];
  if(!cond)                          return { ok:false, reason:"これ以上昇級できません" };
  if((item.enhLv||0) < cond.minEnhLv) return { ok:false, reason:`強化+${cond.minEnhLv}以上が必要（現在+${item.enhLv||0}）` };
  if(gs.player.gold < cond.gold)     return { ok:false, reason:`Gold不足（${cond.gold.toLocaleString()}G必要）` };
  for(const req of cond.materials) {
    // 素材はitemIdのみで照合（等級は問わない）
    const held = gs.inventory.filter(i =>
      i.itemId === req.itemId &&
      !Object.values(gs.equipped).includes(i.uid)
    ).length;
    if(held < req.count) {
      const mm = ITEM_MASTER[req.itemId];
      return { ok:false, reason:`${mm.name}が${req.count}個必要（所持${held}個）` };
    }
  }
  return { ok:true, reason:"" };
}

function gradeUpItem(uid, backFn) {
  const item = gs.inventory.find(i=>i.uid===uid);
  if(!item) return;
  const check = canGradeUp(item);
  if(!check.ok) { addLog("item", `✕ ${check.reason}`); return; }

  const cond   = GRADE_UP_MASTER[item.rarity];
  const m      = ITEM_MASTER[item.itemId];
  const oldRar = item.rarity;
  const newRar = cond.to;
  const oldMul = RARITY_MASTER[oldRar].multi;
  const newMul = RARITY_MASTER[newRar].multi;
  const scale  = newMul / oldMul; // 例 Rare→Epic: 3.5/1.8 ≒ 1.94

  // Gold・素材消費（素材は昇級元と同じレアリティのものを優先消費）
  gs.player.gold -= cond.gold;
  for(const req of cond.materials) {
    let need = req.count;
    gs.inventory = gs.inventory.filter(i => {
      if(need > 0 && i.uid !== uid && i.itemId === req.itemId && !Object.values(gs.equipped).includes(i.uid)) {
        need--;
        return false;
      }
      return true;
    });
  }

  // レアリティ昇格
  item.rarity = newRar;

  // ベース補正スケール（小数→切り上げ、最低+1保証）
  // 強化値（enhLv）をベースに吸収してからスケール適用 → enhLvはリセット
  if(m.stats) {
    if(!item.statOverride) item.statOverride = { ...m.stats };
    const enh = item.enhLv || 0;
    // 強化分をベースに加算してからスケール
    Object.keys(item.statOverride).forEach(k => {
      const absorbed = item.statOverride[k] + enh; // enhは全ステに+1/段階
      item.statOverride[k] = Math.max(1, Math.ceil(absorbed * scale));
    });
  }
  // 強化値をリセット
  const absorbedEnh = item.enhLv || 0;
  item.enhLv = 0;

  // ランダムOP：既存値を引き継ぎ＋上位枠分を新規追加
  const oldAffixCount = RARITY_MASTER[oldRar].affixCount;
  const newAffixCount = RARITY_MASTER[newRar].affixCount;
  const addCount = newAffixCount - oldAffixCount; // 追加する枠数
  if(addCount > 0) {
    if(!item.affixes) item.affixes = [];
    const itemType = m.type;
    const pool = AFFIX_MASTER.filter(a =>
      a.types.includes(itemType) &&
      !item.affixes.some(ex => ex.id === a.id) // 重複排除
    );
    for(let i = 0; i < addCount && pool.length > 0; i++) {
      const totalW = pool.reduce((s, a) => s + a.weight, 0);
      let rnd = Math.random() * totalW;
      const chosen = pool.find(a => (rnd -= a.weight) < 0) || pool[pool.length-1];
      item.affixes.push({
        id:    chosen.id,
        label: chosen.label,
        stat:  chosen.stat,
        val:   Math.floor(chosen.min + Math.random() * (chosen.max - chosen.min + 1)),
      });
      pool.splice(pool.indexOf(chosen), 1);
    }
  }

  saveGame();
  render();
  const enhNote = absorbedEnh > 0 ? `（強化+${absorbedEnh}をベースに吸収）` : "";
  if(newRar === "legendary" && gs.achievements?.stats) gs.achievements.stats.totalGradeUp = (gs.achievements.stats.totalGradeUp||0) + 1;
  addLog("item", `✨ 【${m.name}】が ${RARITY_MASTER[oldRar].label} → ${RARITY_MASTER[newRar].label} に昇級！${enhNote}`);
  if(typeof backFn === "function") backFn();
  else openItemDetail(uid);
}

// ─────────────────────────────────────────
// 錬成システム
// ─────────────────────────────────────────
function crystalCount() {
  return gs.inventory.filter(i => i.itemId === "magic_crystal").length;
}

function canReforge(item) {
  if(!item.identified)  return { ok:false, reason:"未鑑定は錬成不可" };
  if(item.cursed)       return { ok:false, reason:"呪われたアイテムは錬成不可" };
  if(item.locked)       return { ok:false, reason:"ロック中は錬成不可" };
  if(gs.shop.shelves.some(s => s && s.item && s.item.uid === item.uid)) return { ok:false, reason:"棚に出しているアイテムは錬成不可" };
  if(!REFORGE_MASTER[item.rarity]) return { ok:false, reason:"このレアリティは錬成不可" };
  if(!item.affixes || item.affixes.length === 0) return { ok:false, reason:"OPなしは錬成不可" };
  return { ok:true };
}

function consumeCrystal(count) {
  let need = count;
  gs.inventory = gs.inventory.filter(i => {
    if(need > 0 && i.itemId === "magic_crystal") { need--; return false; }
    return true;
  });
}

// affix1枠を振り直す（fixedIds: 固定するaffix.idの配列）
function rerollAffixes(item, fixedIds) {
  const m = ITEM_MASTER[item.itemId];
  const fixedAffixes = item.affixes.filter(a => fixedIds.includes(a.id));
  const rerollCount  = item.affixes.length - fixedAffixes.length;
  const pool = AFFIX_MASTER.filter(a =>
    a.types.includes(m.type) && !fixedAffixes.some(fa => fa.id === a.id)
  );
  const newAffixes = [...fixedAffixes];
  for(let i = 0; i < rerollCount && pool.length > 0; i++) {
    const totalW = pool.reduce((s,a) => s + a.weight, 0);
    let rnd = Math.random() * totalW;
    const chosen = pool.find(a => (rnd -= a.weight) < 0) || pool[pool.length-1];
    newAffixes.push({
      id: chosen.id, label: chosen.label, stat: chosen.stat,
      val: Math.floor(chosen.min + Math.random() * (chosen.max - chosen.min + 1)),
    });
    pool.splice(pool.indexOf(chosen), 1);
  }
  return newAffixes; // item.affixes への書き込みは呼び出し側で行う
}

function _renderReforgeModal(uid, selectedIds) {
  document.querySelector(".modal-overlay")?.remove();
  const item = gs.inventory.find(i => i.uid === uid);
  if(!item) return;
  const m  = ITEM_MASTER[item.itemId];
  const rc = REFORGE_MASTER[item.rarity];
  const crystal = crystalCount();
  const affixCount = item.affixes.length;

  const hasAll = !!rc.all;
  const hasOne = !!rc.one && affixCount >= 2;
  const hasTwo = !!rc.two && affixCount >= 3;

  const fixedCount  = selectedIds.length;
  const rerollCount = affixCount - fixedCount;

  // 部分錬成モード判定
  // Legendary: 2枠固定時のみ "two"
  // Epic:      1枠固定時のみ "one"
  // Rare:      部分錬成なし
  let partMode = null;
  if(fixedCount > 0 && rerollCount > 0) {
    if(item.rarity === "legendary" && fixedCount === 2 && hasTwo) {
      partMode = "two";
    } else if(item.rarity === "epic" && fixedCount === 1 && hasOne) {
      partMode = "one";
    }
  }

  const maxFixed = item.rarity === "legendary" ? 2 : item.rarity === "epic" ? 1 : 0;
  const selHint = maxFixed > 0
    ? `<div style="font-size:11px;color:var(--muted);margin:6px 0">固定したいOPをタップで選択（最大${maxFixed}個）</div>`
    : "";

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-content" style="max-width:340px">
      <div class="modal-title">🔮 錬成　<span style="font-size:12px;color:var(--muted)">${m.name}</span> ${goldBadge()}</div>
      <div style="font-size:12px;color:var(--text-muted-blue);margin-bottom:4px">所持魔晶石: <span style="color:#88ccff;font-weight:700">🔷 ${crystal}個</span></div>
      <div id="reforgeCostInfo" style="margin-bottom:8px"></div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">現在のOP：</div>
      <div id="reforgeAffixList"></div>
      ${selHint}
      <div id="reforgeModeBtns"></div>
      <button class="btn btn-secondary" style="width:100%;margin-top:10px" id="reforgeCancelBtn">キャンセル</button>
    </div>`;

  // OPリストをリスナーで構築
  const affixList = overlay.querySelector("#reforgeAffixList");
  item.affixes.forEach(a => {
    const sel = selectedIds.includes(a.id);
    const row = document.createElement("div");
    row.style.cssText = "padding:6px 10px;margin:3px 0;border-radius:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;"
      + (sel ? "border:1px solid var(--accent);background:var(--accent-bg);" : "border:1px solid var(--border-subtle);background:var(--bg-deep);");
    row.innerHTML = `<span style="color:${sel ? "var(--accent)" : "var(--text-muted-blue)"}">${a.label}</span>`
      + `<div style="display:flex;align-items:center;gap:6px">`
      + `<span style="color:${sel ? "var(--accent)" : "var(--success)"};font-size:12px">+${a.val}${sel ? " 🔒固定" : ""}</span>`
      + `<button style="width:18px;height:18px;border-radius:50%;border:1px solid var(--text-faint);background:var(--bg-mid);color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:1" data-info-btn="${a.id}">!</button>`
      + `</div>`;
    row.addEventListener("click", e => {
      if(e.target.dataset.infoBtn) return; // ! ボタンは別処理
      if(maxFixed === 0) return;
      const next = selectedIds.includes(a.id)
        ? selectedIds.filter(id => id !== a.id)
        : selectedIds.length < maxFixed ? [...selectedIds, a.id] : selectedIds;
      _renderReforgeModal(uid, next);
    });
    row.querySelector("[data-info-btn]").addEventListener("click", e => {
      e.stopPropagation();
      _showAffixPoolModal(item);
    });
    affixList.appendChild(row);
  });

  // 固定数で自動判定：部分錬成条件を満たせば部分錬成、それ以外は全再錬成
  const activeCost   = partMode ? rc[partMode] : rc.all;
  const activeMode   = partMode || "all";
  const activeFixed  = partMode ? selectedIds : [];

  // コスト表示
  const costInfo = overlay.querySelector("#reforgeCostInfo");
  const enoughCrystal = crystal >= activeCost.crystal;
  const enoughGold    = gs.player.gold >= activeCost.gold;
  const canDo = enoughCrystal && enoughGold;
  costInfo.style.color = canDo ? "#88ccff" : "var(--damage)";
  costInfo.innerHTML = `必要コスト：🔷×${activeCost.crystal} / ${activeCost.gold.toLocaleString()}G`
    + (!enoughCrystal ? `　<span style="color:var(--damage)">🔷不足</span>` : "")
    + (!enoughGold    ? `　<span style="color:var(--damage)">Gold不足</span>` : "");

  // 錬成ボタン（1つのみ）
  const modeBtns = overlay.querySelector("#reforgeModeBtns");
  const btn = document.createElement("button");
  btn.className = "btn btn-secondary";
  btn.style.cssText = "width:100%;margin-top:6px;"
    + (canDo ? "border-color:#5588ff;color:#aaccff;" : "border-color:var(--border-subtle);color:var(--text-faint);opacity:0.5;");
  btn.disabled = !canDo;
  btn.textContent = "🔮 錬成";
  if(canDo) btn.addEventListener("click", () => _execReforge(uid, activeFixed, activeMode));
  modeBtns.appendChild(btn);

  overlay.querySelector("#reforgeCancelBtn").addEventListener("click", () => {
    overlay.remove();
    openItemDetail(uid);
  });

  document.body.appendChild(overlay);
}

function _execReforge(uid, fixedIds, mode) {
  const item = gs.inventory.find(i => i.uid === uid);
  if(!item) return;
  const rc   = REFORGE_MASTER[item.rarity];
  const cost = rc[mode];
  if(!cost) return;
  if(crystalCount() < cost.crystal) { addLog("item","✕ 魔晶石が不足しています"); return; }
  if(gs.player.gold < cost.gold)    { addLog("item","✕ Gold不足"); return; }

  // コスト先払い
  consumeCrystal(cost.crystal);
  gs.player.gold -= cost.gold;
  showGoldPop(-cost.gold);

  // 新OPを生成（まだ適用しない）
  const oldAffixes = item.affixes.map(a => ({...a}));
  const newAffixes = rerollAffixes(item, fixedIds);

  // 確認モーダルを表示
  _showReforgeConfirm(uid, oldAffixes, newAffixes, cost);
}

            const oa = oldAffixes.find(o => o.id === na.id);

// ─────────────────────────────────────────
function generateEnemy(depth, floor) {
  // 真エンドフロア（6〜10階）各階専用プール
  const ABYSS_POOLS = {
    6:  ["void_crawler","void_crawler","void_golem","abyss_wraith"],
    7:  ["void_specter","abyss_hunter","abyss_hunter","shadow_titan"],
    8:  ["abyss_knight","colossus_shard","colossus_shard","void_wyrm"],
    9:  ["sovereign_guard","abyss_herald","abyss_herald","void_dread"],
    10: ["will_echo","oblivion_walker","oblivion_walker","abyss_wraith_elder"],
  };
  // 5階専用エネミープール
  const FLOOR5_POOL = ["lava_lizard","lava_lizard","hell_armor","inferno_drake","plague_soldier"];
  // 4階は専用エネミープールを使用（確率配分で多様性を維持）
  const FLOOR4_POOL = ["toxic_frog","toxic_frog","plague_soldier","golem","dragon"];
  let key;
  if(floor >= 6) {
    const pool = ABYSS_POOLS[Math.min(floor, 10)] || ABYSS_POOLS[10];
    key = pool[Math.floor(Math.random() * pool.length)];
  } else if(floor >= 5) {
    key = FLOOR5_POOL[Math.floor(Math.random() * FLOOR5_POOL.length)];
  } else if(floor >= 4) {
    key = FLOOR4_POOL[Math.floor(Math.random() * FLOOR4_POOL.length)];
  } else {
    const keys = ["slime","goblin","skeleton","wolf","golem","dragon"];
    const diff = depth + floor*2;
    let idx = Math.min(Math.floor(diff/4), keys.length-1);
    if(Math.random()<0.3 && idx>0) idx--;
    key = keys[idx];
  }
  const base = ENEMY_MASTER[key];
  const ng = gs.dungeon.ng || 0;
  const wr = gs.player.worldRank || 0;
  const ngMul = 1 + ng * 0.5;
  const wrMul = 1 + wr * 0.35;
  const scale = (1 + depth*0.05 + floor*0.08) * ngMul * wrMul;
  return {
    id: key,
    name: base.name,
    icon: base.icon,
    str: Math.floor(base.str*scale),
    def: Math.floor(base.def*scale),
    hp:  Math.floor(base.hp*scale),
    maxHp: Math.floor(base.hp*scale),
    exp: Math.floor(base.exp*scale * (1 + ng*0.2)), // 経験値も増加
    drop: base.drop,
    dropRate: Math.min(85, 65 + ng*5), // ドロップ率も上昇
    ...(base.poisonRate ? { poisonRate: base.poisonRate } : {}),
    ...(base.burnRate   ? { burnRate:   base.burnRate   } : {}),
  };
}

function startCombat(depth, floor) {
  const enemy = generateEnemy(depth, floor);
  // 予兆マス効果
  if(gs.dungeon._omenActive) {
    const omenType = gs.dungeon._omenType || "def_down";
    if(omenType === "def_down") {
      enemy.def = Math.max(0, Math.floor(enemy.def * 0.7));
      addLog("item", `🔮 吉兆発動！ ${enemySpan(enemy.icon + enemy.name)}の守りが弱まっている`);
    } else if(omenType === "drop_up") {
      enemy._omenDropBonus = 50; // dropRate+50%
      addLog("item", `🔮 吉兆発動！ ${enemySpan(enemy.icon + enemy.name)}が何かを持っている`);
    } else if(omenType === "exp_up") {
      enemy.exp = Math.floor(enemy.exp * 2);
      addLog("item", `🔮 吉兆発動！ ${enemySpan(enemy.icon + enemy.name)}から多くを学べる`);
    } else if(omenType === "str_up") {
      enemy.str = Math.floor(enemy.str * 1.2);
      addLog("item", `🔮 凶兆発動！ ${enemySpan(enemy.icon + enemy.name)}が強大な力を持っている！`);
    }
    // next_trap / windfall はhandleOmen時にマップ書き換え済み
    gs.dungeon._omenActive = false;
    gs.dungeon._omenType = null;
  }
  gs.dungeon.combat = { enemy, depth, log:[], _mercFirstFired: false };
  addLog("item", `⚔ ${enemySpan(enemy.icon + enemy.name)}が現れた！`);
  // 弓使い・魔術師の戦闘開始時効果
  const merc = gs.dungeon.mercenary ? MERCENARY_MASTER[gs.dungeon.mercenary.id] : null;
  if(merc) {
    const r = calcStats(gs);
    const c = gs.dungeon.combat;
    if(merc.onCombatStart) {
      const res = merc.onCombatStart(c, r);
      if(res?.log) addLog("item", res.log);
    }
    gs.dungeon.combat._mercFirstFired = true;
  }
}

function doBattle(action) {
  const c = gs.dungeon.combat;
  if(!c) return;
  const r = calcStats(gs);
  const en = c.enemy;
  const logs = [];
  c._defending = (action === "defend");

  if(action === "attack") {
    const variance = 0.85 + Math.random()*0.3;
    const skills = gs.player.skills || [];
    const critBonus  = skills.includes("crit_up")   ? 5  : 0;
    // 回避封印中は回避チェックをスキップ（後段の敵行動で参照）
    const isCrit = Math.random()*100 < Math.min(60, 5 + r.total.luk*0.2 + critBonus + (r.setCritRateBonus||0) + (r.colCritRate||0) + (r.rbCritRatePct||0));
    const bossGuardMul = (en.isBoss && en.guardActive) ? 0.5 : 1.0;
    const warCryMul = gs.dungeon.combat._warCryActive ? 2.0 : 1.0;
    if(gs.dungeon.combat._warCryActive) { gs.dungeon.combat._warCryActive = false; logs.push({cls:"item", msg:`📯 鬨の声が発動！`}); }
    // atk_debuff 適用（恐怖の叫び・主権者の恐怖）
    const atkDebuffMul = (c._atkDebuffTurns > 0 && c._atkDebuffMul) ? c._atkDebuffMul : 1.0;
    // def_debuffFlat 適用（盾砕き・呪縛・鎧砕き）：敵のDEFに対するデバフは en.def から引く
    const effectiveDef = Math.max(0, en.def - (c._defDebuffFlat || 0));
    // 祠バフ：_shrineAtkBuff（次の戦闘1回のみ与ダメ+30%）
    const shrineAtkMul = gs.dungeon._shrineAtkBuff ? 1.3 : 1.0;
    if(gs.dungeon._shrineAtkBuff) {
      gs.dungeon._shrineAtkBuff = false;
      logs.push({cls:"item", msg:"⛩ 戦神の加護が発動！与ダメ+30%"});
    }
    // 遺物バフ：与ダメ+25%（S82）
    const relicAtkMul = gs.dungeon._relicAtkBuff ? 1.25 : 1.0;
    if(gs.dungeon._relicAtkBuff) {
      gs.dungeon._relicAtkBuff = false;
      logs.push({cls:"item", msg:"🏺 遺物の加護が発動！与ダメ+25%"});
    }
    let dmg = Math.max(1, Math.floor(r.total.str*2*variance*bossGuardMul*warCryMul*atkDebuffMul*shrineAtkMul*relicAtkMul - effectiveDef*0.7));
    // 処刑人：敵HP30%以下で与ダメ+N%
    if((r.skillExecuteMul||0) > 0 && en.hp / en.maxHp <= 0.3) {
      dmg = Math.floor(dmg * (1 + r.skillExecuteMul));
      logs.push({cls:"item", msg:`🗡️ 処刑人発動！`});
    }
    // 血の昂り：自HP30%以下で与ダメ+N%
    if((r.skillLowHpAtkMul||0) > 0 && gs.player.hp / r.maxHp <= 0.3) {
      dmg = Math.floor(dmg * (1 + r.skillLowHpAtkMul));
      logs.push({cls:"item", msg:`🩸 血の昂り！`});
    }
    // 業炎セット5部位：熱傷中の敵への与ダメ+N%
    if((r.setBurnDmgBonus||0) > 0 && en._burned) {
      dmg = Math.floor(dmg * (1 + r.setBurnDmgBonus / 100));
      logs.push({cls:"item", msg:`🔥 業炎の覇道！${hitSpan("+" + r.setBurnDmgBonus + "%")}`});
    }
    // will_set 10部位：ボス戦全与ダメ +N%
    if((r.setWillBossDmgBonus||0) > 0 && en.isBoss) {
      dmg = Math.floor(dmg * (1 + r.setWillBossDmgBonus / 100));
      logs.push({cls:"item", msg:`🌌 意思の具現！${hitSpan("+" + r.setWillBossDmgBonus + "%")}`});
    }
    // rb_apex: ボス与ダメ+N%（S53）
    if((r.rbBossDmgPct||0) > 0 && en.isBoss) {
      dmg = Math.floor(dmg * (1 + r.rbBossDmgPct / 100));
    }
    // specter_set 8部位：回避後の次攻撃が確定クリティカル（通常戦）
    // ボス戦では回避判定がないため、代わりに攻撃時10%で確定クリティカルを付与
    const _specterCounterReady = r.setSpecterCounterCrit && gs.dungeon.combat._specterCounterReady;
    const _specterBossProc     = r.setSpecterCounterCrit && en.isBoss && Math.random()*100 < 10;
    const _specterForceCrit    = _specterCounterReady || _specterBossProc;
    if(_specterCounterReady) gs.dungeon.combat._specterCounterReady = false;
    if(isCrit || _specterForceCrit) {
      const critMul = 1.8 + (r.setCritDmgBonus||0)/100;
      dmg = Math.floor(dmg * critMul);
      const critMsg = _specterBossProc && !_specterCounterReady
        ? "👻 幻舞の閃き！💥 確定クリティカル！"
        : _specterForceCrit ? "👻 幻舞の一撃！💥 確定クリティカル！"
        : "💥 クリティカル！";
      logs.push({cls:"item", msg:critMsg});
    }
    en.hp -= dmg;
    if(en.isBoss) en.rage = Math.min(100, en.rage + dmg*0.02);
    if(gs.dungeon._session) { gs.dungeon._session.totalDmgGiven += dmg; gs.dungeon._session.maxDmgGiven = Math.max(gs.dungeon._session.maxDmgGiven, dmg); }
    logs.push({cls:"item",  msg:`⚔ ${hitSpan(dmg + "ダメージ")}を与えた`});
    // 傭兵：剣士の追撃
    const _merc = gs.dungeon.mercenary ? MERCENARY_MASTER[gs.dungeon.mercenary.id] : null;
    if(_merc?.onPlayerAttack && en.hp > 0) {
      const _r = calcStats(gs);
      const _res = _merc.onPlayerAttack(c, _r);
      if(_res?.log) logs.push({cls:"item", msg:_res.log});
    }

    // 毒刃スキル：通常攻撃15%で敵に毒付与（+セット毒付与率ボーナス）
    if(en.hp > 0 && !en.isBoss) {
      const poisonOnHit = skills.includes("poison_blade") ? 15 : 0;
      const totalPoisonRate = poisonOnHit + (r.setPoisonRateBonus || 0);
      if(totalPoisonRate > 0 && Math.random()*100 < totalPoisonRate && !en._poisoned) {
        en._poisoned = true;
        logs.push({cls:"item", msg:`🐍 ${statusSpan("毒")}を与えた！`});
      }
    }

    // 業炎セット3部位：攻撃時N%で敵に熱傷付与
    if(en.hp > 0 && !en.isBoss && (r.setBurnRateBonus||0) > 0 && !en._burned) {
      if(Math.random()*100 < r.setBurnRateBonus) {
        en._burned = true;
        logs.push({cls:"item", msg:`🔥 ${statusSpan("熱傷")}を与えた！`});
      }
    }

    // 二連撃スキル：攻撃時N%でもう1回攻撃
    if(en.hp > 0 && (r.skillDoubleStrikePct||0) > 0 && Math.random()*100 < r.skillDoubleStrikePct) {
      const dmg2 = Math.max(1, Math.floor(r.total.str*2*(0.85+Math.random()*0.3) - en.def*0.7));
      en.hp -= dmg2;
      if(gs.dungeon._session) { gs.dungeon._session.totalDmgGiven += dmg2; gs.dungeon._session.maxDmgGiven = Math.max(gs.dungeon._session.maxDmgGiven, dmg2); }
      logs.push({cls:"item", msg:`⚡ 二連撃！${hitSpan(dmg2 + "ダメージ")}`});
    }

    // sovereign_set 8部位：攻撃時N%で2連撃
    if(en.hp > 0 && (r.setSovereignDoubleStrike||0) > 0 && Math.random()*100 < r.setSovereignDoubleStrike) {
      const dmg3 = Math.max(1, Math.floor(r.total.str*2*(0.85+Math.random()*0.3) - en.def*0.7));
      en.hp -= dmg3;
      if(gs.dungeon._session) { gs.dungeon._session.totalDmgGiven += dmg3; gs.dungeon._session.maxDmgGiven = Math.max(gs.dungeon._session.maxDmgGiven, dmg3); }
      logs.push({cls:"item", msg:`👑 覇気の連撃！${hitSpan(dmg3 + "ダメージ")}`});
    }

    // セット効果：鉄の覇者6部位 攻撃時N%で追加ダメ
    if(en.hp > 0 && (r.setOnHitPct || 0) > 0 && Math.random()*100 < r.setOnHitPct) {
      const bonusDmg = Math.max(1, Math.floor(r.total.str * 0.5));
      en.hp -= bonusDmg;
      if(gs.dungeon._session) gs.dungeon._session.totalDmgGiven += bonusDmg;
      logs.push({cls:"item", msg:`⚔ 鉄の一撃！${hitSpan(bonusDmg + "追加ダメージ")}`});
    }

    if(en.hp <= 0) {
      if(en.isBoss) {
        logs.push({cls:"item", msg:`🏆 ${enemySpan(en.name)}を撃破した！`});
        gainExp(en.exp);
        if(gs.dungeon._session) { gs.dungeon._session.bossKilled = true; gs.dungeon._session.kills++; }
        const droppedItem = dropBossItems(en);
        const clearedFloor = gs.dungeon.activeFloor || gs.dungeon.floor;

        // will_set 10部位：ボス撃破時ゴールド +N%
        if((r.setWillBossGoldBonus||0) > 0) {
          const _willGold = Math.floor(gs.player.gold * r.setWillBossGoldBonus / 100);
          if(_willGold > 0) {
            gs.player.gold += _willGold;
            logs.push({cls:"item", msg:`🌌 意思の具現！ボス撃破ボーナス ${goldSpan(_willGold + "G 獲得！")}`});
          }
        }
        gs.dungeon.combat = null;
        gs.dungeon.active = false;
        gs.player.status = "idle";
        const _bossResultItems = [...gs.dungeon.loot]; // リザルト用にコピー
        gs.dungeon.loot.forEach(item => {
          gs.inventory.push(item);
        });
        gs.dungeon.loot = [];

        // クリア済み最大階層を更新（後退しない）
        const maxBossFloor = Math.max(...Object.values(BOSS_MASTER).map(b=>b.floor));
        const isAbyssFloor = !!(BOSS_MASTER[en.id]?.abyssFloor);
        const isNewClear = clearedFloor > gs.dungeon.clearedFloor; // 初クリア判定（更新前に取得）
        if(isNewClear) {
          gs.dungeon.clearedFloor = clearedFloor;
          // 解放済み最新フロアも連動して更新（後退しない）
          gs.dungeon.floor = Math.max(gs.dungeon.floor, clearedFloor + 1);
          checkQuestProgress("explore");
        }

        // 真エンドフロア（6〜10階）クリア時: abyssFloorClearedを更新し次階層を解放
        if(isAbyssFloor && isNewClear) {
          gs.player.abyssFloorCleared = Math.max(gs.player.abyssFloorCleared || 0, clearedFloor);
        }

        // 最終ボスフロアクリアで周回数アップ
        // 通常フェーズ: 5階クリア / 真エンドフェーズ: 10階クリア
        const currentMaxFloor = (gs.player.abyssFloorCleared >= 6) ? maxBossFloor : 5;
        if(clearedFloor >= currentMaxFloor) {
          gs.dungeon.ng += 1;
          gs.dungeon.floor = 1; // 1階層から再スタート（clearedFloorはリセットしない）
          gs.dungeon.clearedFloor = 0;
          gs.dungeon.selectedFloor = 1;
        } else {
          // 初クリア時のみ次の階層を自動選択、再クリア時は選択階層をそのまま維持
          if(isNewClear) gs.dungeon.selectedFloor = clearedFloor + 1;
          // 再クリア時：selectedFloorを変えない（クリアしたフロアを選択状態に保つ）
        }

        const r2 = calcStats(gs);
        gs.player.hp = r2.maxHp;
        gs.player.mp = r2.maxMp;
        logs.forEach(l=>addLog(l.cls,l.msg));
        saveGame();
        showBossResult(en.id, droppedItem, clearedFloor, gs.dungeon.floor, isNewClear, () => {
          showDungeonResult(gs.dungeon._session, _bossResultItems);
        });
        return;
      } else {
        logs.push({cls:"item", msg:`✓ ${enemySpan(en.name)}を倒した！`});
        // 毒キル実績カウント
        if(gs.dungeon.poisoned && gs.achievements?.stats) gs.achievements.stats.poisonKills = (gs.achievements.stats.poisonKills||0) + 1;
        gainExp(en.exp);
        dropItems(en, c.depth, gs.dungeon.activeFloor||gs.dungeon.floor);
        if(gs.dungeon._session) { gs.dungeon._session.kills++; gs.dungeon._session.maxDepth = Math.max(gs.dungeon._session.maxDepth||0, c.depth||0); }
        gs.dungeon.combat = null;
        applyCurseHpDrain(logs);
        applyPoisonDamage(logs);
        applyBurnDamage(logs);
        logs.forEach(l=>addLog(l.cls,l.msg));
        if(gs.player.hp <= 0) { leaveDungeon(false); return; }
        render(); return;
      }
    }

    if(en.isBoss) {
      const b = BOSS_MASTER[en.id];
      const hpRate = en.hp / en.maxHp;
      const newPhase = hpRate > b.phases[1] ? 1 : hpRate > b.phases[2] ? 2 : 3;
      if(newPhase !== en.phase) {
        en.phase = newPhase;
        en.turnIndex = 0;
        logs.push({cls:"item", msg:`⚡ ${enemySpan(en.name)}がフェーズ${en.phase}に移行した！`});
        showPhaseFlash();
      }
    }
  }

  if(action === "defend") {
    logs.push({cls:"item", msg:"🛡 防御態勢"});
  }

  if(en.isBoss) {
    doBossAttack(en, logs);
  } else {
    // 回避封印中は回避不可
    const evadeBlocked = (c._evadeSealedTurns || 0) > 0;
    const isEvade = !evadeBlocked && Math.random()*100 < Math.min(25, r.total.agi*0.3);
    if(isEvade) {
      logs.push({cls:"item", msg:"🌀 回避した！"});
    } else {
      const ev = 0.85 + Math.random()*0.3;
      const defMul = action === "defend" ? 0.5 : 1;
      const _eStr = en.str*ev*defMul; const _eDef = Math.max(1,r.total.def); let edm = Math.max(1, Math.floor(_eStr*_eStr*5 / (_eDef + _eStr*5)));
      // 傭兵：衛士の被ダメ軽減
      const _mercG = gs.dungeon.mercenary ? MERCENARY_MASTER[gs.dungeon.mercenary.id] : null;
      if(_mercG?.onDamageReceive) {
        const _gres = _mercG.onDamageReceive(edm);
        edm = Math.max(1, edm - _gres.reduced);
        logs.push({cls:"item", msg:_gres.log});
      }
      // 冒険録：被ダメ軽減
      if((r.colDmgReduce||0) > 0) edm = Math.max(1, Math.floor(edm * (1 - r.colDmgReduce/100)));
      // 傭兵：治癒師のターン開始HP回復
      const _mercH = gs.dungeon.mercenary ? MERCENARY_MASTER[gs.dungeon.mercenary.id] : null;
      if(_mercH?.onTurnStart) {
        const _hres = _mercH.onTurnStart(r);
        if(_hres?.log) logs.push({cls:"item", msg:_hres.log});
      }
      // 見張り番：初撃回避
      if(gs.dungeon.combat._divineShieldActive) {
        gs.dungeon.combat._divineShieldActive = false;
        logs.push({cls:"item", msg:`🔆 聖なる盾が発動！ ${dmgSpan(edm + "ダメージ")}を完全に無効化した！`});
      } else if(gs.dungeon._watcherReady && !gs.dungeon._firstHitAvoided) {
        gs.dungeon._firstHitAvoided = true;
        gs.dungeon._watcherReady = false;
        logs.push({cls:"item", msg:`👁 見張り番の警告が活きた！ ${dmgSpan(edm + "ダメージ")}を回避した！`});
      } else {
        // 影の刺客セット：回避ボーナス
        if((r.setAvoidBonus||0) > 0 && Math.random()*100 < r.setAvoidBonus) {
          logs.push({cls:"item", msg:`🌑 ${dmgSpan(edm + "ダメージ")}を回避した！`});
          // specter_set 8部位：回避後、次の攻撃が確定クリティカル
          if(r.setSpecterCounterCrit) {
            gs.dungeon.combat._specterCounterReady = true;
            logs.push({cls:"item", msg:`👻 幻舞の構え！次の攻撃が確定クリティカル`});
          }
        } else {
          // セット＋スキルによる被ダメ軽減（fortress/death_ward/鉄の覇者セット）
          // 遺物バフ：被ダメ-20%（S82）
          const _relicDefMul = gs.dungeon._relicDefBuff ? 0.8 : 1.0;
          if(gs.dungeon._relicDefBuff) { gs.dungeon._relicDefBuff = false; logs.push({cls:"item", msg:"🏺 遺物の加護が発動！被ダメ-20%"}); }
          const totalDmgReducePct = (r.setDmgReducePct||0) + (r.skillDmgReducePct||0);
          const reducedEdm = totalDmgReducePct > 0
            ? Math.max(1, Math.floor(edm * _relicDefMul * (1 - totalDmgReducePct/100)))
            : Math.max(1, Math.floor(edm * _relicDefMul));
          // void_set 8部位：被ダメN%でブロック
          if((r.setVoidBlockPct||0) > 0 && Math.random()*100 < r.setVoidBlockPct) {
            logs.push({cls:"item", msg:`🌑 虚空の侵食！${dmgSpan(edm + "ダメージ")}を完全ブロック！`});
          } else {
            gs.player.hp = Math.max(0, gs.player.hp - reducedEdm);
            if(gs.dungeon._session) gs.dungeon._session.totalDmgTaken += reducedEdm;
            const reduceNote = reducedEdm < edm ? ` (${edm-reducedEdm}軽減)` : "";
            logs.push({cls:"item", msg:`🩸 ${dmgSpan(reducedEdm + "ダメージ")}を受けた${reduceNote}`});
            // 棘鎧：被ダメ時N%を敵に反射
            if(en.hp > 0 && (r.skillThornPct||0) > 0) {
              const thornDmg = Math.max(1, Math.floor(reducedEdm * r.skillThornPct / 100));
              en.hp -= thornDmg;
              logs.push({cls:"item", msg:`🌵 棘鎧！${hitSpan(thornDmg + "反射ダメージ")}`});
            }
            // colossus_set 8部位：被ダメ時N%で即時反撃
            if(en.hp > 0 && (r.setColossusCounterPct||0) > 0 && Math.random()*100 < r.setColossusCounterPct) {
              const counterDmg = Math.max(1, Math.floor(r.total.str * 1.2));
              en.hp -= counterDmg;
              if(gs.dungeon._session) { gs.dungeon._session.totalDmgGiven += counterDmg; gs.dungeon._session.maxDmgGiven = Math.max(gs.dungeon._session.maxDmgGiven, counterDmg); }
              logs.push({cls:"item", msg:`🗿 鉄壁の反撃！${hitSpan(counterDmg + "ダメージ")}`});
            }
            if(gs.player.hp > 0) tryAutoHeal(logs);
          }
        }
      }
      // 毒付与（一部敵：15%、毒付きなら重複なし・鋼の意志で耐性付加）
      if(!gs.dungeon.poisoned && en.poisonRate) {
        const resistPct = r.skillStatusResist || 0;
        const effectiveRate = Math.max(0, en.poisonRate * (1 - resistPct / 100));
        if(Math.random()*100 < effectiveRate) {
          gs.dungeon.poisoned = true;
          logs.push({cls:"item", msg:`☠ ${statusSpan("毒")}を受けた！`});
        }
      }
      // 熱傷付与（5階エネミー専用）
      if(!gs.dungeon.burned && en.burnRate) {
        if(Math.random()*100 < en.burnRate) {
          gs.dungeon.burned = true;
          logs.push({cls:"item", msg:`🔥 ${statusSpan("熱傷")}を受けた！`});
        }
      }
      // 反撃スキル：N%で即反撃
      if((r.skillCounterRate||0) > 0 && Math.random()*100 < r.skillCounterRate) {
        const cdmg = Math.max(1, Math.floor(r.total.str * 1.0));
        en.hp -= cdmg;
        if(gs.dungeon._session) { gs.dungeon._session.totalDmgGiven += cdmg; gs.dungeon._session.maxDmgGiven = Math.max(gs.dungeon._session.maxDmgGiven, cdmg); }
        logs.push({cls:"item",  msg:`🔄 反撃！${hitSpan(cdmg + "ダメージ")}`});
      }

      // ── 6〜10F エネミー specialSkill ──
      if(en.specialSkill && en.hp > 0) {
        const ss    = en.specialSkill;
        const enraged = (en.hp / en.maxHp) <= 0.5;
        const ssRate  = enraged ? ss.rateEnraged : ss.rate;
        if(Math.random() * 100 < ssRate) {
          // 激昂演出（HP50%以下初回のみ）
          if(enraged && !c._enragedShown) {
            c._enragedShown = true;
            logs.push({cls:"item", msg:`💢 ${enemySpan(en.name)}が激昂した！`});
          }
          logs.push({cls:"item", msg:`${statusSpan("【" + ss.name + "】")} ${ss.msg}`});

          if(ss.type === "poison_burst") {
            // 確定毒付与（既に毒なら無視）
            if(!gs.dungeon.poisoned) {
              gs.dungeon.poisoned = true;
              logs.push({cls:"item", msg:`☠ ${statusSpan("毒")}を受けた！`});
            }

          } else if(ss.type === "hp_pct_dmg") {
            // 防御無視・最大HP%ダメージ
            const ssDmg = Math.max(1, Math.floor(gs.player.maxHp * ss.hpPct));
            gs.player.hp = Math.max(0, gs.player.hp - ssDmg);
            if(gs.dungeon._session) gs.dungeon._session.totalDmgTaken += ssDmg;
            logs.push({cls:"item", msg:`🩸 ${dmgSpan(ssDmg + "ダメージ！")}（防御無視）`});

          } else if(ss.type === "heal_block") {
            // 回復封印
            c._healBlockedTurns = ss.duration;
            logs.push({cls:"item", msg:`🚫 ${statusSpan("回復封印")} ${ss.duration}ターン！`});

          } else if(ss.type === "evade_seal") {
            // 回避封印（次Nターン回避率0）
            c._evadeSealedTurns = ss.duration;
            logs.push({cls:"item", msg:`🌀 ${statusSpan("回避封印")} ${ss.duration}ターン！`});

          } else if(ss.type === "pierce_strike") {
            // 防御貫通攻撃
            const pierceDef = Math.max(1, Math.floor(r.total.def * (1 - (ss.pierce || 0))));
            const _ssStr = en.str * (0.85 + Math.random()*0.3) * (ss.dmgMul || 1.0);
            const ssDmg  = Math.max(1, Math.floor(_ssStr*_ssStr*5 / (pierceDef + _ssStr*5)));
            gs.player.hp = Math.max(0, gs.player.hp - ssDmg);
            if(gs.dungeon._session) gs.dungeon._session.totalDmgTaken += ssDmg;
            logs.push({cls:"item", msg:`🩸 ${dmgSpan(ssDmg + "ダメージ！")}（防御${Math.round((ss.pierce||0)*100)}%貫通）`});

          } else if(ss.type === "def_debuff") {
            // DEFフラットダウン
            c._defDebuffFlat = (c._defDebuffFlat || 0) + ss.defDown;
            c._defDebuffTurns = ss.duration;
            logs.push({cls:"item", msg:`💔 ${statusSpan("DEF -" + ss.defDown)} ${ss.duration}ターン！`});

          } else if(ss.type === "heavy_strike") {
            // 高倍率通常打撃
            const _hsStr = en.str * (0.85 + Math.random()*0.3) * (ss.dmgMul || 1.0);
            const _hsDef = Math.max(1, r.total.def - (c._defDebuffFlat || 0));
            const ssDmg  = Math.max(1, Math.floor(_hsStr*_hsStr*5 / (_hsDef + _hsStr*5)));
            gs.player.hp = Math.max(0, gs.player.hp - ssDmg);
            if(gs.dungeon._session) gs.dungeon._session.totalDmgTaken += ssDmg;
            logs.push({cls:"item", msg:`🩸 ${dmgSpan(ssDmg + "ダメージ！")}`});

          } else if(ss.type === "atk_debuff") {
            // 攻撃力デバフ（次Nターンの与ダメに乗算）
            c._atkDebuffMul   = ss.atkMul;
            c._atkDebuffTurns = ss.duration;
            logs.push({cls:"item", msg:`😱 ${statusSpan("攻撃力低下")} ${ss.duration}ターン！（与ダメ×${ss.atkMul}）`});

          } else if(ss.type === "ancient_curse") {
            // 高倍率打撃 + 確定毒
            const _acStr = en.str * (0.85 + Math.random()*0.3) * (ss.dmgMul || 1.0);
            const _acDef = Math.max(1, r.total.def - (c._defDebuffFlat || 0));
            const ssDmg  = Math.max(1, Math.floor(_acStr*_acStr*5 / (_acDef + _acStr*5)));
            gs.player.hp = Math.max(0, gs.player.hp - ssDmg);
            if(gs.dungeon._session) gs.dungeon._session.totalDmgTaken += ssDmg;
            logs.push({cls:"item", msg:`🩸 ${dmgSpan(ssDmg + "ダメージ！")}`});
            if(!gs.dungeon.poisoned) {
              gs.dungeon.poisoned = true;
              logs.push({cls:"item", msg:`☠ 怨念の毒が体を侵す… ${statusSpan("毒状態")}！`});
            }
            if(!gs.dungeon.burned) {
              gs.dungeon.burned = true;
              logs.push({cls:"item", msg:`🔥 老いた炎が焦がす… ${statusSpan("熱傷状態")}！`});
            }
          }
          if(gs.player.hp > 0) tryAutoHeal(logs);
        }
      }
    }
    // デバフ残ターン消費（ターン末処理・回避時も消費）
    if((c._defDebuffTurns || 0) > 0) {
      c._defDebuffTurns--;
      if(c._defDebuffTurns <= 0) { c._defDebuffFlat = 0; logs.push({cls:"item", msg:`💚 DEF低下が回復した`}); }
    }
    if((c._healBlockedTurns || 0) > 0) {
      c._healBlockedTurns--;
      if(c._healBlockedTurns <= 0) logs.push({cls:"item", msg:`💚 回復封印が解けた`});
    }
    if((c._evadeSealedTurns || 0) > 0) {
      c._evadeSealedTurns--;
      if(c._evadeSealedTurns <= 0) logs.push({cls:"item", msg:`💚 回避封印が解けた`});
    }
    if((c._atkDebuffTurns || 0) > 0) {
      c._atkDebuffTurns--;
      if(c._atkDebuffTurns <= 0) { c._atkDebuffMul = 1.0; logs.push({cls:"item", msg:`💚 攻撃力低下が回復した`}); }
    }
  }

  // 敵の毒ダメージ（poison_mistスキルによる付与）
  if(gs.dungeon.combat && gs.dungeon.combat.enemy?.hp > 0 && gs.dungeon.combat.enemy?._poisoned) {
    const _en = gs.dungeon.combat.enemy;
    const pdmg = Math.max(1, Math.floor(_en.maxHp * 0.05));
    _en.hp = Math.max(0, _en.hp - pdmg);
    logs.push({cls:"item", msg:`☠ 敵が毒で ${hitSpan(pdmg + "ダメージ")}`});
    if(_en.hp <= 0) {
      logs.push({cls:"item", msg:`✓ ${enemySpan(_en.name)}を倒した（毒）！`});
      if(gs.achievements?.stats) gs.achievements.stats.poisonKills = (gs.achievements.stats.poisonKills||0) + 1;
      gainExp(_en.exp);
      dropItems(_en, gs.dungeon.combat.depth, gs.dungeon.activeFloor||gs.dungeon.floor);
      if(gs.dungeon._session) { gs.dungeon._session.kills++; gs.dungeon._session.maxDepth = Math.max(gs.dungeon._session.maxDepth||0, gs.dungeon.combat.depth||0); }
      gs.dungeon.combat = null;
      applyCurseHpDrain(logs);
      applyPoisonDamage(logs);
      applyBurnDamage(logs);
      logs.forEach(l=>addLog(l.cls,l.msg));
      if(gs.player.hp <= 0) { leaveDungeon(false); return; }
      render(); return;
    }
  }

  // 敵の熱傷ダメージ（業炎セット3部位による付与）
  if(gs.dungeon.combat && gs.dungeon.combat.enemy?.hp > 0 && gs.dungeon.combat.enemy?._burned) {
    const _en = gs.dungeon.combat.enemy;
    const bdmg = Math.max(1, Math.floor(_en.maxHp * 0.03));
    _en.hp = Math.max(0, _en.hp - bdmg);
    logs.push({cls:"item", msg:`🔥 敵が熱傷で ${hitSpan(bdmg + "ダメージ")}`});
    if(_en.hp <= 0) {
      logs.push({cls:"item", msg:`✓ ${enemySpan(_en.name)}を倒した（熱傷）！`});
      gainExp(_en.exp);
      dropItems(_en, gs.dungeon.combat.depth, gs.dungeon.activeFloor||gs.dungeon.floor);
      if(gs.dungeon._session) { gs.dungeon._session.kills++; gs.dungeon._session.maxDepth = Math.max(gs.dungeon._session.maxDepth||0, gs.dungeon.combat.depth||0); }
      gs.dungeon.combat = null;
      applyCurseHpDrain(logs);
      applyPoisonDamage(logs);
      applyBurnDamage(logs);
      logs.forEach(l=>addLog(l.cls,l.msg));
      if(gs.player.hp <= 0) { leaveDungeon(false); return; }
      render(); return;
    }
  }
  logs.forEach(l=>addLog(l.cls,l.msg));
  if(gs.player.hp <= 0) {
    gs.dungeon.combat = null;
    leaveDungeon(false);
    return;
  }
  saveGame();
  render();
}

// ボス登場モーダル
function showBossIntro(bossId, onClose) {
  const b = BOSS_MASTER[bossId];
  const overlay = document.createElement("div");
  overlay.className = "boss-intro-overlay";
  overlay.innerHTML = `
    <div class="boss-intro-box">
      <span class="boss-intro-icon">${b.icon}</span>
      <div class="boss-intro-name">${b.name}</div>
      <div class="boss-intro-flavor">${b.flavor}</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:8px">
        <button class="btn btn-danger" style="min-width:130px" id="bossStartBtn">⚔ 戦う</button>
        <button class="btn btn-secondary" style="min-width:130px" id="bossFleeBtn">💨 逃げる</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector("#bossStartBtn").addEventListener("click", () => {
    overlay.remove();
    onClose();
  });
  overlay.querySelector("#bossFleeBtn").addEventListener("click", () => {
    overlay.remove();
    addLog("item", "💨 ボスから逃げ出した…");
    leaveDungeon(true); // 獲得品は持ち帰れる
  });
}

}

}

// ボス撃破リザルト
function showBossResult(bossId, droppedItem, clearedFloor, nextFloor, isNewClear, onClose) {
  const b = BOSS_MASTER[bossId];
  const m = droppedItem ? ITEM_MASTER[droppedItem.itemId] : null;
  const maxBossFloor = Math.max(...Object.values(BOSS_MASTER).map(b=>b.floor));
  const isLoopClear = clearedFloor >= maxBossFloor;
  const ng = gs.dungeon.ng;

  // 制覇テキスト・サブテキスト
  const clearText   = isLoopClear ? "全階層制覇！"
                    : isNewClear  ? `${clearedFloor}階層を制覇`
                    :               `${clearedFloor}階層を再び制覇`;
  const subText     = isLoopClear ? (ng > 0 ? `フェーズ${ng + 1}に突入。敵が強化された。` : "1階層から再スタート")
                    : isNewClear  ? `✨ ${nextFloor}階層が解放された`
                    :               `💀 ${b.name}、再び沈む`;
  const subColor    = isLoopClear ? "#aa8888"
                    : isNewClear  ? "#88aa88"
                    :               "#cc6666";

  const overlay = document.createElement("div");
  overlay.className = "boss-result-overlay";
  overlay.innerHTML = `
    <div class="boss-result-box">
      <div style="font-size:48px;margin-bottom:12px">${isLoopClear ? "🌟" : "🏆"}</div>
      <div class="boss-result-title">${b.name} 撃破！</div>
      ${isLoopClear ? `
        <div style="font-size:14px;color:var(--gold);margin-bottom:8px">全階層制覇！</div>
        <div style="font-size:12px;color:#aa8888;margin-bottom:16px">フェーズ${ng + 1}に突入。敵が強化された。</div>
        ${canRebirth() ? `
        <div style="margin-bottom:14px;padding:10px;background:var(--gold-bg);border:1px solid var(--gold);border-radius:8px">
          <div style="font-size:11px;color:var(--gold);margin-bottom:4px">🌟 転生が可能です</div>
          <div style="font-size:11px;color:var(--muted)">Lv${gs.player.level} / ${gs.dungeon.ng}周 → 永続SP +${calcRebirthPoints()}</div>
        </div>` : ""}
      ` : `
        <div style="font-size:13px;color:var(--muted);margin-bottom:8px">${clearText}</div>
      `}
      ${m ? `
      <div style="margin-bottom:16px;padding:12px;background:var(--gold-bg);border:1px solid var(--gold-dark);border-radius:8px">
        <div style="font-size:11px;color:var(--gold-dark);margin-bottom:6px">ドロップ</div>
        <div style="font-size:20px">${m.icon}</div>
        <div style="font-size:14px;color:var(--gold);margin-top:4px">${m.name}</div>
      </div>` : ""}
      <div style="font-size:12px;color:${subColor};margin-bottom:20px">${subText}</div>
      ${isLoopClear && canRebirth() ? `<button class="btn" style="background:linear-gradient(135deg,#7a5c00,#3a2c00);border-color:var(--gold);color:var(--gold);min-width:160px;margin-bottom:8px" id="rebirthBtn">🌟 転生する</button>` : ""}
      <button class="btn btn-secondary" style="min-width:160px;border-color:var(--gold);color:var(--gold)" id="bossResultBtn">続ける</button>
      <button class="btn btn-secondary" style="min-width:160px;margin-top:6px;border-color:var(--twitter);color:var(--twitter);opacity:0.85;font-size:12px" id="shareBossBtn">𝕏 結果をシェアする</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector("#bossResultBtn").addEventListener("click", () => {
    overlay.remove();
    onClose();
  });
  overlay.querySelector("#shareBossBtn").addEventListener("click", () => {
    openShareDialog("boss", { bossName: b.name });
  });
  overlay.querySelector("#rebirthBtn")?.addEventListener("click", () => {
    overlay.remove();
    openRebirthModal();
  });
}

function startBossCombat(floor) {
  const bossId = getBossIdForFloor(floor);
  if(!bossId) { addLog("item","…何もなかった"); return; }
  const b = BOSS_MASTER[bossId];

  showBossIntro(bossId, () => {
    const ng = gs.dungeon.ng || 0;
    const wr = gs.player.worldRank || 0;
    const ngMul = (1 + ng * 0.5) * (1 + wr * 0.35);
    const boss = {
      id:bossId, isBoss:true, name:b.name, icon:b.icon,
      str: Math.floor(b.str * ngMul),
      def: Math.floor(b.def * ngMul),
      hp:  Math.floor(b.hp  * ngMul),
      maxHp: Math.floor(b.hp * ngMul),
      exp: Math.floor(b.exp * (1 + ng*0.25)),
      drop:b.drop, dropRarity:b.dropRarity, dropRate:100,
      phase:1, rage:0, turnIndex:0,
      guardActive:false, chargePending:false, defDebuff:0,
    };
    gs.dungeon.combat = { enemy:boss, depth:gs.dungeon.progress, log:[] };
    const ngLabel = ng > 0 ? `[フェーズ${ng + 1}強化版]` : "";
    addLog("item", `💀 ${boss.icon}【${enemySpan(boss.name)}】${ngLabel}との戦闘開始！`);
    render();
  });
}

function doBossAttack(boss, logs) {
  const c = gs.dungeon.combat; // デバフ状態の読み書きに使用
  const r = calcStats(gs);
  const b = BOSS_MASTER[boss.id];
  const pattern = b.patterns[boss.phase];
  const action = pattern[boss.turnIndex % pattern.length];
  boss.turnIndex++;
  const skill = b.skills[action];

  if(action === "attack") {
    boss.guardActive = false;
    const ev = 0.85 + Math.random()*0.3;
    const defMul = gs.dungeon.combat._defending ? 0.5 : 1.0;
    const _bStr = boss.str * ev * defMul; const _bDef = Math.max(1, r.total.def - (boss.defDebuff||0)); let dmg = Math.max(1, Math.floor(_bStr*_bStr*5 / (_bDef + _bStr*5)));
    if(boss.chargePending) { dmg = Math.floor(dmg*1.5); boss.chargePending = false; }
    // 傭兵：衛士の被ダメ軽減（ボス戦）
    const _bMG = gs.dungeon.mercenary ? MERCENARY_MASTER[gs.dungeon.mercenary.id] : null;
    if(_bMG?.onDamageReceive) {
      const _bgr = _bMG.onDamageReceive(dmg);
      dmg = Math.max(1, dmg - _bgr.reduced);
      logs.push({cls:"item", msg:_bgr.log});
    }
    // 傭兵：治癒師のHP回復（ボス戦・被ダメ前）
    if(_bMG?.onTurnStart) {
      const _bhr = _bMG.onTurnStart(r);
      if(_bhr?.log) logs.push({cls:"item", msg:_bhr.log});
    }
    // セット＋スキルによる被ダメ軽減
    const _bReducePct = (r.setDmgReducePct||0) + (r.skillDmgReducePct||0);
    if(_bReducePct > 0) dmg = Math.max(1, Math.floor(dmg * (1 - _bReducePct/100)));
    // void_set 8部位：被ダメN%でブロック（ボス戦）
    if((r.setVoidBlockPct||0) > 0 && Math.random()*100 < r.setVoidBlockPct) {
      boss.rage = Math.min(100, boss.rage + dmg*0.02); // ブロック時も半分加算
      logs.push({cls:"item", msg:`🌑 虚空の侵食！${dmgSpan(dmg + "ダメージ")}を完全ブロック！`});
    } else {
      gs.player.hp = Math.max(0, gs.player.hp - dmg);
      boss.rage = Math.min(100, boss.rage + dmg*0.04);
      if(gs.dungeon._session) gs.dungeon._session.totalDmgTaken += dmg;
      const _bReduceNote = _bReducePct > 0 ? ` (軽減)` : "";
      logs.push({cls:"item", msg:`${boss.icon} ${enemySpan(boss.name)}の攻撃！ ${dmgSpan(dmg + "ダメージ")}${_bReduceNote}`});
      // colossus_set 8部位：被ダメ時N%で即時反撃（ボス戦）
      if(boss.hp > 0 && (r.setColossusCounterPct||0) > 0 && Math.random()*100 < r.setColossusCounterPct) {
        const _bcDmg = Math.max(1, Math.floor(r.total.str * 1.2));
        boss.hp -= _bcDmg;
        if(gs.dungeon._session) { gs.dungeon._session.totalDmgGiven += _bcDmg; gs.dungeon._session.maxDmgGiven = Math.max(gs.dungeon._session.maxDmgGiven, _bcDmg); }
        logs.push({cls:"item", msg:`🗿 鉄壁の反撃！${hitSpan(_bcDmg + "ダメージ")}`});
      }
    }
  } else if(skill) {
    if(skill.charge) {
      boss.chargePending = true;
      showBossActionBanner(`⚡ ${skill.name}`);
      logs.push({cls:"item", msg:skill.msg});
    } else if(skill.guardTurn) {
      boss.guardActive = true;
      showBossActionBanner(`🛡 ${skill.name}`);
      logs.push({cls:"item", msg:skill.msg});
    } else if(skill.defDown) {
      boss.defDebuff = (boss.defDebuff||0) + skill.defDown;
      showBossActionBanner(`💔 ${skill.name}`);
      logs.push({cls:"item", msg:skill.msg});
    } else if(skill.regen) {
      // 再生スキル：ボスのHPを割合回復
      const healAmt = Math.floor(boss.maxHp * skill.regen);
      boss.hp = Math.min(boss.maxHp, boss.hp + healAmt);
      showBossActionBanner(`💚 ${skill.name}`);
      logs.push({cls:"item", msg:`${skill.msg} ${healSpan(healAmt)} 回復！`});
    } else if(skill.poison && skill.dmgMul === 0) {
      // 毒付与スキル（ダメージなし）
      showBossActionBanner(`☠ ${skill.name}`);
      if(!gs.dungeon.poisoned) {
        const resistPct = r.skillStatusResist || 0;
        if(resistPct > 0 && Math.random()*100 < resistPct) {
          logs.push({cls:"item", msg:`${skill.msg} ${statusSpan("耐性")}で毒を防いだ！`});
        } else {
          gs.dungeon.poisoned = true;
          logs.push({cls:"item", msg:`${skill.msg} ${statusSpan("毒状態")}になった！`});
        }
      } else {
        logs.push({cls:"item", msg:`${skill.msg} ${statusSpan("毒霧")}が漂う…`});
      }
    } else if(skill.burn && skill.dmgMul === 0) {
      // 熱傷付与スキル（ダメージなし）
      showBossActionBanner(`🔥 ${skill.name}`);
      if(!gs.dungeon.burned) {
        gs.dungeon.burned = true;
        logs.push({cls:"item", msg:`${skill.msg} ${statusSpan("熱傷状態")}になった！`});
      } else {
        logs.push({cls:"item", msg:`${skill.msg} 業炎がさらに激しくなる…`});
      }
    } else if(skill.healBlock) {
      // 回復封印スキル
      showBossActionBanner(`🚫 ${skill.name}`);
      c._healBlockedTurns = skill.healBlock;
      logs.push({cls:"item", msg:`${skill.msg} 🚫 ${statusSpan("回復封印")} ${skill.healBlock}ターン！`});
    } else if(skill.defDebuffPct) {
      // DEF割合デバフ
      showBossActionBanner(`💔 ${skill.name}`);
      const debuffAmt = Math.floor(r.total.def * skill.defDebuffPct / 100);
      c._defDebuffFlat  = (c._defDebuffFlat  || 0) + debuffAmt;
      c._defDebuffTurns = skill.defDebuffDuration || 2;
      logs.push({cls:"item", msg:`${skill.msg} 💔 ${statusSpan("DEF -" + debuffAmt)} ${c._defDebuffTurns}ターン！`});
    } else if(skill.fearDebuff) {
      // 恐怖デバフ（次Nターンの与ダメ低下）
      showBossActionBanner(`😱 ${skill.name}`);
      c._atkDebuffMul   = 0.6;
      c._atkDebuffTurns = skill.fearDuration || 1;
      logs.push({cls:"item", msg:`${skill.msg} 😱 ${statusSpan("攻撃力低下")} ${c._atkDebuffTurns}ターン！`});
    } else if(skill.hpPctDmg) {
      // HP%ダメージスキル（防御無視・最大HPベース）
      showBossActionBanner(`🔥 ${skill.name}`);
      const dmg = Math.max(1, Math.floor(gs.player.maxHp * skill.hpPctDmg));
      gs.player.hp = Math.max(0, gs.player.hp - dmg);
      if(gs.dungeon._session) gs.dungeon._session.totalDmgTaken += dmg;
      boss.rage = Math.min(100, boss.rage + dmg*0.04);
      logs.push({cls:"item", msg:`${skill.msg} ${dmgSpan(dmg + "ダメージ！")}（防御無視）`});
    } else {
      showBossActionBanner(`💥 ${skill.name}`);
      const ev = 0.85 + Math.random()*0.3;
      const defMul = gs.dungeon.combat._defending ? 0.5 : 1.0;
      const hits = skill.multi || 1;
      let totalDmg = 0;
      for(let h=0; h<hits; h++) {
        // 貫通スキル：DEFを指定割合だけ無視（boss.defDebuffも考慮）
        const _baseDef = Math.max(0, r.total.def - (boss.defDebuff||0));
        const pierceDef = skill.pierce
          ? Math.max(1, Math.floor(_baseDef * (1 - skill.pierce)))
          : Math.max(1, _baseDef);
        const _sStr = boss.str * ev * defMul * skill.dmgMul;
        let dmg = Math.max(1, Math.floor(_sStr*_sStr*5 / (pierceDef + _sStr*5)));
        if(boss.chargePending) { dmg = Math.floor(dmg*1.5); boss.chargePending = false; }
        gs.player.hp = Math.max(0, gs.player.hp - dmg);
        if(gs.dungeon._session) gs.dungeon._session.totalDmgTaken += dmg;
        totalDmg += dmg;
        boss.rage = Math.min(100, boss.rage + dmg*0.04);
      }
      // 毒付与ダメージスキル
      if(skill.poison && !gs.dungeon.poisoned) {
        const resistPct = r.skillStatusResist || 0;
        const poisoned = resistPct <= 0 || Math.random()*100 >= resistPct;
        if(poisoned) gs.dungeon.poisoned = true;
        const poisonNote = poisoned ? ` ${statusSpan("毒状態")}！` : ` ${statusSpan("耐性")}で毒を防いだ！`;
        logs.push({cls:"item", msg:`${skill.msg} ${dmgSpan(totalDmg + "ダメージ！")}${poisonNote}`});
      } else {
        const pierceNote = skill.pierce ? "（防御貫通）" : "";
        logs.push({cls:"item", msg:`${skill.msg} ${dmgSpan(totalDmg + "ダメージ！")}${pierceNote}`});
      }
    }
  }

  // rage は演出用ゲージのみ（フェーズ移行はHP基準に統一）
  // rage満タンで視覚的な演出のみ発動
  if(boss.rage >= 100) {
    boss.rage = 0; // リセットして繰り返す（フェーズ移行はしない）
    showRageFlash();
    logs.push({cls:"item", msg:`💢 ${enemySpan(boss.name)}が怒りを溜めている！`});
  }

  // ボス戦デバフ残ターン消費
  if((c._defDebuffTurns || 0) > 0) {
    c._defDebuffTurns--;
    if(c._defDebuffTurns <= 0) { c._defDebuffFlat = 0; logs.push({cls:"item", msg:`💚 DEF低下が回復した`}); }
  }
  if((c._healBlockedTurns || 0) > 0) {
    c._healBlockedTurns--;
    if(c._healBlockedTurns <= 0) logs.push({cls:"item", msg:`💚 回復封印が解けた`});
  }
  if((c._atkDebuffTurns || 0) > 0) {
    c._atkDebuffTurns--;
    if(c._atkDebuffTurns <= 0) { c._atkDebuffMul = 1.0; logs.push({cls:"item", msg:`💚 攻撃力低下が回復した`}); }
  }
}

function dropBossItems(boss) {
  // 実績カウンタ
  if(gs.achievements?.stats) gs.achievements.stats.bossKills = (gs.achievements.stats.bossKills||0) + 1;
  const b = BOSS_MASTER[boss.id];
  const rarity = b.dropRarity || "rare";
  const itemDropRate = b.itemDropRate ?? 100;

  // 装備品ドロップ（確率制）
  if(Math.random() * 100 < itemDropRate) {
    const itemId = b.drop[Math.floor(Math.random()*b.drop.length)];
    const m = ITEM_MASTER[itemId];
    if(m) {
      const affixes = rollAffixes(rarity, m.type, gs.dungeon.progress);
      const item = { uid:uuid(), itemId, rarity, demand:100, affixes, cursed:false, curse:null, identified:true, enhLv:0, statOverride:null, locked:false };
      gs.dungeon.loot.push(item);
    }
  }

  // 印章：4階ボス撃破時のみ低確率でドロップ
  if(b.floor === 4 && Math.random() < 0.12) {
    const seals = ["power_seal","wisdom_seal","shadow_seal"];
    const sealId = seals[Math.floor(Math.random()*seals.length)];
    const sm = ITEM_MASTER[sealId];
    const sealAffixes = rollAffixes("epic", sm.type, gs.dungeon.progress);
    const sealItem = { uid:uuid(), itemId:sealId, rarity:"epic", demand:100, affixes:sealAffixes, cursed:false, curse:null, identified:false, enhLv:0, statOverride:null, locked:false };
    gs.dungeon.loot.push(sealItem);
    addLog("item", `🔴 ${enemySpan(boss.name)}から${rarityItemSpan("謎の印章","epic",sealAffixes.length)}を入手！`);
  }

  // 5階ボス：業炎の核を確定ドロップ + Legendary装備を低確率で追加
  if(b.floor === 5) {
    const coreItem = { uid:uuid(), itemId:"inferno_core", rarity:"legendary", demand:100, affixes:[], cursed:false, curse:null, identified:true, enhLv:0, statOverride:null, locked:false };
    gs.dungeon.loot.push(coreItem);
    addLog("item", `🔴 ${enemySpan(boss.name)}から${goldSpan("業炎の核")}を入手！`);
    if(Math.random() < 0.30) {
      const legendaryDrops = ["inferno_blade","inferno_ring","ashcloak","heatwall_shield","ember_armor"];
      const lId = legendaryDrops[Math.floor(Math.random()*legendaryDrops.length)];
      const lm = ITEM_MASTER[lId];
      const lAff = rollAffixes("legendary", lm.type, gs.dungeon.progress);
      const lItem = { uid:uuid(), itemId:lId, rarity:"legendary", demand:100, affixes:lAff, cursed:false, curse:null, identified:false, enhLv:0, statOverride:null, locked:false };
      gs.dungeon.loot.push(lItem);
      addLog("item", `✨ ${enemySpan(boss.name)}から${rarityItemSpan("謎の装備","legendary",lAff.length)}を入手！`);
    }
  }

  // 魔晶石：1%の確率でドロップ
  if(Math.random() < 0.01) {
    gs.dungeon.loot.push({
      uid: uuid(), itemId:"magic_crystal", rarity:materialRarity("magic_crystal"),
      demand:100, affixes:[], cursed:false, curse:null, identified:true, enhLv:0, statOverride:null, locked:false
    });
    addLog("item", `🔷 ${enemySpan(boss.name)}から${goldSpan("魔晶石")}を入手！`);
  }

  return null;
}

function bmUnlocked() {
  return gs.shop.level >= 5;
}

// バイヤーが好む価格ボーナスを計算
function bmPrice(item, buyer) {
  // 謎品ハンターは真の価値ベースで計算（未鑑定50G固定を使わない）
  const truePrice = (() => {
    const m = ITEM_MASTER[item.itemId];
    const r = RARITY_MASTER[item.rarity] || RARITY_MASTER["normal"];
    const affixBonus = (item.affixes||[]).reduce((s,a) => s + a.val * 18, 0);
    return Math.floor(m.basePrice * r.multi + affixBonus);
  })();
  const base = (buyer.unidentifiedOnly && !item.identified) ? truePrice : itemPrice(item);
  let bonus = 1.0;
  for(const like of buyer.likes) {
    if(like === "cursed"       && item.cursed && item.identified) bonus = Math.max(bonus, buyer.bonus);
    if(like === "unidentified" && !item.identified)               bonus = Math.max(bonus, buyer.bonus);
    if(like === "epic"         && item.rarity === "epic")         bonus = Math.max(bonus, buyer.bonus);
    if(like === "legendary"    && item.rarity === "legendary")    bonus = Math.max(bonus, buyer.bonus);
  }
  return Math.floor(base * bonus);
}

// 次のバイヤーをランダム選出してスケジュール
function bmScheduleNextBuyer() {
  const bm = gs.shop.blackmarket;
  const buyer = BM_BUYERS[Math.floor(Math.random() * BM_BUYERS.length)];
  const delay = (buyer.cooldownMin + Math.random() * (buyer.cooldownMax - buyer.cooldownMin)) * 1000;
  bm.buyer = null;
  bm.nextBuyerAt = Date.now() + delay;
  saveGame();
}

// 毎秒チェック：バイヤー到着・取引実行
function checkBlackmarket() {
  if(!bmUnlocked()) return;
  const bm = gs.shop.blackmarket;

  // バイヤー到着チェック
  if(!bm.buyer && bm.nextBuyerAt > 0 && Date.now() >= bm.nextBuyerAt) {
    bm.buyer = BM_BUYERS[Math.floor(Math.random() * BM_BUYERS.length)];
    bm.nextBuyerAt = 0;
    addShopLog("info", `${bm.buyer.icon}【${bm.buyer.name}】が裏口に現れた`);
    saveGame();
    if(currentTab === "shop") updateShopTick();
    checkFatigueExpiry();
    return;
  }

  // 取引チェック：バイヤーがいて陳列中なら購入
  if(bm.buyer && bm.slot) {
    const item = bm.slot.item;
    const buyer = BM_BUYERS.find(b => b.id === bm.buyer.id) || bm.buyer;
    const price = bmPrice(item, buyer);
    const m = ITEM_MASTER[item.itemId];
    const comment = buyer.comment[Math.floor(Math.random() * buyer.comment.length)];

    gs.player.gold += price;
    gs.shop.totalSales++;
    checkQuestProgress("sell", { gold: price, itemId: item.itemId, rarity: item.rarity });
    const _rc4 = item.identified ? (RARITY_MASTER[item.rarity]?.color || 'var(--text-light)') : 'var(--unidentified)';
    addShopLog("gold", `${buyer.icon}${buyer.name}「${comment}」→【<span style="color:${_rc4};font-weight:700">${m.name}</span>】${price}G`);
    notifySale(item, price); // 売却快感演出（S48-SALE）

    // 摘発リスク加算
    const raidAdd = buyer.raidReduction ? 8 * buyer.raidReduction : 8;
    const guardReduce = (gs.shop?.staff||[]).reduce((acc,s) => acc + (getStaffEffect(s).raidRiskReduce||0), 0);
    bm.raidRisk = Math.min(100, Math.max(0, bm.raidRisk + raidAdd - guardReduce));

    // 摘発判定（raidRisk/100 の確率）
    if(Math.random() * 100 < bm.raidRisk) {
      const fine = Math.floor(price * 0.6);
      gs.player.gold = Math.max(0, gs.player.gold - fine);
      bm.raidRisk = Math.max(0, bm.raidRisk - 30);
      addShopLog("damage", `🚨 摘発！罰金 ${fine}G を徴収された`);
    } else {
      bm.raidRisk = Math.max(0, bm.raidRisk - 5);
    }

    // 陳列品をinventoryから除去
    if(gs.achievements?.stats) gs.achievements.stats.totalBmSales = (gs.achievements.stats.totalBmSales||0) + 1;
    gs.inventory = gs.inventory.filter(i => i.uid !== item.uid);
    bm.slot = null;
    bm.buyer = null;
    bmScheduleNextBuyer();
    saveGame();
  }
}

// ブラックマーケットに陳列
function bmListItem(uid) {
  const bm = gs.shop.blackmarket;
  if(!bmUnlocked()) return;
  if(bm.slot) { addShopLog("damage","✕ 裏取引の枠はすでに使用中"); return; }
  const item = gs.inventory.find(i => i.uid === uid);
  if(!item) return;
  const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));
  if(equippedUids.has(uid)) { addShopLog("damage","✕ 装備中のアイテムは出品できない"); return; }
  bm.slot = { item, listedAt: Date.now() };
  if(item.identified) registerCollection(item); // 裏取引出品時に収集登録
  const m = ITEM_MASTER[item.itemId];
  addShopLog("info", `🌑 【${m.name}】を裏取引に出品した`);
  // バイヤーがいなければ次の到着をスケジュール
  if(!bm.buyer && bm.nextBuyerAt === 0) bmScheduleNextBuyer();
  saveGame();
  render();
}

// ブラックマーケットから取り下げ
function bmRemoveItem() {
  const bm = gs.shop.blackmarket;
  if(!bm.slot) return;
  const m = ITEM_MASTER[bm.slot.item.itemId];
  addShopLog("info", `🌑 【${m.name}】を裏取引から取り下げた`);
  bm.slot = null;
  saveGame();
  render();
}
