// ─────────────────────────────────────────
// 装備
// ─────────────────────────────────────────
function equipItem(item) {
  const m = ITEM_MASTER[item.itemId];
  if(!m || !EQUIP_TYPES.has(m.type)) return;
  const slot = m.type;
  gs.equipped[slot] = item.uid;
  registerCollection(item); // 装備時に収集登録
  recalcHpMp(gs);
  setInventoryMsg("good", `✓ 【${m.name}】を装備した`);
  saveGame();
  render();
}

function equipItemByUid(uid) {
  const item = gs.inventory.find(i => i.uid === uid);
  if(item) equipItem(item);
}

function unequipItem(slot) {
  const uid = gs.equipped[slot];
  if(uid) {
    const item = gs.inventory.find(i => i.uid === uid);
    if(item && item.cursed && item.curse && item.curse.type === 'bind') {
      addLog("item", `⛓ ${statusSpan("呪い")}【${statusSpan(item.curse.label)}】により装備を外せない！`);
      render(); return;
    }
  }
  gs.equipped[slot] = null;
  recalcHpMp(gs);
  saveGame();
  render();
}

// 鑑定コスト計算（ショップLv2以上で解禁）
function identifyCost(item) {
  const m = ITEM_MASTER[item.itemId];
  const r = RARITY_MASTER[item.rarity] || RARITY_MASTER["normal"];
  const base = Math.floor(m.basePrice * r.multi * 0.25);
  return Math.max(10, base);
}

// 鑑定実行
function identifyItem(uid) {
  if(gs.shop.level < 2) {
    addLog("item", "ショップLv2以上で鑑定が解禁されます");
    return;
  }
  const item = gs.inventory.find(i => i.uid === uid);
  if(!item || item.identified) return;
  const cost = identifyCost(item);
  if(gs.player.gold < cost) {
    addLog("item", `Goldが足りません（必要: ${goldSpan(cost + "G")}）`);
    return;
  }
  gs.player.gold -= cost;
  item.identified = true;
  const m = ITEM_MASTER[item.itemId];
  const curseMsg = item.cursed ? `⚠ 呪い【${item.curse.label}】が判明！` : "呪いなし";
  addLog("item", `🔍 【${m.name}】を鑑定した。${curseMsg}`);
  saveGame();
  render();
  document.querySelector(".modal-overlay")?.remove();
  openItemDetail(uid);
}



function openBulkPurifyModal() {
  const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));
  const cursedItems  = gs.inventory.filter(i =>
    i.cursed && i.identified && !equippedUids.has(i.uid)
  );

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.cssText = "max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";
  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  // フィルター・選択状態
  const selected       = new Set();
  const activeRarities = new Set();
  const activeTypes    = new Set();

  const BTN = 'display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;font-size:14px;cursor:pointer;border:1px solid var(--border-subtle);background:var(--btn-default);flex-shrink:0';
  const RARITY_SHORT = RARITY_SHORT_LABEL; // S76: グローバル定数を参照
  const TYPE_ICON    = { weapon:"🗡", sub:"🛡", head:"🪖", body:"🥋", cloak:"🧥",
                         legs:"👖", arms:"🧤", feet:"👟", neck:"📿", bracelet:"🔮", ring:"💍", seal:"🔴" };
  const TYPE_COLOR = EQUIP_TYPE_COLOR; // S73: グローバル定数を参照

  // 存在するレアリティ・タイプのみ表示
  const rarityOrder = ["normal","rare","epic","legendary"];
  const typeOrder   = ["weapon","sub","head","body","cloak","legs","arms","feet","neck","bracelet","ring","seal"];
  const rarityKeys  = rarityOrder.filter(rk => cursedItems.some(i => i.rarity === rk));
  const typeKeys    = typeOrder.filter(tk => cursedItems.some(i => ITEM_MASTER[i.itemId]?.type === tk));

  // フィルター適用後のアイテム
  const filtered = () => cursedItems.filter(i => {
    if(activeRarities.size > 0 && !activeRarities.has(i.rarity)) return false;
    if(activeTypes.size > 0 && !activeTypes.has(ITEM_MASTER[i.itemId]?.type)) return false;
    return true;
  });

  const render = () => {
    if(cursedItems.length === 0) {
      mc.innerHTML = `
        <div style="padding:14px 16px"><div class="modal-title">⛓ 一括解呪</div></div>
        <div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted)">呪い付きアイテムがありません</div>
        <div style="padding:8px 16px 14px;border-top:1px solid var(--border)">
          <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
        </div>`;
      return;
    }

    const vis      = filtered();
    const selItems = cursedItems.filter(i => selected.has(i.uid));
    const totalCost = selItems.reduce((s, i) => s + purifyCost(i, 1.0), 0);
    const canAfford = gs.player.gold >= totalCost;

    const noFilter  = activeRarities.size === 0 && activeTypes.size === 0;
    const rarityBtns = rarityKeys.map(rk => {
      const rc  = RARITY_MASTER[rk];
      const on  = activeRarities.has(rk);
      return `<button onclick="window._bpFilterRarity('${rk}')" title="${rc?.label||rk}"
        style="${BTN};color:${rc?.color||'var(--text-white)'};font-weight:700;font-size:12px;
          border-color:${on?rc?.color||'var(--accent)':'var(--border-subtle)'};
          background:${on?'var(--filter-active)':'var(--surface-deep)'}"
        >${RARITY_SHORT[rk]}</button>`;
    }).join('');
    const allBtn = `<button onclick="window._bpFilterAll()" title="全フィルター解除"
      style="${BTN};color:var(--muted);font-weight:700;font-size:11px;
        border-color:${noFilter?'var(--accent)':'var(--border-subtle)'};
        background:${noFilter?'var(--filter-active)':'var(--surface-deep)'}">全</button>`;

    const typeBtns = typeKeys.map(tk => {
      const on  = activeTypes.has(tk);
      const col = TYPE_COLOR[tk] || 'var(--text-light)';
      return `<button onclick="window._bpFilterType('${tk}')" title="${tk}"
        style="${BTN};font-size:14px;color:${col};
          border-color:${on?col:'var(--border-subtle)'};
          background:${on?'var(--filter-active)':'var(--surface-deep)'}"
        >${TYPE_ICON[tk]||tk[0]}</button>`;
    }).join('');

    const rows = vis.map(item => {
      const m    = ITEM_MASTER[item.itemId];
      const r    = RARITY_MASTER[item.rarity];
      const cost = purifyCost(item, 1.0);
      const sel  = selected.has(item.uid);
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-list);cursor:pointer"
        onclick="window._bulkPurifyToggle('${item.uid}')">
        <div style="width:20px;height:20px;border:2px solid ${sel?'var(--curse-border)':'var(--text-disabled)'};border-radius:4px;background:${sel?'var(--curse-bg)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${sel?'<span style="color:var(--curse);font-size:12px">✓</span>':''}
        </div>
        <div style="font-size:20px;flex-shrink:0">${m.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:700;color:${r.color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name}</div>
          <div style="font-size:10px;color:var(--curse)">${item.curse?.icon||''} ${item.curse?.label||'呪い'}</div>
        </div>
        <div style="font-size:11px;color:${sel?'var(--curse)':'var(--text-disabled)'};flex-shrink:0">${cost.toLocaleString()}G</div>
      </div>`;
    }).join('');

    mc.innerHTML = `
      <div style="flex-shrink:0;padding:14px 16px 8px;border-bottom:1px solid var(--border)">
        <div class="modal-title" style="text-align:center;margin-bottom:6px">⛓ 一括解呪 ${goldBadge()}</div>
        <div style="background:var(--surface-alt);border-radius:6px;padding:4px 6px;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:3px;margin-bottom:3px">
            <button onclick="window._bulkPurifySelectAll(true)"  title="表示中を全選択" style="${BTN};font-size:14px">✅</button>
            <button onclick="window._bulkPurifySelectAll(false)" title="選択解除"       style="${BTN};font-size:14px">❌</button>
            <div style="width:1px;height:20px;background:var(--border-dark);margin:0 2px;flex-shrink:0"></div>
            <div style="display:flex;flex-wrap:nowrap;overflow-x:auto;gap:3px;scrollbar-width:none">${rarityBtns}${allBtn}</div>
          </div>
          <div style="display:flex;flex-wrap:nowrap;overflow-x:auto;gap:3px;scrollbar-width:none">${typeBtns}</div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">
          <span>${selected.size}件選択（表示: ${vis.length}件）</span>
          ${totalCost > 0 ? `<span style="color:${canAfford?'var(--curse)':'var(--red)'};font-weight:700;margin-left:8px">${totalCost.toLocaleString()}G</span>` : ''}
          ${!canAfford && totalCost > 0 ? '<span style="color:var(--red);margin-left:4px">⚠ Gold不足</span>' : ''}
        </div>
        <div style="font-size:10px;color:var(--text-disabled);margin-bottom:6px">成功65% / 失敗30% / 大失敗5%（大失敗で中断）</div>
        <button class="btn btn-secondary" style="width:100%;border-color:var(--curse-border);color:var(--curse);${selected.size===0||!canAfford?'opacity:0.5':''}"
          id="bulkPurifyExecBtn" ${selected.size===0?'disabled':''} onclick="window._execBulkPurify()">
          ⛓ 一括解呪（${selected.size}件）
        </button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:0 16px">${rows||'<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px">該当なし</div>'}</div>
      <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border)">
        <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
      </div>
    `;
    // render後にフィルターUIのハイライトを更新（「全」のみハイライト初期状態）
    const noF = activeRarities.size === 0 && activeTypes.size === 0;
    mc.querySelectorAll("[onclick*='_bpFilter']").forEach(btn => {
      const isAll = btn.getAttribute('onclick')?.includes('_bpFilterAll');
      const rkMatch = btn.getAttribute('onclick')?.match(/_bpFilterRarity\('([^']+)'\)/);
      const tkMatch = btn.getAttribute('onclick')?.match(/_bpFilterType\('([^']+)'\)/);
      const isActive = (rkMatch && activeRarities.has(rkMatch[1])) || (tkMatch && activeTypes.has(tkMatch[1]));
      const highlight = isActive || (isAll && noF);
      btn.style.background  = highlight ? 'var(--filter-active)' : 'var(--surface-deep)';
      btn.style.borderColor = highlight ? 'var(--accent)' : 'var(--border-subtle)';
    });
  };

  window._bulkPurifyToggle = (uid) => {
    if(selected.has(uid)) selected.delete(uid); else selected.add(uid);
    render();
  };
  window._bulkPurifySelectAll = (selectAll) => {
    if(selectAll) { selected.clear(); filtered().forEach(i => selected.add(i.uid)); }
    else selected.clear();
    render();
  };
  window._bpFilterRarity = (rk) => {
    if(activeRarities.has(rk)) activeRarities.delete(rk); else activeRarities.add(rk);
    render();
  };
  window._bpFilterType = (tk) => {
    if(activeTypes.has(tk)) activeTypes.delete(tk); else activeTypes.add(tk);
    render();
  };
  window._bpFilterAll = () => { activeRarities.clear(); activeTypes.clear(); render(); };

  window._execBulkPurify = () => {
    const targets = cursedItems.filter(i => selected.has(i.uid));
    if(targets.length === 0) return;

    const purifyBonus   = calcStaffBonus();
    const successAdd    = purifyBonus.purifySuccessBonus || 0;
    const failSafe      = purifyBonus.purifyFailSafe || 0;
    const bigFailThresh = Math.max(1, 5 - failSafe);
    const failThresh    = bigFailThresh + Math.max(0, 30 - successAdd);

    let succeeded = 0, failed = 0;
    for(const item of targets) {
      const cost = purifyCost(item, 1.0);
      if(gs.player.gold < cost) {
        addLog("item", `⚠ Gold不足で${ITEM_MASTER[item.itemId].name}の解呪をスキップ`);
        continue;
      }
      gs.player.gold -= cost;
      const roll = Math.random() * 100;
      if(roll < bigFailThresh) {
        // 大失敗：呪い強化して中断
        const add = CURSE_AMPLIFY.add[item.curse.type] || 0;
        if(add > 0) {
          const maxVal = CURSE_AMPLIFY.maxVal[item.curse.type] || 99;
          item.curse.val = Math.min(item.curse.val + add, maxVal);
        }
        if(gs.achievements?.stats) gs.achievements.stats.totalPurify = (gs.achievements.stats.totalPurify||0) + succeeded;
        addLog("item", `💀 大失敗！【${ITEM_MASTER[item.itemId].name}】の呪いが強化された…一括解呪を中断`);
        addLog("item", `⛓ 中断までの結果：成功${succeeded}件 / 失敗${failed}件`);
        overlay.remove();
        saveGame(); render();
        return;
      } else if(roll < failThresh) {
        failed++;
      } else {
        item.cursed = false;
        item.curse  = null;
        succeeded++;
      }
    }
    if(gs.achievements?.stats) gs.achievements.stats.totalPurify = (gs.achievements.stats.totalPurify||0) + succeeded;
    addLog("item", `⛓ 一括解呪完了：成功${succeeded}件 / 失敗${failed}件`);
    overlay.remove();
    saveGame(); render();
  };

  render();
}

function openBrewModal() {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
  const mc = document.createElement("div");
  mc.className = "modal-content";
  // mc.style は refresh() 内の初回描画時に設定
  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  const RARITY_COLOR = { normal:"var(--text-subtle)", rare:"var(--info)", epic:"var(--epic)", legendary:"var(--legendary-bright)" };
  const RARITY_LABEL = RARITY_SHORT_LABEL; // S76: グローバル定数を参照

  // レシピごとの数量状態
  const qty = {};
  BREW_MASTER.forEach(r => { qty[r.id] = 0; });

  const equippedUids = () => new Set(Object.values(gs.equipped).filter(Boolean));
  const countIn = (itemId, rarity) =>
    gs.inventory.filter(i => i.itemId === itemId && i.rarity === rarity && !equippedUids().has(i.uid)).length;
  const maxTimes = (recipe) => {
    const have = countIn(recipe.fromId, recipe.fromRarity);
    const byStock = Math.floor(have / recipe.fromCount);
    return recipe.gold > 0
      ? Math.min(byStock, Math.floor(gs.player.gold / recipe.gold))
      : byStock;
  };

  const BTN_S = "width:28px;height:28px;border-radius:6px;border:1px solid var(--border-subtle);background:var(--surface-deep);color:var(--text-light);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0";

  const buildRows = () => {
    return BREW_MASTER.filter(recipe => maxTimes(recipe) > 0).map(recipe => {
      const have  = countIn(recipe.fromId, recipe.fromRarity);
      const mx    = maxTimes(recipe);
      // qtyをmxの範囲内にクランプ
      qty[recipe.id] = Math.max(0, Math.min(qty[recipe.id], mx));
      const q     = qty[recipe.id];
      const canDo = q > 0;
      const totalGold = recipe.gold * q;
      const fromM = ITEM_MASTER[recipe.fromId];
      const toM   = ITEM_MASTER[recipe.toId];
      const fromColor = RARITY_COLOR[recipe.fromRarity];
      const toColor   = RARITY_COLOR[recipe.toRarity];

      return `<div style="padding:10px 0;border-bottom:1px solid var(--bg-darker)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="font-size:20px;flex-shrink:0">${recipe.icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;flex-wrap:wrap">
              <span style="color:${fromColor}">${fromM.name}
                <span style="font-size:10px;border:1px solid ${fromColor};border-radius:3px;padding:0 3px">${RARITY_LABEL[recipe.fromRarity]}</span>
              </span>
              <span style="color:var(--muted)">×${recipe.fromCount}</span>
              <span style="color:var(--muted)">→</span>
              <span style="color:${toColor}">${toM.name}
                <span style="font-size:10px;border:1px solid ${toColor};border-radius:3px;padding:0 3px">${RARITY_LABEL[recipe.toRarity]}</span>
              </span>
              <span style="color:var(--muted)">×1</span>
            </div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px;display:flex;gap:8px">
              <span>所持: <span style="color:${have >= recipe.fromCount ? "var(--green)" : "var(--damage)"};font-weight:700">${have}個</span></span>
              ${recipe.gold > 0 ? `<span>1回: <span style="color:var(--gold)">${recipe.gold.toLocaleString()}G</span></span>` : ""}
              <span>最大: <span style="color:var(--muted)">${mx}回</span></span>
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <button style="${BTN_S};font-size:10px" onclick="window._brewQty('${recipe.id}','min')">Min</button>
          <button style="${BTN_S}" onclick="window._brewQty('${recipe.id}','dec')">－</button>
          <div style="min-width:32px;text-align:center;font-size:15px;font-weight:700;color:${q>0?'var(--accent2)':'var(--muted)'}">${q}</div>
          <button style="${BTN_S}" onclick="window._brewQty('${recipe.id}','inc')">＋</button>
          <button style="${BTN_S};font-size:10px" onclick="window._brewQty('${recipe.id}','max')">Max</button>
          <div style="flex:1"></div>
          ${recipe.gold > 0 && q > 0 ? `<span style="font-size:10px;color:var(--gold)">計 ${totalGold.toLocaleString()}G</span>` : ""}
          <button onclick="window._execBrew('${recipe.id}');window._brewRefresh&&window._brewRefresh();"
            style="padding:5px 14px;font-size:11px;border-radius:6px;
              border:1px solid ${canDo?"var(--accent)":"var(--border-dark)"};
              background:${canDo?"var(--accent-bg)":"transparent"};
              color:${canDo?"var(--accent)":"var(--text-disabled)"};
              cursor:${canDo?"pointer":"not-allowed"}"
            ${canDo?"":"disabled"}>調合 ×${q||"0"}</button>
        </div>
      </div>`;
    }).join("");

    if(rows.length === 0) return '<div style="font-size:12px;color:var(--muted);text-align:center;padding:24px">調合できる素材がありません</div>';
    return rows.join("");
  };

  const refresh = () => {
    if(!mc.querySelector("#brewScrollArea")) {
      mc.style.cssText = "max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";
      mc.innerHTML = `
        <div style="flex-shrink:0;padding:14px 16px 8px;border-bottom:1px solid var(--border);background:var(--card)">
          <div class="modal-title" style="text-align:center">🧪 調合 <span id="brewGoldBadge">${goldBadge()}</span></div>
        </div>
        <div id="brewScrollArea" style="flex:1;overflow-y:auto;padding:0 16px"></div>
        <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border);background:var(--card)">
          <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
        </div>`;
    }
    const scrollEl = mc.querySelector("#brewScrollArea");
    const scrollTop = scrollEl ? scrollEl.scrollTop : 0;
    if(scrollEl) scrollEl.innerHTML = buildRows();
    const brewGoldEl = mc.querySelector("#brewGoldBadge");
    if(brewGoldEl) brewGoldEl.outerHTML = `<span id="brewGoldBadge">${goldBadge()}</span>`;
    if(scrollEl) scrollEl.scrollTop = scrollTop;
  };

  window._brewQty = (recipeId, op) => {
    const recipe = BREW_MASTER.find(r => r.id === recipeId);
    if(!recipe) return;
    const mx = maxTimes(recipe);
    if(op === "min") qty[recipeId] = 0;
    else if(op === "max") qty[recipeId] = mx;
    else if(op === "inc") qty[recipeId] = Math.min(mx, (qty[recipeId]||0) + 1);
    else if(op === "dec") qty[recipeId] = Math.max(0, (qty[recipeId]||0) - 1);
    window._brewRefresh && window._brewRefresh();
  };

  window._brewRefresh = refresh;

  window._execBrew = (recipeId) => {
    const recipe = BREW_MASTER.find(r => r.id === recipeId);
    if(!recipe) return;
    const times = qty[recipeId] || 0;
    if(times <= 0) return;
    const eq = equippedUids();
    for(let t = 0; t < times; t++) {
      const sources = gs.inventory.filter(i =>
        i.itemId === recipe.fromId && i.rarity === recipe.fromRarity && !eq.has(i.uid)
      );
      if(sources.length < recipe.fromCount) break;
      if(recipe.gold > 0 && gs.player.gold < recipe.gold) break;
      const toConsume = sources.slice(0, recipe.fromCount).map(i => i.uid);
      gs.inventory = gs.inventory.filter(i => !toConsume.includes(i.uid));
      if(recipe.gold > 0) gs.player.gold -= recipe.gold;
      gs.inventory.push({
        uid: uuid(), itemId: recipe.toId, rarity: recipe.toRarity,
        demand: 100, affixes: [], cursed: false, curse: null, identified: true, enhLv: 0, statOverride: null, locked: false,
      });
    }
    const fromM = ITEM_MASTER[recipe.fromId];
    const toM   = ITEM_MASTER[recipe.toId];
    const totalCost = recipe.gold * times;
    if(totalCost > 0) showGoldPop(-totalCost);
    if(gs.achievements?.stats) gs.achievements.stats.totalBrew = (gs.achievements.stats.totalBrew||0) + times;
    addLog("item", `🧪 調合×${times}：${fromM.name}×${recipe.fromCount * times} → ${toM.name}(${RARITY_MASTER[recipe.toRarity].label})×${times}`);
    qty[recipeId] = 0;
    saveGame();
    render();
  };

  refresh();
}

function openBulkIdentifyModal() {
  if(gs.shop.level < 2) {
    addLog("item", "ショップLv2以上で鑑定が解禁されます");
    return;
  }
  const unidentified = gs.inventory.filter(i => !i.identified);
  if(unidentified.length === 0) {
    addLog("item", "未鑑定品がありません");
    render();
    return;
  }

  const selected = new Set();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
  const mc = document.createElement("div");
  mc.className = "modal-content";
  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  const totalCost = () => [...selected].reduce((s, uid) => {
    const item = unidentified.find(i => i.uid === uid);
    return s + (item ? identifyCost(item) : 0);
  }, 0);

  const scroll = (() => {
    // 骨格を初回生成
    mc.style.cssText = "max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";
    mc.innerHTML = `
      <div style="flex-shrink:0;padding:14px 16px 8px;border-bottom:1px solid var(--border)">
        <div class="modal-title" style="text-align:center;margin-bottom:6px">🔍 一括鑑定 ${goldBadge()}</div>
        <div id="bulkIdCount" style="font-size:11px;color:var(--muted);margin-bottom:6px;text-align:center"></div>
        <div style="display:flex;gap:6px;margin-bottom:6px">
          <button id="bulkIdAll"   class="btn btn-secondary" style="flex:1;font-size:12px">✅ 全選択</button>
          <button id="bulkIdClear" class="btn btn-secondary" style="flex:1;font-size:12px">❌ 解除</button>
        </div>
        <button id="bulkIdConfirm" class="btn btn-gold" style="width:100%" disabled>🔍 0個を鑑定（0G）</button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:8px 16px" id="bulkIdScroll"></div>
      <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border)">
        <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
      </div>
    `;
    const sc = mc.querySelector("#bulkIdScroll");
    const countEl  = mc.querySelector("#bulkIdCount");
    const confirmBtn = mc.querySelector("#bulkIdConfirm");

    mc.querySelector("#bulkIdAll").onclick = () => {
      selected.clear();
      unidentified.forEach(i => selected.add(i.uid));
      renderList();
    };
    mc.querySelector("#bulkIdClear").onclick = () => {
      selected.clear();
      renderList();
    };
    confirmBtn.onclick = () => {
      if(selected.size === 0) return;
      const cost = totalCost();
      if(gs.player.gold < cost) {
        addLog("item", `Gold不足です（必要: ${cost.toLocaleString()}G）`);
        return;
      }
      let count = 0;
      selected.forEach(uid => {
        const item = gs.inventory.find(i => i.uid === uid);
        if(!item || item.identified) return;
        const c = identifyCost(item);
        if(gs.player.gold < c) return;
        gs.player.gold -= c;
        item.identified = true;
        const m = ITEM_MASTER[item.itemId];
        const curseMsg = item.cursed ? `⚠呪い【${item.curse.label}】` : "呪いなし";
        addLog("item", `🔍 【${m.name}】${curseMsg}`);
        count++;
      });
      addLog("item", `✦ ${count}個のアイテムを鑑定した`);
      saveGame(); render();
      overlay.remove();
    };

    const renderList = () => {
      const savedTop = sc.scrollTop;
      const cost = totalCost();
      const canAfford = gs.player.gold >= cost;
      countEl.innerHTML = `選択中 <span style="color:var(--text-white);font-weight:700">${selected.size}</span>個 ／ 合計 <span style="color:${canAfford?'var(--gold)':'var(--danger)'};font-weight:700">${cost.toLocaleString()}G</span>`;
      confirmBtn.textContent = `🔍 ${selected.size}個を鑑定（${cost.toLocaleString()}G）`;
      confirmBtn.disabled = selected.size === 0 || !canAfford;

      sc.innerHTML = "";
      unidentified.forEach(item => {
        const m    = ITEM_MASTER[item.itemId];
        const cost = identifyCost(item);
        const checked = selected.has(item.uid);
        const row = document.createElement("div");
        row.style.cssText = "display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--bg-mid);cursor:pointer";
        row.innerHTML = `
          <div style="width:20px;height:20px;border:2px solid ${checked?'var(--accent)':'var(--text-disabled)'};border-radius:4px;background:${checked?'var(--accent)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            ${checked ? '<span style="color:var(--text-white);font-size:12px;line-height:1">✓</span>' : ''}
          </div>
          <div class="itemIcon rarity-normal" style="width:32px;height:32px;font-size:18px;flex-shrink:0">❓</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;color:var(--muted);font-weight:700">${m.name} <span style="color:var(--text-faint);font-size:11px;font-weight:400">（未鑑定）</span></div>
            <div style="font-size:11px;color:var(--muted)">${m.type} ／ 鑑定費 <span style="color:var(--gold)">${cost}G</span></div>
          </div>
        `;
        row.onclick = () => {
          selected.has(item.uid) ? selected.delete(item.uid) : selected.add(item.uid);
          renderList();
        };
        sc.appendChild(row);
      });
      sc.scrollTop = savedTop;
    };

    renderList();
    return sc;
  })();
}



function openBulkDecomposeModal() {
  const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));
  const shelfUids    = new Set(gs.shop.shelves.filter(s => s && s.item).map(s => s.item.uid));

  // 分解可能条件：鑑定済み・呪いなし・ロックなし・装備中でない・棚に出していない
  const decomposable = gs.inventory.filter(i => {
    const m = ITEM_MASTER[i.itemId];
    return i.identified && !i.cursed && !i.locked
      && !equippedUids.has(i.uid) && !shelfUids.has(i.uid)
      && m && EQUIP_TYPES.has(m.type);
  });

  if(decomposable.length === 0) {
    addLog("item", "分解できるアイテムがありません");
    render(); return;
  }

  const RARITY_ORDER = ["normal","rare","epic","legendary"];
  const TYPE_ICON    = { weapon:"🗡", sub:"🛡", head:"🪖", body:"🥋", legs:"👖", arms:"🧤",
                         feet:"👟", neck:"📿", bracelet:"🔮", ring:"💍", seal:"🔴" };
  const TYPE_COLOR = EQUIP_TYPE_COLOR; // S73: グローバル定数を参照
  const rarityKeys   = RARITY_ORDER.filter(rk => decomposable.some(i => i.rarity === rk));
  const typeKeys     = [...new Set(decomposable.map(i => ITEM_MASTER[i.itemId]?.type).filter(Boolean))];

  const activeRarities = new Set();
  const activeTypes    = new Set();
  const selected       = new Set();

  const BTN = 'display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;font-size:14px;cursor:pointer;border:1px solid var(--border-subtle);background:var(--btn-default);transition:background 0.1s,border 0.1s';

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
  const mc = document.createElement("div");
  mc.className = "modal-content";
  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  // 骨格
  const rarityBtns = rarityKeys.map(rk => {
    const rc = RARITY_MASTER[rk];
    return `<button data-drarity="${rk}" title="${rc.label}"
      style="${BTN};color:${rc.color};font-weight:700;font-size:12px">${rk[0].toUpperCase()}</button>`;
  }).join('');
  const typeBtns = typeKeys.map(tk =>
    `<button data-dtype="${tk}" title="${tk}" style="${BTN};color:${TYPE_COLOR[tk]||'var(--text-light)'}">${TYPE_ICON[tk]||'📦'}</button>`
  ).join('');

  mc.style.cssText = "max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";
  mc.innerHTML = `
    <div style="flex-shrink:0;padding:14px 16px 8px;border-bottom:1px solid var(--border)">
    <div class="modal-title" style="text-align:center;margin-bottom:6px">🔨 一括分解</div>
    <div style="background:var(--surface-alt);border-radius:6px;padding:4px 6px;margin-bottom:4px">
      <div style="display:flex;align-items:center;gap:3px;margin-bottom:3px">
        <button data-dfilter="select" title="表示中を全選択" style="${BTN};font-size:14px">✅</button>
        <button data-dfilter="clear"  title="選択解除"       style="${BTN};font-size:14px">❌</button>
        <div style="width:1px;height:20px;background:var(--border-dark);margin:0 2px;flex-shrink:0"></div>
        <div style="display:flex;flex-wrap:nowrap;overflow-x:auto;gap:3px;scrollbar-width:none">
          ${rarityBtns}
          <button data-dfilter="rarity:all" title="全フィルター解除" style="${BTN};color:var(--muted);font-weight:700;font-size:11px">全</button>
        </div>
      </div>
      <div style="display:flex;flex-wrap:nowrap;overflow-x:auto;gap:3px;scrollbar-width:none;margin-bottom:3px">${typeBtns}</div>
      <div style="display:flex;align-items:center;gap:3px;padding-top:2px;border-top:1px solid var(--bg-mid)">
        <span style="font-size:10px;color:var(--muted);flex-shrink:0">並替</span>
        <button data-dsort="enh_desc" title="強化済み優先" style="${BTN};font-size:11px;font-weight:700;color:var(--success)">⚒↑</button>
        <button data-dsort="enh_asc"  title="通常優先"     style="${BTN};font-size:11px;font-weight:700;color:var(--muted)">⚒↓</button>
      </div>
    </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:8px 16px">
      <div id="bulkDecCount" style="font-size:11px;color:var(--muted);margin-bottom:4px;text-align:center"></div>
      <div id="bulkDecScroll"></div>
    </div>
    <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border)">
      <button id="bulkDecConfirmH" class="btn" style="width:100%;background:#3a1010;border:1px solid var(--danger-dark);color:var(--warning);margin-bottom:6px" disabled>🔨 0個を分解（0G）</button>
      <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
    </div>
  `;

  const scroll     = mc.querySelector("#bulkDecScroll");
  const countEl    = mc.querySelector("#bulkDecCount");
  const confirmBtn = mc.querySelector("#bulkDecConfirmH");

  let sortEnhFirst = false; // trueで強化済み優先

  const filteredItems = () => {
    let list = decomposable.filter(i => {
      if(activeRarities.size > 0 && !activeRarities.has(i.rarity)) return false;
      if(activeTypes.size > 0 && !activeTypes.has(ITEM_MASTER[i.itemId]?.type)) return false;
      return true;
    });
    if(sortEnhFirst) list = [...list].sort((a,b) => (b.enhLv||0) - (a.enhLv||0));
    else             list = [...list].sort((a,b) => (a.enhLv||0) - (b.enhLv||0));
    return list;
  };

  const refreshFilterUI = () => {
    const noFilter = activeRarities.size === 0 && activeTypes.size === 0;
    mc.querySelectorAll("[data-drarity],[data-dtype],[data-dfilter='rarity:all']").forEach(btn => {
      const isAllBtn  = btn.dataset.dfilter === 'rarity:all';
      const isActive  = !isAllBtn && (
        (btn.dataset.drarity && activeRarities.has(btn.dataset.drarity)) ||
        (btn.dataset.dtype   && activeTypes.has(btn.dataset.dtype))
      );
      const highlight = isActive || (isAllBtn && noFilter);
      btn.style.background  = highlight ? 'var(--filter-active)' : 'var(--surface-deep)';
      btn.style.borderColor = highlight ? 'var(--accent)' : 'var(--border-subtle)';
    });
    mc.querySelectorAll("[data-dsort]").forEach(btn => {
      const s = btn.dataset.dsort;
      const isActive = (s === "enh_desc" && sortEnhFirst) || (s === "enh_asc" && !sortEnhFirst);
      btn.style.background  = isActive ? '#1a2a1a' : 'var(--surface-deep)';
      btn.style.borderColor = isActive ? '#44cc44' : 'var(--border-subtle)';
    });
  };

  // フィルター・ソートイベント
  mc.addEventListener("click", e => {
    const sb = e.target.closest("[data-dsort]");
    const fb = e.target.closest("[data-dfilter],[data-drarity],[data-dtype]");
    if(sb) {
      sortEnhFirst = (sb.dataset.dsort === "enh_desc");
      refreshFilterUI(); renderList(); return;
    }
    if(!fb) return;
    if(fb.dataset.dfilter === "select") {
      selected.clear(); filteredItems().forEach(i => selected.add(i.uid));
    } else if(fb.dataset.dfilter === "clear") {
      selected.clear();
    } else if(fb.dataset.dfilter === "rarity:all") {
      activeRarities.clear(); activeTypes.clear();
    } else if(fb.dataset.drarity) {
      const rk = fb.dataset.drarity;
      if(activeRarities.has(rk)) activeRarities.delete(rk); else activeRarities.add(rk);
    } else if(fb.dataset.dtype) {
      const tk = fb.dataset.dtype;
      if(activeTypes.has(tk)) activeTypes.delete(tk); else activeTypes.add(tk);
    }
    refreshFilterUI();
    renderList();
  });

  confirmBtn.onclick = () => {
    if(selected.size === 0) return;
    const totalCost = [...selected].reduce((s, uid) => {
      const item = decomposable.find(i => i.uid === uid);
      return s + (item ? decomposeCost(item) : 0);
    }, 0);
    if(gs.player.gold < totalCost) {
      addLog("item", `Gold不足です（必要: ${totalCost.toLocaleString()}G）`);
      return;
    }
    // 確認ダイアログ
    const confirmOverlay = document.createElement("div");
    confirmOverlay.className = "modal-overlay";
    confirmOverlay.innerHTML = `
      <div class="modal-content" style="text-align:center">
        <div class="modal-title">🔨 一括分解確認 ${goldBadge()}</div>
        <div style="font-size:13px;margin-bottom:8px">${selected.size}個のアイテムを分解します</div>
        <div style="font-size:13px;color:var(--warning);margin-bottom:16px">費用合計: ${totalCost.toLocaleString()}G</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary" style="flex:1" id="bdcCancel">キャンセル</button>
          <button class="btn btn-secondary" style="flex:1;border-color:var(--danger-dark);color:var(--warning)" id="bdcConfirm">🔨 分解する</button>
        </div>
      </div>`;
    document.body.appendChild(confirmOverlay);
    confirmOverlay.querySelector("#bdcCancel").onclick  = () => confirmOverlay.remove();
    confirmOverlay.querySelector("#bdcConfirm").onclick = () => {
      confirmOverlay.remove();
      let count = 0;
      selected.forEach(uid => {
        const item = gs.inventory.find(i => i.uid === uid);
        if(!item) return;
        const cost = decomposeCost(item);
        if(gs.player.gold < cost) return;
        gs.player.gold -= cost;
        const m = ITEM_MASTER[item.itemId];
        const rewards = buildDecomposeRewards(item);
        const rewardText = rewards.map(r => {
          const mm = ITEM_MASTER[r.itemId];
          return `${mm.icon}${mm.name}×${r.count}`;
        }).join("、");
        gs.inventory = gs.inventory.filter(i => i.uid !== uid);
        for(const r of rewards) {
          for(let j = 0; j < r.count; j++) {
            gs.inventory.push({
              uid: `mat_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
              itemId: r.itemId, rarity: r.rarity,
              identified:true, cursed:false, curse:null,
              affixes:[], enhLv:0, statOverride:null,
            });
          }
        }
        addLog("item", `🔨【${m.name}】→ ${rewardText}`);
        count++;
      });
      showGoldPop(-totalCost);
      addLog("item", `✦ ${count}個を一括分解した`);
      saveGame(); render();
      overlay.remove();
    };
  };

  const renderList = () => {
    const savedTop = scroll.scrollTop;
    const totalCost = [...selected].reduce((s, uid) => {
      const item = decomposable.find(i => i.uid === uid);
      return s + (item ? decomposeCost(item) : 0);
    }, 0);
    const canAfford = gs.player.gold >= totalCost;
    countEl.innerHTML = `選択中 <span style="color:var(--text-white);font-weight:700">${selected.size}</span>個 ／ 費用合計 <span style="color:${canAfford?'var(--gold)':'var(--danger)'};font-weight:700">${totalCost.toLocaleString()}G</span>`;
    confirmBtn.textContent = `🔨 ${selected.size}個を分解（${totalCost.toLocaleString()}G）`;
    confirmBtn.disabled = selected.size === 0 || !canAfford;

    scroll.innerHTML = "";
    decomposable.forEach(item => {
      const m    = ITEM_MASTER[item.itemId];
      const r    = RARITY_MASTER[item.rarity];
      const cost = decomposeCost(item);
      const isEnhanced = (item.enhLv || 0) > 0;
      const checked = selected.has(item.uid);
      const row = document.createElement("div");
      row.style.cssText = `display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--bg-mid);cursor:pointer;opacity:${isEnhanced&&!checked?'0.6':'1'}`;
      row.innerHTML = `
        <div style="width:20px;height:20px;border:2px solid ${checked?'var(--warning)':'var(--text-disabled)'};border-radius:4px;background:${checked?'#3a1010':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${checked ? '<span style="color:var(--warning);font-size:12px;line-height:1">✓</span>' : ''}
        </div>
        <div class="itemIcon rarity-${item.rarity}" style="width:32px;height:32px;font-size:18px;flex-shrink:0">${m.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;color:${r.color};font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
            ${m.name}${isEnhanced?` <span style="color:var(--success);font-size:11px">+${item.enhLv}</span>`:''}
          </div>
          <div style="font-size:11px;color:var(--muted)">${m.type} ／ 費用 <span style="color:var(--warning)">${cost.toLocaleString()}G</span></div>
        </div>`;
      row.onclick = () => {
        selected.has(item.uid) ? selected.delete(item.uid) : selected.add(item.uid);
        renderList();
      };
      scroll.appendChild(row);
    });
    scroll.scrollTop = savedTop;
  };

  refreshFilterUI();
  renderList();
}



function openBulkEnhanceModal() {
  const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));
  const shelfUids    = new Set((gs.shop.shelves||[]).filter(s=>s?.item).map(s=>s.item.uid));

  // 対象候補：装備品・鑑定済み・未出品・未装備・強化余地あり
  const candidates = () => gs.inventory.filter(i => {
    if(!i.identified) return false;
    if(equippedUids.has(i.uid) || shelfUids.has(i.uid)) return false;
    if(i.locked) return false;
    if((i.enhLv||0) >= ENHANCE_MAX) return false;
    const m = ITEM_MASTER[i.itemId];
    if(!m || !EQUIP_TYPES.has(m.type)) return false; // 装備品以外を除外
    return true;
  });

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.cssText = "max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";
  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  // 状態
  const selected       = new Set();
  const activeRarities = new Set();
  const activeTypes    = new Set();
  let   targetLv       = 0; // 0=未設定（ENHANCE_MAX扱い）

  const BTN  = 'display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;font-size:14px;cursor:pointer;border:1px solid var(--border-subtle);background:var(--btn-default);flex-shrink:0';
  const BTN2 = 'display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border-subtle);background:var(--btn-default);flex-shrink:0';
  const RARITY_SHORT = RARITY_SHORT_LABEL; // S76: グローバル定数を参照
  const TYPE_ICON    = { weapon:"🗡", sub:"🛡", head:"🪖", body:"🥋", cloak:"🧥",
                         legs:"👖", arms:"🧤", feet:"👟", neck:"📿", bracelet:"🔮", ring:"💍", seal:"🔴" };
  const TYPE_COLOR = EQUIP_TYPE_COLOR; // S73: グローバル定数を参照

  const rarityOrder = ["normal","rare","epic","legendary"];
  const typeOrder   = ["weapon","sub","head","body","cloak","legs","arms","feet","neck","bracelet","ring","seal"];

  // フィルタ適用後のアイテム
  const filtered = () => {
    const goal = targetLv || ENHANCE_MAX;
    return candidates().filter(i => {
      if(activeRarities.size > 0 && !activeRarities.has(i.rarity)) return false;
      if(activeTypes.size > 0    && !activeTypes.has(ITEM_MASTER[i.itemId]?.type)) return false;
      if((i.enhLv||0) >= goal) return false; // 目標値に達しているものは除外
      return true;
    });
  };

  // 選択中アイテムの最大コスト（全成功想定）
  const calcMaxCost = () => {
    const goal = targetLv || ENHANCE_MAX;
    return [...selected].reduce((sum, uid) => {
      const item = gs.inventory.find(i => i.uid === uid);
      if(!item) return sum;
      let cost = 0;
      for(let lv = (item.enhLv||0); lv < goal; lv++) {
        cost += Math.floor(
          (ITEM_MASTER[item.itemId]?.basePrice || 0) *
          (RARITY_MASTER[item.rarity]?.multi || 1) *
          (1 + lv * 1.5)
        );
      }
      return sum + cost;
    }, 0);
  };

  const hasCursed = () => [...selected].some(uid => {
    const i = gs.inventory.find(x => x.uid === uid);
    return i?.cursed;
  });

  const render = () => {
    const all      = candidates();
    if(all.length === 0) {
      mc.innerHTML = `
        <div style="padding:14px 16px"><div class="modal-title">⚒ 一括強化</div></div>
        <div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted)">強化できるアイテムがありません</div>
        <div style="padding:8px 16px 14px;border-top:1px solid var(--border)">
          <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
        </div>`;
      return;
    }

    const vis       = filtered();
    const maxCost   = calcMaxCost();
    const canAfford = gs.player.gold >= maxCost;
    const goal      = targetLv || ENHANCE_MAX;

    // 存在するレアリティ・タイプ（全候補ベース）
    const rarityKeys = rarityOrder.filter(rk => all.some(i => i.rarity === rk));
    const typeKeys   = typeOrder.filter(tk => all.some(i => ITEM_MASTER[i.itemId]?.type === tk));

    const noFilter = activeRarities.size === 0 && activeTypes.size === 0;
    const rarityBtns = rarityKeys.map(rk => {
      const rc = RARITY_MASTER[rk];
      const on = activeRarities.has(rk);
      return `<button onclick="window._beFilterRarity('${rk}')" title="${rc?.label||rk}"
        style="${BTN};color:${rc?.color||'var(--text-white)'};font-weight:700;font-size:12px;
          border-color:${on?rc?.color||'var(--accent)':'var(--border-subtle)'};
          background:${on?'var(--filter-active)':'var(--surface-deep)'}"
        >${RARITY_SHORT[rk]}</button>`;
    }).join('') + `<button onclick="window._beFilterAll()" title="全フィルター解除"
      style="${BTN};color:var(--muted);font-weight:700;font-size:11px;
        border-color:${noFilter?'var(--accent)':'var(--border-subtle)'};
        background:${noFilter?'var(--filter-active)':'var(--surface-deep)'}">全</button>`;

    const typeBtns = typeKeys.map(tk => {
      const on  = activeTypes.has(tk);
      const col = TYPE_COLOR[tk] || 'var(--text-light)';
      return `<button onclick="window._beFilterType('${tk}')" title="${tk}"
        style="${BTN};font-size:14px;color:${on?col:'var(--text-mid)'};
          border-color:${on?col:'var(--border-subtle)'};background:${on?'var(--filter-active)':'var(--surface-deep)'}"
        >${TYPE_ICON[tk]||tk}</button>`;
    }).join('');

    // [1]〜[11] 目標強化値ボタン（28px幅）
    const lvBtns = Array.from({length:11}, (_,i) => i+1).map(n => {
      const on = targetLv === n;
      return `<button onclick="window._beFilterLv(${n})" title="+${n}まで強化"
        style="${BTN2};color:${on?'#88ddff':'var(--text-subtle)'};
          border-color:${on?'var(--accent)':'var(--border-subtle)'};background:${on?'#1a2a40':'var(--surface-deep)'}"
        >${n}</button>`;
    }).join('');

    const rows = vis.map(i => {
      const m    = ITEM_MASTER[i.itemId];
      const r    = RARITY_MASTER[i.rarity];
      const enh  = i.enhLv || 0;
      const sel  = selected.has(i.uid);
      // このアイテムの最大コスト
      let itemCost = 0;
      for(let lv = enh; lv < goal; lv++) {
        itemCost += Math.floor((m?.basePrice||0) * (r?.multi||1) * (1 + lv * 1.5));
      }
      const curseMark = i.cursed ? `<span style="font-size:10px;color:#cc44ff;margin-left:2px">💀</span>` : '';
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-list);cursor:pointer"
        onclick="window._beToggle('${i.uid}')">
        <div style="width:20px;height:20px;border:2px solid ${sel?'var(--accent)':'var(--text-disabled)'};border-radius:4px;background:${sel?'#1a2a40':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${sel?'<span style="font-size:10px;color:var(--accent)">✓</span>':''}
        </div>
        <div style="font-size:20px;flex-shrink:0">${m?.icon||'?'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:700;color:${r?.color||'var(--text-white)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
            ${m?.name||i.itemId}${curseMark}
          </div>
          <div style="font-size:10px;color:var(--muted)">+${enh} → +${goal}</div>
        </div>
        <div style="font-size:11px;color:${sel?'var(--gold)':'var(--text-faint)'};flex-shrink:0">${itemCost.toLocaleString()}G</div>
      </div>`;
    }).join('');

    const cursedWarn = hasCursed()
      ? `<div style="font-size:10px;color:var(--curse);margin-bottom:4px">⚠ 呪い付きを含みます。強化により呪いが強化される場合があります。</div>` : '';

    mc.innerHTML = `
      <div style="flex-shrink:0;padding:14px 16px 8px;border-bottom:1px solid var(--border)">
        <div class="modal-title" style="text-align:center;margin-bottom:6px">⚒ 一括強化 ${goldBadge()}</div>
        <div style="background:var(--surface-alt);border-radius:6px;padding:4px 6px;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:3px;margin-bottom:3px">
            <button onclick="window._beSelectAll(true)"  title="全選択" style="${BTN};font-size:14px">✅</button>
            <button onclick="window._beSelectAll(false)" title="全解除" style="${BTN};font-size:14px">❌</button>
            <div style="width:1px;height:20px;background:var(--border-dark);margin:0 2px;flex-shrink:0"></div>
            <div style="display:flex;flex-wrap:nowrap;overflow-x:auto;gap:3px;scrollbar-width:none">${rarityBtns}</div>
          </div>
          <div style="display:flex;flex-wrap:nowrap;overflow-x:auto;gap:3px;scrollbar-width:none;margin-bottom:3px">${typeBtns}</div>
          <div style="display:flex;align-items:center;gap:3px;padding-top:2px;border-top:1px solid var(--bg-mid)">
            <span style="font-size:10px;color:var(--muted);flex-shrink:0;margin-right:2px">目標</span>
            <div style="display:flex;flex-wrap:nowrap;gap:2px">${lvBtns}</div>
            ${targetLv ? `<button onclick="window._beFilterLv(0)" style="${BTN2};color:var(--muted);border-color:var(--border-subtle);background:var(--surface-deep);font-size:10px">✕</button>` : ''}
          </div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">
          <span>${selected.size}件選択（表示: ${vis.length}件）</span>
          ${maxCost > 0 ? `<span style="color:${canAfford?'var(--gold)':'var(--red)'};font-weight:700;margin-left:8px">最大${maxCost.toLocaleString()}G</span>` : ''}
          ${!canAfford && maxCost > 0 ? '<span style="color:var(--red);margin-left:4px">⚠ Gold不足</span>' : ''}
        </div>
        <div style="font-size:10px;color:var(--text-disabled);margin-bottom:4px">目標値まで強化。失敗しても続行。Gold不足で停止。</div>
        ${cursedWarn}
        <button class="btn btn-secondary" style="width:100%;border-color:#3a7a3a;color:#88cc88;${selected.size===0||!canAfford?'opacity:0.5':''}"
          id="bulkEnhExecBtn" ${selected.size===0||!canAfford?'disabled':''} onclick="window._execBulkEnhance()">
          ⚒ 一括強化（${selected.size}件 / 目標+${goal}）
        </button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:0 16px">${rows||'<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px">該当なし</div>'}</div>
      <div id="bulkEnhResult" style="display:none;flex-shrink:0;padding:6px 16px;border-top:1px solid var(--border);max-height:120px;overflow-y:auto;font-size:11px"></div>
      <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border)">
        <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
      </div>`;
    // render後にフィルターUIのハイライトを更新
    const noF = activeRarities.size === 0 && activeTypes.size === 0;
    mc.querySelectorAll("[onclick*='_beFilter']").forEach(btn => {
      const isAll = btn.getAttribute('onclick')?.includes('_beFilterAll');
      const rkMatch = btn.getAttribute('onclick')?.match(/_beFilterRarity\('([^']+)'\)/);
      const tkMatch = btn.getAttribute('onclick')?.match(/_beFilterType\('([^']+)'\)/);
      const isActive = (rkMatch && activeRarities.has(rkMatch[1])) || (tkMatch && activeTypes.has(tkMatch[1]));
      const highlight = isActive || (isAll && noF);
      btn.style.background  = highlight ? 'var(--filter-active)' : 'var(--surface-deep)';
      btn.style.borderColor = highlight ? 'var(--accent)' : 'var(--border-subtle)';
    });
  };

  window._beToggle = (uid) => {
    if(selected.has(uid)) selected.delete(uid); else selected.add(uid);
    render();
  };
  window._beSelectAll = (on) => {
    if(on) { selected.clear(); filtered().forEach(i => selected.add(i.uid)); }
    else selected.clear();
    render();
  };
  window._beFilterRarity = (rk) => {
    if(activeRarities.has(rk)) activeRarities.delete(rk); else activeRarities.add(rk);
    render();
  };
  window._beFilterType = (tk) => {
    if(activeTypes.has(tk)) activeTypes.delete(tk); else activeTypes.add(tk);
    render();
  };
  window._beFilterAll = () => { activeRarities.clear(); activeTypes.clear(); render(); };
  window._beFilterLv = (n) => {
    targetLv = (targetLv === n) ? 0 : n;
    // 目標値変更時に選択を再フィルタ（目標到達済みのものを除外）
    const goal = targetLv || ENHANCE_MAX;
    [...selected].forEach(uid => {
      const i = gs.inventory.find(x => x.uid === uid);
      if(i && (i.enhLv||0) >= goal) selected.delete(uid);
    });
    render();
  };

  window._execBulkEnhance = () => {
    const goal    = targetLv || ENHANCE_MAX;
    const targets = gs.inventory.filter(i => selected.has(i.uid));
    if(targets.length === 0) return;

    const staffBonus = calcStaffBonus().enhSuccessBonus || 0;
    const summary    = [];
    let   totalSpent = 0;
    let   goldOut    = false;

    for(const item of targets) {
      if(goldOut) break;
      const m      = ITEM_MASTER[item.itemId];
      const startLv = item.enhLv || 0;
      let   success = 0, fail = 0;

      while((item.enhLv||0) < goal) {
        const cost = Math.floor(
          (m?.basePrice||0) *
          (RARITY_MASTER[item.rarity]?.multi||1) *
          (1 + (item.enhLv||0) * 1.5)
        );
        if(gs.player.gold < cost) {
          goldOut = true;
          break;
        }
        gs.player.gold -= cost;
        totalSpent += cost;
        if(gs.achievements?.stats) gs.achievements.stats.totalEnhance = (gs.achievements.stats.totalEnhance||0)+1;
        const rate = Math.min(100, (ENHANCE_SUCCESS_RATE[item.enhLv||0] ?? 30) + staffBonus);
        if(Math.random() * 100 < rate) {
          item.enhLv = (item.enhLv||0) + 1;
          if(item.cursed && item.curse && item.enhLv % 4 === 0) {
            const add    = CURSE_AMPLIFY.add[item.curse.type] || 0;
            const maxVal = CURSE_AMPLIFY.maxVal[item.curse.type] || 99;
            if(add > 0) item.curse.val = Math.min(item.curse.val + add, maxVal);
          }
          success++;
        } else {
          fail++;
        }
      }
      summary.push({ name: m?.name||item.itemId, startLv, finalLv: item.enhLv||0, success, fail, goldOut });
    }

    showGoldPop(-totalSpent);
    // 強化回数をクエストに通知（成功＋失敗の合計）
    const totalEnhCount = summary.reduce((s, r) => s + r.success + r.fail, 0);
    if(totalEnhCount > 0) checkQuestProgress("enhance", { count: totalEnhCount });
    // 一括強化実績カウント
    if(gs.achievements?.stats && totalEnhCount > 0) {
      gs.achievements.stats.totalBulkEnhance = (gs.achievements.stats.totalBulkEnhance||0) + totalEnhCount;
    }
    _finalizeBulkEnhance(summary, totalSpent);
    saveGame(); render();
  };

  function _finalizeBulkEnhance(summary, totalSpent) {
    addLog("item", `⚒ 一括強化完了（${summary.length}件 / 消費${totalSpent.toLocaleString()}G）`);
    const resultEl = mc.querySelector("#bulkEnhResult");
    if(!resultEl) return;
    resultEl.style.display = "block";
    resultEl.innerHTML = summary.map(s => {
      if(s.goldOut && s.startLv === s.finalLv) {
        return `<div style="color:var(--red)">✕ ${s.name} +${s.startLv} Gold不足で未処理</div>`;
      }
      const col = s.success > 0 ? '#88cc88' : 'var(--text-mid)';
      const stopMark = s.goldOut ? ' <span style="color:var(--red)">（途中停止）</span>' : '';
      return `<div style="color:${col}">✓ ${s.name} +${s.startLv}→+${s.finalLv}（成${s.success}失${s.fail}）${stopMark}</div>`;
    }).join('') + `<div style="color:var(--gold);margin-top:2px">計${totalSpent.toLocaleString()}G消費</div>`;
  }

  render();
}

function openMercenaryModal(floor) {

    // 同行中バナー

      ? `<div style="padding:8px 10px;background:#0d180d;border:1px solid var(--border-success);border-radius:8px;margin-bottom:10px;display:flex;align-items:center;gap:10px">
          <div style="font-size:24px;flex-shrink:0">${curDef.icon}</div>

            <div style="font-size:11px;color:var(--muted)">${curDef.desc}</div>
          </div>
          <button class="btn btn-secondary" style="font-size:11px;padding:4px 10px;width:auto;display:inline-block;border-color:#663333;color:var(--damage);flex-shrink:0"
            onclick="gs.dungeon.mercenary=null;saveGame();document.querySelector('.modal-overlay').remove();openMercenaryModal(${floor})">解散</button>
        </div>`
      : `<div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:8px">現在傭兵なし</div>`;

    // 傭兵リスト
    const listHtml = Object.values(MERCENARY_MASTER).map(m => {
      const cost = calcMercCost(m.cost(floor));
      const hired = cur?.id === m.id;
      const canAfford = gs.player.gold >= cost;
      const bg   = hired ? '#0d180d' : 'var(--surface-base)';
      const brd  = hired ? 'var(--border-success)' : '#252540';
      const nc   = hired ? 'var(--success)' : 'var(--text)';
      const btnBrd = hired ? 'var(--border-subtle)' : canAfford ? '#8888ff' : 'var(--border-subtle)';
      const btnC   = hired ? 'var(--text-faint)' : canAfford ? 'var(--accent-light)' : 'var(--text-disabled)';
      const op     = hired || !canAfford ? '0.5' : '1';
      const dis    = hired || !canAfford ? 'disabled' : '';
      const btnTxt = hired ? '同行中' : '雇う';
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:${bg};border:1px solid ${brd};margin-bottom:6px">

          <div style="font-size:13px;color:${nc};font-weight:700">${m.name}${hired ? ' ✓' : ''}</div>
          <div style="font-size:11px;color:var(--muted);margin:2px 0;line-height:1.4">${m.desc}</div>
          <div style="font-size:11px;color:${canAfford ? 'var(--gold)' : 'var(--danger)'}">${cost.toLocaleString()}G / 探索</div>
        </div>
        <button class="btn btn-secondary" style="font-size:11px;padding:5px 12px;flex-shrink:0;width:auto;display:inline-block;border-color:${btnBrd};color:${btnC};opacity:${op}"
          ${dis} onclick="hireMercenary('${m.id}',${floor},${cost})">${btnTxt}</button>
      </div>`;
    }).join('');

    mc.innerHTML = `
      <div style="flex-shrink:0;padding:14px 16px 8px;border-bottom:1px solid var(--border)">
        <div class="modal-title" style="margin-bottom:4px">👥 傭兵を雇う ${goldBadge()}</div>
        <div style="font-size:11px;color:var(--muted)">探索ごとに費用がかかる。帰還・撤退で解散。</div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:10px 16px">
        ${currentHtml}
        <div>${listHtml}</div>
      </div>
      <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border)">
        <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
      </div>
    `;
  };

  window.renderMercList = () => {
    document.querySelector('.modal-overlay')?.remove();
    openMercenaryModal(floor);
  };

  renderAll();
}

function hireMercenary(mercId, floor, cost) {
  if(gs.player.gold < cost) {
    addLog("item", `Gold不足です（必要: ${cost.toLocaleString()}G）`);
    return;
  }
  gs.player.gold -= cost;
  gs.dungeon.mercenary = { id: mercId };
  if(gs.achievements?.stats) gs.achievements.stats.mercUsed = (gs.achievements.stats.mercUsed||0) + 1;
  const m = MERCENARY_MASTER[mercId];
  addLog("item", `⚔ ${m.icon}【${m.name}】を雇った（-${cost.toLocaleString()}G）`);
  saveGame();
  render();
  // モーダル再描画
  if(window.renderMercList) window.renderMercList();
}

// Analytics 可視化モーダル
// ─────────────────────────────────────────
function openAnalyticsModal() {
  // ── データ取得 ──
  let sessions = [];
  try {
    const raw = localStorage.getItem("shinentrade_analytics");
    sessions = raw ? (JSON.parse(raw).sessions || []) : [];
  } catch(e) {}

  // 新規プレイヤーセッションだけ抽出
  const first   = sessions.filter(s => s.isFirstSession);
  const total   = sessions.length;
  const recent5 = sessions.slice(-5).reverse(); // 直近5セッション（新しい順）

  // ── ファネル集計 ──
  const fGuideShown     = first.filter(s => s.guide?.shown).length;
  const fGuideCompleted = first.filter(s => s.guide?.completedAt).length;
  const fEntered        = first.filter(s => s.firstLoop?.enterAt).length;
  const fReturned       = first.filter(s => s.firstLoop?.returnAt).length;
  const fSold           = first.filter(s => s.firstLoop?.firstSaleAt).length;
  const fCompleted      = first.filter(s => s.firstLoop?.completed).length;

  const pct    = (a, b) => b > 0 ? (a / b * 100).toFixed(1) + "%" : "—";
  const avgMin = first.length > 0
    ? (first.reduce((acc, s) => acc + (s.durationSec || 0), 0) / first.length / 60).toFixed(1)
    : "—";

  // ガイドスキップ分布（STEP1〜4 = index 0〜3 に対応、S52でSTEP4追加）
  const skipDist = [0, 0, 0, 0];
  first.forEach(s => {
    const p = s.guide?.skippedAtPage;
    if(p != null && p >= 0 && p <= 3) skipDist[p]++;
  });

  // firstReturn→firstSale 完了率（主目的KPI）
  const convReturnToSale = pct(fSold, fReturned);

  // まとめて出品ボタン使用集計
  const fQuickListUsed  = first.filter(s => s.quickList?.used > 0).length;
  const fQuickListRate  = pct(fQuickListUsed, fReturned);

  // ── ファネルドロップ率（各ステップの離脱率）──
  const dropEnter    = pct(fGuideShown - fEntered,    fGuideShown);
  const dropReturn   = pct(fEntered    - fReturned,   fEntered);
  const dropSale     = pct(fReturned   - fSold,       fReturned);
  const dropComplete = pct(fSold       - fCompleted,  fSold);

  // ── UI生成 ──
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.cssText = "max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";
  overlay.appendChild(mc);

  const row = (label, val, sub) => `
    <div style="display:flex;justify-content:space-between;align-items:center;
      padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:12px;color:var(--muted)">${label}</span>
      <span style="font-size:13px;font-weight:700;color:var(--text)">${val}
        ${sub ? `<span style="font-size:10px;color:var(--muted);margin-left:4px">${sub}</span>` : ""}
      </span>
    </div>`;

  // KPIカード（色付き）
  const kpiRow = (label, val, note, col) => {
    const c = col || "var(--accent2)";
    return `
    <div style="background:#1a1a26;border-radius:8px;padding:10px 12px;margin-bottom:6px;
      border-left:3px solid ${c}">
      <div style="font-size:10px;color:var(--muted);margin-bottom:2px">${label}</div>
      <div style="font-size:20px;font-weight:700;color:${c}">${val}
        ${note ? `<span style="font-size:10px;color:var(--muted);font-weight:400;margin-left:4px">${note}</span>` : ""}
      </div>
    </div>`;
  };

  // ファネル可視化（横バー）
  const funnelBar = (label, n, total, col) => {
    const w = total > 0 ? Math.round(n / total * 100) : 0;
    return `
    <div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="color:var(--muted)">${label}</span>
        <span style="color:var(--text);font-weight:700">${n}件 <span style="color:var(--muted);font-weight:400">(${w}%)</span></span>
      </div>
      <div style="background:var(--border);border-radius:3px;height:6px;overflow:hidden">
        <div style="height:100%;width:${w}%;background:${col || "var(--accent2)"};border-radius:3px;transition:width 0.4s"></div>
      </div>
    </div>`;
  };

  // 直近セッション行
  const sessionRow = s => {
    const dt  = s.startAt ? new Date(s.startAt).toLocaleDateString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}) : "—";
    const min = s.durationSec ? Math.round(s.durationSec / 60) : "—";
    const steps = [
      s.guide?.completedAt   ? "📘" : s.guide?.shown ? "👁" : "✖",
      s.firstLoop?.enterAt   ? "⚔"  : "·",
      s.firstLoop?.returnAt  ? "↩"  : "·",
      s.firstLoop?.firstSaleAt ? "💰" : "·",
      s.firstLoop?.completed ? "✅" : "·",
    ].join(" ");
    return `<div style="display:flex;justify-content:space-between;align-items:center;
      padding:6px 0;border-bottom:1px solid var(--border);font-size:11px">
      <span style="color:var(--muted)">${dt}</span>
      <span style="letter-spacing:2px">${steps}</span>
      <span style="color:var(--muted)">${min}分</span>
    </div>`;
  };

  // KPI色判定（帰還→販売率 50%以上=緑、30%以上=黄、以下=赤）
  const kpiNum = fReturned > 0 ? fSold / fReturned * 100 : -1;
  const kpiCol = kpiNum < 0 ? "var(--muted)" : kpiNum >= 50 ? "var(--green)" : kpiNum >= 30 ? "var(--gold)" : "var(--red)";

  mc.innerHTML = `
    <div style="flex-shrink:0;padding:14px 16px 10px;border-bottom:1px solid var(--border)">
      <div class="modal-title">📊 Analytics</div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">
        総セッション: ${total}件 / 新規: ${first.length}件 / 平均時間: ${avgMin}分
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:12px 16px">

      <!-- 主目的KPI -->
      <div style="font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:8px">🎯 主目的 KPI</div>
      ${kpiRow("帰還→販売完了率", convReturnToSale, `${fSold}/${fReturned}件`, kpiCol)}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
        ${kpiRow("ループ完結率", pct(fCompleted, first.length), `${fCompleted}/${first.length}件`)}
        ${kpiRow("まとめて出品率", fQuickListRate, `${fQuickListUsed}/${fReturned}件`)}
      </div>

      <!-- ファネル可視化 -->
      <div style="font-size:11px;font-weight:700;color:var(--accent2);margin:12px 0 8px">📉 ファネル（新規プレイヤー）</div>
      <div style="background:var(--bg-deep);border-radius:8px;padding:10px 12px">
        ${funnelBar("ガイド表示",  fGuideShown, fGuideShown, "var(--accent)")}
        ${funnelBar("ガイド完読",  fGuideCompleted, fGuideShown, "var(--accent2)")}
        ${funnelBar("初回潜入",    fEntered,    fGuideShown, "var(--accent2)")}
        ${funnelBar("初回帰還",    fReturned,   fGuideShown, "var(--green)")}
        ${funnelBar("初回販売",    fSold,       fGuideShown, kpiCol)}
        ${funnelBar("ループ完結",  fCompleted,  fGuideShown, "var(--gold)")}
      </div>

      <!-- ドロップポイント -->
      <div style="font-size:11px;font-weight:700;color:var(--accent2);margin:12px 0 8px">🚪 各ステップ離脱率</div>
      <div style="background:var(--bg-deep);border-radius:8px;padding:8px 12px">
        ${row("ガイド後→未潜入", dropEnter,    `${fGuideShown - fEntered}件`)}
        ${row("潜入後→未帰還",   dropReturn,   `${fEntered - fReturned}件`)}
        ${row("帰還後→未販売",   dropSale,     `${fReturned - fSold}件`)}
        ${row("販売後→未完結",   dropComplete, `${fSold - fCompleted}件`)}
      </div>

      <!-- ガイドスキップ分布（S52: STEP4追加） -->
      <div style="font-size:11px;font-weight:700;color:var(--accent2);margin:12px 0 8px">⏭ ガイドスキップ分布</div>
      <div style="background:var(--bg-deep);border-radius:8px;padding:8px 12px">
        ${row("STEP1でスキップ", skipDist[0] + "件")}
        ${row("STEP2でスキップ", skipDist[1] + "件")}
        ${row("STEP3でスキップ", skipDist[2] + "件")}
        ${row("STEP4でスキップ", skipDist[3] + "件")}
      </div>

      <!-- 直近セッション -->
      <div style="font-size:11px;font-weight:700;color:var(--accent2);margin:12px 0 8px">🕐 直近セッション（最大5件）</div>
      <div style="background:var(--bg-deep);border-radius:8px;padding:8px 12px">
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px">
          📘=完読 👁=表示 ✖=なし &nbsp;⚔=潜入 ↩=帰還 💰=販売 ✅=完結
        </div>
        ${recent5.length > 0 ? recent5.map(sessionRow).join("") : '<div style="color:var(--muted);font-size:12px">データなし</div>'}
      </div>

      <div style="font-size:10px;color:var(--muted);margin-top:12px;line-height:1.6">
        ※ このデータはこの端末のlocalStorageにのみ存在します。<br>
        コンソールで <code style="color:var(--accent2)">_analyticsReport()</code> を実行すると詳細データを確認できます。
      </div>
    </div>
    <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border)">
      <button class="btn btn-secondary" style="width:100%"
        onclick="this.closest('.modal-overlay').remove()">閉じる</button>
    </div>
  `;

  document.body.appendChild(overlay);
}

// コンソールから呼べる詳細レポート関数（開発・運用確認用）
window._analyticsReport = function() {
  try {
    const d = JSON.parse(localStorage.getItem("shinentrade_analytics") || "{}");
    const f = (d.sessions || []).filter(s => s.isFirstSession);
    const ret  = f.filter(s=>s.firstLoop?.returnAt).length;
    const sold = f.filter(s=>s.firstLoop?.firstSaleAt).length;
    const ent  = f.filter(s=>s.firstLoop?.enterAt).length;
    // ファネルサマリー
    console.table({
      total_sessions:       (d.sessions || []).length,
      first_sessions:       f.length,
      guide_shown:          f.filter(s => s.guide?.shown).length,
      guide_completed:      f.filter(s => s.guide?.completedAt).length,
      entered:              ent,
      returned:             ret,
      first_sale:           sold,
      loop_completed:       f.filter(s => s.firstLoop?.completed).length,
      return_to_sale_pct:   (sold / Math.max(1, ret) * 100).toFixed(1) + "%",
      enter_to_return_pct:  (ret  / Math.max(1, ent) * 100).toFixed(1) + "%",
      quicklist_used:       f.filter(s=>s.quickList?.used > 0).length,
      quicklist_rate:       (f.filter(s=>s.quickList?.used > 0).length / Math.max(1, ret) * 100).toFixed(1) + "%",
      avg_minutes:          (f.reduce((a,b) => a + (b.durationSec||0), 0) / Math.max(1, f.length) / 60).toFixed(1),
    });
    // ガイドスキップ分布（STEP1〜4）
    const skip = [0,0,0,0];
    f.forEach(s => { const p = s.guide?.skippedAtPage; if(p!=null && p>=0 && p<=3) skip[p]++; });
    console.table({ "STEP1_skip": skip[0], "STEP2_skip": skip[1], "STEP3_skip": skip[2], "STEP4_skip": skip[3] });
    // 直近5セッション
    const recent = (d.sessions || []).slice(-5).reverse().map(s => ({
      date:    s.startAt ? new Date(s.startAt).toLocaleString("ja-JP") : "—",
      guide:   s.guide?.completedAt ? "完読" : s.guide?.shown ? "表示のみ" : "なし",
      entered: !!s.firstLoop?.enterAt,
      returned:!!s.firstLoop?.returnAt,
      sold:    !!s.firstLoop?.firstSaleAt,
      completed:!!s.firstLoop?.completed,
      minutes: s.durationSec ? (s.durationSec/60).toFixed(1) : "—",
    }));
    console.table(recent);
  } catch(e) { console.error("Analytics read error:", e); }
};

// セーブデータ エクスポート/インポート (S48-SAVEDATA)
// ─────────────────────────────────────────
function openSaveDataModal() {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };

  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.cssText = "max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";
  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  // B-2修正：exportDataはtextContentで設定するため、ここでは取得のみ
  // P-1修正：クロージャ変数に保持し毎回localStorage読み直しを防ぐ
  const exportData = localStorage.getItem("shinentrade_v1") || "";

  // B-1修正：_render()廃止 → メッセージ表示だけ差分更新する専用関数に変更
  function _showMsg(msg, isOk) {
    const area = mc.querySelector("#_sdMsgArea");
    if(!area) return;
    area.style.display = msg ? "block" : "none";
    area.style.background = isOk ? "#0a1a0a" : "#1a0a0a";
    area.style.borderColor = isOk ? "var(--green)" : "var(--red)";
    area.style.color       = isOk ? "var(--green)" : "var(--red)";
    area.textContent = msg || "";
  }

  // インポート共通処理（テキスト貼り付け・ファイル読み込みで共用）
  function _doImport(raw) {
    if(!raw) { _showMsg("テキストが入力されていません。", false); return; }

    let parsed;
    try { parsed = JSON.parse(raw); }
    catch(e) { _showMsg("❌ データの形式が正しくありません。コピーし直してください。", false); return; }

    if(!parsed || typeof parsed !== "object" || !parsed.player || !parsed.meta) {
      _showMsg("❌ これは深淵商会のセーブデータではありません。", false); return;
    }
