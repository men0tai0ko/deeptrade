        <div style="display:flex;gap:6px;margin-bottom:6px">
          <button class="btn btn-secondary" style="flex:1" id="_sdDownloadBtn">
            💾 ファイルに保存
          </button>
          <button class="btn btn-secondary" style="flex:1" id="_sdCopyBtn">
            📋 コピー
          </button>
        </div>
        <textarea id="_sdExportArea" readonly
          style="width:100%;height:64px;background:var(--bg-canvas);border:1px solid var(--border);
            border-radius:6px;color:var(--text);font-size:10px;padding:6px;resize:none;
            font-family:monospace"></textarea>
      </div>

      <div style="border-top:1px solid var(--border);padding-top:16px">
        <div style="font-size:12px;font-weight:700;color:var(--accent2);margin-bottom:6px">
          📥 インポート（復元）
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px">
          保存したファイルを選択するか、テキストを貼り付けて復元してください。<br>
          <span style="color:var(--red)">⚠ 現在のデータは上書きされます。</span>
        </div>
        <button class="btn btn-secondary" style="width:100%;margin-bottom:6px" id="_sdFileBtn"
          ${gs.dungeon.active ? 'disabled style="opacity:0.4;pointer-events:none"' : ''}>
          📂 ファイルから読み込む
        </button>
        <textarea id="_sdImportArea" placeholder="またはここにテキストを貼り付け..."
          style="width:100%;height:64px;background:var(--bg-canvas);border:1px solid var(--border);
            border-radius:6px;color:var(--text);font-size:10px;padding:6px;resize:none;
            font-family:monospace"></textarea>
        <button class="btn btn-danger" style="width:100%;margin-top:6px" id="_sdImportBtn"
          ${gs.dungeon.active ? 'disabled style="opacity:0.4;pointer-events:none"' : ''}>
          📥 テキストから復元
        </button>
        ${gs.dungeon.active
          ? '<div style="font-size:11px;color:var(--red);margin-top:6px;text-align:center">⚠ 探索中はインポートできません</div>'
          : ''}
      </div>
    </div>
    <div style="flex-shrink:0;padding:10px 16px 14px;border-top:1px solid var(--border)">
      <button class="btn btn-secondary" style="width:100%" id="_sdCloseBtn">閉じる</button>
    </div>
  `;

  // B-2修正：textContentで設定（HTML injection防止）
  mc.querySelector("#_sdExportArea").textContent = exportData;

  // 閉じる
  mc.querySelector("#_sdCloseBtn").onclick = () => overlay.remove();

  // ── ファイルに保存 ──
  mc.querySelector("#_sdDownloadBtn").onclick = () => {
    if(!exportData) { _showMsg("エクスポートするデータがありません。", false); return; }
    const now = new Date();
    const pad = n => String(n).padStart(2, "0");
    const stamp = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
    const filename = `shinentrade_backup_${stamp}.json`;
    const blob = new Blob([exportData], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    _showMsg(`✅ ${filename} をダウンロードしました。`, true);
  };

  // ── クリップボードにコピー（B-1修正：_showMsgのみ呼ぶ・DOMを再生成しない）──
  mc.querySelector("#_sdCopyBtn").onclick = () => {
    if(!exportData) { _showMsg("エクスポートするデータがありません。", false); return; }
    const area = mc.querySelector("#_sdExportArea");
    if(navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(exportData)
        .then(() => _showMsg("✅ クリップボードにコピーしました。", true))
        .catch(() => {
          area.select();
          try { document.execCommand("copy"); _showMsg("✅ コピーしました。", true); }
          catch(e2) { _showMsg("コピーできませんでした。テキストを手動で選択してコピーしてください。", false); }
        });
    } else {
      area.select();
      try { document.execCommand("copy"); _showMsg("✅ コピーしました。", true); }
      catch(e) { _showMsg("コピーできませんでした。テキストを手動で選択してコピーしてください。", false); }
    }
  };

  // ── ファイルから読み込む ──
  const fileInput = document.createElement("input");
  fileInput.type   = "file";
  fileInput.accept = ".json,application/json";
  fileInput.style.display = "none";
  fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => _doImport(e.target.result);
    reader.onerror = () => _showMsg("❌ ファイルの読み込みに失敗しました。", false);
    reader.readAsText(file, "utf-8");
    fileInput.value = ""; // 同じファイルを再選択できるようリセット
  });

  const fileBtn = mc.querySelector("#_sdFileBtn");
  if(fileBtn) fileBtn.onclick = () => fileInput.click();

  // ── テキスト貼り付けからインポート（B-4修正：ダンジョン中は無効化済み）──
  const importBtn = mc.querySelector("#_sdImportBtn");
  if(importBtn) importBtn.onclick = () => {
    _doImport(mc.querySelector("#_sdImportArea").value.trim());
  };
}


function updateIconDock(tab) {
  const dock = document.getElementById('iconDock');
  if(!dock) return;

  // ショップタブ以外ではメニューを閉じる
  if(tab !== 'shop') window._shopDockExpanded = false;

  // 依頼alertFn（ショップ・ステータス共通）
  const _questAlertFn = () => {
    // B1-DAILY: デイリーミッションに達成済み未受取があればバッジを表示
    const hasDailyAlert = (gs.meta?.dailyMissions || []).some(m => {
      const def = _getDailyDef(m.type);
      return def && def.isDone(m) && !m.claimed;
    });
    if(hasDailyAlert) return true;
    if(!gs.quests) return false;
    return gs.quests.some(q => {
      if(q.done) return false;
      if(QUEST_TYPES[q.type]?.check(q)) return true;
      if(q.type === 'sell_item')  return q.count  > 0 && (q.progress||0) / q.count  >= 0.8;
      if(q.type === 'earn_gold')  return q.target > 0 && (q.progress||0) / q.target >= 0.8;
      return false;
    });
  };

  // ショップタブ定義（常時5本 + 折りたたみ5本）
  const SHOP_PRIMARY = [
    { icon:'⚙',  label:'棚設定',   fn:'openShelfSettingsModal()' },
    { icon:'👥', label:'雇用人',   fn:'openStaffModal()' },
    { icon:'⭐', label:'常連客',   fn:'openRegularsModal()', alertFn: ()=> (gs.shop.regulars||[]).some(r=>r.order) },
    { icon:'🌑', label:'裏取引',   fn:'openBlackmarketModal()', alertFn: ()=> gs.shop.blackmarket?.unlocked && !!gs.shop.blackmarket?.buyer },
  ];
  const SHOP_SECONDARY = [
    { icon:'📥', label:'一括取下', fn:'openBulkUnlistModal()', disabledFn: ()=> !gs.shop.shelves.some(s=>s?.item) },
    { icon:'📊', label:'市場',     fn:'openMarketModal()' },
    { icon:'💰', label:'放置収入', fn:'openPassiveIncomeModal()' },
  ];

  const configs = {
    dungeon: [
      { icon:'🎒', label:'持ち物',   fn:'openPrepModal()',
        disabledFn: ()=> !!gs.dungeon.autoRun?.active,
        alertFn: ()=> {
          const USABLE_IDS = ["herb","potion","antidote","omamori"];
          const inInv = gs.inventory.filter(i => USABLE_IDS.includes(i.itemId) && !Object.values(gs.equipped).includes(i.uid)).length;
          const inPrep = Object.values(gs.dungeon.consumables||{}).some(s=>s.count>0);
          return !gs.dungeon.active && (inInv > 0 || inPrep);
        }
      },
      { icon:'👥', label:'傭兵',     fn:'openMercenaryModal(gs.dungeon.selectedFloor||gs.dungeon.floor||1)',
        disabledFn: ()=> gs.dungeon.active || !!gs.dungeon.autoRun?.active,
        alertFn:    ()=> !gs.dungeon.active && !!gs.dungeon.mercenary,
      },
    ],
    loot: [
    ],
    inventory: [
      { icon:'🔍', label:'一括鑑定', fn:'openBulkIdentifyModal()',  disabledFn: ()=> gs.shop.level < 2 || !gs.inventory.some(i=>!i.identified) },
      { icon:'⚒', label:'一括強化', fn:'openBulkEnhanceModal()',   disabledFn: ()=> { const eq=new Set(Object.values(gs.equipped).filter(Boolean)); const sh=new Set((gs.shop.shelves||[]).filter(s=>s?.item).map(s=>s.item.uid)); return !gs.inventory.some(i=> i.identified && !i.locked && !eq.has(i.uid) && !sh.has(i.uid) && (i.enhLv||0) < ENHANCE_MAX); } },
      { icon:'🔨', label:'一括分解', fn:'openBulkDecomposeModal()', disabledFn: ()=> { const eq=new Set(Object.values(gs.equipped).filter(Boolean)); const sh=new Set((gs.shop.shelves||[]).filter(s=>s?.item).map(s=>s.item.uid)); return !gs.inventory.some(i=> i.identified && !i.cursed && !i.locked && !eq.has(i.uid) && !sh.has(i.uid)); } },
      { icon:'⛓', label:'一括解呪', fn:'openBulkPurifyModal()',    disabledFn: ()=> { const eq=new Set(Object.values(gs.equipped).filter(Boolean)); return !gs.inventory.some(i=>i.cursed&&i.identified&&!eq.has(i.uid)); } },
      { icon:'🧪', label:'調合',     fn:'openBrewModal()',          disabledFn: ()=> !BREW_MASTER.some(r => { const eq=new Set(Object.values(gs.equipped).filter(Boolean)); return gs.inventory.filter(i=>i.itemId===r.fromId&&i.rarity===r.fromRarity&&!eq.has(i.uid)).length >= r.fromCount; }) },
      { icon:'📤', label:'一括出品', fn:'openListModal(null)',       disabledFn: ()=> !gs.inventory.some(i=> i.identified && !i.cursed && !i.locked && !Object.values(gs.equipped).includes(i.uid)) },
    ],
    status: [
      { icon:'🌟', label:'スキル',   fn:'openSkillTree()' },
      { icon:'📖', label:'冒険録',   fn:'openCollectionModal()' },
      { icon:'📋', label:'依頼',     fn:'openQuestModal()', alertFn: _questAlertFn },
      { icon:'🏆', label:'実績',     fn:'openAchievementModal()', alertFn: ()=> hasUnclaimedAchievement() },
      { icon:'🎒', label:'鞄拡張',   fn:'openBagModal()' },
      { icon:'🔁', label:'転生',     fn:'openRebirthModal()', alertFn: ()=> canRebirth() },
      { icon:'💾', label:'データ',   fn:'openSaveDataModal()' },
      { icon:'📊', label:'分析',     fn:'openAnalyticsModal()' },
      { icon:'📘', label:'ガイド',   fn:'showFirstGuideModal(true)' }, // S52: 任意再表示
    ],
  };

  const _makeBtn = b => {
    const alert    = b.alertFn    && b.alertFn();
    const disabled = b.disabledFn && b.disabledFn();
    return `<div class="dockBtn${alert?' dock-alert':''}${disabled?' dock-disabled':''}"
      onclick="${disabled ? '' : b.fn}" style="${disabled ? 'opacity:0.35;pointer-events:none' : ''}">
      <span class="dockIcon">${b.icon}</span>
      <span class="dockLabel">${b.label}</span>
    </div>`;
  };

  if(tab === 'shop') {
    // PRIMARY + SECONDARY を常時表示（もっとボタン廃止）
    const allBtns = [...SHOP_PRIMARY, ...SHOP_SECONDARY].map(_makeBtn).join('');
    dock.innerHTML = allBtns;
    return;
  }

  const btns = (configs[tab] || []).map(_makeBtn).join('');
  dock.innerHTML = btns;
}

// 統合ログモーダル（フィルタタブ付き）
function openLogModal(defaultType) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if(e.target === overlay) { window.__logCurrentType = undefined; overlay.remove(); } };
  const mc = document.createElement('div');
  mc.className = 'modal-content';
  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  const TABS = [
    { type:'dungeon',   label:'⚔ 冒険' },
    { type:'shop',      label:'🏪 ショップ' },
    { type:'inventory', label:'📦 格納庫' },
    { type:'all',       label:'📋 全て' },
  ];
  let current = defaultType || 'dungeon';
  window.__logCurrentType = current;

  const render = () => {
    const tabHtml = TABS.map(t => {
      const active = t.type === current;
      return `<button onclick="__logTab('${t.type}')" style="padding:5px 10px;font-size:11px;border-radius:6px;cursor:pointer;white-space:nowrap;
        border:1px solid ${active ? 'var(--accent2)' : 'var(--border)'};
        background:${active ? 'var(--surface-deep)' : 'var(--card)'};
        color:${active ? 'var(--accent2)' : 'var(--muted)'};
        font-weight:${active ? '700' : '400'};
        width:auto;display:inline-block">${t.label}</button>`;
    }).join('');

    mc.innerHTML =
      `<div class="modal-title">📋 ログ</div>` +
      `<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">${tabHtml}</div>` +
      `<div class="eventBox" style="height:300px;text-align:left" id="logContent">${makeFilteredLogHtml(current)}</div>` +
      `<button class="btn btn-secondary" style="width:100%;margin-top:8px" onclick="window.__logCurrentType=undefined;this.closest('.modal-overlay').remove()">閉じる</button>`;
  };

  window.__logTab = (type) => { current = type; window.__logCurrentType = type; render(); };
  render();
}

function openStaffModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  const body = document.createElement('div');
  body.className = 'modal-content';
  body.style.height = '85vh';
  body.style.maxHeight = '85vh';
  body.style.display = 'flex';
  body.style.flexDirection = 'column';
  body.style.padding = '0';
  body.style.overflow = 'hidden';
  overlay.appendChild(body);
  document.body.appendChild(overlay);

  // タブ状態（onclick属性から参照できるようwindowに登録）
  window._staffTab = window._staffTab || "management";
  const STAFF_TABS = [
    { key:"all",        label:"すべて",  ids: Object.keys(STAFF_MASTER) },
    { key:"management", label:"🏪 経営", ids:["clerk","promoter","negotiator","appraiser","stockManager"] },

    { key:"support",    label:"🛡 支援", ids:["guard","diviner"] },
  ];

  const refresh = () => {
    const sh = gs.shop;
    const e  = sh.earnings || {};

  const shopLv = gs.shop.level;
    const RARITY_LIST = [
      { key:"normal",    label:"Normal",    color:"var(--text-subtle)" },
      { key:"rare",      label:"Rare",      color:"#4fc3f7" },
      { key:"epic",      label:"Epic",      color:"#b39ddb" },
      { key:"legendary", label:"Legendary", color:"var(--gold)" },
    ];
    const tabDefs = STAFF_TABS.find(t => t.key === window._staffTab);
    const tabIds  = tabDefs ? tabDefs.ids : [];
    const cards = Object.values(STAFF_MASTER).filter(def => tabIds.includes(def.id)).map(def => {
      const reqLv    = def.requireShopLv || 1;
      const locked   = shopLv < reqLv;
      const hiredIdx = sh.staff.findIndex(s => s.id === def.id);
      const hiredS   = hiredIdx >= 0 ? sh.staff[hiredIdx] : null;
      const hired    = sh.staff.filter(s => s.id === def.id);
      const canHire  = !locked && hired.length < def.maxCount && gs.player.gold >= def.hireCost;
      const curLv    = hiredS?.lv || 1;
      const maxLv    = STAFF_MAX_LV;
      const upCost   = hiredS && curLv < maxLv ? staffUpgradeCost(def, curLv) : 0;
      const canUp    = !!hiredS && curLv < maxLv && gs.player.gold >= upCost;
      const eff      = getStaffEffect(hiredS || { id: def.id, lv: 1 });
      const effParts = [];
      if(eff.goldPerMin)            effParts.push(`+${Math.floor(eff.goldPerMin)}G/分`);
      if(eff.materialIntervalMin)   effParts.push(`${eff.materialIntervalMin}分毎に素材`);
      if(eff.matDropBonus)          effParts.push(`素材DR+${Math.floor(eff.matDropBonus)}%`);
      if(eff.expPerMin)             effParts.push(`+${Math.floor(eff.expPerMin)}EXP/分`);
      if(eff.sellPctBonus)          effParts.push(`売値+${Math.floor(eff.sellPctBonus)}%`);
      if(eff.sellSpeedBonus)        effParts.push(`販売速度+${Math.floor(eff.sellSpeedBonus)}%`);
      if(eff.raidRiskReduce)        effParts.push(`摘発-${Math.floor(eff.raidRiskReduce)}%`);
      if(eff.enhSuccessBonus)       effParts.push(`強化成功+${Math.floor(eff.enhSuccessBonus)}%`);
      if(eff.firstHitAvoidPct)      effParts.push(`初撃回避+${Math.floor(eff.firstHitAvoidPct)}%`);
      if(eff.mercCostReduce)        effParts.push(`傭兵費-${Math.floor(eff.mercCostReduce)}%`);
      if(eff.purifySuccessBonus)    effParts.push(`解呪成功+${Math.floor(eff.purifySuccessBonus)}%`);
      if(eff.returnHealPct)         effParts.push(`帰還時HP+${Math.floor(eff.returnHealPct)}%`);
      if(eff.alchemyIntervalMin)    effParts.push(`消耗品自動生成`);
      if(eff.autoIdentifyIntervalMin) effParts.push(`未鑑定品自動鑑定`);
      if(eff.autoShelfSpeed)        effParts.push(`棚の自動補充`);
      if(eff.demandForecastTurns)   effParts.push(`需要予測+${Math.floor(eff.demandForecastTurns)}ターン`);
      const effDesc = effParts.join(' / ');
      // 商品管理人：等級・種別設定UI
      const autoShelfUI = (def.id === "stockManager" && hiredS) ? (() => {
        const curR = gs.shop.autoShelfRarities || [];
        const curT = gs.shop.autoShelfTypes    || [];

        }).join('');

          { key:"equip",      label:"装",  color:"#7ec8e3" },
          { key:"consumable", label:"消",  color:"#a8e6a3" },

        const typeChips = TYPE_DEFS.map(t => {
          const active = curT.includes(t.key);
          return `<span onclick="(()=>{const a=gs.shop.autoShelfTypes||(gs.shop.autoShelfTypes=[]);const idx=a.indexOf('${t.key}');idx>=0?a.splice(idx,1):a.push('${t.key}');saveGame();window._staffRefresh&&window._staffRefresh();})()"
            style="cursor:pointer;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;border:1px solid ${active?t.color:'var(--border-subtle)'};color:${active?t.color:'var(--text-faint)'};background:${active?t.color+'22':'transparent'};user-select:none">${t.label}</span>`;

            ${!locked ? `<button class="btn btn-secondary" style="font-size:10px;padding:2px 8px;${canHire?'':'opacity:0.4'}"
              ${canHire ? `onclick="hireStaff('${def.id}');window._staffRefresh&&window._staffRefresh();"` : 'disabled'}>
              雇う ${def.hireCost.toLocaleString()}G
            </button>` : ''}
            ${hiredS ? `<button class="btn btn-secondary" style="font-size:10px;padding:2px 8px;${canUp?'border-color:var(--gold);color:var(--gold)':'opacity:0.4'}"
              ${canUp ? `onclick="upgradeStaff(${hiredIdx});window._staffRefresh&&window._staffRefresh();"` : 'disabled'}>
              育成 ${upCost ? upCost.toLocaleString()+'G' : '-'}
            </button>` : ''}
            ${hiredS ? `<button class="btn btn-secondary" style="font-size:10px;padding:2px 8px;border-color:var(--text-faint);color:var(--muted)"

    const filterBar = STAFF_TABS.map(t => {

    }).join("");

    // 初回のみ骨格生成

          <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
        </div>
      `;

    // 差分更新（スクロール位置を保持）
    const scrollEl = body.querySelector("#staffScrollArea");
    const scrollTop = scrollEl ? scrollEl.scrollTop : 0;
    const filterEl = body.querySelector("#staffFilterBar");
    const earningsEl = body.querySelector("#staffEarnings");
    if(filterEl) filterEl.innerHTML = filterBar;
    if(scrollEl) scrollEl.innerHTML = cards;
    if(earningsEl) earningsEl.innerHTML = `スタッフ累計収入: <span style="color:var(--gold)">${(e.staff||0).toLocaleString()}G</span>`;
    const goldBadgeEl = body.querySelector("#staffGoldBadge");
    if(goldBadgeEl) goldBadgeEl.outerHTML = `<span id="staffGoldBadge">${goldBadge()}</span>`;
    if(scrollEl) scrollEl.scrollTop = scrollTop;

  window._staffTab = "all";
  window._staffRefresh = refresh;
  refresh();
}

function openPrepModal() {
  if(gs.dungeon.active) return;
  const USABLE_IDS   = ["herb","potion","antidote","omamori"];
  const RARITY_ORDER = RARITY_ORDER_MAP; // S77: グローバル定数を参照
  const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));
  const lootLimit    = getLootLimit();
  const lootCount    = gs.dungeon.loot.length;
  const cs           = gs.dungeon.consumables || {};

  const invMap = {};
  gs.inventory.filter(i => USABLE_IDS.includes(i.itemId) && !equippedUids.has(i.uid))
    .forEach(i => {
      if(!invMap[i.itemId]) invMap[i.itemId] = {};
      const r = i.rarity || "normal";
      invMap[i.itemId][r] = (invMap[i.itemId][r]||0)+1;
    });

  const allEntries = [];
  USABLE_IDS.forEach(id => {
    const rarities = new Set([
      ...Object.keys(invMap[id]||{}),
      ...(cs[id]||[]).map(s=>s.rarity),
    ]);
    [...rarities].sort((a,b)=>(RARITY_ORDER[b]||0)-(RARITY_ORDER[a]||0)).forEach(r => {
      const inInv  = (invMap[id]||{})[r] || 0;
      const slot   = (cs[id]||[]).find(s=>s.rarity===r);
      const inPrep = slot ? slot.count : 0;
      if(inInv > 0 || inPrep > 0) allEntries.push({id, r, inInv, inPrep});
    });
  });

  const reopen = "document.querySelector('.modal-overlay').remove();openPrepModal();";

  const prepRows = allEntries.map(({id, r, inInv, inPrep}) => {
    const m          = ITEM_MASTER[id];
    const canTake    = inInv > 0;
    const canReturn  = inPrep > 0;
    const canTakeAll = inInv > 1;
    const canRetAll  = inPrep > 1;
    const btnStyle = (ok, bcol, bgcol, tcol) =>
      `padding:3px 8px;font-size:10px;border-radius:6px;border:1px solid ${ok?bcol:"var(--border-subtle)"};background:${ok?bgcol:"var(--bg-darker)"};color:${ok?tcol:"var(--text-disabled)"};cursor:${ok?"pointer":"default"}`;

    return `<div style="display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--bg-mid)">
      <span class="shelfIcon rarity-${r}" style="width:36px;height:36px;font-size:20px;flex-shrink:0">${m.icon}</span>
      <span style="flex:1;font-size:13px">${m.name}</span>
      <span style="font-size:10px;color:var(--muted)">倉:${inInv}</span>
      <span style="font-size:10px;color:var(--gold)">準:${inPrep}</span>
      <button onclick="takeOutConsumable('${id}','${r}');${reopen}" ${canTake?'':'disabled'}
        style="${btnStyle(canTake,'var(--accent)','var(--accent-bg)','var(--accent)')}">+1</button>
      <button onclick="takeOutAllConsumable('${id}','${r}');${reopen}" ${canTakeAll?'':'disabled'}
        style="${btnStyle(canTakeAll,'var(--accent)','var(--accent-bg)','var(--accent)')}">全出</button>
      <button onclick="returnConsumable('${id}','${r}');${reopen}" ${canReturn?'':'disabled'}
        style="${btnStyle(canReturn,'#664433','#1a1010','#cc8866')}">-1</button>
      <button onclick="returnAllConsumable('${id}','${r}');${reopen}" ${canRetAll?'':'disabled'}
        style="${btnStyle(canRetAll,'#664433','#1a1010','#cc8866')}">全戻</button>
    </div>`;
  }).join('');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal-content" style="max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;">
      <div style="flex-shrink:0;padding:14px 16px 8px;border-bottom:1px solid var(--border)">
        <div class="modal-title" style="margin-bottom:4px">🎒 持ち物準備</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px">鞄 ${lootCount}/${lootLimit}（消耗品は鞄の枠を使いません）</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:6px">
          <span style="color:var(--muted)">🪬 お守り消費順：</span>
          <button onclick="window._toggleOmamoriPriority()" id="omamoriPriorityBtn"
            style="padding:3px 10px;border-radius:12px;font-size:11px;cursor:pointer;
              border:1px solid #6a4a9a;background:#1a0a2e;color:var(--accent2)">
            ${gs.dungeon.omamoriPriority==="low"?"低レア優先":"高レア優先"}
          </button>
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:11px;flex-wrap:wrap">
          <span style="color:var(--muted)">🧪 自動回復：</span>
          <button onclick="window._toggleAutoHeal()" id="autoHealToggleBtn"
            style="padding:3px 10px;border-radius:12px;font-size:11px;cursor:pointer;
              border:1px solid ${gs.dungeon.autoHeal?.enabled?'#44aa66':'var(--border-subtle)'};
              background:${gs.dungeon.autoHeal?.enabled?'#0a2a1a':'transparent'};
              color:${gs.dungeon.autoHeal?.enabled?'var(--success-bright)':'var(--text-mid)'}">
            ${gs.dungeon.autoHeal?.enabled?"ON":"OFF"}
          </button>
          ${gs.dungeon.autoHeal?.enabled?`
          <span style="color:var(--muted)">HP</span>
          ${[10,20,30,50].map(v=>`
            <button onclick="window._setAutoHealThreshold(${v})"
              style="padding:3px 8px;border-radius:10px;font-size:11px;cursor:pointer;
                border:1px solid ${(gs.dungeon.autoHeal?.threshold||30)===v?'#44aa66':'var(--border-dark)'};
                background:${(gs.dungeon.autoHeal?.threshold||30)===v?'#0a2a1a':'transparent'};
                color:${(gs.dungeon.autoHeal?.threshold||30)===v?'var(--success-bright)':'var(--text-mid)'}">${v}%以下</button>`).join('')}
          `:""}
        </div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:8px 16px">
        ${allEntries.length === 0
          ? '<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px 0">格納庫に消耗品がありません</div>'
          : prepRows}
      </div>
      <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border)">
        <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}
function openQuestModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  initQuests();
  // LOGIC-1: モーダル開放時にリセット判定を実行（日付をまたいで開いた場合の即時リセット対応）
  // initDailyMissions()はリセット判定・自動受取・saveGame()を複合的に行う。重複呼び出し可（冪等）。
  // 戻り値trueの場合のみrender()を呼ぶ。ダンジョン戦闘中は !gs.dungeon.active で抑制。
  if(initDailyMissions() && !gs.dungeon.active) render(); // B1-DAILY: 自動受取発生時はgold表示を即更新（ダンジョン戦闘中は抑制）

  // ── B1-DAILY: デイリーミッション行を生成 ──
  const now = Date.now();
  const resetAt = gs.meta.dailyResetAt || 0;
  const remainMs = Math.max(0, resetAt - now);
  const remainH  = Math.floor(remainMs / 3600000);
  const remainM  = Math.floor((remainMs % 3600000) / 60000);
  const resetLabel = remainMs > 0 ? `リセットまで ${remainH}時間${remainM}分` : "まもなくリセット";
  const dailyRows = (gs.meta.dailyMissions || []).map((m, idx) => {
    const def    = _getDailyDef(m.type);
    if(!def) return '';
    const done   = def.isDone(m);
    const claimed = m.claimed;
    const borderColor = claimed ? 'var(--muted)' : done ? 'var(--green)' : 'var(--border-dark)';
    const btnHtml = claimed
      ? `<span style="font-size:10px;color:var(--muted)">受取済み</span>`
      : done
        ? `<button class="btn btn-secondary" style="padding:2px 10px;font-size:11px;border-color:var(--green);color:var(--green)"
             onclick="claimDailyMission(${idx});this.closest('.modal-overlay').remove();openQuestModal();">受取</button>`
        : `<span style="font-size:11px;color:var(--gold)">${def.progressText(m)}</span>`;
    return `<div style="padding:8px;background:var(--bg-deep);border:1px solid ${borderColor};border-radius:8px;margin-bottom:6px;opacity:${claimed?'0.5':'1'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">
        <span style="font-size:12px;flex:1">${def.icon} ${m.desc}</span>
        <span style="font-size:11px;color:var(--gold);white-space:nowrap">+${m.reward.toLocaleString()}G</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
        <span style="font-size:11px;color:var(--muted)">${def.label}</span>
        ${btnHtml}
      </div>
    </div>`;
  }).join('');

  const rarityOrder = {normal:0,rare:1,epic:2,legendary:3};
  const questRows = gs.quests.map(q => {
    const def = QUEST_TYPES[q.type];
    const isDone = def.check(q);
    let progressHtml = '';
    if(q.type==='sell_item')       progressHtml = `<span style="color:var(--gold)">${q.progress||0}/${q.count}</span>`;
    else if(q.type==='earn_gold')  progressHtml = `<span style="color:var(--gold)">${(q.progress||0).toLocaleString()}/${q.target.toLocaleString()}G</span>`;
    else if(q.type==='shelf_rarity'){
      const cur = gs.shop.shelves.filter(s=>s?.item).map(s=>s.item).filter(i=>(rarityOrder[i.rarity]||0)>=(rarityOrder[q.rarity]||0)).length;
      progressHtml = `<span style="color:var(--gold)">${cur}/${q.count}</span>`;
    } else if(q.type==='explore')  progressHtml = `<span style="color:var(--gold)">${Math.min(gs.dungeon.clearedFloor||0,q.floor)}/${q.floor}階</span>`;
    return `<div style="padding:8px;background:var(--bg-deep);border:1px solid ${isDone?'var(--green)':'var(--border-dark)'};border-radius:8px;margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">
        <span style="font-size:12px;flex:1">${def.icon} ${q.desc}</span>
        <span style="font-size:11px;color:var(--gold);white-space:nowrap">+${q.reward.toLocaleString()}G</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
        <span style="font-size:11px;color:var(--muted)">${def.label}</span>
        <span style="font-size:11px">${progressHtml}</span>
      </div>
    </div>`;
  }).join('');

  overlay.innerHTML = `
    <div class="modal-content" style="max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;">
      <div style="flex-shrink:0;padding:14px 16px 8px;border-bottom:1px solid var(--border)">
        <div class="modal-title">📋 依頼</div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:10px 16px">
        <div style="font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">
          <span>📅 本日のミッション</span>
          <span style="font-size:10px;color:var(--muted);font-weight:400">${resetLabel}</span>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px">毎日ランダムで2種類出題されます</div>
        ${dailyRows}
        <div style="height:1px;background:var(--border);margin:10px 0"></div>
        <div style="font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:6px">📋 依頼</div>
        ${questRows}
        <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:4px">達成すると自動で新しい依頼に更新されます</div>
      </div>
      <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border)">
        <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

  const canBuy   = nextCost !== null && p.gold >= nextCost;

  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal-content" style="max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;">
      <div style="flex-shrink:0;padding:14px 16px 10px;border-bottom:1px solid var(--border);text-align:center">
        <div class="modal-title" style="margin-bottom:4px">🎒 鞄の拡張 ${goldBadge()}</div>

        <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

function renderScreen() {
  const sc = document.getElementById("screen");
  const ab = document.getElementById("actionBar");
  // list-scroll-modeは格納庫・鞄のみ（ショップはdashboard化したので除外）
  const useListMode = currentTab === "loot" || currentTab === "inventory";
  if(useListMode) {
    sc.classList.add("list-scroll-mode");
  } else {
    sc.classList.remove("list-scroll-mode");
  }

  switch(currentTab) {
    case "dungeon":   renderDungeon(sc, ab); break;
    case "shop":      renderShop(sc, ab); break;
    case "loot":      renderLoot(sc, ab); break;
    case "inventory": renderInventory(sc, ab); break;
    case "status":    renderStatus(sc, ab); break;
  }
  updateIconDock(currentTab);
}

// ── ダンジョン画面 ──
// 戦闘スキルボタンを生成するヘルパー
function buildCombatSkillBtn() {
  const skills = gs.player.skills || [];
  // 習得済みの戦闘スキルを取得
  const available = Object.values(COMBAT_SKILL_MASTER).filter(def =>
    skills.some(sid => SKILL_MASTER[sid]?.effect?.combatSkill === def.id)
  );
  if(available.length === 0) return '<div></div>';

  const mp = gs.player.mp;
  const r  = calcStats(gs);
  const costReduce = r.setSkillCostReduce || 0;
  // 1つだけなら直接ボタン
  if(available.length === 1) {
    const def = available[0];
    const mpCost = Math.max(1, def.mpCost - costReduce);
    const canUse = mp >= mpCost;
    return `<button class="btn btn-secondary" style="color:${canUse?"var(--accent2)":"var(--text-disabled)"};border-color:${canUse?"#6a4a9a":"var(--border-dark)"}"
      onclick="${canUse?`useCombatSkill('${def.id}')`:''}"
      ${canUse?"":"disabled"}>${def.icon} ${def.name} (${mpCost}MP)</button>`;
  }
  // 複数ある場合はモーダル
  // 使用可能スキルが1つでもあれば有効、なければdisabled
  const _hasUsable = available.some(def => mp >= Math.max(1, def.mpCost - costReduce));
  return `<button class="btn btn-secondary" style="color:${_hasUsable?'var(--accent2)':'var(--text-disabled)'};border-color:${_hasUsable?'#6a4a9a':'var(--border-dark)'}"
    onclick="${_hasUsable?'openCombatSkillModal()':''}"
    ${_hasUsable?'':'disabled'}>✨ スキル <span style="font-size:11px;opacity:0.8">(${mp}MP)</span></button>`;
}

function openCombatSkillModal() {
  const skills = gs.player.skills || [];
  const available = Object.values(COMBAT_SKILL_MASTER).filter(def =>
    skills.some(sid => SKILL_MASTER[sid]?.effect?.combatSkill === def.id)
  );
  const mp = gs.player.mp;
  const costReduce = calcStats(gs).setSkillCostReduce || 0;
  overlay.className = "modal-overlay";
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.cssText = "max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";
  mc.innerHTML = `
    <div style="flex-shrink:0;padding:14px 16px 10px;border-bottom:1px solid var(--border)">
      <div class="modal-title">✨ 戦闘スキル <span style="font-size:12px;color:var(--accent2)">${mp}MP</span></div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:10px 16px">
      ${available.map(def => {
        const mpCost = Math.max(1, def.mpCost - costReduce);
        const canUse = mp >= mpCost;
        return `<button onclick="${canUse?`overlay.remove();useCombatSkill('${def.id}')`:''}"
          style="width:100%;padding:12px;margin-bottom:8px;border-radius:8px;
            border:1px solid ${canUse?"#6a4a9a":"var(--border-dark)"};
            background:${canUse?"#1a1020":"transparent"};
            color:${canUse?"#e0e0f0":"var(--text-disabled)"};
            cursor:${canUse?"pointer":"not-allowed"};text-align:left"
          ${canUse?"":"disabled"}>
          <span style="font-size:18px">${def.icon}</span>
          <span style="font-weight:700;margin:0 8px">${def.name}</span>
          <span style="font-size:11px;color:${canUse?"var(--accent2)":"var(--text-disabled)"}">MP ${mpCost}${costReduce>0?` <span style="font-size:10px;color:#88cc88">(-${costReduce})</span>`:""}</span>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">${def.desc}</div>
        </button>`;
      }).join("")}
    </div>
    <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border)">
      <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">キャンセル</button>
    </div>
  `;
  overlay.appendChild(mc);
  document.body.appendChild(overlay);
}

function renderDungeon(sc, ab) {
  const d = gs.dungeon;

  // 周回中UIを最優先で表示（d.activeに関係なく）
  if(gs.dungeon.autoRun?.active) {
    const ar = gs.dungeon.autoRun;
    const now = Date.now();
    const remaining = Math.max(0, ar.nextRunAt - now);
    const remSec = Math.ceil(remaining / 1000);
    const totalSec = Math.round(ar.intervalMs / 1000);
    const progPct = Math.max(0, Math.min(100, ((ar.intervalMs - remaining) / ar.intervalMs * 100)));
    const cfg = AUTO_RUN_CONFIG[ar.floor] || AUTO_RUN_CONFIG[4];
    sc.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px 20px;text-align:center;gap:16px">
        <div style="font-size:18px;font-weight:700;color:var(--accent2)">🔄 周回中</div>
        <div style="font-size:13px;color:var(--muted)">${ar.floor}階層</div>
        <div style="display:flex;gap:24px;font-size:13px;margin-top:4px">
          <div><span style="color:var(--muted)">周回数</span><br><span id="_ar_runs" style="font-weight:700;color:var(--text)">${ar.runs}周</span></div>
          <div><span style="color:var(--muted)">取得数</span><br><span id="_ar_loot" style="font-weight:700;color:var(--gold)">${ar.totalDrops||0}個</span></div>
          <div><span style="color:var(--muted)">次の周</span><br><span id="_ar_sec" style="font-weight:700;color:var(--accent2)">${remSec}秒</span></div>
        </div>
        <div style="width:100%;max-width:280px">
          <div style="background:var(--surface-deep);border-radius:6px;height:8px;overflow:hidden">
            <div id="_ar_bar" style="height:100%;width:${progPct.toFixed(1)}%;background:var(--accent2);border-radius:6px;transition:width 0.4s"></div>
          </div>
          <div style="font-size:10px;color:var(--text-disabled);margin-top:4px">${totalSec}秒間隔 / ${cfg.dropMin}〜${cfg.dropMax}個/周</div>
        </div>
      </div>`;
    ab.innerHTML = `
      <button class="btn btn-secondary" style="border-color:var(--danger);color:var(--danger);width:100%"
        onclick="stopAutoRun()">⏹ 周回を止める</button>
    `;
    return;
  }

  if(!d.active) {
    const ng = d.ng || 0;
    const clearedFloor = d.clearedFloor || 0;
    const abyssMax = gs.player.abyssFloorCleared || 0;
    // 通常フロア上限（5階）と真エンドフロア解禁上限を合わせた最大値
    const normalMax = Math.max(d.floor || 1, (d.clearedFloor || 0) + 1);
    const maxFloor = abyssMax > 0 ? Math.max(normalMax, abyssMax + (clearedFloor >= abyssMax ? 1 : 0), Math.min(abyssMax + 1, 10)) : normalMax;
    const selectableFloors = [];
    for(let f = 1; f <= maxFloor; f++) selectableFloors.push(f);
    const selFloor = d.selectedFloor || maxFloor;
    const ngLabel = ng > 0 ? `<div style="font-size:11px;color:#ffaa44;margin-bottom:2px">フェーズ${ng + 1}</div>` : "";
    // 転生進捗インジケーター（S53）: 転生可能になるまで条件を表示
    const rebirthHint = (() => {
      if(canRebirth()) return ""; // 転生可能なら表示不要
      const cond1ok = gs.dungeon.ng >= 1;
      const cond2ok = gs.player.level >= 50;
      if(cond1ok && cond2ok) return ""; // 両条件達成（念のため）
      const parts = [];
      if(!cond1ok) parts.push(`5階ボス撃破でフェーズ移行`);
      if(!cond2ok) parts.push(`Lv${gs.player.level}/50`);
      return `<div style="font-size:10px;color:#6a6a8a;margin-top:2px">🔁 転生まで：${parts.join("・")}</div>`;
    })();

    // フロア選択ボタン（クリア済み階層＋最新フロア）
    const floorBtns = selectableFloors.map(f => {

      const isCurrent = f === selFloor;
      const isCleared = f <= clearedFloor;
      const isNew = f === maxFloor && !isCleared;
      const cnt = (d.attempts || {})[String(f)] || 0;
      const cntBadge = cnt > 0 ? `<span style="font-size:9px;color:var(--muted);margin-left:2px">${cnt}回</span>` : "";
      return `<button onclick="selectDungeonFloor(${f})" style="
        padding:4px 8px; border-radius:6px; font-size:11px; cursor:pointer; white-space:nowrap;
        border:1px solid ${isCurrent ? "var(--accent2)" : isCleared ? "#446644" : "var(--border)"};
        background:${isCurrent ? "var(--surface-deep)" : "var(--card)"};
        color:${isCurrent ? "var(--accent2)" : isCleared ? "#88bb88" : "var(--muted)"};
        font-weight:${isCurrent ? "700" : "400"};
      ">${f}階</button>`;
    }).join("");

    // 選択中フロアの情報
    const selBossId = getBossIdForFloor(selFloor);
    const selBoss = selBossId ? BOSS_MASTER[selBossId] : null;
    const ngMulLabel = ng > 0 ? `<div style="font-size:11px;color:#ffaa44;margin-top:4px">⚠ 敵強化中（×${(1+ng*0.3).toFixed(1)}）</div>` : "";

    // 持ち物準備：格納庫の消耗品を鞄へ持ち出す
    const USABLE_IDS = ["herb", "potion", "antidote"];
    const lootLimit = getLootLimit();
    const lootCount = gs.dungeon.loot.length;
    const lootSpace = lootLimit - lootCount;
    const consumablesInInv = gs.inventory.filter(i =>
      USABLE_IDS.includes(i.itemId) && !Object.values(gs.equipped).includes(i.uid)
    );
    // 種類ごとに集計
    const consumableCounts = {};
    consumablesInInv.forEach(i => { consumableCounts[i.itemId] = (consumableCounts[i.itemId]||0)+1; });
    // 鞄にある消耗品も集計
    const lootConsumableCounts = {};
    gs.dungeon.loot.filter(i => USABLE_IDS.includes(i.itemId))
      .forEach(i => { lootConsumableCounts[i.itemId] = (lootConsumableCounts[i.itemId]||0)+1; });

    sc.innerHTML = `
        <div class="card" style="text-align:center;padding:16px 14px;margin-bottom:0;flex-shrink:0">
          <div style="font-family:'Cinzel',serif;font-size:20px;color:var(--accent2);margin-bottom:2px">深淵の迷宮</div>
          ${ngLabel}
          <div style="font-size:11px;color:var(--muted);margin-bottom:${rebirthHint?4:12}px">クリア済み：${clearedFloor}階層 / 解放中：${maxFloor}階層</div>
          ${rebirthHint}
          <div style="display:flex;flex-wrap:nowrap;gap:6px;justify-content:center;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none">
            ${floorBtns}
          </div>
          <div style="padding:10px;background:var(--surface-base);border:1px solid var(--border);border-radius:8px;text-align:left">
            <div style="font-size:13px;color:var(--accent2);margin-bottom:4px">${selFloor}階層${selBoss ? ` ─ ${selBoss.icon}${selBoss.name}が待ち構える` : ""}</div>
            <div style="font-size:11px;color:var(--muted)">危険度 ${"★".repeat(Math.min(5,selFloor))}${"☆".repeat(Math.max(0,5-selFloor))}</div>
            ${(()=>{
              const _cp = calcCharCP(gs);
              const _rec = FLOOR_RECOMMENDED_CP[selFloor] || 0;
              const _ok = _cp >= _rec;
              const _col = _ok ? 'var(--green)' : 'var(--danger)';
              return `<div style="font-size:11px;margin-top:4px;display:flex;align-items:center;gap:6px">
                <span style="color:var(--muted)">推奨CP</span>
                <span style="color:${_col};font-weight:700">⚡${_rec}</span>
                <span style="color:var(--text-disabled)">／</span>
                <span style="color:var(--muted)">現在CP</span>
                <span style="color:${_col};font-weight:700">⚡${_cp}</span>
                ${!_ok ? '<span style="color:var(--danger);font-size:10px;margin-left:2px">⚠ 危険</span>' : ''}
              </div>`;
            })()}
            ${(d.attempts||{})[String(selFloor)] > 0 ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">挑戦回数：${(d.attempts||{})[String(selFloor)]}回</div>` : ""}
            ${ngMulLabel}
          </div>
        </div>
      </div>
      <div style="margin-top:10px;display:flex;flex-direction:column;flex:1;min-height:0">
        <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;flex:1;overflow-y:auto;font-size:11px;min-height:0">
          ${makeFilteredLogHtml("all") || '<span style="color:var(--muted)">ログなし</span>'}
        </div>
      </div>
    `;
    // 傭兵同行中の表示（小バナーとして迷宮情報内に表示済みのためフッターでは省略）
    const merc = gs.dungeon.mercenary ? MERCENARY_MASTER[gs.dungeon.mercenary.id] : null;
    const mercCost = merc ? calcMercCost(merc.cost(selFloor)) : 0;
    const mercBanner = merc
      ? `<div style="display:flex;align-items:center;gap:8px;padding:5px 10px;background:#0d180d;border:1px solid var(--border-success);border-radius:8px;margin-bottom:6px">
          <span style="font-size:16px">${merc.icon}</span>
          <div style="flex:1;font-size:11px;color:var(--success)">${merc.name}が同行中（-${mercCost.toLocaleString()}G）</div>
          <button style="font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid var(--border-subtle);background:var(--surface-deep);color:var(--muted);cursor:pointer"
            onclick="openMercenaryModal(${selFloor})">変更</button>
        </div>`
      : '';

    ab.innerHTML = `
      ${mercBanner}
      <button class="btn btn-primary" onclick="confirmEnterDungeon(${selFloor})">⚔ ${selFloor}階層へ潜入</button>
      <button class="btn btn-secondary" style="border-color:var(--accent2);color:var(--accent2)"
        onclick="confirmAutoRun(${selFloor})">🔄 周回</button>
    `;
    return;
  }

  if(d.combat) {
    renderCombat(sc, ab, d.combat);
    return;
  }

  const prog = d.progress;
  const total = d.map.length;
  const hasKeenEye = (gs?.player?.skills||[]).includes("keen_eye");
  // 鷹の目: 次の1マス先まで見える（treasure_senseは2マス先まで）
  const hasTreasureSense = (gs?.player?.skills||[]).includes("treasure_sense");
  const revealAhead = hasTreasureSense ? 2 : hasKeenEye ? 1 : 0;
  const icons = {battle:"⚔",treasure:"💰",trap:"⚠",rest:"💤",shrine:"⛩",boss:"💀",windfall:"✨",omen:"🔮",shortcut:"💨",lava:"🌋",nothing:"·"};
  const mapHtml = d.map.map((ev,i)=>{
    let cls = "mapCell";
    if(i < prog) cls += " visited";
    if(i === prog) cls += " current";
    // bossCell（赤枠）は距離2以内に近づいたときのみ付与する。
    // 遠方では赤枠を出さず、ボスの存在を隠す。
    const ahead = i - prog; // 現在地からの距離
    if(ev === "boss" && ahead <= 2) cls += " bossCell";
    if(i === prog) {
      return `<div class="${cls}">▶</div>`;
    } else if(i < prog) {
      // 通過済み: アイコン表示
      return `<div class="${cls}">${icons[ev]||"·"}</div>`;
    } else if(ev === "boss") {
      // ボスマス：距離に応じて段階的にフェードイン
      if(ahead > 5) {
        // 5マス超：他の未踏マスと同じく隠す
        return `<div class="${cls}">?</div>`;
      } else if(ahead === 5) {
        // 5マス先：かすかに輪郭が浮かぶ（存在の予兆）
        return `<div class="${cls}" style="opacity:0.2">💀</div>`;
      } else if(ahead >= 3) {
        // 4〜3マス先：薄く見えてくる（緊張感の高まり）
        return `<div class="${cls}" style="opacity:0.5">💀</div>`;
      } else {
        // 2マス以内：フル表示・bossCell赤枠が付く
        return `<div class="${cls}">💀</div>`;
      }
    } else if(ahead <= revealAhead) {
      // 鷹の目スキルで見えている範囲: アイコン表示（薄め）
      return `<div class="${cls}" style="opacity:0.7" title="${ev}">${icons[ev]||"?"}</div>`;
    } else if(ahead === revealAhead + 1 && revealAhead > 0) {
      // 見える範囲の1つ先: シルエット（さらに薄め）
      return `<div class="${cls}" style="opacity:0.25">${icons[ev]||"?"}</div>`;
    } else if(ahead === 1 && revealAhead === 0) {
      // 次の1マスはシルエット（スキルなしでも薄く見える）
      return `<div class="${cls}" style="opacity:0.2">${icons[ev]||"?"}</div>`;
    } else {
      return `<div class="${cls}">?</div>`;
    }
  }).join("");

  sc.innerHTML = `
    <div class="dungeonHeader">
        <div class="dungeonFloor">${d.activeFloor||d.floor}階層</div>
        <div class="dungeonProgress">${prog+1} / ${total}</div>
      </div>
      <div class="mapRow" id="dungeonMapRow">${mapHtml}</div>
      ${d.loot.length > 0 ? `<div style="text-align:center;font-size:12px;color:${d.loot.length>=getLootLimit()?"var(--red)":"var(--gold)"};margin-top:4px">🎒 鞄 ${d.loot.length}/${getLootLimit()}個${d.loot.length>=getLootLimit()?" (満杯)":""}</div>` : ""}
      ${d.poisoned ? `<div style="background:#1a0a00;border:1px solid #884400;color:#ff9944;font-size:11px;padding:4px 10px;border-radius:6px;margin-top:4px;text-align:center">☠ 毒状態（最大HP3%/移動）</div>` : ""}
      ${d.burned   ? `<div style="background:#1a0800;border:1px solid #cc5500;color:#ff7722;font-size:11px;padding:4px 10px;border-radius:6px;margin-top:4px;text-align:center">🔥 熱傷状態（最大HP2%/移動）</div>` : ""}
    <div class="eventBox" style="text-align:left;margin-top:8px;flex:1;height:auto;min-height:60px">${renderLogs()}</div>
  `;

  // 現在地セルを中央付近にスクロール
  requestAnimationFrame(() => {
    const row = document.getElementById("dungeonMapRow");
    if(!row) return;
    const cell = row.children[prog];
    if(!cell) return;
    const rowW  = row.offsetWidth;
    const cellL = cell.offsetLeft;
    const cellW = cell.offsetWidth;
    row.scrollLeft = cellL - rowW / 2 + cellW / 2;
  });

  if(prog >= total-1) {
    ab.innerHTML = `
      <button class="btn btn-secondary" onclick="openCombatItemModal()">🎒 アイテム</button>
      <button class="btn btn-secondary" style="border-color:var(--green);color:var(--green);" onclick="leaveDungeon(true)">✓ 帰還する</button>
    `;
  } else {
    ab.innerHTML = `
      <button class="btn btn-primary" onclick="advanceDungeon()">▶ 進む</button>
      <button class="btn btn-secondary" onclick="openCombatItemModal()">🎒 アイテム</button>
      <button class="btn btn-secondary" style="border-color:var(--green);color:var(--green);" onclick="leaveDungeon(true)">↩ 帰還する</button>
      <div></div>
    `;
  }
}

function renderCombat(sc, ab, c) {
  const en = c.enemy;
  const hpPct = Math.max(0, (en.hp/en.maxHp*100)).toFixed(0);
  const poisonBanner = gs.dungeon.poisoned
    ? `<div style="background:#1a0a00;border:1px solid #884400;color:#ff9944;font-size:11px;padding:5px 10px;border-radius:6px;margin-bottom:4px;text-align:center">☠ 毒状態（移動・戦闘後に最大HP3%失う）</div>`
    : "";
  const burnBanner = gs.dungeon.burned
    ? `<div style="background:#1a0800;border:1px solid #cc5500;color:#ff7722;font-size:11px;padding:5px 10px;border-radius:6px;margin-bottom:4px;text-align:center">🔥 熱傷状態（移動・戦闘後に最大HP2%失う）</div>`

  if(en.isBoss) {
    const phaseColor = en.phase===3?"var(--boss)":en.phase===2?"#ff7700":"#cc4400";
    const rageColor  = en.rage>70?"var(--boss)":en.rage>40?"#ff7700":"var(--gold-dark)";
    sc.innerHTML = `
      ${poisonBanner}${burnBanner}
      <div class="bossCard" id="enemyBox">
        <div style="font-size:11px;color:${phaseColor};text-align:center;margin-bottom:4px;letter-spacing:2px">─── BOSS PHASE ${en.phase} ───</div>
        <div class="enemyName" style="font-size:18px;color:${phaseColor}">${en.icon} ${en.name}</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;text-align:center">HP ${Math.max(0,en.hp)} / ${en.maxHp}</div>
        <div class="enemyHpTrack" style="height:14px">
          <div class="enemyHpFill" style="width:${hpPct}%;background:linear-gradient(90deg,${phaseColor},#ff8800)"></div>
        </div>
        <div style="margin-top:8px;font-size:10px;color:var(--muted)">
          怒り: <span style="color:${rageColor}">${Math.floor(en.rage)}%</span>
          <div class="enemyHpTrack" style="height:6px;margin-top:3px">
            <div style="width:${en.rage}%;height:100%;background:${rageColor};border-radius:3px;transition:width 0.3s"></div>
          </div>
        </div>
        ${en.chargePending?`<div style="color:#ffaa00;font-size:11px;margin-top:6px;text-align:center">⚡ 溜め中…</div>`:""}

function restoreFatigue() {
  const r = calcStats(gs);
  const floor = gs.dungeon.clearedFloor || 1;
  const cost  = floor * 100;
  if(gs.player.gold < cost) {
    addShopLog("damage", `Goldが足りません（必要: ${cost}G）`);
    render(); return;
  }
  gs.player.gold -= cost;
  gs.player.fatigue = null;
  recalcHpMp(gs);
  gs.player.hp = Math.min(gs.player.hp, calcStats(gs).maxHp);
  addShopLog("info", `💆 休息して疲弊が回復した（${cost}G）`);
  saveGame(); render();
}
