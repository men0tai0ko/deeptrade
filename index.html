function applyCurseHpDrain(logs) {
  const _cr = calcStats(gs);
  const resistPct = _cr.skillStatusResist || 0;
  Object.values(gs.equipped).forEach(uid => {
    if(!uid) return;
    const item = gs.inventory.find(i => i.uid === uid);
    if(!item || !item.cursed || !item.curse) return;
    if(item.curse.type !== 'hp_drain') return;
    const rawDmg = item.curse.val;
    const dmg = resistPct > 0 ? Math.max(1, Math.floor(rawDmg * (1 - resistPct/100))) : rawDmg;
    gs.player.hp = Math.max(1, gs.player.hp - dmg);
    const note = resistPct > 0 ? ` (耐性-${rawDmg-dmg})` : "";
    logs.push({ cls:"item", msg:`⛓ 呪い【${item.curse.label}】が発動 ${dmgSpan("-" + dmg + " HP")}${note}` });
  });
}

// 呪い発動：gold_loss（帰還時）
function applyCurseGoldLoss() {
  Object.values(gs.equipped).forEach(uid => {
    if(!uid) return;
    const item = gs.inventory.find(i => i.uid === uid);
    if(!item || !item.cursed || !item.curse) return;
    if(item.curse.type !== 'gold_loss') return;
    const loss = Math.floor(gs.player.gold * item.curse.val / 100);
    if(loss <= 0) return;
    gs.player.gold = Math.max(0, gs.player.gold - loss);
    addLog("item", `⛓ ${statusSpan("呪い")}【${statusSpan(item.curse.label)}】が発動 ${goldSpan("-" + loss + "G")}`);
  });
}

function useCombatSkill(skillId) {
  const c = gs.dungeon.combat;
  if(!c) return;
  const def = COMBAT_SKILL_MASTER[skillId];
  if(!def) return;
  const r = calcStats(gs);
  // MP消費チェック（深淵の叡智4部位でコスト-1、最小1）
  const mpCost = Math.max(1, def.mpCost - (r.setSkillCostReduce || 0));
  if(gs.player.mp < mpCost) {
    addLog("item", `✕ MPが足りない（必要: ${mpCost}MP）`);
    render(); return;
  }
  gs.player.mp -= mpCost;
  const logs = [];
  def.exec(gs, r, c.enemy, logs);
  // スキル後に敵ターン実行（divine_shieldのみ被ダメ無効化が有効）
  logs.forEach(l => addLog(l.cls, l.msg));
  // 敵が倒れた場合の処理
  if(c.enemy.hp <= 0 && !c.enemy.isBoss) {
    addLog("item", `✓ ${enemySpan(c.enemy.name)}を倒した！`);
    gainExp(c.enemy.exp);
    dropItems(c.enemy, c.depth, gs.dungeon.activeFloor||gs.dungeon.floor);
    if(gs.dungeon._session) { gs.dungeon._session.kills++; }
    gs.dungeon.combat = null;
    saveGame(); render(); return;
  }
  // 敵ターンを実行（doBattle("nothing")に相当）
  doBattle("nothing");
}

function tryEscape() {
  const r = calcStats(gs);
  const rate = 40 + r.total.agi*1.5 + (r.setEscapeBonus||0) + (r.skillEscapeBonus||0) + (r.colEscapeBonus||0);
  if(Math.random()*100 < rate) {
    addLog("item","💨 逃走成功！");
    gs.dungeon.combat = null;
    render();
  } else {
    addLog("item","✕ 逃走失敗！");
    doBattle("nothing");
  }
}

function dropItems(enemy, depth, floor) {
  // 実績カウンタ
  if(gs.achievements?.stats) gs.achievements.stats.enemyKills = (gs.achievements.stats.enemyKills||0) + 1;
  // Gold必ずドロップ
  const ng = gs.dungeon.ng || 0;
  const goldDrop = Math.floor(floor * (10 + Math.floor(Math.random() * 21)) * (1 + ng * 0.15));
  gs.player.gold += goldDrop;
  addLog("item", `💰 ${enemySpan(enemy.icon + enemy.name)}から ${goldSpan(goldDrop + "G")} 獲得`);
  showGoldPop(goldDrop);

  // アイテムドロップ
  const _r = calcStats(gs);
  const baseLuk = _r.total.luk;
  const lukBonus = (_r.skillDropLukBonus || 0);  // 幸運の手：luk+5換算
  const luk = baseLuk + lukBonus;
  if(Math.random()*100 < enemy.dropRate + luk*0.2 + (enemy._omenDropBonus||0)) {
    const item = generateDrop(depth, floor);
    const m = ITEM_MASTER[item.itemId];

    // 素材嗅覚：素材ドロップ率+N%（素材タイプのみ再抽選で底上げ）
    if(m.type === "material" && (_r.skillMaterialDropBonus||0) > 0) {
      // 素材をもう1個追加ドロップ（確率で）
      if(Math.random()*100 < _r.skillMaterialDropBonus) {
        const bonusItem = generateDrop(depth, floor);
        const bm = ITEM_MASTER[bonusItem.itemId];
        if(bm.type === "material" && !gs.dungeon.autoRun?.active) {
          gs.dungeon.loot.push({...bonusItem, uid: uuid()});
          addLog("item", `🔮 素材嗅覚！追加素材をドロップ`);
        }
      }
    }

    // 呪い耐性：呪いアイテム取得時N%で自動鑑定
    if(item.cursed && !item.identified && (_r.skillCurseAutoIdent||0) > 0) {
      if(Math.random()*100 < _r.skillCurseAutoIdent) {
        item.identified = true;
        addLog("item", `🧿 呪い耐性：自動鑑定！`);
      }
    }

    const affixCount = item.affixes ? item.affixes.length : 0;
    const itemSpan = rarityItemSpan(m.name, item.rarity, affixCount);
    if(!gs.dungeon.autoRun?.active && gs.dungeon.loot.length >= getLootLimit()) {
      addLog("item", `✦ 【${itemSpan}】をドロップ！荷物がいっぱい…`);
      openLootOverflowModal(item);
      return;
    }
    gs.dungeon.loot.push(item);
    if(item.rarity === "legendary" && gs.achievements?.stats) gs.achievements.stats.legendaryFound = (gs.achievements.stats.legendaryFound||0) + 1;
    addLog("item", `✦ 【${itemSpan}】をドロップ！`);
  }
}

// ── 荷物溢れモーダル ──

function generateDrop(depth, floor) {
  let unique;
  if(floor >= 6) {
    // 真エンドフロア各階ドロッププール
    const ABYSS_DROP_POOLS = {
      6:  ["void_blade","void_shield","void_helm","void_armor","void_greaves","void_gauntlets","void_boots","void_amulet","void_bangle","void_ring","void_core","magic_crystal"],
      7:  ["specter_blade","specter_shield","specter_helm","specter_armor","specter_greaves","specter_gloves","specter_boots","specter_amulet","specter_bangle","specter_ring","void_core","magic_crystal"],
      8:  ["colossus_sword","colossus_shield","colossus_helm","colossus_armor","colossus_greaves","colossus_gloves","colossus_boots","colossus_amulet","colossus_bangle","colossus_ring","void_core","magic_crystal"],
      9:  ["sovereign_blade","sovereign_shield","sovereign_helm","sovereign_armor","sovereign_greaves","sovereign_gloves","sovereign_boots","sovereign_amulet","sovereign_bangle","sovereign_ring","void_core","magic_crystal"],
      10: ["will_blade","will_shield","will_helm","will_armor","will_greaves","will_gloves","will_boots","will_amulet","will_bangle","will_ring","void_core","magic_crystal"],
    };
    unique = ABYSS_DROP_POOLS[Math.min(floor, 10)] || ABYSS_DROP_POOLS[10];
  } else if(floor >= 5) {
    // 5階専用ドロッププール：熔岩地帯アイテム中心
    unique = ["inferno_blade","magma_dagger","heatwall_shield","ashen_helm",
              "ember_armor","lava_greaves","pyre_gauntlets","cinderstep",
              "inferno_ring","ashcloak","inferno_amulet","inferno_bangle","inferno_seal",
              "inferno_core",
              "dragon_fang","magic_crystal","gem"];
  } else if(floor >= 4) {
    // 4階専用ドロッププール：新アイテムを中心に
    unique = ["poison_blade","swamp_hood","toxin_bangle","serpent_ring",
              "iron_armor","iron_gauntlets","speed_boots","dragon_fang","antidote","gem",
              "iron_shield","parry_blade","shadow_cloak","shadow_seal","magic_crystal"];
  } else {
    const candidates = [];
    ["slime","goblin","skeleton","wolf","golem","dragon"].forEach(id=>{
      ENEMY_MASTER[id].drop.forEach(d=>candidates.push(d));
    });
    unique = [...new Set(candidates)];
  }
  const itemId = unique[Math.floor(Math.random()*unique.length)];
  // 等級固定素材はレアリティを上書き（グローバルMATERIAL_FIXED_RARITY使用）
  const rarity = materialRarity(itemId) !== "normal" ? materialRarity(itemId) : rollRarity(depth, calcStats(gs).total.luk);
  const m = ITEM_MASTER[itemId];
  // 素材・消耗品は affix/呪いなし・identified固定
  if(m.type === "material" || m.type === "consumable") {
    return { uid:uuid(), itemId, rarity, demand:100, affixes:[], cursed:false, curse:null, identified:true, enhLv:0, statOverride:null, locked:false };
  }
  const affixes = rollAffixes(rarity, m.type, depth);
  const curse = rollCurse(rarity, depth);
  // affix or 呪いがあれば未鑑定候補（ショップLvに依存しない）
  const canBeUnidentified = affixes.length > 0 || curse !== null;
  const identified = canBeUnidentified ? (Math.random() < 0.45) : true;
  return { uid:uuid(), itemId, rarity, demand:100, affixes, cursed: curse !== null, curse, identified, enhLv:0, statOverride:null, locked:false };
}

// 呪い抽選
function rollCurse(rarity, depth) {
  const base = CURSE_BASE_CHANCE[rarity] || 0;
  const chance = base + depth * 0.8;
  if(Math.random() * 100 >= chance) return null;

  const totalW = CURSE_MASTER.reduce((s,c) => s + c.weight, 0);
  let rand = Math.random() * totalW;
  let chosen = CURSE_MASTER[CURSE_MASTER.length - 1];
  for(const c of CURSE_MASTER) {
    if(rand < c.weight) { chosen = c; break; }
    rand -= c.weight;
  }
  // bind 以外は値を決定
  const val = chosen.min === 0 ? 0
    : Math.max(chosen.min, Math.round(chosen.min + Math.random() * (chosen.max - chosen.min)));
  return { type: chosen.type, label: chosen.label, icon: chosen.icon, desc: chosen.desc, val };
}

// affix の重み付き抽選
function rollAffixes(rarity, itemType, depth) {
  const count = RARITY_MASTER[rarity].affixCount;
  if(count === 0) return [];

  // 付与可能な affix を種別でフィルタ
  const pool = AFFIX_MASTER.filter(a => a.types.includes(itemType));
  if(pool.length === 0) return [];

  const result = [];
  const usedIds = new Set();
  const depthScale = 1 + Math.floor(depth / 5) * 0.15; // 深度5ごとに+15%

  for(let i = 0; i < count; i++) {
    // 未使用のものだけで重み抽選
    const avail = pool.filter(a => !usedIds.has(a.id));
    if(avail.length === 0) break;

    const totalW = avail.reduce((s,a) => s + a.weight, 0);
    let rand = Math.random() * totalW;
    let chosen = avail[avail.length - 1];
    for(const a of avail) {
      if(rand < a.weight) { chosen = a; break; }
      rand -= a.weight;
    }

    usedIds.add(chosen.id);
    const val = Math.round(
      (chosen.min + Math.random() * (chosen.max - chosen.min)) * depthScale
    );
    result.push({ id: chosen.id, stat: chosen.stat, label: chosen.label, val: Math.max(1, val) });
  }
  return result;
}

function rollRarity(depth, luk) {
  const rarityBonus = (gs.player.skills||[]).includes("keen_eye") ? 3 : 0;
  // rb_rarity: ドロップ品質底上げ（normal -N%・rare +N%）
  const _rbRarityShift = (gs?.player?.rebirthSkills||[]).reduce((acc,id) => {
    const sk = REBIRTH_SKILL_MASTER[id];
    return acc + (sk?.effect?.rarityShift || 0);
  }, 0);
  const bonus = Math.min(40, depth*0.5 + luk*0.3 + rarityBonus);
  const table = [
    { r:"legendary", base:2 },
    { r:"epic",      base:8 },
    { r:"rare",      base:20 + _rbRarityShift },
    { r:"normal",    base:Math.max(10, 70 - _rbRarityShift) },
  ];
  const adjusted = table.map(t=>({
    r: t.r,
    v: t.r === "normal" ? t.base : t.base + bonus,
  }));
  const total = adjusted.reduce((s,a)=>s+a.v,0);
  let rand = Math.random()*total;
  for(const a of adjusted) {
    if(rand < a.v) return a.r;
    rand -= a.v;
  }
  return "normal";
}

let pendingLvUp = false;

function gainExp(amount) {
  if(gs.dungeon._session) gs.dungeon._session.earnedExp += amount;
  gs.player.exp += amount;
  while(gs.player.exp >= gs.player.nextExp) {
    gs.player.exp -= gs.player.nextExp;
    gs.player.level++;
    gs.player.nextExp = Math.floor(gs.player.nextExp * 1.5);
    gs.player.skillPoints = (gs.player.skillPoints || 0) + 1;
    pendingLvUp = true;
    addLog("item", `✨ Lv.${gs.player.level} にレベルアップ！SP+1`);
  }
}

function applyLvUpStat(key) {
  gs.player.base[key]++;
  recalcHpMp(gs);
  pendingLvUp = false;
  document.querySelector(".lvup-overlay")?.remove();
  saveGame();
  render();
}

// 特化設定に合った空き棚を優先して返す
// 優先順: ①特化一致の空き棚 → ②item:nullで特化一致の棚 → ③null棚（先頭）
function findBestShelfSlot(item) {
  const m = ITEM_MASTER[item.itemId];
  const shelves = gs.shop.shelves;

  // 特化タイプに一致するか判定
  const matches = (slot) => {
    if(!slot?.specialType) return false;
    return itemMatchesShelfSpecial(item, slot.specialType);
  };

  // ① 特化一致 かつ 空き（null または item:null）
  const matchEmpty = shelves.findIndex(s =>
    (s === null || s?.item === null) && matches(s)
  );
  if(matchEmpty >= 0) return matchEmpty;

  // ② 特化なし の null 棚
  const plainNull = shelves.findIndex(s => s === null || (s && !s.item && !s.specialType));
  if(plainNull >= 0) return plainNull;

  // ③ item:null の棚（特化設定のみあるもの）
  const itemNull = shelves.findIndex(s => s?.item === null);
  return itemNull;
}

function listItem(item, slotIdx) {
  if(UNSELLABLE_ITEMS.has(item.itemId)) return;
  if(item.locked) return; // ロック中は出品不可（全経路共通ガード）
  const existing = gs.shop.shelves[slotIdx];
  if(existing && existing.item) return;
  const inv = gs.inventory.findIndex(i => i.uid === item.uid);
  if(inv<0) return;
  gs.inventory.splice(inv,1);

  // 装備してたら外す
  Object.entries(gs.equipped).forEach(([slot,uid])=>{
    if(uid===item.uid) gs.equipped[slot]=null;
  });

  // 特化設定を引き継ぐ
  const specialType = existing?.specialType || null;
  gs.shop.shelves[slotIdx] = {
    item,
    listedAt: Date.now(),
    sellDuration: calcSellDuration(item),
    ...(specialType ? { specialType } : {}),
  };
  saveGame();
}

function unlistItem(uid) {
  const slotIdx = gs.shop.shelves.findIndex(s => s && s.item && s.item.uid === uid);
  if(slotIdx < 0) return;
  const shelf = gs.shop.shelves[slotIdx];
  gs.inventory.push(shelf.item);
  gs.shop.shelves[slotIdx] = null;
  const m = ITEM_MASTER[shelf.item.itemId];
  addLog("item", `🏪 【${m.name}】を棚から取り下げた`);
  saveGame();
  render();
  document.querySelector(".modal-overlay")?.remove();
  openItemDetail(uid);
}

function setShelfSpecial(slotIdx, specialId) {
  if(gs.shop.shelves[slotIdx] === null || gs.shop.shelves[slotIdx] === undefined) {
    // 空棚にspecialTypeのみ設定（itemはnullのまま）
    gs.shop.shelves[slotIdx] = { item: null, specialType: specialId || null };
  } else {
    gs.shop.shelves[slotIdx].specialType = specialId || null;
    if(gs.shop.shelves[slotIdx].item) {
      gs.shop.shelves[slotIdx].sellDuration = calcSellDuration(gs.shop.shelves[slotIdx].item);
    }
  }
  saveGame(); render();
}

function toggleSale(slotIdx) {
  const slot = gs.shop.shelves[slotIdx];
  if(!slot || !slot.item) return;
  slot.onSale = !slot.onSale;
  slot.listedAt = Date.now();      // S55: セール切替時にタイマーをリセット（即売れ防止）
  slot.sellDuration = calcSellDuration(slot.item);
  saveGame(); render();
}

function isTrending(item) {
  const trend = gs.shop.trend;
  if(!trend || !trend.type || Date.now() > trend.endsAt) return false;
  const m = ITEM_MASTER[item.itemId];
  return m && m.type === trend.type;
}

function updateTrend() {
  const trend = gs.shop.trend;
  const now = Date.now();
  if(trend.type && now < trend.endsAt) return;
  if(Math.random() < 0.35) {
    const t = TREND_TYPES[Math.floor(Math.random() * TREND_TYPES.length)];
    gs.shop.trend = { type:t.type, label:t.label, endsAt: now + TREND_DURATION };
    addShopLog("gold", `📣 流行：${t.label}（しばらく続く）`);
  } else {
    gs.shop.trend = { type:null, label:null, endsAt:0 };
  }
}

// カテゴリ→typeリストのマップ（MARKET_CATEGORIESと対応）
const CAT_TYPES = {
  weapon:    ["weapon"],
  armor:     ["head","body","legs","arms","feet"],
  accessory: ["neck","bracelet","ring"],
  consumable:["consumable"],
};
// カテゴリ全体の需要を変化させる
function shiftCatDemand(catKey, delta) {
  if(!gs.shop.demand) gs.shop.demand = {};
  const ids = Object.entries(ITEM_MASTER)
    .filter(([,m]) => (CAT_TYPES[catKey]||[]).includes(m.type))
    .map(([id]) => id);
  ids.forEach(id => {
    gs.shop.demand[id] = Math.max(20, Math.min(150, (gs.shop.demand[id] ?? 100) + delta));
  });
}

function reduceDemand(item) {
  if(!gs.shop.demand) gs.shop.demand = {};
  const id = item.itemId;
  const m = ITEM_MASTER[id];
  // 単品を下げる（-10）＋同カテゴリにも波及（-3）
  gs.shop.demand[id] = Math.max(20, (gs.shop.demand[id] ?? 100) - 10);
  const cat = Object.entries(CAT_TYPES).find(([,types]) => types.includes(m?.type))?.[0];
  if(cat) shiftCatDemand(cat, -3);
}

function recoverDemand() {
  if(!gs.shop.demand) { gs.shop.demand = {}; return; }
  // 回復は遅め：30秒ごとに+1%（setInterval変更と合わせる）
  Object.keys(gs.shop.demand).forEach(id => {
    gs.shop.demand[id] = Math.min(100, (gs.shop.demand[id] ?? 100) + 1);
  });
}

// 自発的需要波動（30秒ごとに呼ぶ）
function fluctuateDemand() {
  if(!gs.shop) return;
  if(!gs.shop.demand) gs.shop.demand = {};
  const cats = Object.keys(CAT_TYPES);
  // rb_demand: 需要変動幅を縮小
  const _rbDemandStabilize = (gs?.player?.rebirthSkills||[]).reduce((acc,id) => {
    const sk = REBIRTH_SKILL_MASTER[id];
    return acc + (sk?.effect?.demandStabilize || 0);
  }, 0);
  const _demandMul = 1 - Math.min(80, _rbDemandStabilize) / 100; // 最大80%縮小
  // ランダムに1〜2カテゴリを選んで上下させる
  // DAILY-RANDOMと同様にFisher-Yatesで一様分布を保証（S66）
  const shuffled = [...cats];
  for(let _i = shuffled.length - 1; _i > 0; _i--) {
    const _j = Math.floor(Math.random() * (_i + 1));
    [shuffled[_i], shuffled[_j]] = [shuffled[_j], shuffled[_i]];
  }
  shuffled.slice(0, 2).forEach(cat => {
    // -8〜+8のランダム変動（トレンド中のカテゴリは+方向バイアス）
    const isTrend = gs.shop.trend?.type === cat && Date.now() < (gs.shop.trend?.endsAt||0);
    const base  = isTrend ? 4 : 0;
    const rawDelta = base + Math.floor(Math.random() * 17) - 8;
    const delta = Math.round(rawDelta * _demandMul);
    shiftCatDemand(cat, delta);
  });
}

function getDemand(item) {
  if(!gs.shop.demand) return 100;
  return gs.shop.demand[item.itemId] ?? 100;
}

// ─────────────────────────────────────────
function calcSellDuration(item) {
  const rarityBase = { normal:60000, rare:180000, epic:480000, legendary:1200000 };
  const typeMulti  = { weapon:1.0, sub:0.9, head:1.0, body:1.1, cloak:1.0, legs:1.0, arms:1.0, feet:0.95, neck:1.2, bracelet:1.1, ring:1.15, seal:1.3, consumable:0.5, material:0.65 };
  const m = ITEM_MASTER[item.itemId];
  // 未鑑定品は「謎の品」として通常より売れ足が遅い（×2.5）
  const unidMul   = item.identified ? 1.0 : 2.5;
  const base      = (rarityBase[item.rarity] || 120000) * unidMul;
  const multi     = typeMulti[m.type] || 1.0;
  const lvBonus   = Math.min(0.5, (gs.shop.level - 1) * 0.07);
  const demandMul = 2.0 - (getDemand(item) / 100); // demand100→×1.0, demand0→×2.0
  const trendMul  = isTrending(item) ? 0.65 : 1.0;
  const rand      = 0.8 + Math.random() * 0.4;     // ±20%のランダム幅
  const staffSpeedBonus = (gs?.shop?.staff||[]).reduce((acc,s) => acc + (getStaffEffect(s).sellSpeedBonus||0), 0);
  const speedMul  = Math.max(0.3, 1 - staffSpeedBonus / 100);
  // 棚特化ボーナス・セール速度（流行一致でさらに強化）
  const _shelf = gs?.shop?.shelves?.find(s => s?.item?.uid === item.uid);
  const _isSpecialMatch = _shelf?.specialType && itemMatchesShelfSpecial(item, _shelf.specialType);
  const _isTrendMatch   = _isSpecialMatch && isTrending(item);
  const specialSpeedMul = _isTrendMatch ? 0.50 : _isSpecialMatch ? (1 - SHELF_SPECIAL_BONUS.speedPct / 100) : 1.0;
  const salSpeedMul = _shelf?.onSale ? 0.60 : 1.0; // セール時販売速度×1.67
  return Math.floor(base * multi * (1 - lvBonus) * demandMul * trendMul * rand * speedMul * specialSpeedMul * salSpeedMul);
}

// ── 未鑑定品クレーム処理 ──
// 中身の良し悪しでクレーム率・返金額・セリフが変わる
function scheduleComplaint(item, customer, paidPrice) {
  if(!gs.shop.pendingComplaints) gs.shop.pendingComplaints = [];

  // 中身の価値を判定
  const truePrice = (() => {
    const m = ITEM_MASTER[item.itemId];
    const r = RARITY_MASTER[item.rarity];
    const affixBonus = (item.affixes||[]).reduce((s,a) => s + a.val * 18, 0);
    const cursePenalty = (item.cursed && item.curse) ? 0.75 : 1.0;
    return Math.floor((m.basePrice * r.multi + affixBonus) * cursePenalty);
  })();

  // 良品（真の価値が売値の1.5倍以上）→ クレームなし、感謝の可能性
  if(truePrice >= paidPrice * 1.5) {
    // 40%で感謝メッセージ（時間差）
    if(Math.random() < 0.4) {
      const delay = 20000 + Math.random() * 30000; // 20〜50秒後
      gs.shop.pendingComplaints.push({
        fireAt: Date.now() + delay,
        type: "thanks",
        customer,
        refund: 0,
      });
    }
    return;
  }

  // ハズレ（真の価値が売値未満）→ クレーム
  const isCursed = item.cursed && item.curse;
  // 謎箱として売る前提：クレーム率を緩和（ただし呪いはやや高め）
  const claimRate = isCursed ? 0.65 : 0.35;
  if(Math.random() >= claimRate) return;

  const refund = isCursed
    ? paidPrice                          // 呪い入りは全額返金
    : Math.floor(paidPrice * 0.5);       // 通常は半額返金

  const delay = 30000 + Math.random() * 60000; // 30〜90秒後
  gs.shop.pendingComplaints.push({
    fireAt: Date.now() + delay,
    type: isCursed ? "curse" : "bad",
    customer,
    refund,
  });
}

const COMPLAINT_MSGS = {
  bad:   ["「中身がこれだけ？返金してほしいんだが」",
          "「謎の荷物って書いてあったけど、さすがにこれは…」",
          "「期待してたのに。半分だけ返してくれ」"],
  curse: ["「呪われてるじゃないか！！返せ！！」",
          "「これ呪いが入ってたんだが。全額返金を要求する」",
          "「装備したら呪われた。冗談じゃない、全部返せ」"],
  thanks:["「謎の荷物、意外とよかった。また来るよ」",
          "「中身が良くて驚いた。ありがとう」",
          "「思ったより良いものだった。得した気分だ」"],
};

function processComplaints() {
  if(!gs.shop.pendingComplaints || gs.shop.pendingComplaints.length === 0) return;
  const now = Date.now();
  const remaining = [];
  gs.shop.pendingComplaints.forEach(c => {
    if(now < c.fireAt) { remaining.push(c); return; }
    const msgs = COMPLAINT_MSGS[c.type] || [];
    const msg = msgs[Math.floor(Math.random() * msgs.length)] || "";
    if(c.type === "thanks") {
      addShopLog("good", `${c.customer.icon}${c.customer.name}${msg}`);
    } else {
      gs.player.gold = Math.max(0, gs.player.gold - c.refund);
      addShopLog("damage", `${c.customer.icon}${c.customer.name}${msg} (-${c.refund}G)`);
      showGoldPop(`-${c.refund}G`);
    }
  });
  gs.shop.pendingComplaints = remaining;
}

// A: 店舗収入（60秒ごと自動）
function checkShopIncome() {
  const sh = gs.shop;
  const now = Date.now();
  if(!sh.lastIncomeAt) sh.lastIncomeAt = now;
  if(now - sh.lastIncomeAt < SHOP_INCOME_INTERVAL) return;
  sh.lastIncomeAt = now;
  const lv = Math.min(sh.level, SHOP_INCOME_BASE.length - 1);
  const income = SHOP_INCOME_BASE[lv];
  if(income <= 0) return;
  gs.player.gold += income;
  gs.shop.earnings.shopIncome += income;
  addShopLog("gold", `🏪 店舗収入 +${income}G（Lv${sh.level}）`);
}

// B: スタッフ収入（60秒ごと）
function checkStaffIncome() {
  const sh = gs.shop;
  const now = Date.now();
  sh.staff.forEach(s => {
    const def = STAFF_MASTER[s.id];
    if(!def) return;
    if(!s.lv) s.lv = 1;
    const eff = getStaffEffect(s);
    if(!s.lastAt) s.lastAt = now;
    if(now - s.lastAt < STAFF_INCOME_INTERVAL) return;
    s.lastAt = now;
    if(eff.goldPerMin) {
      gs.player.gold += eff.goldPerMin;
      gs.shop.earnings.staff += eff.goldPerMin;
      addShopLog("gold", `${def.icon} ${def.name}(Lv${s.lv}) が +${eff.goldPerMin}G 稼いできた`);
    }
    if(eff.materialIntervalMin) {
      if(!s.matTick) s.matTick = 0;
      s.matTick++;
      if(s.matTick >= eff.materialIntervalMin) {
        s.matTick = 0;
        const matIds = Object.keys(ITEM_MASTER).filter(k => ITEM_MASTER[k].type === "material");
        if(matIds.length > 0) {
          const picked = matIds[Math.floor(Math.random() * matIds.length)];
          const m = ITEM_MASTER[picked];
          gs.inventory.push({ uid:uuid(), itemId:picked, rarity:materialRarity(picked), identified:true, enhLv:0, statOverride:null, affixes:[], cursed:false, curse:null, locked:false });
          addShopLog("item", `${def.icon} ${def.name}が${m.icon}${m.name}を持ち帰った`);
        }
      }
    }
    // 錬金術師：消耗品自動生成
    if(s.id === "alchemist" && eff.alchemyIntervalMin) {
      const speedBonus = eff.alchemySpeedBonus || 0;
      const interval = Math.max(1, Math.floor(eff.alchemyIntervalMin * (1 - speedBonus / 100)));
      if(!s.alchTick) s.alchTick = 0;
      s.alchTick++;
      if(s.alchTick >= interval) {
        s.alchTick = 0;
        const pool = ["herb", "potion", "antidote"];
        const picked = pool[Math.floor(Math.random() * pool.length)];
        const m = ITEM_MASTER[picked];
        if(m) {
          gs.inventory.push({ uid:uuid(), itemId:picked, rarity:"normal", identified:true, enhLv:0, statOverride:null, affixes:[], cursed:false, curse:null, locked:false });
          addShopLog("item", `${def.icon} ${def.name}が${m.icon}${m.name}を錬成した`);
        }
      }
    }
    // 古物商：未鑑定品自動鑑定
    if(s.id === "antiquarian" && eff.autoIdentifyIntervalMin) {
      const speedBonus = eff.autoIdentifySpeedBonus || 0;
      const interval = Math.max(1, Math.floor(eff.autoIdentifyIntervalMin * (1 - speedBonus / 100)));
      if(!s.identTick) s.identTick = 0;
      s.identTick++;
      if(s.identTick >= interval) {
        s.identTick = 0;
        const unidentified = gs.inventory.filter(i => !i.identified);
        if(unidentified.length > 0) {
          const target = unidentified[0];
          target.identified = true;
          if(!target.statOverride && ITEM_MASTER[target.itemId]?.stats) {
            target.statOverride = { ...ITEM_MASTER[target.itemId].stats };
          }
          const m = ITEM_MASTER[target.itemId];
          addShopLog("item", `${def.icon} ${def.name}が${m.icon}${m.name}を鑑定した`);
          render();
        }
      }
    }
    // 商品管理人：等級・種別指定自動陳列
    if(s.id === "stockManager") {
      const _rarities = gs.shop.autoShelfRarities || [];
      const _types    = gs.shop.autoShelfTypes    || [];
      // 等級が1つ以上選択されている場合のみ動作（種別は補助フィルタ）
      if(_rarities.length > 0) {
        if(!s.shelfTick) s.shelfTick = 0;
        s.shelfTick++;
        if(s.shelfTick >= 2) {  // 2分ごとにチェック
          s.shelfTick = 0;
          const emptySlots = gs.shop.shelves.filter(sl => sl === null || (sl && !sl.item)).length;
          if(emptySlots > 0) {
            const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));
            const listedUids   = new Set(gs.shop.shelves.filter(s=>s?.item).map(sl => sl.item.uid));
            const candidates   = gs.inventory.filter(i => {
              if(!i.identified)             return false;
              if(equippedUids.has(i.uid))   return false;
              if(listedUids.has(i.uid))     return false;
              if(i.locked)                  return false;
              // 等級フィルタ（設定あり時のみ適用）
              if(_rarities.length > 0 && !_rarities.includes(i.rarity)) return false;
              // 種別フィルタ（設定あり時のみ適用）
              if(_types.length > 0) {
                const m = ITEM_MASTER[i.itemId];
                const isEquip       = m && EQUIP_TYPES.has(m.type);
                const isConsumable  = m && (m.type === "consumable" || m.type === "material");
                const wantEquip     = _types.includes("equip");
                const wantConsumable = _types.includes("consumable");
                if(wantEquip && !wantConsumable && !isEquip)      return false;
                if(wantConsumable && !wantEquip && !isConsumable) return false;
              }
              return true;
            });
            if(candidates.length > 0) {
              const item = candidates[0];
              const emptyIdx = gs.shop.shelves.findIndex(s => s === null || (s && !s.item));
              if(emptyIdx >= 0) {
                gs.shop.shelves[emptyIdx] = {
                  item,
                  listedAt: Date.now(),
                  sellDuration: calcSellDuration(item),
                };
                const m = ITEM_MASTER[item.itemId];
                addShopLog("item", `${def.icon} ${def.name}が${m.icon}${m.name}を棚に並べた`);
              }
            }
          }
        }
      }
    }
  });
}

function hireStaff(id) {
  const def = STAFF_MASTER[id];
  if(!def) return;
  if(def.requireShopLv && gs.shop.level < def.requireShopLv) {
    addShopLog("damage", `✕ ${def.name}はショップLv${def.requireShopLv}で雇用解放`);
    return;
  }
  const count = gs.shop.staff.filter(s => s.id === id).length;
  if(count >= def.maxCount) { addShopLog("damage", `✕ ${def.name}はこれ以上雇えません（上限${def.maxCount}人）`); return; }
  if(gs.player.gold < def.hireCost) { addShopLog("damage", `✕ Gold不足（${def.hireCost}G必要）`); return; }
  gs.player.gold -= def.hireCost;
  gs.shop.staff.push({ id, hiredAt: Date.now(), lastAt: Date.now(), matTick: 0, lv: 1 });
  addShopLog("good", `${def.icon} ${def.name}を雇った（-${def.hireCost}G）`);
  saveGame(); render();
}

function fireStaff(idx) {
  const s = gs.shop.staff[idx];
  if(!s) return;
  const def = STAFF_MASTER[s.id];
  // 解雇は雇用コストの25%を返還
  const lv = s.lv || 1;
  const totalPaid = (def?.hireCost || 0) + Array.from({length: lv-1}, (_,i) => staffUpgradeCost(def, i+1)).reduce((a,b)=>a+b, 0);
  const refund = Math.floor(totalPaid * 0.5);
  gs.shop.staff.splice(idx, 1);
  gs.player.gold += refund;
  addShopLog("info", `${def?.icon || "👤"} ${def?.name || "スタッフ"}を解雇した（+${refund}G 返還）`);
  saveGame(); render();
}

function upgradeStaff(idx) {
  const s = gs.shop.staff[idx];
  if(!s) return;
  const def = STAFF_MASTER[s.id];
  if(!def) return;
  const lv = s.lv || 1;
  if(lv >= STAFF_MAX_LV) { addShopLog("damage", `✕ ${def.name}はLv${STAFF_MAX_LV}が上限です`); return; }
  const cost = staffUpgradeCost(def, lv);
  if(gs.player.gold < cost) { addShopLog("damage", `✕ Gold不足（${cost.toLocaleString()}G必要）`); return; }
  gs.player.gold -= cost;
  s.lv = lv + 1;
  addShopLog("good", `${def.icon} ${def.name}がLv${s.lv}になった！（-${cost.toLocaleString()}G）`);
  saveGame(); render();
}

// C: 投資
function checkInvestmentReturn() {
  const inv = gs.shop.investment;
  if(!inv.amount || inv.amount <= 0) return;
  const now = Date.now();
  if(!inv.lastReturnAt) inv.lastReturnAt = now;
  if(now - inv.lastReturnAt < INVEST_INTERVAL) return;
  inv.lastReturnAt = now;
  const tier = INVEST_RATE_TABLE.find(t => inv.amount >= t.min && inv.amount <= t.max) || INVEST_RATE_TABLE[0];
  const returns = Math.max(1, Math.floor(inv.amount * tier.rate));
  inv.amount = Math.min(inv.amount + returns, INVEST_MAX);
  gs.shop.earnings.investment += returns;
  addShopLog("gold", `💰 投資利回り +${returns}G（残高: ${inv.amount.toLocaleString()}G）`);
}

function doInvestAndRefresh(amount) {
  doInvest(amount);
  if(window._investRefresh) window._investRefresh();
  if(window._passiveRefresh) window._passiveRefresh();
}

function withdrawInvestAndRefresh() {
  withdrawInvestment();
  if(window._investRefresh) window._investRefresh();
  if(window._passiveRefresh) window._passiveRefresh();
}

function doInvest(amount) {
  if(gs.player.gold < amount) { addShopLog("damage", `✕ Gold不足`); return; }
  const inv = gs.shop.investment;
  if(inv.amount + amount > INVEST_MAX) { addShopLog("damage", `✕ 投資上限（${INVEST_MAX.toLocaleString()}G）を超えます`); return; }
  gs.player.gold -= amount;
  inv.amount += amount;
  if(!inv.lastReturnAt) inv.lastReturnAt = Date.now();
  addShopLog("gold", `💰 ${amount.toLocaleString()}G を投資に預けた（残高: ${inv.amount.toLocaleString()}G）`);
  saveGame(); render();
}

function withdrawInvestment() {
  const inv = gs.shop.investment;
  if(!inv.amount) return;
  const amount = inv.amount;
  gs.player.gold += amount;
  inv.amount = 0;
  inv.lastReturnAt = 0;
  addShopLog("gold", `💰 投資から ${amount.toLocaleString()}G を引き出した`);
  saveGame();
}

// D: ギルド時間報酬
function checkGuildReward() {
  const gr = gs.shop.guildReward;
  const now = Date.now();
  if(!gr.lastTickAt) gr.lastTickAt = now;
  if(now - gr.lastTickAt < GUILD_REWARD_INTERVAL) return;
  const ticks = Math.floor((now - gr.lastTickAt) / GUILD_REWARD_INTERVAL);
  gr.lastTickAt = now;
  // 60分で1個分蓄積、上限60分分（=1個分）
  gr.mins = Math.min((gr.mins || 0) + ticks, GUILD_REWARD_MAX_MINS);
}

function claimGuildReward() {
  const gr = gs.shop.guildReward;
  if(!gr.mins || gr.mins < GUILD_REWARD_MAX_MINS) return;
  // 受け取り可能個数（1個分たまるたびに消費）
  const items = Math.floor(gr.mins / GUILD_REWARD_MAX_MINS);
  gr.mins = gr.mins % GUILD_REWARD_MAX_MINS;
  // ショップLvで解放された素材プールを取得
  const pool = GUILD_SUPPLY_POOL.filter(p => gs.shop.level >= p.minLv).map(p => p.itemId);
  if(pool.length === 0) return;
  // 1〜3個ランダム付与
  const count = Math.min(items, 1 + Math.floor(Math.random() * 3));
  const received = {};
  for(let i = 0; i < count; i++) {
    const itemId = pool[Math.floor(Math.random() * pool.length)];
    const rarity = materialRarity(itemId);
    gs.inventory.push({ uid:uuid(), itemId, rarity, demand:100, affixes:[], cursed:false, curse:null, identified:true, enhLv:0, statOverride:null, locked:false });
    received[itemId] = (received[itemId] || 0) + 1;
  }
  gs.shop.earnings.guildItems = (gs.shop.earnings.guildItems || 0) + count;
  const summary = Object.entries(received).map(([id,n]) => `${ITEM_MASTER[id].icon}${ITEM_MASTER[id].name}×${n}`).join("、");
  addShopLog("item", `📦 ギルド支給品を受け取った: ${summary}`);
  saveGame(); render();
  return summary;
}

          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">

    const body = modal.querySelector?.('.modal-body') || (() => {

            <div class="modal-title" style="margin-bottom:8px">⭐ 常連客 <span style="font-size:12px;color:var(--muted);font-family:sans-serif">${allRegs.length}人</span></div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px" id="regFilterBar">${filterBar}</div>
          </div>

            ${regCards}

// ── 需要履歴スナップショット ──
function takeDemandSnapshot() {
  if(!gs.shop) return;
  if(!gs.shop.demandHistory) gs.shop.demandHistory = [];
  const hist = gs.shop.demandHistory;
  const now  = Date.now();
  // 最後のスナップから MARKET_SNAPSHOT_INTERVAL 未満なら skip
  if(hist.length > 0 && now - hist[hist.length-1].ts < MARKET_SNAPSHOT_INTERVAL) return;
  // 5カテゴリの需要平均を計算
  const snap = {};
  MARKET_CATEGORIES.forEach(cat => {
    const ids = Object.entries(ITEM_MASTER)
      .filter(([,m]) => cat.types.includes(m.type))
      .map(([id]) => id);
    if(ids.length === 0) { snap[cat.key] = 100; return; }
    const avg = ids.reduce((s,id) => s + (gs.shop.demand[id] ?? 100), 0) / ids.length;
    snap[cat.key] = Math.round(avg);
  });
  hist.push({ ts: now, snap });
  // 上限を超えたら古いものを削除
  if(hist.length > MARKET_SNAPSHOT_MAX) hist.splice(0, hist.length - MARKET_SNAPSHOT_MAX);
}

// ── 市場モーダル ──
// 表示中カテゴリ管理（モーダル間で保持）
const _marketVisible = { weapon:true, armor:true, accessory:true, consumable:true };
let _marketXRange = 0;    // 0=全履歴, 15, 30 点
let _marketYRange = 'fixed'; // 'fixed'=20-150%, 'auto'=自動フィット

function _drawMarketCanvas(hist, trendActive, trend) {
  const canvas = document.getElementById('marketCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const PAD = { top:16, right:12, bottom:28, left:28 };
  const gW = W - PAD.left - PAD.right;
  const gH = H - PAD.top  - PAD.bottom;

  ctx.clearRect(0, 0, W, H);

  // X軸レンジ適用
  const dispHist = (_marketXRange > 0 && hist.length > _marketXRange)
    ? hist.slice(-_marketXRange) : hist;

  // Y軸レンジ
  let Y_MIN, Y_MAX;
  if(_marketYRange === 'auto' && dispHist.length >= 2) {
    const allVals = dispHist.flatMap(h => MARKET_CATEGORIES.map(cat => h.snap[cat.key] ?? 100));
    const dataMin = Math.min(...allVals);
    const dataMax = Math.max(...allVals);
    const pad = Math.max(5, (dataMax - dataMin) * 0.15);
    Y_MIN = Math.max(0,   Math.floor(dataMin - pad));
    Y_MAX = Math.min(200, Math.ceil (dataMax + pad));
  } else {
    Y_MIN = 20; Y_MAX = 150;
  }
  const Y_RANGE = Y_MAX - Y_MIN;
  const toY = v => PAD.top + gH * (1 - (Math.max(Y_MIN, Math.min(Y_MAX, v)) - Y_MIN) / Y_RANGE);

  // グリッド線
  const yStep = Y_RANGE <= 40 ? 5 : Y_RANGE <= 80 ? 10 : 30;
  const yTicks = [];
  for(let v = Math.ceil(Y_MIN/yStep)*yStep; v <= Y_MAX; v += yStep) yTicks.push(v);
  ctx.strokeStyle = 'var(--track-bg)'; ctx.lineWidth = 1;
  yTicks.forEach(v => {
    const y = toY(v);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left+gW, y); ctx.stroke();
    ctx.fillStyle = v === 100 ? 'var(--text-faint)' : '#3a3a3a';
    ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(v+'%', PAD.left-3, y+3);
  });
  // 100%基準線を強調
  ctx.strokeStyle = '#2a2a3e'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(PAD.left, toY(100)); ctx.lineTo(PAD.left+gW, toY(100)); ctx.stroke();
  ctx.lineWidth = 1;

  if(dispHist.length < 2) {
    ctx.fillStyle = 'var(--text-disabled)'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('データ蓄積中… (5分ごとに記録)', W/2, H/2);
    return;
  }

  // X軸ラベル
  ctx.fillStyle = 'var(--border-subtle)'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(dispHist.length / 5));
  dispHist.forEach((h, i) => {
    if(i % step !== 0 && i !== dispHist.length-1) return;
    const x = PAD.left + gW * i / (dispHist.length-1);
    const age = Math.round((Date.now() - h.ts) / 60000);
    ctx.fillText(age === 0 ? '今' : `-${age}m`, x, H - PAD.bottom + 12);
  });

  // 折れ線（表示ONのカテゴリのみ）
  MARKET_CATEGORIES.forEach(cat => {
    if(!_marketVisible[cat.key]) return;
    const isTrend = trendActive && trend.type === cat.key;
    ctx.strokeStyle = cat.color;
    ctx.lineWidth   = isTrend ? 2.5 : 1.5;
    ctx.shadowColor = isTrend ? cat.color : 'transparent';
    ctx.shadowBlur  = isTrend ? 6 : 0;
    ctx.beginPath();
    dispHist.forEach((h, i) => {
      const x = PAD.left + gW * i / (dispHist.length-1);
      const y = toY(h.snap[cat.key] ?? 100);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.shadowBlur = 0;
    // 最新点ドット
    const last = dispHist[dispHist.length-1];
    const lx = PAD.left + gW;
    const ly = toY(last.snap[cat.key] ?? 100);
    ctx.fillStyle = cat.color;
    ctx.beginPath(); ctx.arc(lx, ly, isTrend ? 4 : 2.5, 0, Math.PI*2); ctx.fill();
  });

  // 占い師：予測ライン描画
  const forecastTurns = Math.floor(
    (gs?.shop?.staff || []).reduce((acc, s) => {
      const e = getStaffEffect(s);
      return acc + (e.demandForecastTurns || 0);
    }, 0)
  );
  if(forecastTurns > 0 && dispHist.length >= 3) {
    const LOOK_BACK = Math.min(6, dispHist.length);
    MARKET_CATEGORIES.forEach(cat => {
      if(!_marketVisible[cat.key]) return;
      const recent = dispHist.slice(-LOOK_BACK).map(h => h.snap[cat.key] ?? 100);
      // 線形回帰で傾きを算出
      const n = recent.length;
      const xMean = (n - 1) / 2;
      const yMean = recent.reduce((a, b) => a + b, 0) / n;
      const slope = recent.reduce((acc, y, i) => acc + (i - xMean) * (y - yMean), 0)
                  / recent.reduce((acc, _, i) => acc + Math.pow(i - xMean, 2), 0);
      const intercept = yMean - slope * xMean;
      // 最新点から forecastTurns 先まで点線で延長
      const lastX = PAD.left + gW;
      const lastVal = recent[recent.length - 1];
      const predVal = Math.max(Y_MIN, Math.min(Y_MAX, lastVal + slope * forecastTurns));
      const predX = Math.min(W - 4, lastX + (gW / Math.max(hist.length - 1, 1)) * forecastTurns);
      ctx.save();
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = cat.color;
      ctx.globalAlpha = 0.5;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(lastX, toY(lastVal));
      ctx.lineTo(predX, toY(predVal));
      ctx.stroke();
      // 予測終端ひし形マーカー
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = cat.color;
      ctx.beginPath();
      ctx.moveTo(predX,     toY(predVal) - 4);
      ctx.lineTo(predX + 4, toY(predVal));
      ctx.lineTo(predX,     toY(predVal) + 4);
      ctx.lineTo(predX - 4, toY(predVal));
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    });
  }
}

function openMarketModal() {
  document.querySelector('.market-modal')?.remove();
  const modal = document.createElement('div');
  modal.className = 'market-modal modal-overlay';
  modal.onclick = e => { if(e.target === modal) modal.remove(); };
  document.body.appendChild(modal);

  const render = () => {
    const sh   = gs.shop;
    const hist = sh.demandHistory || [];
    const trend = sh.trend;
    const trendActive = !!(trend?.type && Date.now() < trend.endsAt);

    // 現在の各カテゴリ需要
    const currentDemand = {};
    MARKET_CATEGORIES.forEach(cat => {
      const ids = Object.entries(ITEM_MASTER)
        .filter(([,m]) => cat.types.includes(m.type)).map(([id]) => id);
      currentDemand[cat.key] = ids.length
        ? Math.round(ids.reduce((s,id) => s + (sh.demand[id] ?? 100), 0) / ids.length)
        : 100;
    });

    // 棚在庫数
    const shelfStock = {};
    MARKET_CATEGORIES.forEach(cat => { shelfStock[cat.key] = 0; });
    sh.shelves.forEach(slot => {
      if(!slot?.item) return;
      const m = ITEM_MASTER[slot.item.itemId];
      MARKET_CATEGORIES.forEach(cat => {
        if(cat.types.includes(m.type)) shelfStock[cat.key]++;
      });
    });

    // 流行予測
    const forecastBonus = Math.floor(
      (gs.shop.staff || []).reduce((acc, s) => {
        const e = getStaffEffect(s);
        return acc + (e.demandForecastTurns || 0);
      }, 0)
    );
    let predictionLabel = forecastBonus > 0 ? '占い師が予測中…' : '—';
    if(hist.length >= 3) {
      let maxScore = -Infinity, bestCat = null;
      MARKET_CATEGORIES.forEach(cat => {
        const recent = hist.slice(-6).map(h => h.snap[cat.key] ?? 100);
        const half = Math.floor(recent.length / 2);
        const prev = recent.slice(0,half).reduce((a,b)=>a+b,0) / half;
        const next = recent.slice(half).reduce((a,b)=>a+b,0) / (recent.length-half);
        const score = next - prev;
        if(score > maxScore) { maxScore = score; bestCat = cat; }
      });
      if(forecastBonus > 0) {
        predictionLabel = (bestCat && maxScore >= 0)
          ? `${bestCat.label} 上昇傾向（+${forecastBonus}先読み）`
          : '不安定（予測困難）';
      } else {
        predictionLabel = (bestCat && maxScore >= 0) ? bestCat.label + ' 上昇傾向' : '不安定（予測困難）';
      }
    }

    // 凡例カード（タップでON/OFF）
    const legendHtml = MARKET_CATEGORIES.map(cat => {
      const on      = _marketVisible[cat.key];
      const isTrend = trendActive && trend.type === cat.key;
      const demand  = currentDemand[cat.key];
      const dColor  = demand >= 80 ? 'var(--green-bright)' : demand >= 50 ? 'var(--alert)' : 'var(--danger)';
      const border  = on ? (isTrend ? cat.color : 'var(--border-dark)') : 'var(--bg-mid)';
      const opacity = on ? '1' : '0.35';
      return `<div onclick="window._marketToggle('${cat.key}')"
        style="display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--bg-deep);border-radius:6px;
               border:1px solid ${border};opacity:${opacity};cursor:pointer;user-select:none;transition:opacity 0.15s">

        <span style="font-size:11px;flex:1">${cat.label}${isTrend ? ' 🔥' : ''}</span>
        <span style="font-size:10px;color:${dColor};font-weight:700">${demand}%</span>
        <span style="font-size:9px;color:var(--muted)">×${(1+(demand-100)*0.005).toFixed(2)}</span>
        <span style="font-size:9px;color:var(--muted)">棚${shelfStock[cat.key]}</span>
      </div>`;
    }).join('');

    modal.innerHTML = `
      <div class="modal-content" style="max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;max-width:480px">
        <div style="flex-shrink:0;padding:16px 16px 10px;border-bottom:1px solid var(--border)">
          <div class="modal-title">📊 市場動向</div>
        </div>
        <div style="flex:1;overflow-y:auto;padding:12px 16px">
        <div style="margin-bottom:6px">
          <canvas id="marketCanvas" width="440" height="200"
            style="width:100%;height:auto;background:var(--bg-canvas);border-radius:8px;display:block"></canvas>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center">
          <span style="font-size:10px;color:var(--text-disabled)">X軸：</span>
          ${[['全履歴',0],['直近30点',30],['直近15点',15],['直近5点',5]].map(([label,val])=>
            `<button onclick="window._marketSetX(${val})"
              style="padding:2px 8px;border-radius:8px;font-size:10px;cursor:pointer;
                border:1px solid ${_marketXRange===val?'var(--accent)':'var(--border-dark)'};
                background:${_marketXRange===val?'#0a1a2a':'transparent'};
                color:${_marketXRange===val?'var(--accent)':'var(--text-faint)'}">${label}</button>`
          ).join('')}
          <span style="font-size:10px;color:var(--text-disabled);margin-left:4px">Y軸：</span>
          ${[['固定','fixed'],['自動','auto']].map(([label,val])=>
            `<button onclick="window._marketSetY('${val}')"
              style="padding:2px 8px;border-radius:8px;font-size:10px;cursor:pointer;
                border:1px solid ${_marketYRange===val?'var(--gold)':'var(--border-dark)'};
                background:${_marketYRange===val?'#1a1400':'transparent'};
                color:${_marketYRange===val?'var(--gold)':'var(--text-faint)'}">${label}</button>`
          ).join('')}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
          ${legendHtml}
        </div>
        <div style="display:flex;gap:8px;font-size:11px;margin-bottom:10px">
          <div style="flex:1;background:var(--bg-deep);border-radius:6px;padding:8px;border:1px solid var(--bg-mid)">
            <div style="color:var(--muted);margin-bottom:3px">📡 流行中</div>
            <div style="color:var(--gold);font-weight:700">${trendActive ? trend.label : 'なし'}</div>
          </div>
          <div style="flex:1;background:var(--bg-deep);border-radius:6px;padding:8px;border:1px solid var(--bg-mid)">
            <div style="color:var(--muted);margin-bottom:3px">🔮 予測</div>
            <div style="color:#aaddff;font-weight:700">${predictionLabel}</div>
          </div>
        </div>
        <div style="font-size:10px;color:var(--text-disabled);text-align:right;margin-bottom:8px">
          表示: ${_marketXRange>0?Math.min(_marketXRange,hist.length):hist.length}点 / 全${hist.length}点 / 5分間隔
        </div>
        </div>
        <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border)">
          <button class="btn btn-secondary" style="width:100%"
            onclick="this.closest('.market-modal').remove()">閉じる</button>
        </div>
      </div>
    `;

    requestAnimationFrame(() => _drawMarketCanvas(hist, trendActive, trend));
  };

  // トグルコールバック
  window._marketToggle = key => {
    _marketVisible[key] = !_marketVisible[key];
    render();
  };
  window._marketSetX = val => {
    _marketXRange = val;
    render();
  };
  window._marketSetY = val => {
    _marketYRange = val;
    render();
  };

  render();
}
function checkShopSales() {
  const now = Date.now();
  let sold = false;
  gs.shop.shelves.forEach((shelf, idx)=>{
    if(!shelf) return;
    const elapsed = now - shelf.listedAt;
    // 販売タイマー80%超で客が来訪（まだ来ていない場合のみ）
    if(elapsed >= shelf.sellDuration * 0.8 && !shelf.visitor) {
      shelf.visitor = randomCustomer();
    }
    if(elapsed >= shelf.sellDuration) {
      const item = shelf.item;
      const price = itemPrice(item);
      gs.player.gold += price;
      const shopExp = Math.floor(price / 8);
      gs.shop.exp += shopExp;
      gs.shop.totalSales++;
      Analytics.firstSale(); // 初回販売完了を記録
      checkQuestProgress("sell", { gold: price, itemId: item.itemId, rarity: item.rarity });

      // 25%の確率で立ち寄りだけの客
      if(Math.random() < 0.25) {
        const browser = randomCustomer();
        const browseComment = BROWSE_COMMENTS[Math.floor(Math.random()*BROWSE_COMMENTS.length)];
        addShopLog("info", `${browser.icon}${browser.name}「${browseComment}」`);
      }

      const customer = randomCustomer();
      const comment = customer.comment[Math.floor(Math.random()*customer.comment.length)];
      const displayName = itemDisplayName(item);
      const _rCol = item.identified ? (RARITY_MASTER[item.rarity]?.color || 'var(--text-light)') : 'var(--unidentified)';
      const coloredName = `<span style="color:${_rCol};font-weight:700">${displayName}</span>`;

      // 常連ボーナス判定（この客が常連かつLv1以上）
      const reg = (gs.shop.regulars||[]).find(r => r.name === customer.name && r.lv >= 1);
      const regBonus = reg ? Math.floor(price * reg.bonusPct / 100) : 0;
      const finalPrice = price + regBonus;
      if(regBonus > 0) {
        gs.player.gold += regBonus; // 追加ボーナス分
        addShopLog("gold", `⭐ ${customer.icon}${customer.name}「${comment}」→【${coloredName}】${finalPrice}G（常連+${regBonus}G）`);
      } else {
        addShopLog("gold", `${customer.icon}${customer.name}「${comment}」→【${coloredName}】${price}G`);
      }
      notifySale(item, finalPrice); // 売却快感演出（S48-SALE）

      // 常連データ更新
      processRegularPurchase(customer, item);

      // 未鑑定品を売った場合：時間差クレームをスケジュール
      if(!item.identified) {
        scheduleComplaint(item, customer, price);
      }

      registerCollection(item); // 販売完了時に収集登録
      gs.shop.shelves[idx] = null;

      reduceDemand(item);
      updateTrend();

      while(gs.shop.exp >= gs.shop.nextExp) {
        gs.shop.exp -= gs.shop.nextExp;
        gs.shop.level++;
        gs.shop.nextExp = Math.floor(gs.shop.nextExp * 1.6);
        const extraShelf = (gs.player.rebirthSkills||[]).reduce((acc,id) => {
          const sk = REBIRTH_SKILL_MASTER[id];
          return acc + (sk?.effect?.extraShelf || 0);
        }, 0);
        const newSlots = gs.shop.level + 2 + extraShelf;
        while(gs.shop.shelves.length < newSlots) gs.shop.shelves.push(null);
        addShopLog("good", `🏪 ショップ Lv.${gs.shop.level}！陳列枠が増えた`);
      }
      sold = true;
    }
  });

  // クレーム発火チェック
  processComplaints();

  if(sold) { saveGame(); render(); }
}

// ─────────────────────────────────────────
// 売却快感システム (S48-SALE)
// checkShopSalesの売却確定時のみ呼ぶ。
// 他のshowGoldPop呼び出しには一切影響しない。
// ─────────────────────────────────────────
let _pendingSaleCount = 0; // 他タブ中の未通知売却数（rare以上）
let _bannerTimer      = null;

// メイン統合関数：checkShopSalesから呼ぶ
function notifySale(item, finalPrice) {
  _showGoldPopFixed(finalPrice);       // ① 位置固定goldPop
  _flashGoldDisplay(finalPrice);       // ② topBar発光+カウントアップ
  const rarity = item.identified ? item.rarity : "normal";
  if     (rarity === "legendary") { _showSaleBanner(item, finalPrice, "legendary"); _showLegendaryFlash(); setTimeout(() => _showLegendaryShareModal(item), 1000); }
  else if(rarity === "epic")      { _showSaleBanner(item, finalPrice, "epic"); }
  else if(rarity === "rare")      { _showSaleBanner(item, finalPrice, "rare"); }
  // ③ 他タブにいる時はバッジ表示（rare以上のみ）
  if(currentTab !== "shop" && rarity !== "normal") {
    _pendingSaleCount++;
    _updateShopTabBadge();
  }
}

// ① goldPop：topBar直下右に位置固定
function _showGoldPopFixed(amount) {
  const el = document.createElement("div");
  el.className = "goldPop";
  const isPos = (typeof amount === "number" ? amount : 0) >= 0;
  el.style.cssText = `right:14px;left:auto;top:52px;font-size:18px;color:${isPos?"var(--gold)":"var(--red)"};`;
  el.textContent = (isPos ? "+" : "") + (typeof amount === "number" ? amount.toLocaleString() : amount) + "G";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// ② topBar発光 + ゴールドカウントアップ（1000G以上のみ）
function _flashGoldDisplay(addAmount) {
  const el = document.getElementById("goldValue");
  if(!el) return;
  el.classList.remove("gold-flash");
  void el.offsetWidth; // reflow強制でアニメをリセット
  el.classList.add("gold-flash");
  setTimeout(() => { if(el) el.classList.remove("gold-flash"); }, 700);
  if(typeof addAmount !== "number" || addAmount < 1000) return;
  const endVal   = gs.player.gold;
  const startVal = endVal - addAmount;
  const duration = Math.min(500, 150 * Math.log10(addAmount));
  const startTime = performance.now();
  function tick(now) {
    if(!el || !el.isConnected) return; // render()でDOM再生成された場合は中断
    const t      = Math.min(1, (now - startTime) / duration);
    const eased  = 1 - Math.pow(1 - t, 3); // ease-out cubic
    el.textContent = Math.round(startVal + addAmount * eased).toLocaleString();
    if(t < 1) requestAnimationFrame(tick);
    else el.textContent = endVal.toLocaleString();
  }
  requestAnimationFrame(tick);
}

// ③ 売却バナー（スライドイン）
function _showSaleBanner(item, price, tier) {
  // ボス演出・レベルアップ演出中はバナーを出さない（体験を汚さない）
  if(document.querySelector(".boss-intro-overlay, .lvup-overlay")) return;
  const existing = document.querySelector(".sale-banner");
  if(existing) {
    existing.remove();
    if(_bannerTimer) { clearTimeout(_bannerTimer); _bannerTimer = null; }
  }
  const m = ITEM_MASTER[item.itemId];
  if(!m) return;
  const baseName    = item.identified ? m.name : "謎の品";
  const enhSuffix   = (item.identified && item.enhLv > 0) ? `+${item.enhLv}` : "";
  const displayName = baseName + enhSuffix;
  const rarityColor = { rare:"#7ec8ff", epic:"#d4aaff", legendary:"var(--gold)" }[tier] || "var(--gold)";
  const banner = document.createElement("div");
  banner.className = `sale-banner ${tier}-banner`;
  if(tier === "legendary") {
    banner.innerHTML =
      `<div style="font-size:11px;letter-spacing:1px;opacity:0.8">💎 伝説装備 取引成立</div>` +
      `<div style="color:${rarityColor};font-weight:700;font-size:16px">${displayName}</div>` +
      `<div class="banner-price">${price.toLocaleString()} G</div>`;
  } else {
    const icon = tier === "epic" ? "✨" : "📦";
    banner.innerHTML =
      `<div>${icon} <span style="color:${rarityColor}">${displayName}</span> が売れた</div>` +
      `<div class="banner-price" style="color:${rarityColor}">${price.toLocaleString()}G</div>`;
  }
  document.body.appendChild(banner);
  const ms = tier === "legendary" ? 4000 : tier === "epic" ? 3000 : 2000;
  _bannerTimer = setTimeout(() => {
    if(banner.parentNode) {
      banner.style.transition = "opacity 0.4s, top 0.4s";
      banner.style.opacity = "0";
      banner.style.top = "-80px";
      setTimeout(() => { if(banner.parentNode) banner.remove(); }, 400);
    }
    _bannerTimer = null;
  }, ms);
}
