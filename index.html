  },
  explore: {
    label: "探索",
    icon: "🗺",
    gen(ng) {
      const maxBossFloor = Math.max(...Object.values(BOSS_MASTER).map(b => b.floor));
      const raw = 1 + Math.floor(Math.random() * 3) + ng;
      const floor = Math.min(raw, maxBossFloor, gs.dungeon.clearedFloor + 2 || maxBossFloor);
      const reward = 500 + floor * 150 + Math.floor(ng * 200);
      return { type:"explore", floor, reward,
               desc:`${floor}階層をクリアする` };

  },
  enhance_item: {
    // 特定レアリティの装備を指定強化値まで強化する依頼
    label: "強化",
    icon: "⚒",
    gen(ng) {
      const rarities = ["normal","rare","epic","legendary"];
      const rarity   = rarities[Math.min(Math.floor(ng / 2), 3)];
      const minEnh   = 3 + Math.floor(Math.random() * 4) + Math.floor(ng * 1.5); // 3〜10+
      const targetEnh = Math.min(minEnh, ENHANCE_MAX);
      const reward   = 600 + targetEnh * 150 + Math.floor(ng * 400);
      return { type:"enhance_item", rarity, targetEnh, reward,
               desc:`${RARITY_MASTER[rarity].label}装備を+${targetEnh}以上に強化` };
    },
    check(q) {
      return gs.inventory.some(i =>
        i.rarity === q.rarity && (i.enhLv||0) >= q.targetEnh
      ) || Object.values(gs.equipped).some(uid => {
        const i = gs.inventory.find(x => x.uid === uid);
        return i && i.rarity === q.rarity && (i.enhLv||0) >= q.targetEnh;
      });
    }
  },
  collect_theme: {
    // 特定コレクションテーマの★N以上を達成する依頼
    label: "収集",
    icon: "📖",
    gen(ng) {
      const themeIds = Object.keys(COLLECTION_THEME);
      const themeId  = themeIds[Math.floor(Math.random() * themeIds.length)];
      const theme    = COLLECTION_THEME[themeId];
      const rarities = ["normal","rare","epic","legendary"];
      const rarity   = rarities[Math.min(Math.floor(ng / 3), 3)];
      const star     = Math.min(1 + Math.floor(Math.random() * 3) + Math.floor(ng * 0.5), ENHANCE_MAX);
      const reward   = 800 + star * 200 + Math.floor(ng * 500);
      return { type:"collect_theme", themeId, rarity, star, reward,
               desc:`【${theme.icon}${theme.title}】(${RARITY_MASTER[rarity].label})の★${star}を達成` };

    check(q) {
      const theme = COLLECTION_THEME[q.themeId];
      if(!theme) return false;
      const done = gs.collection?.completed || [];
      const parts = (theme.isAcc || theme.isSlot) ? ["all"] : ["weapon","armor","acc","all"];
      // いずれかのpartで★star以上を達成していればOK
      return parts.some(part => done.includes(makeColId(q.themeId, part, q.rarity, q.star)));
    }
  },
  bulk_enhance: {
    // 一括強化でN回強化する依頼（一括強化機能の活用促進）
    label: "一括",
    icon: "⚡",
    gen(ng) {
      const count  = 5 + Math.floor(Math.random() * 6) + Math.floor(ng * 2); // 5〜20+
      const reward = 400 + count * 80 + Math.floor(ng * 300);
      return { type:"bulk_enhance", count, progress:0, reward,
               desc:`一括強化で合計${count}回強化する` };

// デイリーミッションのマスターデータ（3種固定・軽量なトリガーのみ）
// LOGIC-4: 配列形式に変更（5種定義・毎日ランダム2種を抽選）
// 追加種別: daily_sell_rare（Rare以上を売る）/ daily_sell_count（何個でも売る）
const DAILY_MISSION_TYPES = [
  {
    type: "daily_sell_gold",
    icon: "💰", label: "売上",
    gen() {
      const target = [500, 1000, 2000][Math.floor(Math.random() * 3)];
      const reward = Math.floor(target * 0.15 + 100);
      return { type:"daily_sell_gold", target, progress:0, reward, claimed:false,
               desc:`本日の売上 ${target.toLocaleString()}G 達成` };
    },
    update(m, trigger, payload) {
      if(trigger === "sell" && payload.gold) {
        return { ...m, progress: Math.min(m.progress + payload.gold, m.target) };
      }
      return m;
    },
    isDone(m) { return m.progress >= m.target; },
    progressText(m) { return `${Math.min(m.progress, m.target).toLocaleString()}/${m.target.toLocaleString()}G`; },
  },
  {
    type: "daily_enter_dungeon",
    icon: "⚔", label: "探索",
    gen() {
      const target = [1, 2, 3][Math.floor(Math.random() * 3)];
      const reward = 100 + target * 80;
      return { type:"daily_enter_dungeon", target, progress:0, reward, claimed:false,
               desc:`ダンジョンに${target}回潜入する` };
    },
    update(m, trigger, payload) {
      if(trigger === "dungeon_enter") {
        return { ...m, progress: Math.min(m.progress + 1, m.target) };
      }
      return m;
    },
    isDone(m) { return m.progress >= m.target; },
    progressText(m) { return `${m.progress}/${m.target}回`; },
  },
  {
    type: "daily_enhance",
    icon: "⚒", label: "強化",
    gen() {
      const target = [3, 5, 8][Math.floor(Math.random() * 3)];
      const reward = 100 + target * 25;
      return { type:"daily_enhance", target, progress:0, reward, claimed:false,
               desc:`装備を${target}回強化する` };
    },
    update(m, trigger, payload) {
      if(trigger === "enhance" && payload.count) {
        return { ...m, progress: Math.min(m.progress + payload.count, m.target) };
      }
      return m;
    },
    isDone(m) { return m.progress >= m.target; },
    progressText(m) { return `${m.progress}/${m.target}回`; },
  },
  {
    // 新種別①: Rare以上のアイテムをN個売却する
    type: "daily_sell_rare",
    icon: "💎", label: "希少売却",
    gen() {
      const target = [1, 2, 3][Math.floor(Math.random() * 3)];
      const reward = 150 + target * 100;
      return { type:"daily_sell_rare", target, progress:0, reward, claimed:false,
               desc:`Rare以上の装備を${target}個売却する` };
    },
    update(m, trigger, payload) {
      // sellトリガー・rarity が rare/epic/legendary のとき1件カウント
      if(trigger === "sell" && ["rare","epic","legendary"].includes(payload.rarity)) {
        return { ...m, progress: Math.min(m.progress + 1, m.target) };
      }
      return m;
    },
    isDone(m) { return m.progress >= m.target; },
    progressText(m) { return `${m.progress}/${m.target}個`; },
  },
  {
    // 新種別②: アイテムをN個売却する（レアリティ問わず）
    type: "daily_sell_count",
    icon: "🏪", label: "販売数",
    gen() {
      const target = [3, 5, 8][Math.floor(Math.random() * 3)];
      const reward = 80 + target * 20;
      return { type:"daily_sell_count", target, progress:0, reward, claimed:false,
               desc:`アイテムを${target}個売却する` };
    },
    update(m, trigger, payload) {
      // sellトリガー・goldが正値（実際の販売）のとき1件カウント
      if(trigger === "sell" && payload.gold > 0) {
        return { ...m, progress: Math.min(m.progress + 1, m.target) };
      }
      return m;
    },
    isDone(m) { return m.progress >= m.target; },
    progressText(m) { return `${m.progress}/${m.target}個`; },
  },
];

// DAILY_MISSION_TYPESをtypeキーで引くヘルパー（配列化に伴い全参照箇所で使用）
function _getDailyDef(type) {
  return DAILY_MISSION_TYPES.find(d => d.type === type) || null;
}

// 翌00:00のタイムスタンプを返す（ローカル時刻基準）
function _nextMidnight() {
  const d = new Date();
  d.setHours(24, 0, 0, 0);  // 翌日の00:00:00.000
  return d.getTime();
}

// デイリーミッション初期化・リセット判定（init()から呼ぶ）
function initDailyMissions() {
  if(!gs || !gs.meta) return false;
  // 未初期化ガード（loadGame補完が走らなかった場合の安全弁）
  if(!Array.isArray(gs.meta.dailyMissions)) gs.meta.dailyMissions = [];
  if(!gs.meta.dailyResetAt) gs.meta.dailyResetAt = 0;

  const now = Date.now();
  // リセット時刻を過ぎていたら新しいミッションを生成
  if(now >= gs.meta.dailyResetAt) {
    // 達成済みで未受取のミッションは自動付与（00:00をまたいで報酬が消えるのを防ぐ）
    let autoClaimed = false;
    (gs.meta.dailyMissions || []).forEach(m => {
      const def = _getDailyDef(m.type);
      if(def && def.isDone(m) && !m.claimed) {
        gs.player.gold += m.reward;
        showGoldPop(m.reward); // UX-2: claimDailyMission（手動受取）と演出を統一
        addLog("item", `📅 デイリー自動受取：「${m.desc}」→ ${goldSpan("+" + m.reward.toLocaleString() + "G")}`);
        autoClaimed = true;
      }
    });
    // LOGIC-4: 5種からランダム2種を抽選して生成（毎日変化するミッション）
    // DAILY-RANDOM: Fisher-Yatesシャッフルで一様分布を保証（S44）
    const _pool = [...DAILY_MISSION_TYPES];
    for(let _i = _pool.length - 1; _i > 0; _i--) {
      const _j = Math.floor(Math.random() * (_i + 1));
      [_pool[_i], _pool[_j]] = [_pool[_j], _pool[_i]];
    }
    gs.meta.dailyMissions = _pool.slice(0, 2).map(d => d.gen());
    gs.meta.dailyResetAt = _nextMidnight();
    // S53: リセット時にログ1行追加（旧セーブから2件化後の混乱軽減）
    addShopLog("info", `📅 デイリーミッションが更新されました（本日の2件）`);
    saveGame();
    return autoClaimed; // 自動受取発生時はtrueを返す（呼び出し元でrender()を判断）
  }
  return false;
}

// デイリーミッション進捗チェック（トリガー発火時に呼ぶ）
function checkDailyMissions(trigger, payload) {
  if(!gs?.meta?.dailyMissions?.length) return;
  let changed = false;
  gs.meta.dailyMissions = gs.meta.dailyMissions.map(m => {
    if(m.claimed) return m;  // 受取済みはスキップ
    const def = _getDailyDef(m.type);
    if(!def) return m;
    // 達成瞬間を検出するために更新前の isDone を保持
    const wasDone = def.isDone(m);
    const updated = def.update(m, trigger, payload);
    if(updated !== m) {
      changed = true;
      // 今回の更新で達成に変わった瞬間のみトースト通知（S52）
      if(!wasDone && def.isDone(updated)) {
        showDailyToast(updated);
      }
      return updated;
    }
    return m;
  });
  if(changed) saveGame();
}

// デイリーミッション達成トースト（S52）
// 達成した瞬間に1回だけ表示。タップで依頼モーダルを開く。
let _dailyToastTimer = null;
function showDailyToast(mission) {
  // 既存トーストがあれば即撤去
  const existing = document.querySelector('.daily-toast');
  if(existing) {
    if(_dailyToastTimer) { clearTimeout(_dailyToastTimer); _dailyToastTimer = null; }
    existing.remove();
  }

  const toast = document.createElement('div');
  toast.className = 'daily-toast';
  toast.innerHTML = `
    <div style="font-size:22px;flex-shrink:0;width:30px;text-align:center">📅</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:10px;color:var(--green);letter-spacing:1px;margin-bottom:2px;font-weight:700">✅ デイリー達成！</div>
      <div style="font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${mission.desc}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:1px">報酬 <span style="color:var(--gold);font-weight:700">+${(mission.reward||0).toLocaleString()}G</span>　タップして受取</div>
    </div>
    <div style="font-size:16px;color:var(--green);flex-shrink:0">›</div>
  `;
  document.body.appendChild(toast);

  toast.addEventListener('click', () => {
    if(_dailyToastTimer) { clearTimeout(_dailyToastTimer); _dailyToastTimer = null; }
    toast.classList.remove('visible');
    setTimeout(() => { if(toast.parentNode) toast.remove(); }, 380);
    openQuestModal();
  });

  requestAnimationFrame(() => toast.classList.add('visible'));

  _dailyToastTimer = setTimeout(() => {
    toast.classList.remove('visible');
    setTimeout(() => { if(toast.parentNode) toast.remove(); }, 380);
    _dailyToastTimer = null;
  }, 5000);
}

// デイリーミッション報酬受取
function claimDailyMission(idx) {
  const m = gs.meta.dailyMissions?.[idx];
  if(!m || m.claimed) return;
  const def = _getDailyDef(m.type);
  if(!def || !def.isDone(m)) return;
  gs.meta.dailyMissions[idx] = { ...m, claimed: true };
  gs.player.gold += m.reward;
  showGoldPop(m.reward);
  addLog("item", `📅 デイリー達成！「${m.desc}」→ ${goldSpan("+" + m.reward.toLocaleString() + "G")}`);
  saveGame();
  render();
}

function generateQuest() {
  const ng = gs.dungeon.ng || 0;
  const allTypes = Object.keys(QUEST_TYPES);
  const existing = gs.quests || [];
  const usedTypes = existing.map(q => q.type);

  // 同種別は完全に除外。全種別使用済みの場合のみ重複を許可
  const available = allTypes.filter(t => !usedTypes.includes(t));
  const pool = available.length > 0 ? available : allTypes;
  const chosen = pool[Math.floor(Math.random() * pool.length)];

  // explore：既存クエストと同じfloorにならないよう再試行
  let q;
  const usedFloors = existing.filter(q => q.type === "explore").map(q => q.floor);
  for(let attempt = 0; attempt < 5; attempt++) {
    q = QUEST_TYPES[chosen].gen(ng);
    if(chosen !== "explore" || !usedFloors.includes(q.floor)) break;
  }
  q.id = `q_${Date.now()}_${Math.random().toString(36).slice(2,5)}`;
  return q;
}

function initQuests() {
  if(!gs.quests) {
    gs.quests = [];
    while(gs.quests.length < 3) gs.quests.push(generateQuest());
  }
}

function checkQuestProgress(trigger, payload={}) {
  initQuests();
  let changed = false;
  gs.quests = gs.quests.map(q => {
    if(q.done) return q;
    // earn_gold：売上加算
    if(q.type === "earn_gold" && trigger === "sell" && payload.gold) {
      q = { ...q, progress: (q.progress||0) + payload.gold };
    }
    // sell_item：アイテム売却
    if(q.type === "sell_item" && trigger === "sell" && payload.itemId === q.itemId && payload.rarity === q.rarity) {
      q = { ...q, progress: (q.progress||0) + 1 };
    }
    // bulk_enhance：一括強化の強化回数を加算
    if(q.type === "bulk_enhance" && trigger === "enhance" && payload.count) {
      q = { ...q, progress: (q.progress||0) + payload.count }
    }
    // shelf_rarity・explore・enhance_item・collect_theme はリアルタイムチェック
    if(QUEST_TYPES[q.type].check(q)) {
      q = { ...q, done: true };
      gs.player.gold += q.reward;
      showGoldPop(q.reward);
      addLog("item", `🎉 依頼達成！「${q.desc}」→ ${goldSpan("+" + q.reward.toLocaleString() + "G")}`);
      changed = true;
    }
    return q;
  });
  if(changed) {
    // 達成済みを除去して補充
    gs.quests = gs.quests.filter(q => !q.done);
    while(gs.quests.length < 3) gs.quests.push(generateQuest());
    saveGame();
    render();
  }
  // B1-DAILY: デイリーミッション進捗を同トリガーで更新（毎秒ループ起因の shelf_check は除外）
  if(trigger !== "shelf_check") checkDailyMissions(trigger, payload);
}

function generateMap(floor) {
  const len = 14 + floor * 3;
  const skills = gs?.player?.skills || [];
  const hasTreasureSense = skills.includes("treasure_sense");

  // 基本プール（shortcutを廃止しomairyに置き換え）
  let pool = hasTreasureSense
    ? ["battle","battle","battle","treasure","treasure","trap","rest","windfall","shrine","omen","relic"]
    : ["battle","battle","battle","treasure","trap","rest","windfall","shrine","omen","omen","relic"];

  // 財宝感知スキル：宝箱マス出現率+10%ごとに追加1枠
  const r = gs ? calcStats(gs) : null;
  const extraTreasure = r ? Math.floor((r.skillTreasureBonus||0) / 10) : 0;
  for(let i = 0; i < extraTreasure; i++) pool.push("treasure");

  // ADV-5: 階層特殊ルール（個性強化版）
  if(floor === 2) {
    // 2階: 罠多め・omen少なめ
    pool = [...pool, "trap"];
    pool = pool.filter((e,i,a) => e !== "omen" || a.indexOf(e) === i); // omen1枠のみ
  } else if(floor === 3) {
    // 3階: 宝箱増・休息なし（探索報酬特化）
    pool = pool.filter(e => e !== "rest");
    pool = [...pool, "treasure"];
  } else if(floor === 4) {
    // 4階: 罠1枠増・windfall増（厳しさの中の一筋の光）
    pool = [...pool, "trap", "windfall"];
  } else if(floor === 5) {
    // 5階: 溶岩マス追加・罠増・宝箱増（ハイリスクハイリターン）
    pool = [...pool, "lava", "lava", "trap", "treasure"];
    pool = pool.filter(e => e !== "rest"); // 休息なし
  } else if(floor >= 6 && floor <= 8) {
    // 6〜8階（観測外領域・前半）: 溶岩増・罠増・windfall増・休息なし
    pool = [...pool, "lava", "lava", "lava", "trap", "trap", "windfall"];
    pool = pool.filter(e => e !== "rest");
  } else if(floor >= 9) {
    // 9〜10階（観測外領域・深部）: 溶岩多・罠多・休息なし・祠増
    pool = [...pool, "lava", "lava", "lava", "trap", "trap", "shrine", "windfall"];
    pool = pool.filter(e => e !== "rest");
  }

  const mid = Array.from({length:len}, ()=>
    pool[Math.floor(Math.random()*pool.length)]
  );
  if(getBossIdForFloor(floor)) mid.push("boss");
  return mid;
}

function enterDungeon(floor) {
  if(gs.dungeon.active) return;
  const targetFloor = floor || gs.dungeon.selectedFloor || gs.dungeon.floor;
  const prevAttempts = gs.dungeon.attempts || {};
  // consumables は別スロット管理のためlootから除外（既存lootからも除去）
  const CARRY_IDS = new Set(["herb","potion","antidote","omamori"]);
  const prevLoot = (gs.dungeon.loot || []).filter(i => !CARRY_IDS.has(i.itemId));
  const prevConsumables = gs.dungeon.consumables || {};
  // 傭兵雇用コスト徴収（出発時）
  const prevMercenary = gs.dungeon.mercenary || null;
  if(prevMercenary) {
    const mDef = MERCENARY_MASTER[prevMercenary.id];
    const mCost = mDef ? calcMercCost(mDef.cost(targetFloor)) : 0;
    if(mCost > 0 && gs.player.gold >= mCost) {
      gs.player.gold -= mCost;
      addLog("item", `⚔ ${mDef.icon}${mDef.name}の報酬 -${mCost.toLocaleString()}G`);
    } else if(mCost > 0) {
      // Gold不足なら解散
      addLog("item", `⚔ ${mDef.icon}${mDef.name}はGold不足で解散した`);
      prevMercenary && (gs.dungeon.mercenary = null);
    }
  }
  const _prevOmamoriPriority = gs.dungeon.omamoriPriority || "low";
  const _prevAutoHeal        = gs.dungeon.autoHeal || { enabled:false, threshold:30 };
  gs.dungeon = {
    active:true,
    floor: gs.dungeon.floor,
    activeFloor: targetFloor,
    clearedFloor: gs.dungeon.clearedFloor,
    ng: gs.dungeon.ng,
    selectedFloor: targetFloor,
    attempts: prevAttempts,
    map: generateMap(targetFloor),
    progress:0, loot: prevLoot, combat:null,
    consumables: prevConsumables,
    isReplay: targetFloor < gs.dungeon.floor,
    mercenary: prevMercenary,
    omamoriPriority: _prevOmamoriPriority,  // 消費順設定を引き継ぐ
    autoHeal: _prevAutoHeal,                // 自動回復設定を引き継ぐ
  };
  gs.player.status = "dungeon";
  if(gs.achievements?.stats) gs.achievements.stats.totalDungeonEnter = (gs.achievements.stats.totalDungeonEnter||0) + 1;
  // お守り自動使用（優先度設定に従い1個消費）
  const _omamoriSlots = gs.dungeon.consumables?.omamori || [];
  const _priority = gs.dungeon.omamoriPriority || "low";
  const _rarityOrder = {normal:0,rare:1,epic:2,legendary:3};
  const _sorted = [..._omamoriSlots].filter(s=>s.count>0).sort((a,b)=>
    _priority==="low" ? (_rarityOrder[a.rarity]||0)-(_rarityOrder[b.rarity]||0)
                      : (_rarityOrder[b.rarity]||0)-(_rarityOrder[a.rarity]||0)
  );
  if(_sorted.length > 0) {
    const _eff = OMAMORI_EFFECTS[_sorted[0].rarity] || OMAMORI_EFFECTS.normal;
    _sorted[0].count -= 1;
    if(_sorted[0].count <= 0) {
      gs.dungeon.consumables.omamori = _omamoriSlots.filter(s=>s.count>0);
      if(gs.dungeon.consumables.omamori.length === 0) delete gs.dungeon.consumables.omamori;
    }
    addLog("item", `🪬 ${RARITY_MASTER[_sorted[0].rarity]?.label||""}加護のお守りが発動！${_eff.label}`);
  }
  // ADV-5: 4階は5マス進んだ後に毒状態（即時付与から猶予を持たせる）
  if(targetFloor >= 4) {
    gs.dungeon._floor4PoisonAt = 5; // 5マス後に発症
  }
  // セッション追跡（リザルト用）
  gs.dungeon._session = {
    startGold:      gs.player.gold,
    kills:          0,
    bossKilled:     false,
    consumedItems:  [],
    startDepth:     0,
    maxDepth:       0,
    earnedExp:      0,
    totalDmgGiven:  0,
    totalDmgTaken:  0,
    maxDmgGiven:    0,
  };
  // 永続スキル：潜入時HP全回復
  if((gs.player.rebirthSkills||[]).some(id => REBIRTH_SKILL_MASTER[id]?.effect?.fullHealOnEnter)) {
    gs.player.hp = gs.player.maxHp;
    addLog("item", "✨ 深淵の再生：HP全回復");
  }
  // 挑戦回数カウント
  const fkey = String(targetFloor);
  gs.dungeon.attempts[fkey] = (gs.dungeon.attempts[fkey] || 0) + 1;
  const attemptNum = gs.dungeon.attempts[fkey];
  const ngLabel = gs.dungeon.ng > 0 ? `[フェーズ${gs.dungeon.ng + 1}]` : "";
  const attemptLabel = attemptNum > 1 ? ` (${attemptNum}回目)` : "";
  // 見張り番：初撃回避フラグをセット
  gs.dungeon._firstHitAvoided = false;
  if(rollFirstHitAvoid()) {
    gs.dungeon._watcherReady = true;
    addLog("item", `👁 見張り番が異変を察知。最初の一撃を回避する準備ができた`);
  } else {
    gs.dungeon._watcherReady = false;
  }
  addLog("item", `▶ ${targetFloor}階層に潜入した${ngLabel}${attemptLabel}`);
  Analytics.firstEnter(); // 初回潜入を記録
  // B1-DAILY: 潜入トリガー
  checkDailyMissions("dungeon_enter", {});
  saveGame();
  render();
}

function canRebirth() {
  return gs.dungeon.ng >= 1 && gs.player.level >= 50;
}

function calcRebirthPoints() {
  // 転生時の獲得RP = floor(Lv^0.8 + ng×2)
  const bonusSp = (gs.player.rebirthSkills||[]).reduce((acc,id) => {
    const sk = REBIRTH_SKILL_MASTER[id];
    return acc + (sk?.effect?.bonusSp || 0);
  }, 0);
  return Math.floor(Math.pow(gs.player.level, 0.8) + gs.dungeon.ng * 2) + bonusSp;
}

function doRebirth() {
  const rp = calcRebirthPoints();
  const wr = (gs.player.worldRank || 0) + 1;

  // 引き継ぐもの
  const keepGold       = gs.player.gold;
  const keepShop       = gs.shop;
  const keepInventory  = gs.inventory;
  const keepEquipped   = gs.equipped;
  const keepRbSkills   = gs.player.rebirthSkills || [];
  const keepRbPoints   = (gs.player.rebirthPoints || 0) + rp;
  const keepLootSlots  = gs.player.lootSlots || 0;
  const keepAbyssFloor = gs.player.abyssFloorCleared || 0;

  // リセット（DEFAULT_STATEのplayer部分に戻す）
  gs.player = {
    level:1, exp:0, nextExp:100,
    base:{ str:5, def:5, agi:5, vit:5, int:5, luk:5 },
    hp:0, maxHp:0, mp:0, maxMp:0,
    gold: keepGold,
    status:"idle",
    skills:[],
    skillPoints: 1 + (gs.player.rebirthSkills||[]).reduce((acc,id) => {
      return acc + (REBIRTH_SKILL_MASTER[id]?.effect?.bonusSp || 0);
    }, 0),  // 転生後のSP初期値（bonusSp分を加算）
    worldRank:     wr,
    rebirthPoints: keepRbPoints,
    rebirthSkills: keepRbSkills,
    lootSlots:     keepLootSlots,
    abyssFloorCleared: keepAbyssFloor,
  };
  gs.dungeon = {
    active:false, floor:1,
    clearedFloor:0, ng:0, selectedFloor:1,
    attempts:{}, map:[], progress:0, loot:[], combat:null,
  };
  gs.inventory = keepInventory;
  gs.equipped  = keepEquipped;
  gs.shop      = keepShop;

  recalcHpMp(gs);
  gs.player.hp = gs.player.maxHp;
  gs.player.mp = gs.player.maxMp;
  saveGame();
  render();
  addLog("item", `🌟 転生！転生回数 ${wr} に到達。永続SP +${rp}`);

  if(wr === 100 && (gs.player.abyssFloorCleared || 0) === 0) {

        "深淵の意思を目指して進め。",

      badge: "称号「深淵の観測者」",

    _showRebirthMilestoneModal({

      color: "#818cf8",

        "転生200回——もはや深淵すら",

// セーブデータからレトロアクティブに実績達成を判定・反映（loadGame後に1回のみ実行）
function retroCheckAchievements() {
  if(!gs.achievements) return;
  // カウンタで補完できる値をセーブデータから推定
  const stats = gs.achievements.stats;

  // 敵撃破：セーブデータに既存カウントがなければshopLv/playerLvから推定しない（0のまま）
  // ボス撃破：clearedFloorから最低値を推定
  if((stats.bossKills||0) === 0 && (gs.dungeon.clearedFloor||0) > 0) {
    // クリアしたフロア分×周回数でボス撃破最低値を推定
    const ng = gs.dungeon.ng || 0;
    stats.bossKills = Math.max(stats.bossKills||0, gs.dungeon.clearedFloor + ng * 4);
  }

  // 潜入回数：attemptsの合計から推定
  if((stats.totalDungeonEnter||0) === 0 && gs.dungeon.attempts) {
    const total = Object.values(gs.dungeon.attempts).reduce((s,v)=>s+v,0);
    if(total > 0) stats.totalDungeonEnter = total;
  }

  // 常連客購入数：各常連客のpurchasesから合計
  if((stats.totalRegularBuys||0) === 0 && (gs.shop.regulars||[]).length > 0) {
    const total = gs.shop.regulars.reduce((s,r)=>s+(r.purchases||0),0);
    if(total > 0) stats.totalRegularBuys = total;
  }

  // カウンタ不要な実績をチェックして自動付与（報酬なし・サイレント）
  const claimed = gs.achievements.claimed;
  ACHIEVEMENT_MASTER.forEach(a => {
    if(a.ranked) return;  // ランク制は対象外（カウンタ依存が多い）
    if(claimed.includes(a.id)) return;
    try {
      if(a.check()) claimed.push(a.id);
    } catch(e) { /* 安全のため無視 */ }
  });
}

// 実績の未受取チェック（通知バッジ用）
function hasUnclaimedAchievement() {
  const claimed = gs.achievements?.claimed || [];
  return ACHIEVEMENT_MASTER.some(a => !claimed.includes(a.id) && a.check());
}

// ─────────────────────────────────────────
// 実績解除トースト (S49-ACH)
// claimAchievement から呼ぶ。retroCheckAchievements（起動時サイレント付与）からは呼ばない。
// キュー制で複数同時解除を順次表示。上限3件でスパムを防止。
// ─────────────────────────────────────────
let _achToastQueue  = [];
let _achToastActive = false;

function showAchievementToast(id) {
  const a = ACHIEVEMENT_MASTER.find(x => x.id === id);
  if(!a) return;
  // 処理中含む総数が3件を超えたら追加しない
  const totalInFlight = _achToastQueue.length + (_achToastActive ? 1 : 0);
  if(totalInFlight >= 3) return;
  _achToastQueue.push(id);
  if(!_achToastActive) _processAchToastQueue();
}

function _processAchToastQueue() {
  if(_achToastQueue.length === 0) { _achToastActive = false; return; }
  _achToastActive = true;
  const id = _achToastQueue.shift();
  const a  = ACHIEVEMENT_MASTER.find(x => x.id === id);
  if(!a) { _processAchToastQueue(); return; }

  const toast = document.createElement("div");
  toast.className = "ach-toast";
  toast.innerHTML = `
    <div style="font-size:24px;flex-shrink:0;width:32px;text-align:center">${a.icon}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:10px;color:var(--gold);letter-spacing:1px;margin-bottom:2px">🏆 実績解除</div>
      <div style="font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.name}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:1px">${a.desc}</div>
    </div>
    <div style="font-size:16px;color:var(--muted);flex-shrink:0">›</div>
  `;
  document.body.appendChild(toast);

  // タップで実績モーダルを開く
  toast.addEventListener("click", () => {
    document.querySelectorAll(".modal-overlay").forEach(m => m.remove());
    openAchievementModal();
    _dismissAchToast(toast);
  });

  // スライドイン（次フレームで適用しないとtransitionが効かない）
  requestAnimationFrame(() => toast.classList.add("visible"));

  // 4500ms後に自動フェードアウト
  toast._achTimer = setTimeout(() => _dismissAchToast(toast), 4500);
}

function _dismissAchToast(toast) {
  if(toast._achTimer) { clearTimeout(toast._achTimer); toast._achTimer = null; }
  toast.classList.remove("visible");
  setTimeout(() => {
    if(toast.parentNode) toast.remove();
    _processAchToastQueue(); // 次のキューを処理
  }, 380); // transitionの0.35s + 余裕
}

// 実績報酬を受け取る
function claimAchievement(id) {
  const a = ACHIEVEMENT_MASTER.find(x => x.id === id);
  if(!a) return;
  if(!a.check()) return;
  if((gs.achievements.claimed||[]).includes(id)) return;
  gs.achievements.claimed.push(id);
  const lines = [];
  if(a.reward.gold) {
    gs.player.gold += a.reward.gold;
    showGoldPop(a.reward.gold);
    lines.push(`${a.reward.gold.toLocaleString()}G`);
  }
  (a.reward.items||[]).forEach(r => {
    for(let i = 0; i < r.count; i++) {
      gs.inventory.push({
        uid: uuid(), itemId: r.id, rarity: materialRarity(r.id),
        demand:100, affixes:[], cursed:false, curse:null, identified:true, enhLv:0, statOverride:null, locked:false,
      });
    }
    const m = ITEM_MASTER[r.id];
    lines.push(`${m?.icon||""}${m?.name||r.id} ×${r.count}`);
  });
  addLog("item", `🏆 実績【${a.name}】達成！ 報酬: ${lines.join(" / ")}`);
  showAchievementToast(id); // トースト通知（S49-ACH）
  saveGame();
  render();
}

function openAchievementModal() {
  window._achCat = "all";
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
  const body = document.createElement("div");
  body.className = "modal-content";
  body.style.cssText = "max-height:85vh;display:flex;flex-direction:column;padding:0;overflow:hidden;";
  overlay.appendChild(body);
  document.body.appendChild(overlay);

  const refresh = () => {
    const claimed = gs.achievements?.claimed || [];

    // ランク制実績：同じrankBaseは「次のランク1件のみ」を代表として表示
    // 表示順：ランク制（数量系）→ 単発系
    const rankBaseShown = new Map();
    const rankedList = [];
    const singleList = [];
    const catFilter = window._achCat;

    ACHIEVEMENT_MASTER.forEach(a => {
      if(catFilter !== "all" && a.cat !== catFilter) return;
      if(a.ranked) {
        const base = a.rankBase;
        if(!rankBaseShown.has(base)) {
          const maxClaimedRank = ACHIEVEMENT_MASTER
            .filter(x => x.rankBase === base && claimed.includes(x.id))
            .reduce((m, x) => Math.max(m, x.rank), 0);
          const nextRank = ACHIEVEMENT_MASTER.find(x => x.rankBase === base && x.rank === maxClaimedRank + 1);
          if(nextRank) {
            rankBaseShown.set(base, nextRank); rankedList.push(nextRank);
          } else if(maxClaimedRank > 0) {
            // S55: Rank最大（50）到達済み → 最大ランクエントリを引き続き表示
            const maxEntry = ACHIEVEMENT_MASTER.find(x => x.rankBase === base && x.rank === maxClaimedRank);
            if(maxEntry) { rankBaseShown.set(base, maxEntry); rankedList.push(maxEntry); }
          }
        }
      } else {
        singleList.push(a);
      }
    });
    // 完了済みを末尾に移動（ランク制・単発それぞれ内で未完了→完了の順）
    const sortByDone = (list) => [
      ...list.filter(a => !claimed.includes(a.id)),
      ...list.filter(a =>  claimed.includes(a.id)),
    ];
    const displayList = [...sortByDone(rankedList), ...sortByDone(singleList)];

    // 未受取数カウント（ランク制は各baseの次ランクのみカウント）
    const countUnclaimed = (list) => list.filter(a => !claimed.includes(a.id) && a.check()).length;

    const filterBar = ACH_CATS.map(c => {
      const active = window._achCat === c.key;
      // カテゴリの未受取数（ランク代表のみ）
      const catList = (() => {
        const tmp = []; const seen = new Map();
        ACHIEVEMENT_MASTER.forEach(a => {
          if(c.key !== "all" && a.cat !== c.key) return;
          if(a.ranked) {
            if(!seen.has(a.rankBase)) {
              const maxR = ACHIEVEMENT_MASTER.filter(x=>x.rankBase===a.rankBase&&claimed.includes(x.id)).reduce((m,x)=>Math.max(m,x.rank),0);
              const nxt = ACHIEVEMENT_MASTER.find(x=>x.rankBase===a.rankBase&&x.rank===maxR+1);
              if(nxt) { seen.set(a.rankBase,true); tmp.push(nxt); }
              else if(maxR > 0) {
                // S56: Rank50到達済み → 最大ランクエントリをバッジカウントにも含める
                const maxE = ACHIEVEMENT_MASTER.find(x=>x.rankBase===a.rankBase&&x.rank===maxR);
                if(maxE) { seen.set(a.rankBase,true); tmp.push(maxE); }
              }
            }
          } else { tmp.push(a); }
        });
        return tmp;
      })();
      const unclaimed = countUnclaimed(catList);
      const badge = unclaimed > 0
        ? `<span style="font-size:9px;background:#ffcc4433;color:var(--gold);border-radius:8px;padding:1px 4px;margin-left:3px">${unclaimed}</span>` : "";
      return `<button onclick="window._achCat='${c.key}';window._achRefresh&&window._achRefresh();"
        style="padding:4px 10px;font-size:11px;border-radius:12px;border:1px solid ${active?"var(--accent)":"var(--border-subtle)"};background:${active?"var(--accent-bg)":"transparent"};color:${active?"var(--accent)":"var(--muted)"};cursor:pointer;white-space:nowrap">${c.label}${badge}</button>`;
    }).join("");

    const cards = displayList.map(a => {
      const done    = claimed.includes(a.id);
      const reached = a.check();
      const canGet  = reached && !done;
      const rewardText = [
        a.reward.gold ? `${a.reward.gold.toLocaleString()}G` : "",
        ...(a.reward.items||[]).map(r => { const m=ITEM_MASTER[r.id]; return `${m?.icon||""}${m?.name||r.id} ×${r.count}`; }),
      ].filter(Boolean).join(" / ");

      const statusIcon = done ? "✅" : reached ? "🎁" : "⬜";
      // ランク制の進捗表示
      const progressHtml = a.ranked ? (() => {
        // S59: 全 rankBase を _statMap に追加（6種欠落修正）
        const _statMap = {
          adv_kill:"enemyKills", adv_boss:"bossKills", adv_enter:"totalDungeonEnter",
          shop_sales:"totalSales", shop_reg:"totalRegularBuys",
          enh_enhance:"totalEnhance", enh_reforge:"totalReforge",
          enh_purify:"totalPurify", enh_brew:"totalBrew", enh_bulk:"totalBulkEnhance",
          col_star:"totalColStar",
        };
        const _baseReqMap = {
          adv_boss:1, adv_enter:10,
          enh_reforge:10, enh_purify:5, enh_brew:5,
          enh_enhance:50, enh_bulk:50, shop_reg:50,
          col_star:10,
        };
        const _statKey = _statMap[a.rankBase] || "";
        if(!_statKey) return ""; // 対応statKeyなし → バー非表示
        const _curVal = (gs.achievements?.stats[_statKey]||0);
        const _baseReq = _baseReqMap[a.rankBase] || 100;
        const _req = _achRankReq(_baseReq, a.rank);
        const _pct = Math.min(100, Math.floor(_curVal / _req * 100));
        return `<div style="margin-top:4px;background:var(--surface);border-radius:3px;height:4px;width:100%"><div style="background:var(--accent);width:${_pct}%;height:4px;border-radius:3px"></div></div><div style="font-size:10px;color:var(--muted);margin-top:2px">${_curVal.toLocaleString()} / ${_req.toLocaleString()}</div>`;
      })() : "";

      return `<div style="padding:10px 0;border-bottom:1px solid var(--bg-darker);display:flex;align-items:center;gap:10px">
        <div style="font-size:22px;width:32px;text-align:center;flex-shrink:0">${a.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:700;color:${done?"#4a8a4a":reached?"#cccc44":"var(--text)"}">${statusIcon} ${a.name}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:1px">${a.desc}</div>
          ${progressHtml}
          <div style="font-size:10px;color:var(--muted);margin-top:2px">報酬: ${rewardText}</div>
        </div>
        ${canGet ? `<button onclick="claimAchievement('${a.id}');window._achRefresh&&window._achRefresh();"
          style="flex-shrink:0;padding:4px 10px;font-size:11px;border-radius:6px;border:1px solid var(--gold);background:#2a2200;color:var(--gold);cursor:pointer;white-space:nowrap">受け取る</button>` : ""}
      </div>`;
    }).join("");

    // 表示件数・クリア数（ランク制は代表のみカウント）
    const totalDisplay = (() => {
      const seen = new Set(); let n = 0;
      ACHIEVEMENT_MASTER.forEach(a => { if(a.ranked){if(!seen.has(a.rankBase)){seen.add(a.rankBase);n++;}}else{n++;} });
      return n;
    })();
    const cleared = (() => {
      const seen = new Set(); let n = 0;
      ACHIEVEMENT_MASTER.forEach(a => {
        if(a.ranked){
          if(!seen.has(a.rankBase)){
            seen.add(a.rankBase);
            if(ACHIEVEMENT_MASTER.filter(x=>x.rankBase===a.rankBase).every(x=>claimed.includes(x.id))) n++;
          }
        } else { if(claimed.includes(a.id)) n++; }
      });
      return n;
    })();

    const unclaimedAll = ACHIEVEMENT_MASTER.filter(a => !claimed.includes(a.id) && a.check());
    const bulkBtn = unclaimedAll.length > 0
      ? `<button onclick="window._achClaimAll&&window._achClaimAll();"
          style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid var(--gold);background:#2a2200;color:var(--gold);cursor:pointer;white-space:nowrap">
          一括受取 (${unclaimedAll.length})</button>`
      : `<button style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid var(--border-subtle);background:transparent;color:var(--text-disabled);cursor:not-allowed" disabled>一括受取</button>`;

    body.innerHTML = `
      <div style="flex-shrink:0;padding:14px 16px 8px;border-bottom:1px solid var(--border);background:var(--card)">
        <div class="modal-title" style="text-align:center;margin-bottom:4px">🏆 実績 <span style="font-size:12px;color:var(--muted);font-family:sans-serif">${cleared}/${totalDisplay}</span></div>
        ${bulkBtn ? `<div style="margin-bottom:6px">${bulkBtn}</div>` : ''}
        <div style="display:flex;gap:6px;flex-wrap:wrap">${filterBar}</div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:0 16px">
        ${cards || '<div style="text-align:center;color:var(--muted);padding:20px;font-size:12px">実績がありません</div>'}
      </div>
      <div style="flex-shrink:0;padding:8px 16px 14px;border-top:1px solid var(--border);background:var(--card)">
        <button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
      </div>`;
  };

  window._achCat = "all";
  window._achClaimAll = () => {
    const targets = ACHIEVEMENT_MASTER.filter(a => !gs.achievements.claimed.includes(a.id) && a.check());
    if(targets.length === 0) return;
    targets.forEach(a => claimAchievement(a.id));
    window._achRefresh && window._achRefresh();
  };
  window._achRefresh = refresh;
  refresh();
}

function learnRebirthSkill(id) {
  const sk = REBIRTH_SKILL_MASTER[id];
  if(!sk) return;
  const p = gs.player;
  if(p.rebirthSkills.includes(id)) return;
  if(sk.unlockRank && (p.worldRank || 0) < sk.unlockRank) return; // 解禁ランク未達
  if(!sk.requires.every(r => p.rebirthSkills.includes(r))) return;
  if(p.rebirthPoints < sk.cost) return;
  p.rebirthSkills.push(id);
  p.rebirthPoints -= sk.cost;
  recalcHpMp(gs);
  // 陳列枠を即時反映
  const extraShelf = p.rebirthSkills.reduce((acc,sid) => {
    return acc + (REBIRTH_SKILL_MASTER[sid]?.effect?.extraShelf || 0);
  }, 0);
  const needed = gs.shop.level + 2 + extraShelf;
  while(gs.shop.shelves.length < needed) gs.shop.shelves.push(null);
  saveGame();
  openSkillTree(_skillTreeTab);
  addLog("item", `🌟 永続スキル「${sk.name}」を習得した！`);
}

let _autoRunTimer = null;

// ─────────────────────────────────────────
// 周回モード（インターバル制・アイテム収集専用）
// ─────────────────────────────────────────

// 階層ごとの周回設定
const AUTO_RUN_CONFIG = {
  1: { intervalSec: 30, dropMin: 1, dropMax: 2 },
  2: { intervalSec: 45, dropMin: 1, dropMax: 3 },
  3: { intervalSec: 60, dropMin: 2, dropMax: 3 },
  4: { intervalSec: 90, dropMin: 2, dropMax: 4 },
  5: { intervalSec:120, dropMin: 2, dropMax: 4 },
  6: { intervalSec:150, dropMin: 2, dropMax: 5 },
  7: { intervalSec:180, dropMin: 3, dropMax: 5 },
  8: { intervalSec:210, dropMin: 3, dropMax: 6 },
  9: { intervalSec:240, dropMin: 3, dropMax: 6 },
 10: { intervalSec:300, dropMin: 4, dropMax: 6 },
};

function _calcAutoRunInterval(floor) {
  const cfg = AUTO_RUN_CONFIG[floor] || AUTO_RUN_CONFIG[Math.min(floor, 5)];
  const charCP = calcCharCP(gs);
  const recCP  = FLOOR_RECOMMENDED_CP[floor] || 1;
  const ratio  = charCP / recCP;
  let mul = 1.0;
  if(ratio >= 2.0) mul = 0.6;
  else if(ratio >= 1.5) mul = 0.8;
  // rb_autorun: 周回インターバルをさらに短縮
  const _rbAutoRunSpeedPct = (gs?.player?.rebirthSkills||[]).reduce((acc,id) => {
    const sk = REBIRTH_SKILL_MASTER[id];
    return acc + (sk?.effect?.autoRunSpeedPct || 0);
  }, 0);
  const _rbSpeedMul = 1 - Math.min(50, _rbAutoRunSpeedPct) / 100; // 最大50%短縮
  return Math.round(cfg.intervalSec * mul * _rbSpeedMul * 1000); // ms
}

function startAutoRun(floor) {
  if(_autoRunTimer) return;
  const cfg = AUTO_RUN_CONFIG[floor] || AUTO_RUN_CONFIG[Math.min(floor, 5)];
  const intervalMs = _calcAutoRunInterval(floor);
  gs.dungeon.autoRun = {
    active: true,
    floor,
    runs: 0,
    totalDrops: 0,
    startGold: gs.player.gold,
    startAt: Date.now(),        // S52: 周回開始時刻
    intervalMs,
    nextRunAt: Date.now() + intervalMs,
  };
  saveGame();
  render();
  _autoRunTimer = setInterval(_autoRunTick, 500);
}

function stopAutoRun() {
  if(_autoRunTimer) { clearInterval(_autoRunTimer); _autoRunTimer = null; }
  const ar = gs.dungeon.autoRun;
  if(!ar) return;
  ar.active = false;

  gs.dungeon.loot = [];
  gs.dungeon.autoRun = null;
  gs.player.status = 'idle';

  // 周回中のGold増加を計算（startGold時点からの差分）
  const autoRunEarnedGold = Math.max(0, gs.player.gold - (ar.startGold || gs.player.gold));
  // 周回開始時刻（startAt）があれば経過時間を計算
  const elapsedSec = ar.startAt ? Math.max(1, Math.floor((Date.now() - ar.startAt) / 1000)) : null;

  const session = {
    startGold: ar.startGold,
    kills: 0,
    bossKilled: false,
    earnedExp: 0,
    totalDmgGiven: 0,
    totalDmgTaken: 0,
    maxDmgGiven: 0,
    maxDepth: 0,
    autoRunRuns: ar.runs,
    autoRunKills: 0,
    autoRunDrops: ar.totalDrops || 0,
    autoRunEarnedGold,          // S52: 周回中の獲得Gold
    autoRunElapsedSec: elapsedSec, // S52: 経過時間（秒）
    autoRunFloor: ar.floor,     // S52: 周回階層
  };
  saveGame();
  showDungeonResult(session, []);
}

function _autoRunTick() {
  const ar = gs.dungeon.autoRun;
  if(!ar || !ar.active) { stopAutoRun(); return; }

  const now = Date.now();

  if(now < ar.nextRunAt) {
    // 残り時間表示のみ差分更新（render()は呼ばない）
    _autoRunUpdateUI(ar, now);
    return;
  }

  // 1周完了
  ar.runs++;
  ar.nextRunAt = now + ar.intervalMs;

  // ドロップ抽選（経験値なし）
  const floor = ar.floor;
  const cfg   = AUTO_RUN_CONFIG[floor] || AUTO_RUN_CONFIG[Math.min(floor, 5)];
  const count = cfg.dropMin + Math.floor(Math.random() * (cfg.dropMax - cfg.dropMin + 1));
  const depth = Math.floor(Math.random() * 10) + 1;

  for(let i = 0; i < count; i++) {
    const item = generateDrop(depth, floor);
    if(item) {
      // 周回は直接格納庫（inventory）へ送る
      gs.inventory.push(item);
      ar.totalDrops++;
      const _m = ITEM_MASTER[item.itemId];
      const _affixCount = item.affixes ? item.affixes.length : 0;
      addLog('item', `✦ 【${rarityItemSpan(_m.name, item.rarity, _affixCount)}】を格納庫へ`);
      if(item.rarity === 'legendary' && gs.achievements?.stats) {
        gs.achievements.stats.legendaryFound = (gs.achievements.stats.legendaryFound || 0) + 1;
      }
    }
  }

  saveGame();
  // ドロップ時のみフル更新
  _autoRunUpdateUI(ar, now);
}

function _autoRunUpdateUI(ar, now) {
  // 周回中UIの差分更新（render()を使わず直接DOM操作）
  if(currentTab !== 'dungeon') return;
  const remaining = Math.max(0, ar.nextRunAt - now);
  const remSec    = Math.ceil(remaining / 1000);
  const progPct   = Math.max(0, Math.min(100, (ar.intervalMs - remaining) / ar.intervalMs * 100));

  const elRuns = document.getElementById('_ar_runs');
  const elLoot = document.getElementById('_ar_loot');
  const elSec  = document.getElementById('_ar_sec');
  const elBar  = document.getElementById('_ar_bar');

  if(!elRuns) {
    // 要素がなければrender()でフル描画
    render();
    return;
  }
  if(elRuns) elRuns.textContent = ar.runs + '周';
  if(elLoot) elLoot.textContent = (gs.dungeon.autoRun?.totalDrops || 0) + '個';
  if(elSec)  elSec.textContent  = remSec + '秒';
  if(elBar)  elBar.style.width  = progPct.toFixed(1) + '%';
}


function leaveDungeon(keepLoot, skipCostCheck) {
  if(!gs.dungeon.active) return;
  // 周回モード中なら停止（タイマーリーク防止）
  if(gs.dungeon.autoRun?.active) stopAutoRun();

  const floor   = gs.dungeon.activeFloor || gs.dungeon.floor;
  const prog    = gs.dungeon.progress;
  const r       = calcStats(gs);
  const hpRatio = gs.player.hp / r.maxHp;
  const bossJustKilled = gs.dungeon._session?.bossKilled;

  // 帰還コスト計算（案C）：深部帰還・ボス撃破後は免除
  const depthThreshold = floor * 3;
  const retreatCost = (!bossJustKilled && prog >= depthThreshold)
    ? floor * 50 : 0;

  // コスト確認モーダル（keepLoot=true かつ コストあり かつ skipCostCheck未指定）
  if(keepLoot && (retreatCost > 0) && !skipCostCheck) {
    const canAfford = gs.player.gold >= retreatCost;
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    const mc = document.createElement("div");
    mc.className = "modal-content";
    mc.style.cssText = "text-align:center;max-width:300px";
    mc.innerHTML = `
      <div class="modal-title" style="margin-bottom:12px">↩ 帰還確認</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px">
        深部（${prog+1}マス）からの帰還には<br>
        <span style="color:var(--gold);font-size:16px;font-weight:700">${retreatCost.toLocaleString()}G</span>
        が必要です
      </div>
      ${!canAfford ? `<div style="font-size:11px;color:var(--red);margin-bottom:12px">⚠ Gold不足（現在 ${gs.player.gold.toLocaleString()}G）</div>` : ""}
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1" id="_retreatCancel">戻る</button>
        <button class="btn btn-primary" style="flex:1;${!canAfford?"opacity:0.6":""}" id="_retreatConfirm">帰還する</button>
      </div>
    `;
    overlay.appendChild(mc);
    document.body.appendChild(overlay);
    overlay.querySelector("#_retreatCancel").onclick = () => overlay.remove();
    overlay.querySelector("#_retreatConfirm").onclick = () => {
      overlay.remove();
      leaveDungeon(true, true); // skipCostCheck=true で再呼び出し
    };
    return;
  }

  const _resultItems = keepLoot ? [...gs.dungeon.loot] : [];
  if(keepLoot) {
    Analytics.firstReturn(); // 初回帰還成功を記録
    // 案C: 帰還コスト徴収
    if(retreatCost > 0) {
      gs.player.gold = Math.max(0, gs.player.gold - retreatCost);
      addLog("item", `💸 深部帰還コスト ${goldSpan(retreatCost + "G")} を支払った`);
    }

    // 案A: HP不足時の消耗品消失（rb_deathsave2で無効化可能）
    const _noPenalty = (gs.player.rebirthSkills||[]).some(id => REBIRTH_SKILL_MASTER[id]?.effect?.noPenaltyOnRetreat);
    const consumItems = gs.dungeon.loot.filter(i => {
      const m = ITEM_MASTER[i.itemId];
      return m && m.type === "consumable";
    });
    if(!_noPenalty && hpRatio < 0.5 && consumItems.length > 0) {
      const loseCount = Math.min(consumItems.length, hpRatio < 0.3 ? floor * 2 : floor);
      const toLose = consumItems.slice(0, loseCount).map(i => i.uid);
      gs.dungeon.loot = gs.dungeon.loot.filter(i => !toLose.includes(i.uid));
      if(loseCount > 0) addLog("item", `💊 満身創痍の帰還…消耗品${loseCount}個を落としてしまった`);
    } else if(_noPenalty && hpRatio < 0.5) {
      addLog("item", `🎒 深淵の器の加護で消耗品を守った`);
    }

    addLog("item", `✓ ${floor}階層から無事に帰還した`);
    if(gs.dungeon.loot.length > 0) {
      gs.dungeon.loot.forEach(item=>{
        gs.inventory.push(item);
      });
      addLog("item", `✦ ${gs.dungeon.loot.length}個のアイテムを持ち帰った`);
      gs.dungeon.loot = [];
    }
    // 案B: 疲弊デバフ付与（HP30%未満帰還・重複なし）
    if(hpRatio < 0.3) {
      gs.player.fatigue = { expiresAt: Date.now() + 30 * 60 * 1000 }; // 30分
      addLog("item", `😓 満身創痍で帰還…${statusSpan("疲弊状態")}になった（最大HP-15%・30分）`);
    }

    // 薬草師：帰還時HP回復
    const _herbHealPct = calcStaffBonus().returnHealPct;
    if(_herbHealPct > 0) {
      const _r = calcStats(gs);
      const _voidHealMul = 1 + (_r.setVoidHealBonus || 0) / 100;
      const _heal = Math.max(1, Math.floor(_r.maxHp * _herbHealPct / 100 * _voidHealMul));
      const _actual = Math.min(_heal, _r.maxHp - gs.player.hp);
      if(_actual > 0) {
        gs.player.hp = Math.min(_r.maxHp, gs.player.hp + _actual);
        addLog("item", `🌿 薬草師が${healSpan(_actual + " HP")}回復してくれた`);
      }
    }
    // 呪い発動：gold_loss（帰還成功時のみ）
    applyCurseGoldLoss();
  } else {
    // 装備はそのまま維持（ロストなし・外れもしない）
    // rb_deathsave3: Gold10%保持
    const _goldSave = (gs.player.rebirthSkills||[]).reduce((acc,id) => {
      const sk = REBIRTH_SKILL_MASTER[id];
      return Math.max(acc, sk?.effect?.goldSaveOnDeath || 0);
    }, 0);
    if(_goldSave > 0) {
      const saved = Math.floor(gs.player.gold * _goldSave);
      if(saved > 0) addLog("item", `💰 深淵の器の加護で${goldSpan(saved + "G")}を守った`);
    }
    addLog("item", `✕ 倒れた。鞄の中身は失ったが装備はそのまま`);
    // 鞄（loot）は常に失う
    gs.dungeon.loot = [];
  }
  // 傭兵は探索終了で解散
  if(gs.dungeon.mercenary) {
    const _mDef = MERCENARY_MASTER[gs.dungeon.mercenary.id];
    if(_mDef) addLog("item", `⚔ ${_mDef.icon}${_mDef.name}と別れた`);
    gs.dungeon.mercenary = null;
  }
  gs.dungeon.active = false;
  gs.dungeon.combat = null;
  gs.dungeon.poisoned = false; // 帰還・全滅で毒解除
  gs.dungeon.burned   = false; // 熱傷も解除
  // 祠バフをリセット（フロア単位のバフ）
  gs.dungeon._shrineAtkBuff = false;
  gs.dungeon._shrineLukBuff = false;
  gs.dungeon._relicAtkBuff  = false; // S82
  gs.dungeon._relicDefBuff  = false; // S82
  // 帰還時：残った消耗品を格納庫に返却。全滅時：消滅
  if(keepLoot) {
    const cs = gs.dungeon.consumables || {};
    Object.entries(cs).forEach(([itemId, arr]) => {
      arr.forEach(slot => {
        for(let i = 0; i < slot.count; i++) {
          gs.inventory.push({
            uid: uuid(), itemId, rarity: slot.rarity,
            demand:100, affixes:[], cursed:false, curse:null,
            identified: true, enhLv: 0, statOverride: null, locked: false
          });
        }
      });
    });
  }
  gs.dungeon.consumables = {};  // 消耗品スロットリセット
  gs.player.status = "idle";
  recalcHpMp(gs);
  const _rFinal = calcStats(gs);
  gs.player.hp = _rFinal.maxHp;
  gs.player.mp = _rFinal.maxMp;
  saveGame();

  // リザルト表示（帰還・全滅共通）
  if(keepLoot) {
    showDungeonResult(gs.dungeon._session, _resultItems, false);
  } else {
    showDungeonResult(gs.dungeon._session, [], true);
  }
}

// ─────────────────────────────────────────
// 次の一手ヒント (S48-HINT)
// ─────────────────────────────────────────

// プレイヤーの現在状態から「次にやること」を1つ返す
// { icon, label, text, sub, action } の形
function calcNextAction() {
  const equippedUids  = new Set(Object.values(gs.equipped).filter(Boolean));
  const listedUids    = new Set(
    gs.shop.shelves.filter(Boolean).map(s => s.item?.uid).filter(Boolean)
  );
  // 格納庫にある装備・消耗品以外（出品可能なもの）
  const stockItems = gs.inventory.filter(i =>
    !equippedUids.has(i.uid) && !listedUids.has(i.uid)
  );

  // ① SP未消費 → スキルツリーを促す（S59）
  if((gs.player.skillPoints || 0) > 0) {
    return {
      icon:  "🌟",
      label: "NEXT ACTION",
      text:  `スキルポイントを振ろう（SP×${gs.player.skillPoints}）`,
      sub:   "ステータスタブ → スキルツリー",
      action: () => { switchTab("status"); setTimeout(() => openSkillTree(), 100); },
    };
  }
  // ① RP未消費 → 永続スキルを促す（S59）
  if((gs.player.rebirthPoints || 0) > 0) {
    return {
      icon:  "♾",
      label: "NEXT ACTION",
      text:  `永続スキルポイントを使おう（RP×${gs.player.rebirthPoints}）`,
      sub:   "ステータスタブ → 転生スキルツリー",
      action: () => { switchTab("status"); setTimeout(() => openSkillTree("rb"), 100); },
    };
  }

  // ② 未鑑定品がある → まず鑑定（格納庫タブへ：帰還後はlootタブに遷移不可のためinventoryを使う）
  const unidentified = stockItems.filter(i => !i.identified);
  if(unidentified.length > 0) {
    return {
      icon: "🔍",
      label: "NEXT ACTION",
      text: `未鑑定品を鑑定しよう`,
      sub:  `${unidentified.length}個の未鑑定品が眠っている`,
      action: () => switchTab("inventory"),
    };
  }

  // ②.5 疲弊中 → 棚より先に休息を促す（S62: 疲弊時は行動効率が落ちるため優先）
  if(gs.player.fatigue && gs.player.fatigue.expiresAt > Date.now()) {
    const _restCost = (gs.dungeon.clearedFloor || 1) * 100;
    return {
      icon:  "💆",
      label: "NEXT ACTION",
      text:  "疲弊状態を回復しよう",
      sub:   `ショップで${_restCost.toLocaleString()}G — 最大HP-15%が解除されます`,
      action: () => switchTab("shop"),
    };
  }

  // ② 空き棚がある + 出品可能な装備がある → 棚に並べる
  const emptyShelfCount = gs.shop.shelves.filter(
    s => s === null || (s && !s.item)
  ).length;
  const listableItems = stockItems.filter(i => {
    const m = ITEM_MASTER[i.itemId];
    return m && EQUIP_TYPES.has(m.type) && !UNSELLABLE_ITEMS.has(i.itemId);
  });
  if(emptyShelfCount > 0 && listableItems.length > 0) {
    return {
      icon: "🏪",
      label: "NEXT ACTION",
      text:  `棚に商品を並べよう`,
      sub:   `空き${emptyShelfCount}枠 / 出品可能${listableItems.length}個`,
      action: () => switchTab("shop"),
    };
  }

  // ③ 次の階へCPが足りない → 強化してCPを上げる
  const currentCP   = calcCharCP(gs);
  const nextFloor   = (gs.dungeon.clearedFloor || 0) + 1;
  const nextFloorCP = FLOOR_RECOMMENDED_CP[nextFloor] || 0;
  if(nextFloor <= 10 && nextFloorCP > 0 && currentCP < nextFloorCP) {
    const cpGap = nextFloorCP - currentCP;
    // 強化できる装備があるか（enhLv < 12 の装備）
    const enhanceable = gs.inventory.filter(i => {
      const m = ITEM_MASTER[i.itemId];
      return m && EQUIP_TYPES.has(m.type) && (i.enhLv || 0) < 12;
    });
    if(enhanceable.length > 0) {
      return {
        icon: "⚒",
        label: "NEXT ACTION",
        text:  `装備を強化してCPを上げよう`,
        sub:   `${nextFloor}階推奨CP ⚡${nextFloorCP}（あとCP+${cpGap}）`,
        action: () => switchTab("inventory"),
      };
    }
  }

  // ③.3 投資未満 + 十分なGold → 投資を促す（S60）
  const _investAmount = gs.shop.investment?.amount || 0;
  if(_investAmount < INVEST_MAX && gs.player.gold >= 5000) {
    const _investable = Math.min(gs.player.gold - 1000, INVEST_MAX - _investAmount);
    if(_investable >= 1000) {
      return {
        icon:  "💹",
        label: "NEXT ACTION",
        text:  "Goldを投資しよう",
        sub:   `投資可能 ${_investable.toLocaleString()}G — 放置収入タブから`,
        action: () => { switchTab("shop"); setTimeout(() => openPassiveIncomeModal(), 100); },
      };
    }
  }

  // ③.4 デイリーミッション達成・未受取 → 受け取りを促す（S56）
  const _dailyUnclaimed = (gs.meta?.dailyMissions || []).some(m => {
    const def = _getDailyDef(m.type);
    return def && def.isDone(m) && !m.claimed;
  });
  if(_dailyUnclaimed) {
    return {
      icon:  "📅",
      label: "NEXT ACTION",
      text:  "デイリー報酬を受け取ろう",
      sub:   "依頼タブで受け取れます",
      action: () => { switchTab("status"); setTimeout(() => openQuestModal(), 100); },
    };
  }

  // ③.5 転生可能 → 転生を促す（S55）
  if(canRebirth()) {
    return {
      icon:  "🌟",
      label: "NEXT ACTION",
      text:  "転生できる！",
      sub:   `worldRank ${gs.player.worldRank + 1} へ——ステータスタブで転生`,
      action: () => switchTab("status"),
    };
  }

  // ④ 次の階へGoldが少し足りない目安（潜入コスト = 傭兵代）
  const merc = gs.dungeon.mercenary
    ? MERCENARY_MASTER[gs.dungeon.mercenary.id] : null;
  const mercCost = merc
    ? calcMercCost(merc.cost(gs.dungeon.selectedFloor || 1)) : 0;
  if(mercCost > 0 && gs.player.gold < mercCost) {
    return {
      icon: "💰",
      label: "NEXT ACTION",
      text:  `放置収入を待とう`,
      sub:   `傭兵代 ${mercCost.toLocaleString()}G（現在 ${gs.player.gold.toLocaleString()}G）`,
      action: () => switchTab("shop"),
    };
  }

  // ⑤ デフォルト → 次の潜入へ
  const selFloor = gs.dungeon.selectedFloor || gs.dungeon.floor || 1;
  return {
    icon:  "⚔",
    label: "NEXT ACTION",
    text:  `${selFloor}階層へ潜入しよう`,
    sub:   `現在CP ⚡${currentCP}`,
    action: () => switchTab("dungeon"),
  };
}

// 「次の一手」ヒントブロックのHTMLを生成して返す（domに追加はしない）
function makeNextActionHintEl() {
  const hint = calcNextAction();
  const el = document.createElement("div");
  el.className = "next-action-hint";
  el.innerHTML = `
    <div class="hint-icon">${hint.icon}</div>
    <div class="hint-body">
      <div class="hint-label">${hint.label}</div>
      <div class="hint-text">${hint.text}</div>
      <div class="hint-sub">${hint.sub}</div>
    </div>
    <div class="hint-arrow">›</div>
  `;
  el.addEventListener("click", () => {
    document.querySelectorAll(".modal-overlay").forEach(m => m.remove());
    hint.action(); // switchTab内でrender()が呼ばれるため追加のrender()は不要
  });
  return el;
}

// ── ワンタップ一括出品（帰還直後専用）──────────────────────────────
// 帰還リザルトの「まとめて出品する」ボタンから呼び出す。
// listItem()は内部でsaveGame()を毎回呼ぶため流用せず、
// 同等のgs操作を直接行い最後に1回だけsaveGame+renderで完結させる。
// identifyItem()はGold消費・Lv制限・render・モーダルremoveを含むため流用不可。
function quickListAfterReturn() {
  // ── 出品除外対象UIDを収集 ──
  const equippedUids = new Set(Object.values(gs.equipped).filter(Boolean));
  const listedUids   = new Set(
    gs.shop.shelves.filter(Boolean).map(s => s.item?.uid).filter(Boolean)
  );
  // 裏取引中アイテムはinventoryに残留したまま → UIDで除外
  const bmUid = gs.shop.blackmarket?.slot?.item?.uid;
  if(bmUid) listedUids.add(bmUid);

  // ── 未鑑定品を全て無料鑑定（Gold消費なし・Lv制限なし）──
  // 帰還直後の体験コスト削減が目的のため、通常の identifyItem() は使わない
  let identifiedCount = 0;
  gs.inventory.forEach(item => {
    if(item.identified) return;
    item.identified = true;
    identifiedCount++;
  });

  // ── 出品候補を絞り込む ──
  // 条件: 鑑定済み / 装備型 / 売却可能 / 装備中でない / 棚・裏取引出品中でない / ロック解除
  const candidates = gs.inventory.filter(i => {
    const m = ITEM_MASTER[i.itemId];
    return i.identified
      && m
      && EQUIP_TYPES.has(m.type)
      && !UNSELLABLE_ITEMS.has(i.itemId)
      && !equippedUids.has(i.uid)
      && !listedUids.has(i.uid)
      && !i.locked;
  });

  // ── 空きスロットへ順番に出品 ──
  // listItem()と同等のgs操作（saveGameのみ省略）
  let listedCount = 0;
  for(let idx = 0; idx < gs.shop.shelves.length; idx++) {
    if(listedCount >= candidates.length) break;
    const slot = gs.shop.shelves[idx];
    // スロットが使用中（アイテムあり）はスキップ
    if(slot && slot.item) continue;

    const item = candidates[listedCount++];
    // inventoryから除去
    const invIdx = gs.inventory.findIndex(i => i.uid === item.uid);
    if(invIdx < 0) { listedCount--; continue; } // 念のため存在確認
    gs.inventory.splice(invIdx, 1);

    // 棚に登録（specialTypeは既存スロット設定を引き継ぐ・onSaleはデフォルトfalse）
    const specialType = slot?.specialType || null;
    gs.shop.shelves[idx] = {
      item,
      listedAt:     Date.now(),
      sellDuration: calcSellDuration(item),
      onSale:       false,
      ...(specialType ? { specialType } : {}),
    };
  }

  // まとめて1回だけ保存
  if(identifiedCount > 0 || listedCount > 0) saveGame();

  return { identifiedCount, listedCount };
}

function showDungeonResult(session, items, defeated=false) {
  const earnedGold    = session ? Math.max(0, gs.player.gold - session.startGold) : 0;
  const lostGold      = session && defeated ? Math.max(0, session.startGold - gs.player.gold) : 0;
  const earnedExp     = session?.earnedExp || 0;
  const kills         = session?.kills || 0;
  const bossKilled    = session?.bossKilled || false;
  const autoRunRuns        = session?.autoRunRuns || 0;
  const autoRunDrops       = session?.autoRunDrops || 0;
  const autoRunEarnedGold  = session?.autoRunEarnedGold ?? null;  // S52: 周回中獲得Gold
  const autoRunElapsedSec  = session?.autoRunElapsedSec ?? null;  // S52: 経過時間
  const autoRunFloor       = session?.autoRunFloor ?? null;        // S52: 周回階層
  const maxDepth      = session?.maxDepth || gs.dungeon.progress || 0;
  const totalDmgGiven = session?.totalDmgGiven || 0;
  const totalDmgTaken = session?.totalDmgTaken || 0;
  const maxDmgGiven   = session?.maxDmgGiven || 0;

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.cssText = "max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";

  // 持ち帰りアイテム一覧（5列グリッド・種類別ソート・未鑑定は等級隠し）
  const _RESULT_SORT = {
    consumable:0, material:1,
    weapon:2, sub:3, head:4, body:5, legs:6, cloak:7,
    arms:8, feet:9, neck:10, bracelet:11, ring:12, seal:13,
  };
  const _sortedItems = [...items].sort((a,b) => {
    const aUnid = !a.identified ? 1 : 0;
    const bUnid = !b.identified ? 1 : 0;
    if(aUnid !== bUnid) return aUnid - bUnid;
    const ta = _RESULT_SORT[ITEM_MASTER[a.itemId]?.type] ?? 99;
    const tb = _RESULT_SORT[ITEM_MASTER[b.itemId]?.type] ?? 99;
    return ta - tb;
  });
  const itemGrid = _sortedItems.length > 0
    ? `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px 4px">
        ${_sortedItems.map(item => {
          const m      = ITEM_MASTER[item.itemId];
          const isUnid = !item.identified;
          const icon   = isUnid ? "❓" : m.icon;
          const name   = isUnid ? "未鑑定品" : (m.name.length > 6 ? m.name.slice(0,5)+"…" : m.name);
          const cls    = isUnid ? "rarity-unidentified" : `rarity-${item.rarity}`;
          return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
            <div class="${cls}" style="width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px">${icon}</div>
            <div style="font-size:9px;color:var(--text-light);text-align:center;line-height:1.2;width:100%">${name}</div>
          </div>`;
        }).join("")}
      </div>`
    : `<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px">なし</div>`;

  // 統計カード（撃破数→到達深度→獲得Gold→獲得EXP→持ち帰り個数）
  // 周回サマリーカード（S52: 獲得Gold・1周平均・経過時間を追加）
  const _autoRunSummaryCards = (() => {
    if(autoRunRuns <= 0) return [];
    const avgDrops = autoRunRuns > 0 ? (autoRunDrops / autoRunRuns).toFixed(1) : "—";
    const elapsedLabel = autoRunElapsedSec != null
      ? (autoRunElapsedSec >= 3600
          ? `${Math.floor(autoRunElapsedSec/3600)}時間${Math.floor((autoRunElapsedSec%3600)/60)}分`
          : autoRunElapsedSec >= 60
          ? `${Math.floor(autoRunElapsedSec/60)}分${autoRunElapsedSec%60}秒`
          : `${autoRunElapsedSec}秒`)
      : "—";
    const goldPerMin = (autoRunEarnedGold != null && autoRunElapsedSec > 0)
      ? Math.floor(autoRunEarnedGold / (autoRunElapsedSec / 60))
      : null;

    return [
      { label:"🔄 周回数",   value: autoRunRuns + `<span style="font-size:12px;color:var(--muted)"> 周</span>`, color:"var(--accent2)" },
      { label:"📦 取得数",   value: autoRunDrops + `<span style="font-size:12px;color:var(--muted)"> 個</span>`, color:"var(--gold)" },
      ...(autoRunEarnedGold != null ? [{
        label:"💰 獲得Gold",
        value: autoRunEarnedGold.toLocaleString() + `<span style="font-size:12px;color:var(--muted)">G</span>`,
        color: autoRunEarnedGold > 0 ? "var(--gold)" : "var(--muted)"
      }] : []),
      { label:"📊 1周平均",  value: avgDrops + `<span style="font-size:12px;color:var(--muted)"> 個/周</span>`, color:"#88ddff" },
      ...(autoRunElapsedSec != null ? [{ label:"⏱ 経過時間", value: elapsedLabel, color:"var(--muted)" }] : []),
      ...(goldPerMin != null ? [{
        label:"⚡ Gold/分",
        value: goldPerMin.toLocaleString() + `<span style="font-size:12px;color:var(--muted)">G</span>`,
        color: "var(--green)"
      }] : []),
    ];
  })();

  const stats = [
    ..._autoRunSummaryCards,
    { label:"⚔ 撃破数",       value: kills + (bossKilled ? `<div style="font-size:10px;color:var(--gold);margin-top:2px">👑 ボス討伐</div>` : ""), color: bossKilled ? "var(--gold)" : "var(--text)" },
    { label:"🗺 到達深度",     value: maxDepth,                                color: "var(--text)" },
    { label: defeated && lostGold > 0 ? "💸 損失Gold" : "💰 獲得Gold",
      value: defeated && lostGold > 0
        ? lostGold.toLocaleString() + "G"
        : earnedGold.toLocaleString() + "G",
      color: defeated && lostGold > 0 ? "var(--damage)" : "var(--gold)" },
    { label:"✨ 獲得EXP",      value: earnedExp.toLocaleString(),             color: "var(--accent2)" },
    { label:"📦 持ち帰り",     value: items.length + `<span style="font-size:12px;color:var(--muted)"> 個</span>`, color: "var(--accent2)" },
    { label:"⚔ 総与ダメージ",  value: totalDmgGiven.toLocaleString(),         color: "#4dd9ac" },
    { label:"🩸 総被ダメージ",  value: totalDmgTaken.toLocaleString(),         color: "var(--damage)" },
    { label:"💥 最大単発",      value: maxDmgGiven.toLocaleString(),           color: "var(--gold)" },
  ];
  const statCards = stats.map(s => `
    <div class="card" style="padding:10px;text-align:center">
      <div style="font-size:10px;color:var(--muted);margin-bottom:4px">${s.label}</div>
      <div style="font-size:20px;font-weight:700;color:${s.color}">${s.value}</div>
    </div>`).join("");

  mc.innerHTML = `
    <div style="flex-shrink:0;padding:14px 16px 10px;border-bottom:1px solid var(--border);text-align:center;${defeated ? 'background:#1a0808;' : ''}">
      <div class="modal-title" style="${defeated ? 'color:var(--dmg-text);' : ''}">${defeated ? '💀 力尽きた…' : autoRunRuns > 0 ? '🔄 周回リザルト' : '📋 探索リザルト'}</div>
      ${defeated ? '<div style="font-size:11px;color:var(--damage);margin-top:4px">鞄の中身は失った。装備はそのまま。</div>' : ''}
    </div>
    <div style="flex:1;overflow-y:auto;padding:12px 16px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        ${statCards}
      </div>
      ${items.length > 0 ? `
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px">持ち帰りアイテム</div>
      <div>${itemGrid}</div>` : ""}
    </div>
    <div style="flex-shrink:0;padding:10px 16px 14px;border-top:1px solid var(--border)">
      ${!defeated ? `<button class="btn btn-secondary" style="width:100%;margin-bottom:8px" id="resultQuickListBtn">📦 まとめて出品する</button>` : ''}
      <button class="btn ${defeated ? 'btn-secondary' : 'btn-primary'}" style="width:100%" id="resultCloseBtn">${defeated ? '戻る' : '閉じる'}</button>
    </div>
  `;

  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  // ── まとめて出品ボタン（帰還成功時のみ表示）──
  const quickListBtn = overlay.querySelector("#resultQuickListBtn");
  if(quickListBtn) {
    quickListBtn.addEventListener("click", () => {
      const { identifiedCount, listedCount } = quickListAfterReturn();
      Analytics.quickList(listedCount); // ①: まとめて出品ボタン使用を計測
      overlay.remove();
      switchTab("shop");
      render();
      // 出品結果をショップログに記録
      if(listedCount > 0) {
        addShopLog("info", `📦 ${listedCount}個の装備をまとめて出品した${identifiedCount > 0 ? `（${identifiedCount}個を鑑定済み）` : ""}`);
      } else if(identifiedCount > 0) {
        addShopLog("info", `🔍 ${identifiedCount}個を鑑定した（出品可能な空き棚がありません）`);
      }
      // 次の一手ヒントはshopタブへ遷移するため不要（calcNextActionが「潜入しよう」を返す状態に自然に移行）
    });
  }

  overlay.querySelector("#resultCloseBtn").addEventListener("click", () => {
    overlay.remove();
    // 帰還成功時のみ「次の一手」ヒントを冒険タブに表示してから遷移
    if(!defeated) {
      switchTab("dungeon");
      render();
      // renderが終わった後にhintを差し込む
      requestAnimationFrame(() => {
        const sc = document.getElementById("screen");
        if(!sc) return;
        const hintEl = makeNextActionHintEl();
        sc.insertBefore(hintEl, sc.firstChild);
        // 8秒後に自動フェードアウト（タップされなかった場合）
        setTimeout(() => {
          if(hintEl.parentNode) {
            hintEl.style.transition = "opacity 0.5s";
            hintEl.style.opacity = "0";
            setTimeout(() => { if(hintEl.parentNode) hintEl.remove(); }, 500);
          }
        }, 8000);
      });
    } else {
      switchTab("dungeon");
      render();
    }
  });
}

// ─────────────────────────────────────────
// 双六進行
// ─────────────────────────────────────────
const MAX_LOG = 100;

// ─── 統合ログ ───────────────────────────
// type: "dungeon" | "shop" | "inventory"
const ALL_LOGS = [];
function _pushLog(type, cls, msg) {
  ALL_LOGS.unshift({ type, cls, msg });
  if(ALL_LOGS.length > MAX_LOG) ALL_LOGS.pop();
  // モーダルが開いていれば差分更新
  const logEl = document.getElementById('logContent');
  if(logEl && window.__logCurrentType !== undefined) {
    const t = window.__logCurrentType;
    if(t === 'all' || t === type) {
      logEl.innerHTML = makeFilteredLogHtml(t);
    }
  }
}
function addLog(cls, msg)           { _pushLog("dungeon",   cls, msg); }
function addShopLog(cls, msg)       { _pushLog("shop",      cls, msg); }
function setInventoryMsg(cls, text) { _pushLog("inventory", cls, text); }

// フィルタ付きHTML生成
function makeFilteredLogHtml(type) {
  const lines = type === "all" ? ALL_LOGS : ALL_LOGS.filter(l => l.type === type);
  if(lines.length === 0)
    return `<span style="color:var(--muted);font-size:12px">ログなし</span>`;
  return lines.map(l => `<div class="logLine ${l.cls||""}">${l.msg}</div>`).join("");
}

// アイテム名をレアリティ色でspan包みするヘルパー（affixCount: OP数 or 0）
function rarityItemSpan(name, rarity, affixCount) {
  const color = RARITY_MASTER[rarity]?.color || "#cccccc";
  return `<span style="color:${color};font-weight:700">${name}</span>`;
}

// ダメージ・回復数値を色付けするヘルパー
function dmgSpan(n)    { return `<span style="color:var(--dmg-text);font-weight:700">${n}</span>`; }
function hitSpan(n)    { return `<span style="color:#4dd9ac;font-weight:700">${n}</span>`; }
function healSpan(n)   { return `<span style="color:#66ffaa;font-weight:700">+${n}</span>`; }
function goldSpan(n)   { return `<span style="color:#f0c040;font-weight:700">${n}</span>`; }
function goldBadge()   { return `<span class="modal-gold-badge">💰 ${(gs?.player?.gold||0).toLocaleString()}G</span>`; }
function enemySpan(n)  { return `<span style="color:#ff9966;font-weight:700">${n}</span>`; }
function statusSpan(n) { return `<span style="color:#bb88ff;font-weight:700">${n}</span>`; }

function advanceDungeon() {
  const d = gs.dungeon;
  if(!d.active || d.combat) return;
  if(d.progress >= d.map.length-1) {
    const lastEv = d.map[d.map.length-1];
    if(lastEv === "boss") {
      addLog("item","💀 ボスの前に立った！戦うか帰還するか…");
    } else {
      addLog("item","🏆 最深部に到達！引き返してアイテムを持ち帰ろう");
    }
    render(); return;
  }
  d.progress++;
  // 4階：5マス後に毒発症
  if(d._floor4PoisonAt !== undefined && !d.poisoned) {
    d._floor4PoisonAt--;
    if(d._floor4PoisonAt <= 0) {
      d.poisoned = true;
      delete d._floor4PoisonAt;
      addLog("item", "☠ 沼地の毒気が体に染み込んできた…毒状態になった");
    }
  }
  let ev = d.map[d.progress];
  // HP満タンの場合は休息マスをwindfallに差し替え
  if(ev === "rest") {
    const r = calcStats(gs);
    if(gs.player.hp >= r.maxHp) {
      d.map[d.progress] = "windfall";
      ev = "windfall";
    }
  }
  // 道開きスキル：windfall/shortcutマスをスキップしてさらに1マス進む
  const _rMove = calcStats(gs);
  if((_rMove.skillMoveBonus||0) > 0 && (ev === "windfall" || ev === "shortcut") && d.progress < d.map.length - 1) {
    handleEvent(ev, d.progress);
    d.progress++;
    ev = d.map[d.progress];
    addLog("item", `🗺️ 道開き！さらに1マス進んだ`);
    saveGame(); render();
    if(d.combat) return; // 戦闘が始まった場合は中断
  }
  handleEvent(ev, d.progress);
  // 非戦闘イベント後に毒・熱傷ダメージを適用（戦闘は戦闘後処理で行う）
  if(!d.combat && ev !== "battle" && ev !== "boss") {
    applyPoisonDamage();
    applyBurnDamage();
    if(gs.player.hp <= 0) { leaveDungeon(false); return; }
  }
  saveGame();
  render();
}

function handleEvent(type, depth) {
  const floor = gs.dungeon.activeFloor || gs.dungeon.floor;
  switch(type) {
    case "battle":   startCombat(depth, floor); break;
    case "treasure": handleTreasure(depth, floor); break;
    case "gold":     handleGoldRoom(depth, floor); break;
    case "trap":     handleTrap(depth); break;
    case "rest":     handleRest(); break;
    case "shrine":   handleShrine(); break;
    case "relic":    handleRelic(); break;
    case "boss":     startBossCombat(floor); break;
    case "windfall":  handleWindfall(depth, floor); break;
    case "omen":      handleOmen(); break;
    case "shortcut":  handleShortcut(); break;
    case "lava":      handleLava(); break;
    case "nothing":   addLog("item","…何もなかった"); break;
  }
}

function handleLava() {
  // 溶岩マス：最大HPの5%ダメ（回避不可・防御無視）
  const dmg = Math.max(1, Math.floor(gs.player.maxHp * 0.05));
  gs.player.hp = Math.max(0, gs.player.hp - dmg);
  addLog("item", `🌋 溶岩を踏んだ！ ${dmgSpan(dmg + "ダメージ")}（防御無視）`);
  if(gs.player.hp <= 0) {
    addLog("item", "☠ 溶岩に飲み込まれた…");
    leaveDungeon(false);
    return;
  }
  tryAutoHeal();
  saveGame();
  render();
}

function handleWindfall(depth, floor) {
  const ng = gs.dungeon.ng || 0;
  const gold = Math.floor(floor * (8 + Math.floor(Math.random()*8)) * (1 + ng*0.1));
  gs.player.gold += gold;
  showGoldPop(gold);
  gainExp(3 + depth);
  addLog("item", `✨ 落し物を発見！ ${goldSpan("+" + gold.toLocaleString() + "G")}`);
  saveGame();
}

function handleOmen(depth) {
  const roll = Math.random();
  let omenType, msg;
  if(roll < 0.25) {
    // 好omen A: 次戦闘で敵DEF-30%（既存）
    omenType = "def_down";
    msg = "🔮 吉兆… 次の敵の守りが弱まって見える";
  } else if(roll < 0.50) {
    // 好omen B: 次戦闘でドロップ率+50%
    omenType = "drop_up";
    msg = "🔮 吉兆… 次の敵が何かを持っている予感がする";
  } else if(roll < 0.65) {
    // 好omen C: 次戦闘でEXP×2
    omenType = "exp_up";
    msg = "🔮 吉兆… 次の敵から多くを学べる気がする";
  } else if(roll < 0.80) {
    // 悪omen A: 次戦闘で敵STR+20%
    omenType = "str_up";
    msg = "🔮 凶兆… 何か強大な気配を感じる…";
  } else if(roll < 0.90) {
    // 悪omen B: 次マスが罠に変化
    omenType = "next_trap";
    const nextIdx = gs.dungeon.progress + 1;
    if(nextIdx < gs.dungeon.map.length - 1 && gs.dungeon.map[nextIdx] !== "boss") {
      gs.dungeon.map[nextIdx] = "trap";
    }
    msg = "🔮 凶兆… 先の道に危険が潜んでいる…";
  } else {
    // 中立: 次マスをwindfallに変化（サプライズ）
    omenType = "windfall";
    const nextIdx = gs.dungeon.progress + 1;
    if(nextIdx < gs.dungeon.map.length - 1 && gs.dungeon.map[nextIdx] !== "boss") {
      gs.dungeon.map[nextIdx] = "windfall";
    }
    msg = "🔮 不思議な予兆… 何かが転がり込んでくる気がする";
  }
  gs.dungeon._omenActive = true;
  gs.dungeon._omenType = omenType;
  addLog("item", msg);
  saveGame();
}

function handleShortcut() {
  gs.dungeon.progress = Math.min(gs.dungeon.map.length - 1, gs.dungeon.progress + 1);
  addLog("item", "💨 抜け道を発見！ 一マス先へ進んだ");
  saveGame();
  render();
}

function handleTreasure(depth, floor) {
  // 40%の確率でGoldも追加ドロップ
  if(Math.random() < 0.4) {
    const ng = gs.dungeon.ng || 0;
    const goldDrop = Math.floor(floor * (50 + Math.floor(Math.random() * 51)) * (1 + ng * 0.15));
    gs.player.gold += goldDrop;
    addLog("item", `💰 宝箱に${goldSpan(goldDrop.toLocaleString() + "G")}も入っていた！`);
    showGoldPop(goldDrop);
  }
  const item = generateDrop(depth, floor);
  gainExp(10 + depth);
  const m = ITEM_MASTER[item.itemId];
  const r = RARITY_MASTER[item.rarity];
  const affixCount = item.affixes ? item.affixes.length : 0;
  const itemSpan = rarityItemSpan(m.name, item.rarity, affixCount);
  if(!gs.dungeon.autoRun?.active && gs.dungeon.loot.length >= getLootLimit()) {
    addLog("item", `✦ 宝箱から【${itemSpan}】を発見！荷物がいっぱい…`);
    openLootOverflowModal(item);
    return;
  }
  gs.dungeon.loot.push(item);
  addLog("item", `✦ 宝箱から【${itemSpan}】を発見！`);
}

function handleGoldRoom(depth, floor) {
  const ng = gs.dungeon.ng || 0;
  const base = floor * (20 + Math.floor(Math.random() * 31)); // floor×20〜50G
  const gold = Math.floor(base * (1 + ng * 0.2));
  gs.player.gold += gold;
  gainExp(5 + depth);
  addLog("item", `💰 金貨の山を発見！ ${goldSpan("+" + gold.toLocaleString() + "G")}`);
  showGoldPop(gold);
  checkQuestProgress("gold_room");
}

function handleTrap(depth) {
  const floor  = gs.dungeon.activeFloor || gs.dungeon.floor;
  const r      = calcStats(gs);
  // luk補正：3F以下は最大+2、4Fは最大+3（毒スタートの補填）
  // 祠バフ（_shrineLukBuff）: LUK+5 として加算
  const _shrLuk = (gs.dungeon._shrineLukBuff ? 5 : 0);
  const lukBonus = Math.min(floor >= 4 ? 3 : 2, Math.floor(((r.total.luk || 0) + _shrLuk) / 10));
  const die1   = Math.ceil(Math.random() * 6);
  const die2   = Math.ceil(Math.random() * 6);
  const raw    = die1 + die2;
  const total  = Math.min(12, raw + lukBonus);

  // 階層別成功ライン（お守りバフで軽減）
  // 1F=7 / 2F=8 / 3F=8（休息削除との二重ペナルティ緩和） / 4F=9
  const _omamoriBonus = (r.omamoriEff?.successLineBonus || 0);
  const successLine = Math.max(2, (floor <= 1 ? 7 : floor <= 2 ? 8 : floor <= 3 ? 8 : 9) - _omamoriBonus);

  // 大失敗はゾロ目1が出たら補正・成功ライン関係なく必ず発動
  const isCritFail    = (die1 === 1 && die2 === 1);
  const isCritSuccess = (raw === 12) && !isCritFail;
  const isSuccess     = !isCritFail && !isCritSuccess && total >= successLine;

  // ダイス演出モーダルを表示してから結果適用
  _showTrapDiceModal(die1, die2, lukBonus, total, isCritSuccess, isCritFail, isSuccess, floor, successLine);
}

// サイコロ演出モーダル
function _showTrapDiceModal(die1, die2, lukBonus, total, isCritSuccess, isCritFail, isSuccess, floor, successLine) {
  const DICE_FACES = ["","⚀","⚁","⚂","⚃","⚄","⚅"];

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.cssText = "text-align:center;padding:24px 20px;max-width:300px;";
  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  // 結果データ
  const resultData = (() => {
    if(isCritFail)    return { icon:"💀", color:"var(--boss)", label:"大失敗！", sub:"罠が大爆発した！" };
    if(isCritSuccess) return { icon:"✨", color:"#ffdd44", label:"大成功！", sub:"罠を解除＆HP回復！" };
    if(isSuccess)     return { icon:"✓",  color:"var(--success-bright)", label:"成功！",   sub:"罠を解除した！" };

    if(_applied) return;
    _applied = true;
    overlay.remove();
    _applyTrapResult(isCritSuccess, isCritFail, isSuccess);
  };

  // Phase2の結果HTMLを描画してイベントを設定する関数
  const showResult = () => {
    const lukLine = lukBonus > 0
      ? `<span style="font-size:11px;color:var(--muted)"> + ${lukBonus}(luk)</span>` : "";
    const totalColor = isCritFail ? "var(--boss)" : isCritSuccess ? "#ffdd44" : total >= successLine ? "var(--success-bright)" : "#ff6644";

    mc.innerHTML = `
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px">⚠ 罠を発見！</div>

      </div>

        ${die1} + ${die2}${lukBonus > 0 ? ` + ${lukBonus}` : ""} = <span style="font-size:24px">${total}</span>${lukLine}
      </div>
      <div style="font-size:11px;color:var(--text-faint);margin-bottom:16px">成功ライン: ${successLine}以上</div>
      <div style="font-size:28px;margin-bottom:6px;animation:trapReveal 0.4s ease-out">${resultData.icon}</div>
      <div style="font-size:20px;font-weight:700;color:${resultData.color};margin-bottom:4px;animation:trapReveal 0.4s ease-out 0.1s both">${resultData.label}</div>

      <button class="btn btn-secondary" style="width:100%" id="trapContinueBtn">続ける</button>

  mc.innerHTML = `
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">⚠ 罠を発見！ダイスを振る…</div>

// 罠結果の実際の適用
function _applyTrapResult(isCritSuccess, isCritFail, isSuccess) {
  if(isCritSuccess || isSuccess) {
    if(isCritSuccess) {
      // 大成功：ダメージなし＋HP回復ボーナス
      const r = calcStats(gs);
      const heal = Math.floor(r.maxHp * 0.20);
      const actual = Math.min(heal, r.maxHp - gs.player.hp);
      if(actual > 0) {
        gs.player.hp = Math.min(r.maxHp, gs.player.hp + actual);
        addLog("item", `✨ 大成功！罠を完全に解除した（ダメージなし）${healSpan(actual + "HP")}`);
      } else {
        addLog("item", `✨ 大成功！罠を完全に解除した（ダメージなし）`);
      }
    } else {
      addLog("item", `✓ 成功！罠を解除した（ダメージなし）`);
    }
  } else if(isCritFail) {
    const dmg = Math.max(1, Math.floor(gs.player.maxHp * 0.4));
    gs.player.hp = Math.max(0, gs.player.hp - dmg);
    if(gs.dungeon._session) gs.dungeon._session.totalDmgTaken += dmg;
    if(!gs.dungeon.poisoned) gs.dungeon.poisoned = true;
    addLog("item", `💀 大失敗！罠が大爆発！${dmgSpan(dmg + " ダメージ")}＋${statusSpan("毒状態")}`);
    if(gs.player.hp <= 0) { saveGame(); leaveDungeon(false); return; }
  } else {
    const rate = 0.30 + Math.random() * 0.15;
    const dmg  = Math.max(1, Math.floor(gs.player.maxHp * rate));
    gs.player.hp = Math.max(0, gs.player.hp - dmg);
    if(gs.dungeon._session) gs.dungeon._session.totalDmgTaken += dmg;
    addLog("item", `✕ 失敗！罠が作動した… ${dmgSpan(dmg + " ダメージ")}`);
    if(gs.player.hp <= 0) { saveGame(); leaveDungeon(false); return; }
    tryAutoHeal(null);
  }
  saveGame();
  render();
}

function handleRest() {
  const r      = calcStats(gs);
  // 祠バフ（_shrineLukBuff）: LUK+5 として加算
  const _shrLukR = (gs.dungeon._shrineLukBuff ? 5 : 0);
  const lukBonus = Math.min(2, Math.floor(((r.total.luk || 0) + _shrLukR) / 10));
  const die1   = Math.ceil(Math.random() * 6);
  const die2   = Math.ceil(Math.random() * 6);
  const total  = Math.min(12, die1 + die2 + lukBonus);

  // 出目合計→回復率テーブル
  const healRate =
    total <= 4  ? 0.15 :
    total <= 7  ? 0.20 :
    total <= 10 ? 0.30 :
    total === 11 ? 0.40 : 0.50;

  _showRestDiceModal(die1, die2, lukBonus, total, healRate);
}

function _applyRestResult(healRate) {
  const r_apply  = calcStats(gs);
  const _voidHealMul = 1 + (r_apply.setVoidHealBonus || 0) / 100;
  const heal     = Math.floor(gs.player.maxHp * healRate * _voidHealMul);
  const actual   = Math.min(heal, gs.player.maxHp - gs.player.hp);
  gs.player.hp   = Math.min(gs.player.maxHp, gs.player.hp + heal);
  // MP回復（HP回復率の50%・最低10%）
  const mpHeal   = Math.floor(r_apply.maxMp * Math.max(0.1, healRate * 0.5));
  const mpActual = Math.min(mpHeal, r_apply.maxMp - gs.player.mp);
  gs.player.mp   = Math.min(r_apply.maxMp, gs.player.mp + mpHeal);
  if(gs.dungeon.poisoned) {
    gs.dungeon.poisoned = false;
    addLog("item", `💤 休息。HP${healSpan("+" + actual)}・MP${healSpan("+" + mpActual)}回復し、毒が癒えた`);
  } else {
    addLog("item", `💤 休息。HP${healSpan("+" + actual)}・MP${healSpan("+" + mpActual)}回復した`);
  }
  saveGame();
  render();
}
