<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>深淵商会</title>
<!-- favicon (SVG dataURI・追加ファイル不要) -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔</text></svg>">
<!-- OGP / SNSカードメタタグ (S49-OGP) -->
<meta name="description"         content="ダンジョンを潜り、装備を売る。転生を重ねるほど深まる放置型ループRPG。">
<meta property="og:type"         content="website">
<meta property="og:url"          content="https://men0tai0ko.github.io/deeptrade/">
<meta property="og:title"        content="深淵商会 — 冒険×放置ショップRPG">
<meta property="og:description"  content="ダンジョンを潜り、装備を売る。転生を重ねるほど深まる放置型ループRPG。">
<meta property="og:locale"       content="ja_JP">
<meta name="twitter:card"        content="summary">
<meta name="twitter:title"       content="深淵商会 — 冒険×放置ショップRPG">
<meta name="twitter:description" content="ダンジョンを潜り、装備を売る。転生を重ねるほど深まる放置型ループRPG。">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Cinzel:wght@400;700&display=swap');

  :root {
    --bg:       #0a0a0f;
    --surface:  #12121a;
    --card:     #1a1a26;
    --border:   #2a2a40;
    --accent:   #7b5ea7;
    --accent2:  #a07fd4;
    --gold:     #c9a84c;
    --red:      #c0392b;
    --green:    #27ae60;
    --blue:     #2980b9;
    --text:     #e8e8f0;
    --muted:    #6a6a8a;
    --rare:     #3498db;
    --epic:     #9b59b6;
    --legendary:#e67e22;
    /* 呪いシステム専用カラー */
    --curse:        #cc66ff;
    --curse-border: #9b00cc;
    --curse-bg:     #2a0030;
    /* UIコンポーネント背景（S44変数化） */
    --surface-deep: #1a1a2e;
    --surface-base: #0d0d18;
    --danger:       #e74c3c;  /* 危険・警告・赤系アクション（S55変数化） */
    --success:      #88ff88;  /* 成功・強化値・同行中など明緑（S55変数化） */
    --damage:       #ff8888;  /* 被ダメ・損失Gold・ネガティブ数値（S56変数化） */
    --warning:      #ff9999;  /* 強行潜入・分解確認など警戒色（S56変数化） */
    --filter-active:#2a2a4e;  /* フィルターボタンのアクティブ背景（S56変数化） */
    --unidentified: #cccc00;  /* 未鑑定品テキスト・バッジ色（S56変数化） */
    --border-subtle:#444;     /* 非アクティブ・disabled ボーダー（S57変数化） */
    --text-disabled:#555;     /* disabled テキスト・非活性ラベル（S57変数化） */
    --info:         #4488ff;  /* Rare色・守備中・選択チェック・完了バッジ（S57変数化） */
    --accent-bg:    #1a2a3a;  /* アクティブタブ・選択ボタン背景（S57変数化） */
    --bg-deep:      #111;     /* Analytics・実績・モーダル内カード背景（S57変数化） */
    --bg-mid:       #222;     /* 薄暗いボーダー・セクション区切り（S57変数化） */
    /* S59変数化 */
    --bg-darker:    #1a1a1a;  /* リスト区切り・背景最暗部 */
    --border-list:  #1a1a2a;  /* リスト行ボーダー */
    /* S60変数化 */
    --boss:         #ff2244;  /* ボスセル・赤強調 */
    --alert:        #ffcc00;  /* dockアラート・注意色 */
    --twitter:      #1da1f2;  /* X（Twitter）シェアボタン */
    --track-bg:     #1e1e2e;  /* プログレスバー背景 */
    --accent-light: #aaaaff;  /* 昇級ボタン・採用可能テキスト */
    --border-success:#226622; /* 強化値上昇ボーダー */
    --text-muted-blue:#aaaadd;/* 薄青テキスト（選択・魔晶石） */
    --unid-bg:      #1a1a00;  /* 未鑑定バッジ背景 */
    --unid-border:  #888800;  /* 未鑑定バッジボーダー */
    /* S61変数化 */
    --gold-dark:    #886600;  /* ドロップラベル・rage中間色 */
    --bg-canvas:    #0a0a14;  /* canvas背景・最暗UI背景 */
    --gold-bg:      #1a1200;  /* ゴールド系カード背景 */
    --dmg-text:     #ff6666;  /* ダメージ数値・力尽き色 */
    --danger-dark:  #8a2a2a;  /* 強行潜入・分解ボタンボーダー */
    --success-bright:#44dd88; /* 罠成功・スキル発動色 */
    --surface-alt:  #0d0d1a;  /* モーダル内サブ背景 */
    --btn-default:  #585880;  /* デフォルトボタン背景 */
    --legendary-bright:#e6ac2e; /* UI用明るいLegendary色・CP値・コレクション達成 */
    --green-bright:  #2ecc71;  /* 常連定期来訪・需要高・探索タブ色 */
    --text-strike:   #888888;  /* affix消滅色（打ち消し線） */
    --blackmarket:   #ff6688;  /* 裏取引・バイヤー色 */
    /* S58変数化 */
    --border-dark:  #333;     /* 暗いボーダー・枠線 */
    --text-faint:   #666;     /* 非活性・補足テキスト */
    --text-mid:     #888;     /* 中間グレーテキスト */
    --text-white:   #fff;     /* 純白テキスト（btn等） */
    --text-light:   #ccc;     /* 薄いテキスト */
    --text-subtle:  #aaa;     /* Normal色・淡テキスト */
  }

  html { height: 100%; overflow: hidden; }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    overflow: hidden;
    display: flex;
    justify-content: center;
  }

  #app {
    width: 100%;
    max-width: 480px;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── ヘッダー ── */
  #topBar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px 8px;
    flex-shrink: 0;
  }

  .topRow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .gameTitle {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--accent2);
    letter-spacing: 2px;
  }

  .goldDisplay {
    font-size: 15px;
    color: var(--gold);
    font-weight: 700;
  }

  .barsRow {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .statBar { }

  .statLabel {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 2px;
    display: flex;
    justify-content: space-between;
  }

  .barTrack {
    height: 6px;
    background: var(--track-bg);
    border-radius: 3px;
    overflow: hidden;
  }

  .barFill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .hpFill  { background: linear-gradient(90deg, #8b0000, var(--danger)); }
  .mpFill  { background: linear-gradient(90deg, #003366, var(--rare)); }
  .expFill { background: linear-gradient(90deg, #4a2080, var(--epic)); }

  /* ── タブ ── */
  #tabBar {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab {
    flex: 1;
    padding: 10px 4px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }

  .tab.active {
    color: var(--accent2);
    border-bottom-color: var(--accent2);
  }

  /* ── メイン ── */
  #screen {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 14px;
    min-height: 0;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }

  /* アイテムリストのみスクロールさせるモード */
  #screen.list-scroll-mode {
    overflow: hidden !important;
    padding: 0 !important;
    display: flex !important;
    flex-direction: column !important;
  }

  /* 探索中モード：ログをフッターまで伸縮させる */
  #screen.list-scroll-mode .list-header {
    padding: 14px 14px 0;
    flex-shrink: 0;
    overflow: hidden;
    max-height: 55vh;
  }

  #screen.list-scroll-mode .list-body {
    flex: 1 !important;
    overflow-y: auto !important;
    overflow-x: hidden !important;
    padding: 0 14px 14px;
    min-height: 0 !important;
  }

  /* ── ボタン共通 ── */
  .btn {
    display: block;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary { background: var(--accent); color: var(--text-white); }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--red); color: var(--text-white); }
  .btn-gold { background: #4a3800; color: var(--gold); border: 1px solid var(--gold); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── アクションバー ── */
  #actionBar {
    flex-shrink: 0;
    min-height: 72px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 10px 14px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  /* ── アイコンドック ── */
  #iconDock {
    flex-shrink: 0;
    display: flex;
    gap: 6px;
    padding: 6px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    justify-content: flex-start;
    flex-wrap: nowrap;
    overflow-x: auto;
  }

  .dockBtn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .dockBtn:active { background: #2a2a3e; border-color: var(--accent2); }
  .dockBtn .dockIcon { font-size: 18px; line-height: 1; }
  .dockBtn .dockLabel { font-size: 9px; color: var(--muted); white-space: nowrap; }
  .dockBtn.dock-alert { border-color: var(--alert); }
  .dockBtn.dock-alert .dockLabel { color: var(--alert); }

  /* ── カード ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }

  .cardTitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ── ダンジョン ── */
  .dungeonHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .dungeonFloor {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--accent2);
  }

  .dungeonProgress {
    font-size: 12px;
    color: var(--muted);
  }

  .mapRow {
    display: flex;
    gap: 4px;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 14px;
    scrollbar-width: thin;
    scrollbar-color: #3a3a5a transparent;
  }
  .mapRow::-webkit-scrollbar { height: 4px; }
  .mapRow::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 2px; }

  .mapCell {
    width: 32px;
    height: 32px;
    border-radius: 5px;
    background: var(--track-bg);
    border: 1px solid var(--border);
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .mapCell.visited { background: #2a2a3e; }
  .mapCell.current { background: var(--accent); border-color: var(--accent2); }
  .mapCell.bossCell { border-color: var(--boss); color: var(--boss); font-weight: bold; }

  /* ── ボス専用カード ── */
  .bossCard {
    background: #150008;
    border: 2px solid #aa0022;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
    text-align: center;
    box-shadow: 0 0 12px rgba(200,0,40,0.3);
    animation: bossPulse 2s infinite alternate;
  }
  @keyframes bossPulse {
    from { box-shadow: 0 0 8px rgba(200,0,40,0.2); }
    to   { box-shadow: 0 0 18px rgba(200,0,40,0.5); }
  }

  /* ── ボス演出 ── */
  .boss-intro-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; animation: fadeIn 0.3s;
  }
  .boss-intro-box {
    text-align: center; padding: 40px 30px;
    animation: bossIntroIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes bossIntroIn {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .boss-intro-icon { font-size: 80px; display: block; margin-bottom: 16px; }
  .boss-intro-name {
    font-family: 'Cinzel', serif; font-size: 26px; color: var(--boss);
    text-shadow: 0 0 20px rgba(255,34,68,0.8); margin-bottom: 8px;
  }
  .boss-intro-flavor { font-size: 13px; color: #aa8888; margin-bottom: 24px; }

  .phase-flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 150;
    animation: phaseFlash 0.6s forwards;
  }
  @keyframes phaseFlash {
    0%   { background: rgba(255,100,0,0.5); }
    100% { background: rgba(255,100,0,0); }
  }
  .rage-flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 150;
    animation: rageFlash 0.8s forwards;
  }
  @keyframes rageFlash {
    0%,30% { background: rgba(255,0,40,0.45); }
    100%   { background: rgba(255,0,40,0); }
  }

  .boss-action-banner {
    position: fixed; left: 0; right: 0; top: 40%;
    text-align: center; pointer-events: none; z-index: 160;
    animation: actionBanner 1.1s forwards;
  }
  @keyframes actionBanner {
    0%   { opacity: 0; transform: scale(0.7); }
    20%  { opacity: 1; transform: scale(1.08); }
    70%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1); }
  }
  .boss-action-text {
    display: inline-block; font-size: 24px; font-weight: 700;
    color: var(--text-white); text-shadow: 0 0 16px rgba(255,80,0,0.9);
    background: rgba(0,0,0,0.7); padding: 10px 24px; border-radius: 12px;
    border: 1px solid rgba(255,80,0,0.5);
  }

  .boss-result-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; animation: fadeIn 0.4s;
  }
  .boss-result-box {
    text-align: center; padding: 40px 30px; max-width: 360px;
    animation: bossIntroIn 0.5s ease-out;
  }
  .boss-result-title {
    font-family: 'Cinzel', serif; font-size: 22px; color: var(--gold);
    text-shadow: 0 0 16px rgba(255,200,0,0.8); margin-bottom: 20px;
  }

  /* ── イベントログ ── */
  .eventBox {
    background: var(--surface-base);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    height: 90px;
    overflow-y: auto;
    margin-bottom: 12px;
    font-size: 12px;
    line-height: 1.75;
    scroll-behavior: smooth;
  }

  .logLine { margin-bottom: 2px; color: #cccccc; }

  /* ── 敵情報 ── */
  .enemyCard {
    background: #150a0a;
    border: 1px solid #3a1a1a;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 12px;
    text-align: center;
  }

  .enemyName {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    color: var(--danger);
    margin-bottom: 8px;
  }

  .enemyHpTrack {
    height: 8px;
    background: #1e0808;
    border-radius: 4px;
    overflow: hidden;
  }

  .enemyHpFill {
    height: 100%;
    background: linear-gradient(90deg, #8b0000, var(--danger));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* ── アイテム ── */
  .itemCard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .itemIcon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .rarity-normal    { background: #1e2a1e; border: 1px solid #3a4a3a; }
  .rarity-unidentified { background: #1e1e1e; border: 1px solid #3a3a3a; }
  .rarity-rare      { background: #1a2540; border: 1px solid var(--rare); }
  .rarity-epic      { background: #2a1a3a; border: 1px solid var(--epic); }
  .rarity-legendary { background: #3a2000; border: 1px solid var(--legendary); }

  .itemInfo { flex: 1; min-width: 0; }

  .itemName {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .itemSub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── 格納庫グリッドカード ── */
  .invGrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 2px;
  }

  .invCard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    text-align: center;
    position: relative;
    min-width: 0;
  }

  .invCard:active { opacity: 0.75; }
  .invCard.opacity-50 { opacity: 0.5; }

  .invCardIcon {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    position: relative;
  }

  .shelfIcon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    position: relative;
  }

  .invCardName {
    font-size: 10px;
    font-weight: 700;
    line-height: 1.3;
    word-break: break-all;
    width: 100%;
  }

  .invCardSub {
    font-size: 10px;
    color: var(--muted);
    width: 100%;
  }

  .invCardBadge {
    position: absolute;
    bottom: -4px;
    right: -6px;
    background: var(--border-dark);
    border: 1px solid var(--text-faint);
    color: var(--text-white);
    font-size: 9px;
    font-weight: 700;
    padding: 1px 3px;
    border-radius: 4px;
    line-height: 1.2;
  }

  .invCardEnhLv {
    position: absolute;
    top: -4px;
    left: -4px;
    background: #1a3a20;
    border: 1px solid #3a7a40;
    color: var(--success);
    font-size: 9px;
    font-weight: 700;
    padding: 1px 3px;
    border-radius: 4px;
    line-height: 1.2;
  }

  .invCardLock {
    position: absolute;
    top: -4px;
    right: -4px;
    background: #2a2a10;
    border: 1px solid #aaaa00;
    color: #ffee44;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 3px;
    border-radius: 4px;
    line-height: 1.2;
    pointer-events: none;
  }
  .invCardCurse {
    position: absolute;
    bottom: -4px;
    right: -4px;
    font-size: 11px;
    line-height: 1;
    pointer-events: none;
  }

  .itemPrice {
    font-size: 13px;
    color: var(--gold);
    font-weight: 700;
    flex-shrink: 0;
  }

  .rarityBadge {
    display: inline-block;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 5px;
    font-weight: 700;
  }

  .badge-normal    { background: #3a4a3a; color: var(--green); }

  .badge-epic      { background: #3a1a5a; color: var(--epic); }

    grid-template-columns: repeat(3, 1fr);

    border: 1px dashed var(--border);
    border-radius: 10px;
    min-height: 90px;

    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;

    cursor: default;

  .shelfSlot.special-weapon    { border-color: var(--danger)44; }
  .shelfSlot.special-armor     { border-color: #3498db44; }
  .shelfSlot.special-accessory { border-color: #9b59b644; }
  .shelfSlot.special-consumable{ border-color: #27ae6044; }
  .shelfSlot.special-weapon.occupied    { border-color: var(--danger); }
  .shelfSlot.special-armor.occupied     { border-color: var(--rare); }
  .shelfSlot.special-accessory.occupied { border-color: var(--epic); }
  .shelfSlot.special-consumable.occupied{ border-color: var(--green); }

  .shelfItemName { font-size: 11px; font-weight: 700; margin-top: 4px; }
  .shelfTimer { font-size: 10px; color: var(--gold); margin-top: 3px; }
  .shelfEmpty { font-size: 22px; color: var(--border); }
  .shelfEmptyText { font-size: 10px; color: var(--muted); margin-top: 4px; }

  .timerBar {
    width: 100%;
    height: 3px;
    background: var(--track-bg);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .timerFill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 1s linear;
  }

  /* ── ステータス画面 ── */
  .statGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 10px;
  }

  .statCell {
    background: var(--surface-base);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
  }

  .statName { font-size: 10px; color: var(--muted); }
  .statValue { font-size: 20px; font-weight: 700; color: var(--accent2); margin-top: 2px; }

  /* ── モーダル ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: flex-end;
    z-index: 100;
    animation: fadeIn 0.2s;
  }

  .modal-content {
    width: 100%;
    max-width: 480px;
    margin: auto;
    background: var(--surface);
    border-top: 1px solid var(--border);

    padding: 20px 16px 30px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease-out;

  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    color: #ffffff;
    margin-bottom: 10px;

    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    position: sticky;
    top: -20px;
    margin-top: -20px;
    padding: 18px 0 10px;
    background: var(--surface);
    z-index: 1;

    font-family: sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #f0c040;
    background: var(--gold-bg);
    border: 1px solid #554400;
    border-radius: 10px;
    padding: 2px 8px;
    white-space: nowrap;

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(40px); } to { transform: translateY(0); } }

  /* ── LvUp ── */

    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);

    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.3s;
  }

  .lvup-title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 4px;
    text-shadow: 0 0 20px var(--gold);
    margin-bottom: 8px;
    animation: pulse 1s infinite alternate;
  }

  @keyframes pulse {
    from { text-shadow: 0 0 10px var(--gold); }
    to   { text-shadow: 0 0 30px var(--gold), 0 0 60px var(--gold); }
  }

  .lvup-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

  .statChoices {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 380px;
  }

  .statChoice {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .statChoice:hover, .statChoice:active {
    border-color: var(--accent2);
    background: #1e1e30;
  }

  .statChoiceName { font-size: 11px; color: var(--muted); }
  .statChoiceVal  { font-size: 20px; font-weight: 700; color: var(--accent2); }
  .statChoiceInc  { font-size: 11px; color: var(--green); }

  /* ── ショップ経験値バー ── */
  .shopExpBar { margin-bottom: 14px; }
  .shopExpLabel {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;

    margin-top: 12px;
    background: linear-gradient(135deg, #2d2d50, #1a1a3a);

    padding: 10px 24px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }

    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);

    align-items: center;
    justify-content: center;
    z-index: 1100;
    animation: fadeIn 0.2s;
  }

    background: var(--card);

    border-radius: 14px;
    padding: 18px 14px;

    max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;

    display: flex;
    justify-content: space-between;
    font-size: 16px;

    margin-top: -18px;
    padding: 16px 0 10px;

    position: sticky;
    bottom: -18px;

    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    margin: 10px 0 6px;

    display: flex;
    gap: 8px;
    flex-wrap: wrap;

    flex: 1;

    background: var(--bg);

  /* ── その他 ── */
  .sectionTitle {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;

    text-align: center;
    color: var(--muted);

    font-size: 11px;

    display: inline-block;

    margin-left: 5px;
  }

  .shake {
    animation: shakeAnim 0.3s;
  }

  @keyframes diceRoll {
    0%   { transform: rotate(0deg)   scale(1);   }
    20%  { transform: rotate(120deg) scale(1.2); }
    40%  { transform: rotate(240deg) scale(0.9); }
    60%  { transform: rotate(360deg) scale(1.3); }
    80%  { transform: rotate(480deg) scale(1.0); }
    100% { transform: rotate(540deg) scale(1);   }
  }
  @keyframes diceSettle {
    0%   { transform: scale(1.3); }
    60%  { transform: scale(0.9); }
    100% { transform: scale(1.0); }
  }
  @keyframes trapReveal {
    from { opacity:0; transform: translateY(8px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes shakeAnim {
    0%   { transform: translateX(0); }
    25%  { transform: translateX(-4px); }
    50%  { transform: translateX(4px); }
    75%  { transform: translateX(-3px); }
    100% { transform: translateX(0); }

  .goldPop {
    position: fixed;
    pointer-events: none;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
    animation: floatUp 0.9s forwards;
    z-index: 300;
  }

  @keyframes floatUp {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-50px); }

  /* ── 次の一手ヒント (S48-HINT) ── */

    display: flex;
    align-items: center;
    gap: 10px;

    border: 1px solid var(--accent);

    padding: 10px 14px;
    margin-bottom: 10px;

    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .next-action-hint:active { opacity: 0.75; }
  @keyframes hintFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }

    flex-shrink: 0;
    width: 32px;

  .hint-body { flex: 1; min-width: 0; }
  .hint-label {
    font-size: 9px;
    color: var(--accent);

    text-transform: uppercase;

  .tab-sale-badge {

  @keyframes badgePulse {

  .daily-toast {

    left: 50%;

  .daily-toast.visible { bottom: 200px; }
  .daily-toast:active { opacity: 0.8; }

// Lvから効果を計算
function regularBonusPct(lv) { return Math.min(50, lv * 5); }
function regularVisitInterval(lv) {
  const reduction = Math.min(0.7, lv * 0.05); // 最大70%短縮
  return Math.floor(REGULAR_VISIT_INTERVAL_BASE * (1 - reduction));
}
function regularCanOrder(lv) { return lv >= 3; }
function regularCanFastVisit(lv) { return lv >= 5; }

// 常連セリフを取得
function regularSerif(reg) {
  const pool = reg.lv >= 10 ? REGULAR_SERIFS.high
             : reg.lv >= 5  ? REGULAR_SERIFS.mid
             : REGULAR_SERIFS.low;
  return pool[Math.floor(Math.random() * pool.length)];
}

// 購入後に常連判定・更新
function processRegularPurchase(customer, item) {
  if(!gs.shop.regulars) gs.shop.regulars = [];
  const regs = gs.shop.regulars;
  const m = ITEM_MASTER[item.itemId];

  // 既存常連かチェック
  let reg = regs.find(r => r.name === customer.name);

  if(!reg) {
    // 新規記録（初購入）
    const fixedPref = CUSTOMER_FIXED_PREF[customer.name];
    const preferFixed = fixedPref !== undefined && fixedPref !== null;
    reg = {
      id: customer.name + '_' + Date.now(),
      name: customer.name,
      icon: customer.icon,
      lv: 0,
      purchases: 0,
      preferFixed,
      preferType: fixedPref || m?.type || null,
      typeHistory: {},
      order: null,
      nextVisitAt: 0,
      bonusPct: 0,
    };
    regs.push(reg);
  }

  // 購入数カウント・好み履歴更新
  // 未鑑定品（謎箱）を喜んで買った客は常連化ポイント+2
  const unidBonus = !item.identified ? 1 : 0; // +1追加（合計+2）
  reg.purchases += 1 + unidBonus;
  if(m?.type) reg.typeHistory[m.type] = (reg.typeHistory[m.type] || 0) + 1;

  // 履歴型の場合、最多購入タイプに更新
  if(!reg.preferFixed) {
    const best = Object.entries(reg.typeHistory).sort((a,b)=>b[1]-a[1])[0];
    if(best) reg.preferType = best[0];
  }

  // Lv計算（10回ごとにLvUP）
  const newLv = Math.floor(reg.purchases / REGULAR_LV_THRESHOLD);
  const lvUped = newLv > reg.lv;
  const wasRegular = reg.lv > 0;
  reg.lv = newLv;
  reg.bonusPct = regularBonusPct(reg.lv);

  // 常連認定（初めてLv1になった瞬間）
  if(lvUped && reg.lv === 1) {
    addShopLog("good", `⭐ ${reg.icon}${reg.name} が常連客になった！（${reg.purchases}回目）`);
  } else if(lvUped && reg.lv > 1) {
    addShopLog("good", `⬆️ ${reg.icon}${reg.name} が常連Lv${reg.lv}になった！ 売値ボーナス+${reg.bonusPct}%`);
  }

  // 定期来訪タイマー更新
  reg.nextVisitAt = Date.now() + regularVisitInterval(reg.lv);
}

// 定期来訪チェック（常連がいたら棚を狙って来訪）
function checkRegularVisits() {
  if(!gs.shop.regulars) return;
  const now = Date.now();
  gs.shop.regulars.forEach(reg => {
    if(reg.lv < 1) return;
    if(now < reg.nextVisitAt) return;
    reg.nextVisitAt = now + regularVisitInterval(reg.lv);

    // 注文中の場合：棚に注文品があるか確認
    if(reg.order) {
      // 10分経過で注文キャンセル
      const ORDER_EXPIRE_MS = 10 * 60 * 1000;
      if(now - reg.order.requestedAt > ORDER_EXPIRE_MS) {
        addShopLog("info", `${reg.icon}${reg.name}「しばらく待ったけど…今回は諦めるよ」`);
        reg.order = null;
        saveGame();
        return;
      }
      const slotIdx = gs.shop.shelves.findIndex(s =>
        s && s.item && ITEM_MASTER[s.item.itemId]?.type === reg.order.itemType
      );
      if(slotIdx >= 0) {
        // 注文品購入
        const shelf = gs.shop.shelves[slotIdx];
        const item  = shelf.item;
        const basePrice = itemPrice(item);
        const bonus = Math.floor(basePrice * reg.bonusPct / 100);
        const price = basePrice + bonus;
        gs.player.gold += price;
        gs.shop.exp += Math.floor(price / 8);
        gs.shop.totalSales++;
        if(gs.achievements?.stats) gs.achievements.stats.totalRegularBuys = (gs.achievements.stats.totalRegularBuys||0) + 1;
        const _rc2 = item.identified ? (RARITY_MASTER[item.rarity]?.color || 'var(--text-light)') : 'var(--unidentified)';
        addShopLog("gold", `📦 ${reg.icon}${reg.name}「注文の品、確かに！」→【<span style="color:${_rc2};font-weight:700">${itemDisplayName(item)}</span>】${price}G（+${bonus}G 常連ボーナス）`);
        notifySale(item, price); // 売却快感演出（S48-SALE）
        reduceDemand(item);
        gs.shop.shelves[slotIdx] = null;
        reg.order = null;
        processRegularPurchase({ name:reg.name, icon:reg.icon }, item);
        saveGame(); render();
        return;
      } else {
        const _slotLbl  = Object.fromEntries(EQUIP_SLOTS.map(s=>[s.key,s.label]));
        const _extraLbl = { armor:"防具", accessory:"装飾品", material:"素材", consumable:"消耗品" };
        const _typeLbl  = _slotLbl[reg.order.itemType] || _extraLbl[reg.order.itemType] || reg.order.itemType;
        addShopLog("info", `${reg.icon}${reg.name}「${_typeLbl}を探してたんだけど…まだかな」`);
        return;
      }
    }

    // 棚に好みのアイテムがあるか
    const preferred = gs.shop.shelves.filter(s =>
      s && s.item && reg.preferType && ITEM_MASTER[s?.item?.itemId]?.type === reg.preferType
    );
    if(preferred.length === 0) {
      // 好み品なし：軽くセリフだけ
      addShopLog("info", `${reg.icon}${reg.name}「${regularSerif(reg)}」（今日は合う品がなかった）`);
      return;
    }

    // 来訪購入
    const slotIdx = gs.shop.shelves.findIndex(s =>
      s && s.item && reg.preferType && ITEM_MASTER[s.item.itemId]?.type === reg.preferType
    );
    if(slotIdx < 0) return; // item:null の特化スロットのみの場合は購入しない（S65-BUG）
    const shelf = gs.shop.shelves[slotIdx];
    const item  = shelf.item;
    const basePrice = itemPrice(item);
    const bonus = Math.floor(basePrice * reg.bonusPct / 100);
    const price = basePrice + bonus;
    gs.player.gold += price;
    gs.shop.exp += Math.floor(price / 8);
    gs.shop.totalSales++;
    if(gs.achievements?.stats) gs.achievements.stats.totalRegularBuys = (gs.achievements.stats.totalRegularBuys||0) + 1;
    const _rc3 = item.identified ? (RARITY_MASTER[item.rarity]?.color || 'var(--text-light)') : 'var(--unidentified)';
    addShopLog("gold", `⭐ ${reg.icon}${reg.name}「${regularSerif(reg)}」→【<span style="color:${_rc3};font-weight:700">${itemDisplayName(item)}</span>】${price}G（常連Lv${reg.lv} +${bonus}G）`);
    notifySale(item, price); // 売却快感演出（S48-SALE）
    reduceDemand(item);
    gs.shop.shelves[slotIdx] = null;
    processRegularPurchase({ name:reg.name, icon:reg.icon }, item);
    saveGame(); render();
  });
}

// 常連が注文を出す（Lv3以上でランダムに発動）
function checkRegularOrders() {
  if(!gs.shop.regulars) return;
  gs.shop.regulars.forEach(reg => {
    if(!regularCanOrder(reg.lv)) return;
    if(reg.order) return; // すでに注文中
    if(Math.random() > 0.02) return; // 2%/秒の確率で注文発生
    const types = ["weapon","sub","head","body","cloak","legs","arms","feet","neck","bracelet","ring","seal"];
    const orderType = reg.preferType || types[Math.floor(Math.random()*types.length)];
    reg.order = { itemType: orderType, requestedAt: Date.now() };
    const slotLabelMap = Object.fromEntries(EQUIP_SLOTS.map(s=>[s.key, s.label]));
    const extraLabel   = { armor:"防具", accessory:"装飾品", material:"素材", consumable:"消耗品" };
    const typeLabel = slotLabelMap[orderType] || extraLabel[orderType] || orderType;
    addShopLog("item", `📋 ${reg.icon}${reg.name}「${typeLabel}を取り置きしてほしいんだけど、棚に出してもらえる？」`);
    saveGame();
  });
}

// ★段階を含むcolIdの報酬を返すヘルパー
// colId形式: "iron_w_n_0"=基本, "iron_w_n_3"=★3
function getColReward(colId) {
  // まず新形式（_0付き）で直接ヒットするか試みる
  if(colId in COLLECTION_REWARDS) return COLLECTION_REWARDS[colId];
  // 末尾の _N を取り除いてenhStepを抽出
  const m = colId.match(/^(.+)_(\d+)$/);
  if(!m) return null;
  const step      = parseInt(m[2], 10);
  const baseNoStep = m[1]; // "iron_w_n" 形式（_0なし）= COLLECTION_REWARDSのキー
  if(step === 0) return COLLECTION_REWARDS[baseNoStep] || null;
  // ★1以上：基本報酬からgetEnhStepRewardで動的生成
  const baseColId = baseNoStep; // COLLECTION_REWARDSのキーをそのまま使う
  return getEnhStepReward(baseColId, step) || null;
}

// enhStep付きコレクションID生成
// enhStep: 0=基本達成, 1〜12=★段階
function makeColId(themeId, part, rarity, enhStep) {
  const r = {normal:'n', rare:'r', epic:'e', legendary:'l'}[rarity];
  const e = (enhStep === undefined || enhStep === 0) ? '0' : String(enhStep);
  const th = COLLECTION_THEME[themeId];
  if(th?.isAcc || th?.isSlot) return themeId + '_' + r + '_' + e;
  const p = part === 'weapon' ? 'w' : part === 'armor' ? 'a' : part === 'acc' ? 'acc' : 'all';
  return themeId + '_' + p + '_' + r + '_' + e;
}

// enhStep段階の達成判定（maxEnhを参照）
// enhStep: 0=+0以上, 1=+1以上 ... 12=+12以上
function checkCollection(themeId, rarity, enhStep) {
  const theme  = COLLECTION_THEME[themeId];
  const maxEnh = gs.collection?.maxEnh || {};
  const step   = enhStep || 0;
  const hasItem = id => (maxEnh[id + '_' + rarity] ?? -1) >= step;
  if(theme.isAcc || theme.isSlot) {
    return { all: theme.items.every(hasItem) };
  }
  const hasW = theme.weapon.every(hasItem);
  const hasA = theme.armor.every(hasItem);
  const hasAcc = theme.acc ? theme.acc.every(hasItem) : true; // accなしテーマはtrueで無視
  return { weapon: hasW, armor: hasA, acc: hasAcc, all: hasW && hasA && hasAcc };
}

function calcCollectionBonus() {
  const done  = gs.collection?.completed || [];
  const bonus = { str:0, def:0, agi:0, vit:0, luk:0, int:0,
                  critRate:0, maxHpPct:0, escapeBonus:0, poisonDmg:0, count:done.length };
  for(const colId of done) {
    const r = getColReward(colId);
    if(!r) continue;
    for(const [k,v] of Object.entries(r)) { if(bonus[k] !== undefined) bonus[k] += v; }
  }
  return bonus;
}

// ★段階追加報酬の動的生成（新設計）
// ステータス系（str/def/agi/vit/luk/int）：毎★+1（基本報酬に存在するキーのみ）
// %系（critRate/maxHpPct）：★4/★8/★12で+1
// escapeBonus/poisonDmg：★6/★12で+3
function getEnhStepReward(baseColId, enhStep) {
  if(!enhStep || enhStep <= 0) return {};
  const base = COLLECTION_REWARDS[baseColId];
  if(!base) return {};
  const result = {};
  const STAT_KEYS = new Set(['str','def','agi','vit','luk','int']);
  const PCT_KEYS  = new Set(['critRate','maxHpPct']);
  const BONUS_KEYS = new Set(['escapeBonus','poisonDmg']);
  for(const k of Object.keys(base)) {
    if(STAT_KEYS.has(k))        result[k] = 1;                       // 毎★+1
    else if(PCT_KEYS.has(k))  { if(enhStep % 4 === 0) result[k] = 1; }  // ★4/8/12で+1
    else if(BONUS_KEYS.has(k)){ if(enhStep % 6 === 0) result[k] = 3; }  // ★6/12で+3
  }
  return result;
}

// ★N達成時の累積報酬合計（★0〜★Nの全加算）を返す（進行中カードの表示用）
function getColCumulativeReward(themeId, part, rarity, upToStep) {
  const th = COLLECTION_THEME[themeId];
  const r  = {normal:'n', rare:'r', epic:'e', legendary:'l'}[rarity];
  const p  = (th?.isAcc || th?.isSlot) ? '' : (part === 'weapon' ? 'w' : part === 'armor' ? 'a' : part === 'acc' ? 'acc' : 'all');
  const baseKey = (th?.isAcc || th?.isSlot)
    ? themeId + '_' + r
    : themeId + '_' + p + '_' + r;
  const base = COLLECTION_REWARDS[baseKey];
  if(!base) return {};
  // ★0の報酬をベースに★1〜upToStepの追加分を累積
  const result = {...base};
  for(let s = 1; s <= upToStep; s++) {
    const add = getEnhStepReward(baseKey, s);
    for(const [k, v] of Object.entries(add)) {
      result[k] = (result[k] || 0) + v;
    }
  }
  return result;
}

// 装備タイプ判定セット（registerCollection・マイグレーション共通）
const EQUIP_TYPES_COL = new Set(["weapon","sub","head","body","cloak","legs","arms","feet",
                                  "neck","bracelet","ring","seal"]);

// maxEnh更新方式の収集登録
// トリガー：equipItem / listItem / stockManager自動陳列 / bmListItem（鑑定済み装備のみ）
function registerCollection(item) {
  if(!item.identified) return false;
  const m = ITEM_MASTER[item.itemId];
  if(!m || !EQUIP_TYPES_COL.has(m.type)) return false;
  if(!gs.collection)            gs.collection           = { entries:[], completed:[], maxEnh:{} };
  if(!gs.collection.maxEnh)     gs.collection.maxEnh    = {};
  if(!gs.collection.completed)  gs.collection.completed = [];

  const key     = item.itemId + '_' + item.rarity;
  const enh     = item.enhLv || 0;
  const prevEnh = gs.collection.maxEnh[key] ?? -1;

  // 最高強化値を更新（初回 or 更新時のみ処理）
  if(enh <= prevEnh) return false;
  gs.collection.maxEnh[key] = enh;

  // ★0〜enh の各段階について達成チェック
  const RARITIES = ["normal","rare","epic","legendary"];
  for(const themeId of Object.keys(COLLECTION_THEME)) {
    const theme    = COLLECTION_THEME[themeId];
    const allItems = (theme.isAcc || theme.isSlot) ? theme.items : [...theme.weapon, ...theme.armor, ...(theme.acc||[])];
    if(!allItems.includes(item.itemId)) continue;
    // 前回までに達成済みの最高enhStepを取得
    const prevMaxStep = (() => {
      for(let s = ENHANCE_MAX; s >= 0; s--) {
        const parts = (theme.isAcc || theme.isSlot) ? ["all"] : ["weapon","armor","acc","all"];
        for(const part of parts) {
          if(gs.collection.completed.includes(makeColId(themeId, part, item.rarity, s))) return s;
        }
      }
      return -1;
    })();
    // prevEnh+1 〜 enh の各段階をチェック（新たに到達した範囲のみ）
    for(let step = Math.max(0, prevEnh + 1); step <= enh; step++) {
      // 前段階が未達成なら進めない（★0未達成なら★1以降は不可）
      if(step > 0 && prevMaxStep < step - 1) continue;
      for(const rarity of RARITIES) {
        const parts = (theme.isAcc || theme.isSlot) ? ["all"] : ["weapon","armor","acc","all"];
        for(const part of parts) {
          // accパートを持たないテーマのacc部はスキップ
          if(part === "acc" && !theme.acc) continue;
          const colId = makeColId(themeId, part, rarity, step);
          if(gs.collection.completed.includes(colId)) continue;
          const result   = checkCollection(themeId, rarity, step);
          const achieved = part === "weapon" ? result.weapon
                         : part === "armor"  ? result.armor
                         : part === "acc"    ? result.acc
                         : result.all;
          if(!achieved) continue;
          gs.collection.completed.push(colId);
          // 収集★実績カウント（step=0は基本達成、1〜12は★段階）
          if(gs.achievements?.stats) {
            if(step > 0) gs.achievements.stats.totalColStar = (gs.achievements.stats.totalColStar||0) + 1;
          }
          // 収集系クエストをチェック
          checkQuestProgress("collect", {});
          // 報酬ログ
          const baseColId = makeColId(themeId, part, rarity, 0);
          const rw  = step === 0
            ? (COLLECTION_REWARDS[baseColId] || {})
            : getEnhStepReward(baseColId, step);
          const th   = COLLECTION_THEME[themeId];
          const pLbl = (theme.isAcc || theme.isSlot) ? ""
                     : (part === "weapon" ? "武具・" : part === "armor" ? "防具・" : part === "acc" ? "装身具・" : "全て・");
          const rLbl = RARITY_MASTER[rarity]?.label || rarity;
          const sLbl = step === 0 ? "" : `★${step}`;
          const rwStr = Object.entries(rw).map(([k,v]) => {
            const kl = {str:"STR",def:"DEF",agi:"AGI",vit:"VIT",luk:"LUK",int:"INT",
                        critRate:"クリ率",maxHpPct:"最大HP",escapeBonus:"逃走率",poisonDmg:"毒ダメ"}[k];
            return kl ? kl+"+"+(v)+(['critRate','maxHpPct','escapeBonus','poisonDmg'].includes(k)?"%":"") : "";
          }).filter(Boolean).join("・");
          addLog("item", `📖【${th.icon}${th.title}・${pLbl}(${rLbl})${sLbl}】達成！ ${rwStr || "記録に刻まれた"}`);
        }
      }
    }
  }
  return true;
}

// 装備中アイテムからセット達成状況を計算
function calcSetBonuses(gs) {
  const equipped = Object.values(gs.equipped).filter(Boolean);
  const equippedItemIds = equipped.map(uid => {
    const item = gs.inventory.find(i => i.uid === uid);
    return item?.itemId || null;
  }).filter(Boolean);
  const idSet = new Set(equippedItemIds);

  const results = [];
  for(const set of SET_MASTER) {
    const count = set.items.filter(id => idSet.has(id)).length;
    if(count < 2) continue;
    // 達成している効果を収集
    const activeEffects = set.effects.filter(e => count >= e.need);
    if(activeEffects.length === 0) continue;
    results.push({ set, count, activeEffects });
  }
  return results;
}

const OMAMORI_EFFECTS = {
  normal:    { successLineBonus:1, allStatPct:0,  label:"罠成功ライン-1" },
  rare:      { successLineBonus:1, allStatPct:8,  label:"罠成功ライン-1・全ステ+8%" },
  epic:      { successLineBonus:2, allStatPct:15, label:"罠成功ライン-2・全ステ+15%" },
  legendary: { successLineBonus:2, allStatPct:20, label:"罠成功ライン-2・全ステ+20%" },
};

function getActiveOmamori(gs) {
  const cs = gs.dungeon?.consumables?.omamori;
  if(!cs || !cs.length) return null;
  const priority = gs.dungeon?.omamoriPriority || "low";
  const sorted = [...cs].filter(s => s.count > 0).sort((a,b) => {
    const order = {normal:0,rare:1,epic:2,legendary:3};
    return priority === "low"
      ? (order[a.rarity]||0) - (order[b.rarity]||0)
      : (order[b.rarity]||0) - (order[a.rarity]||0);
  });
  return sorted[0] || null;
}

function getShelfSpecialDef(specialId) {
  return SHELF_SPECIAL_TYPES.find(t => t.id === specialId) || SHELF_SPECIAL_TYPES[0];
}

function itemMatchesShelfSpecial(item, specialId) {
  if(!specialId) return false;
  const def = getShelfSpecialDef(specialId);
  const m   = ITEM_MASTER[item.itemId];
  return def.itemTypes.includes(m?.type);
}

// スタッフのLvNの効果を計算して返す
function getStaffEffect(staffObj) {
  const def = STAFF_MASTER[staffObj.id];
  if(!def) return {};
  const lv = Math.max(1, Math.min(staffObj.lv || 1, STAFF_MAX_LV));
  const eff = {};
  Object.keys(def.base).forEach(k => {
    const raw = def.base[k] + (def.gain[k] || 0) * (lv - 1);
    eff[k] = def.cap[k] != null ? Math.min(def.cap[k], raw) : raw;
    // materialIntervalMin は整数で最小1
    if(k === 'materialIntervalMin') eff[k] = Math.max(1, Math.floor(4 - Math.floor((lv-1)/10)));
  });
  return eff;
}

// LvN→N+1 の育成コスト（2乗急峻型）
function staffUpgradeCost(def, currentLv) {
  return Math.floor(def.hireCost * currentLv * currentLv * 0.4);
}

// 雇用中スタッフの全効果を集計
function calcStaffBonus() {
  const bonus = {
    sellPctBonus:0, sellSpeedBonus:0, raidRiskReduce:0, enhSuccessBonus:0,
    firstHitAvoidPct:0, mercCostReduce:0,
    purifySuccessBonus:0, purifyFailSafe:0,
    returnHealPct:0,
  };
  (gs.shop?.staff || []).forEach(s => {
    const e = getStaffEffect(s);
    if(e.sellPctBonus)       bonus.sellPctBonus       += e.sellPctBonus;
    if(e.sellSpeedBonus)     bonus.sellSpeedBonus     += e.sellSpeedBonus;
    if(e.raidRiskReduce)     bonus.raidRiskReduce     += e.raidRiskReduce;
    if(e.enhSuccessBonus)    bonus.enhSuccessBonus    += e.enhSuccessBonus;
    if(e.firstHitAvoidPct)   bonus.firstHitAvoidPct   += e.firstHitAvoidPct;
    if(e.mercCostReduce)     bonus.mercCostReduce     += e.mercCostReduce;
    if(e.purifySuccessBonus) bonus.purifySuccessBonus += e.purifySuccessBonus;
    if(e.purifyFailSafe)     bonus.purifyFailSafe     += e.purifyFailSafe;
    if(e.returnHealPct)      bonus.returnHealPct      += e.returnHealPct;
  });
  return bonus;
}

// スタッフの初撃回避判定（ダンジョン潜入時に呼ぶ）
function rollFirstHitAvoid() {
  const pct = calcStaffBonus().firstHitAvoidPct;
  return pct > 0 && Math.random() * 100 < pct;
}

// 傭兵コスト（割引後）を返す
function calcMercCost(baseCost) {
  const reduce = Math.min(40, calcStaffBonus().mercCostReduce);
  return Math.max(1, Math.floor(baseCost * (1 - reduce / 100)));
}

// ランク制実績のヘルパー
// 必要数: base * rank^1.8（ランクが上がるほど間隔が広がる）
function _achRankReq(base, rank) {
  return Math.floor(base * Math.pow(rank, 1.8));
}
// ランク別報酬生成
function _achRankReward(rank) {
  if(rank <= 5)  return { gold: rank * 300 };
  if(rank <= 10) return { gold: rank * 200, items:[{id:"gem", count: Math.floor(rank/3)}] };
  if(rank <= 20) return { items:[{id:"ancient_coin", count: Math.floor(rank/5)+1}] };
  if(rank <= 35) return { items:[{id:"magic_crystal", count: Math.floor(rank/10)+1}] };
  return { gold: rank * 500, items:[{id:"magic_crystal", count: Math.floor(rank/8)+1}] };
}
// ランク制実績エントリーを生成（ランク50まで）
function _makeRankedAch(baseId, cat, name, icon, statKey, base, expVal) {
  const entries = [];
  for(let r = 1; r <= 50; r++) {
    const req = Math.floor(base * Math.pow(r, expVal));
    entries.push({
      id: `${baseId}_r${r}`,
      cat, icon,
      name: `${name} Rank${r}`,
      desc: `累計${req.toLocaleString()}`,
      ranked: true,
      rankBase: baseId,
      rank: r,
      check: ((n) => () => (gs.achievements.stats[statKey]||0) >= n)(req),
      reward: _achRankReward(r),
    });
  }
  return entries;
}

// ─────────────────────────────────────────
// 計算
// ─────────────────────────────────────────
function calcStats(gs) {
  const b = gs.player.base;
  const bonus = {str:0,def:0,agi:0,vit:0,int:0,luk:0};
  Object.values(gs.equipped).forEach(uid=>{
    if(!uid) return;
    const item = gs.inventory.find(i=>i.uid===uid);
    if(!item) return;
    const m = ITEM_MASTER[item.itemId];
    if(!m) return;
    // ベースステータス補正（昇級済みは statOverride を優先）
    const baseStats = item.statOverride || m.stats || {};
    Object.entries(baseStats).forEach(([k,v])=>{ if(bonus[k]!==undefined) bonus[k]+=v; });
    // affix補正
    (item.affixes||[]).forEach(a=>{ if(bonus[a.stat]!==undefined) bonus[a.stat]+=a.val; });
    // 強化補正（HP・MPにのみ寄与する専用ボーナスとして別管理）
    // ステータス値には直接加算しない（防御無効化防止）
    const enh = item.enhLv || 0;
    // 呪い補正（def_downのみここで処理）
    if(item.cursed && item.curse && item.curse.type === 'def_down') {
      if(bonus.def !== undefined) bonus.def -= item.curse.val;
    }
  });
  const total = {};
  Object.keys(b).forEach(k=>{ total[k] = b[k] + bonus[k]; });

  // スキルパッシブ補正（装備補正と分離して管理）
  const skillBonus = {str:0,def:0,agi:0,vit:0,int:0,luk:0};
  let skillExecuteMul=0, skillLowHpAtkMul=0, skillCounterRate=0, skillThornPct=0;
  let skillStatusResist=0, skillTreasureBonus=0, skillDropLukBonus=0;
  let skillMaterialDropBonus=0, skillMoveBonus=0, skillCurseAutoIdent=0;
  let skillPoisonDmgMul=0, skillDoubleStrikePct=0;
  let skillDmgReducePct=0, skillEscapeBonus=0;
  (gs.player.skills||[]).forEach(id=>{
    const sk = SKILL_MASTER[id];
    if(!sk) return;
    if(sk.effect.stat && skillBonus[sk.effect.stat] !== undefined) {
      skillBonus[sk.effect.stat] += sk.effect.val;
    }
    if(sk.effect.executeMul)         skillExecuteMul        += sk.effect.executeMul;
    if(sk.effect.lowHpAtkMul)        skillLowHpAtkMul       += sk.effect.lowHpAtkMul;
    if(sk.effect.counterRate)        skillCounterRate        += sk.effect.counterRate;
    if(sk.effect.thornPct)           skillThornPct           += sk.effect.thornPct;
    if(sk.effect.statusResist)       skillStatusResist       += sk.effect.statusResist;
    if(sk.effect.treasureBonus)      skillTreasureBonus      += sk.effect.treasureBonus;
    if(sk.effect.dropLukBonus)       skillDropLukBonus       += sk.effect.dropLukBonus;
    if(sk.effect.materialDropBonus)  skillMaterialDropBonus  += sk.effect.materialDropBonus;
    if(sk.effect.moveBonus)          skillMoveBonus          += sk.effect.moveBonus;
    if(sk.effect.curseAutoIdent)     skillCurseAutoIdent     += sk.effect.curseAutoIdent;
    if(sk.effect.poisonDmgMul)       skillPoisonDmgMul       += sk.effect.poisonDmgMul * 100; // %換算
    if(sk.effect.doubleStrike)       skillDoubleStrikePct    += sk.effect.doubleStrike;
    if(sk.effect.dmgReducePct)       skillDmgReducePct       += sk.effect.dmgReducePct;
    if(sk.effect.escapeBonus)        skillEscapeBonus        += sk.effect.escapeBonus;
  });
  Object.keys(skillBonus).forEach(k=>{ total[k] += skillBonus[k]; });

  // 永続スキルパッシブ補正（stat%加算）
  const rbSkills = gs.player.rebirthSkills || [];
  rbSkills.forEach(id => {
    const sk = REBIRTH_SKILL_MASTER[id];
    if(!sk) return;
    if(sk.type === "passive_pct") {
      if(sk.effect.stat === "all") {
        // rb_mastery: 全ステ+N%
        Object.keys(total).forEach(k => {
          total[k] = Math.floor(total[k] * (1 + sk.effect.pct / 100));
        });
      } else if(sk.effect.stat && total[sk.effect.stat] !== undefined) {
        total[sk.effect.stat] = Math.floor(total[sk.effect.stat] * (1 + sk.effect.pct / 100));
      }
    }
  });
  const rbHpPct = rbSkills.reduce((acc, id) => {
    const sk = REBIRTH_SKILL_MASTER[id];
    return acc + (sk?.effect?.maxHpPct || 0);
  }, 0);
  // rb_apex: ボス与ダメ+N%集計（S53）
  const rbBossDmgPct = rbSkills.reduce((acc, id) => {
    const sk = REBIRTH_SKILL_MASTER[id];
    return acc + (sk?.effect?.bossDmgPct || 0);
  }, 0);
  // rb_crit: クリティカル率ボーナス集計
  const rbCritRatePct = rbSkills.reduce((acc, id) => {
    const sk = REBIRTH_SKILL_MASTER[id];
    return acc + (sk?.effect?.critRatePct || 0);
  }, 0);

  // maxHpPct補正はHP計算後に適用するため先にbaseHpを求める
  const baseMaxHp = 50 + total.def*5 + total.vit*8;
  const baseMaxMp = 20 + total.agi*2 + total.int*5;
  const hpPctBonus = (gs.player.skills||[]).reduce((acc,id)=>{
    const sk = SKILL_MASTER[id];
    return acc + (sk?.effect?.maxHpPct || 0);
  }, 0);

  // 強化ボーナス：装備中アイテムのenhLv合計をHP/MPに加算
  const enhHpBonus = Object.values(gs.equipped).reduce((sum, uid) => {
    if(!uid) return sum;
    const ei = gs.inventory.find(i => i.uid === uid);
    return sum + (ei?.enhLv || 0) * 8;
  }, 0);

  // 疲弊デバフ（案B）
  const isFatigued = gs.player.fatigue && gs.player.fatigue.expiresAt > Date.now();

  // お守りバフ（ダンジョン中のみ）
  const _omamori = gs.dungeon?.active ? getActiveOmamori(gs) : null;
  const omamoriEff = _omamori ? (OMAMORI_EFFECTS[_omamori.rarity] || OMAMORI_EFFECTS.normal) : null;

  // セット効果ボーナス
  const setBonuses = calcSetBonuses(gs);
  const setBonus = {str:0,def:0,agi:0,vit:0,int:0,luk:0};
  let setDmgReducePct = 0, setCritDmgBonus = 0, setAllStatPct = 0;
  let setEscapeBonus = 0, setCritRateBonus = 0, setDropRateBonus = 0;
  let setMpPctBonus = 0, setAvoidBonus = 0, setSkillCostReduce = 0;
  let setPoisonRateBonus = 0, setPoisonDmgBonus = 0, setOnHitPct = 0;
  let setBurnDmgReduce = 0, setBurnRateBonus = 0, setBurnDmgBonus = 0;
  let setVoidHealBonus = 0, setVoidBlockPct = 0;
  let setSpecterCounterCrit = false;
  let setColossusCounterPct = 0;
  let setSovereignDoubleStrike = 0;
  let setWillBossDmgBonus = 0, setWillBossGoldBonus = 0;
  for(const { activeEffects } of setBonuses) {
    for(const e of activeEffects) {
      if(e.bonus) Object.entries(e.bonus).forEach(([k,v])=>{ if(setBonus[k]!==undefined) setBonus[k]+=v; });
      if(e.dmgReducePct)     setDmgReducePct     += e.dmgReducePct;
      if(e.critDmgBonus)     setCritDmgBonus     += e.critDmgBonus;
      if(e.allStatPct)       setAllStatPct        += e.allStatPct;
      if(e.escapeBonus)      setEscapeBonus       += e.escapeBonus;
      if(e.critRateBonus)    setCritRateBonus     += e.critRateBonus;
      if(e.dropRateBonus)    setDropRateBonus     += e.dropRateBonus;
      if(e.mpPctBonus)       setMpPctBonus        += e.mpPctBonus;
      if(e.avoidBonus)       setAvoidBonus        += e.avoidBonus;
      if(e.skillCostReduce)  setSkillCostReduce   += e.skillCostReduce;
      if(e.poisonRateBonus)  setPoisonRateBonus   += e.poisonRateBonus;
      if(e.poisonDmgBonus)   setPoisonDmgBonus    += e.poisonDmgBonus;
      if(e.onHitPct)         setOnHitPct          += e.onHitPct;
      if(e.burnDmgReduce)    setBurnDmgReduce     += e.burnDmgReduce;
      if(e.burnRateBonus)    setBurnRateBonus     += e.burnRateBonus;
      if(e.burnDmgBonus)     setBurnDmgBonus      += e.burnDmgBonus;
      if(e.voidHealBonus)    setVoidHealBonus     += e.voidHealBonus;
      if(e.voidBlockPct)     setVoidBlockPct      += e.voidBlockPct;
      if(e.specterCounterCrit) setSpecterCounterCrit = true;
      if(e.colossusCounterPct) setColossusCounterPct += e.colossusCounterPct;
      if(e.sovereignDoubleStrike) setSovereignDoubleStrike += e.sovereignDoubleStrike;
      if(e.willBossDmgBonus) setWillBossDmgBonus  += e.willBossDmgBonus;
      if(e.willBossGoldBonus) setWillBossGoldBonus += e.willBossGoldBonus;
    }
  }
  Object.keys(setBonus).forEach(k => { total[k] += setBonus[k]; });
  // allStatPct（竜5部位）
  if(setAllStatPct > 0) {
    Object.keys(total).forEach(k => { total[k] = Math.floor(total[k] * (1 + setAllStatPct/100)); });
  }
  // お守りの全ステバフ
  if(omamoriEff?.allStatPct > 0) {
    Object.keys(total).forEach(k => { total[k] = Math.floor(total[k] * (1 + omamoriEff.allStatPct/100)); });
  }

  // 冒険録ボーナス適用
  const _col = calcCollectionBonus();
  if(_col.str > 0) total.str += _col.str;
  if(_col.def > 0) total.def += _col.def;
  if(_col.agi > 0) total.agi += _col.agi;
  if(_col.vit > 0) total.vit += _col.vit;
  if(_col.luk > 0) total.luk += _col.luk;
  if(_col.int > 0) total.int = (total.int||0) + _col.int;

  const baseMaxHpWithSet = 50 + total.def*5 + total.vit*8;
  // 冒険録HP%ボーナス
  const colHpPct = _col.maxHpPct || 0;
  // 冒険録ダメージ軽減・クリ率はreturnに追加

  return {
    total,
    bonus,
    skillBonus,
    setBonus,
    setBonuses,
    hpPctBonus,
    setDmgReducePct, setCritDmgBonus, setEscapeBonus,
    setCritRateBonus, setDropRateBonus, setMpPctBonus, setAvoidBonus, setSkillCostReduce,
    setPoisonRateBonus, setPoisonDmgBonus, setOnHitPct,
    setBurnDmgReduce, setBurnRateBonus, setBurnDmgBonus,
    setVoidHealBonus, setVoidBlockPct,
    setSpecterCounterCrit,
    setColossusCounterPct,
    setSovereignDoubleStrike,
    setWillBossDmgBonus, setWillBossGoldBonus,
    skillExecuteMul, skillLowHpAtkMul, skillCounterRate, skillThornPct,
    skillStatusResist, skillTreasureBonus, skillDropLukBonus,
    skillMaterialDropBonus, skillMoveBonus, skillCurseAutoIdent,
    skillPoisonDmgMul, skillDoubleStrikePct,
    skillDmgReducePct, skillEscapeBonus,
    maxHp: Math.floor(Math.floor(baseMaxHpWithSet * (1 + (hpPctBonus + rbHpPct + colHpPct) / 100)) * (isFatigued ? 0.85 : 1.0)) + enhHpBonus,
    isFatigued,
    omamoriEff,
    maxMp: Math.floor(baseMaxMp * (1 + setMpPctBonus/100)),
    colCritRate:    _col.critRate    || 0,
    colDmgReduce:   0, // 廃止（新設計では使用しない）
    colHpPct:       _col.maxHpPct   || 0,
    colEscapeBonus: _col.escapeBonus|| 0,
    colPoisonDmg:   _col.poisonDmg  || 0,
    colCount:      _col.count      || 0,
    rbCritRatePct,
    rbBossDmgPct,
  };
}

// ─── CP（戦闘力）システム ───
// フロア別推奨CP
const FLOOR_RECOMMENDED_CP = { 1:30, 2:60, 3:110, 4:180, 5:280, 6:450, 7:650, 8:900, 9:1200, 10:1600 };

// アイテム単体CP（ステータス合計 + affix + 強化補正。rarity倍率なし）
function calcItemCP(item) {
  const m = ITEM_MASTER[item.itemId];
  if(!m || !EQUIP_TYPES.has(m.type)) return 0;
  const base = item.statOverride || m.stats || {};
  let cp = Object.values(base).reduce((s, v) => s + Math.max(0, v), 0);
  // affix補正
  (item.affixes || []).forEach(a => { if(a.val > 0) cp += a.val; });
  // 強化補正（1段階につき+3）
  cp += (item.enhLv || 0) * 3;
  return Math.max(0, Math.floor(cp));
}

// キャラクターCP（装備込みの全ステータス + HP/MPの寄与）
function calcCharCP(gs) {
  const r = calcStats(gs);
  const t = r.total;
  const statSum = (t.str||0) + (t.def||0) + (t.agi||0) + (t.vit||0) + (t.luk||0);
  const hpBonus = Math.floor(r.maxHp / 10);
  const mpBonus = Math.floor(r.maxMp / 20);
  return Math.max(0, statSum + hpBonus + mpBonus);
}

// CP表示テキスト（色付き）
function cpSpan(cp) {
  const col = cp >= 180 ? 'var(--legendary)' : cp >= 110 ? 'var(--epic)' : cp >= 60 ? 'var(--rare)' : cp >= 30 ? 'var(--green)' : 'var(--text-mid)';
  return `<span style="color:${col};font-weight:700">⚡${cp}</span>`;
}

// 推奨CP判定（floor:1〜4、charCP現在値）→ {ok, recommended}
function cpCheck(floor, charCP) {
  const recommended = FLOOR_RECOMMENDED_CP[floor] || 0;
  return { ok: charCP >= recommended, recommended, charCP };
}

function recalcHpMp(gs) {
  const r = calcStats(gs);
  gs.player.maxHp = r.maxHp;
  gs.player.maxMp = r.maxMp;
  if(gs.player.hp > r.maxHp) gs.player.hp = r.maxHp;
  if(gs.player.mp > r.maxMp) gs.player.mp = r.maxMp;
}

// 未鑑定品の謎箱価格（真の価値の60〜80%・uid由来の疑似乱数で出品時に固定）
function unidentifiedPrice(item) {
  const m = ITEM_MASTER[item.itemId];
  const r = RARITY_MASTER[item.rarity] || RARITY_MASTER["normal"];
  const affixBonus = (item.affixes||[]).reduce((s,a) => s + a.val * 18, 0);
  const trueVal = Math.floor(m.basePrice * r.multi + affixBonus);
  // uid文字列から0〜1の疑似乱数を生成（出品中は値が変わらない）
  const seed = [...(item.uid||"x")].reduce((h,c) => (h*31 + c.charCodeAt(0)) & 0xffff, 0);
  const ratio = 0.60 + (seed % 2000) / 10000; // 0.60〜0.80
  return Math.max(50, Math.floor(trueVal * ratio));
}

function itemPrice(item) {
  if(!item.identified) return unidentifiedPrice(item);
  const m = ITEM_MASTER[item.itemId];
  const r = RARITY_MASTER[item.rarity];
  const affixBonus = (item.affixes||[]).reduce((s,a) => s + a.val * 18, 0);
  const cursePenalty = (item.cursed && item.curse) ? 0.75 : 1.0;
  const trendBonus = isTrending(item) ? 1.1 : 1.0;
  const rbSellPct = (gs?.player?.rebirthSkills||[]).reduce((acc,id) => {
    const sk = REBIRTH_SKILL_MASTER[id];
    return acc + (sk?.effect?.sellPct || 0);
  }, 0);
  const staffSellPct = (gs?.shop?.staff||[]).reduce((acc,s) => acc + (getStaffEffect(s).sellPctBonus||0), 0);
  const sellMul = 1 + (rbSellPct + staffSellPct) / 100;
  // 棚特化ボーナス（流行一致でさらに強化）
  const shelf = gs?.shop?.shelves?.find(s => s?.item?.uid === item.uid);
  const isSpecialMatch = shelf?.specialType && itemMatchesShelfSpecial(item, shelf.specialType);
  const isTrendMatch   = isSpecialMatch && isTrending(item);
  const specialBonus   = isTrendMatch ? 1.30 : isSpecialMatch ? (1 + SHELF_SPECIAL_BONUS.sellPct / 100) : 1.0;
  // セール割引
  const saleMul = shelf?.onSale ? 0.80 : 1.0;
  return Math.floor((m.basePrice * r.multi + affixBonus) * cursePenalty * trendBonus * sellMul * specialBonus * saleMul);
}

// 未鑑定表示ヘルパー
function itemRarityClass(item) { return item.identified ? `rarity-${item.rarity}` : "rarity-unidentified"; }


// 呪いバッジのHTMLを生成
// 未鑑定アイテムの表示名を返す（種別ヒントあり）
// enhLv込みの実効ステータス文字列を返す
// 表示例: "str +5(+3)" → baseが5、enhが3の場合
function itemEffectiveStatsHtml(item) {
  const m = ITEM_MASTER[item.itemId];
  if(!m) return "";
  const base = item.statOverride || m.stats || {};
  if(!Object.keys(base).length) return "";
  const enh = item.enhLv || 0;
  return Object.entries(base).map(([k, v]) => {
    if(enh > 0) {
      return `${k} +${v}<span style="color:var(--success);font-size:0.85em">(+${enh})</span>`;
    }
    return `${k} +${v}`;
  }).join("  ");
}

// enhLv込みの実効ステータス文字列（テキストのみ・カード一行用）
function itemEffectiveStatsText(item) {
  const m = ITEM_MASTER[item.itemId];
  if(!m) return "";
  const base = item.statOverride || m.stats || {};
  if(!Object.keys(base).length) return "";
  const enh = item.enhLv || 0;
  return Object.entries(base).map(([k, v]) =>
    enh > 0 ? `${k}+${v+enh}` : `${k}+${v}`
  ).join(" ");
}

function itemDisplayName(item) {
  const m = ITEM_MASTER[item?.itemId];
  if(!m) return "不明なアイテム";
  if(item.identified) {
    const enh = item.enhLv || 0;
    return m.name + (enh > 0 ? ` <span style="color:var(--success);font-size:0.85em">+${enh}</span>` : "");
  }
  const typeLabel = { weapon:"武具", head:"防具", body:"防具", legs:"防具", arms:"防具", feet:"防具", neck:"装飾品", bracelet:"装飾品", ring:"装飾品", sub:"武具", cloak:"防具", seal:"装飾品" };
  return `謎の${typeLabel[m.type] || "荷物"}`;
}

// affix バッジ HTML を生成するヘルパー
function affixHtml(item, style="") {
  if(!item.affixes || item.affixes.length === 0) return "";
  return item.affixes.map(a =>
    `<span style="color:var(--accent2);font-size:10px;margin-right:5px${style}">${a.label} +${a.val}</span>`
  ).join("");
}

// ベース補正 + affix を合算したステータスマップを返す
function itemTotalStats(item) {
  const m = ITEM_MASTER[item.itemId];
  const merged = { ...(m.stats||{}) };
  (item.affixes||[]).forEach(a => {
    merged[a.stat] = (merged[a.stat] || 0) + a.val;
  });
  return merged;
}

function uuid() {
  return Math.random().toString(36).slice(2,10) + Date.now().toString(36);
}

// ─────────────────────────────────────────
// 計測モジュール (S48-ANALYTICS)
// localStorage["shinentrade_analytics"] に独立保存。
// gsには一切書かない。全関数をtry-catchで保護。
// ─────────────────────────────────────────
const Analytics = (() => {
  const KEY     = "shinentrade_analytics";
  const SCHEMA  = 1;
  let _sid      = null;  // 現セッションID（重複init防止）

  // ── ストレージ読み書き ──────────────────
  function _load() {
    try {
      const raw = localStorage.getItem(KEY);
      if(!raw) return { schemaVersion: SCHEMA, sessions: [] };
      const d = JSON.parse(raw);
      if(!Array.isArray(d.sessions)) d.sessions = [];
      return d;
    } catch(e) { return { schemaVersion: SCHEMA, sessions: [] }; }
  }
  function _save(data) {
    try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e) {}
  }

  // 現セッションのレコードを取得（なければnull）
  function _current() {
    if(!_sid) return null;
    const d = _load();
    return d.sessions.find(s => s.sessionId === _sid) || null;
  }

  // 現セッションのレコードを更新して保存
  function _update(fn) {
    if(!_sid) return;
    const d = _load();
    const rec = d.sessions.find(s => s.sessionId === _sid);
    if(!rec) return;
    fn(rec);
    _save(d);
  }

  // ── 公開API ────────────────────────────

  // ゲーム起動時（isFirst=true:新規, false:既存セーブ）
  function init(isFirst) {
    try {
      if(_sid) return; // 同一JS実行内での2重呼び出し防止
      _sid = Math.random().toString(36).slice(2, 8) + "_" + Date.now().toString(36);
      const d = _load();
      d.sessions.push({
        sessionId:      _sid,
        startAt:        Date.now(),
        isFirstSession: !!isFirst,
        guide: {
          shown:         !!isFirst,
          completedAt:   null,
          skippedAtPage: null,
        },
        firstLoop: {
          enterAt:    null,
          returnAt:   null,
          firstSaleAt: null,
          completed:  false,
        },
        endAt:       null,
        durationSec: null,
      });
      // セッション数が100を超えたら古いものから削除（容量対策）
      if(d.sessions.length > 100) d.sessions = d.sessions.slice(-100);
      _save(d);
    } catch(e) {}
  }

  // ガイドを最後まで読んで「はじめる！」を押した
  function guideCompleted() {
    try { _update(r => { r.guide.completedAt = Date.now(); }); } catch(e) {}
  }

  // ガイドをスキップした（pageは0始まりのページ番号）
  function guideSkipped(page) {
    try { _update(r => { r.guide.skippedAtPage = page; }); } catch(e) {}
  }

  // 最初の潜入（enterDungeon確定後）
  function firstEnter() {
    try {
      _update(r => {
        if(!r.firstLoop.enterAt) r.firstLoop.enterAt = Date.now();
      });
    } catch(e) {}
  }

  // 最初の帰還成功（leaveDungeon keepLoot=true確定後）
  function firstReturn() {
    try {
      _update(r => {
        if(!r.firstLoop.returnAt) r.firstLoop.returnAt = Date.now();
      });
    } catch(e) {}
  }

  // 最初の販売完了（checkShopSales売却確定後）
  function firstSale() {
    try {
      _update(r => {
        if(!r.firstLoop.firstSaleAt) {
          r.firstLoop.firstSaleAt = Date.now();
          // 3ステップがすべて揃っていればループ完結
          r.firstLoop.completed =
            !!(r.firstLoop.enterAt && r.firstLoop.returnAt && r.firstLoop.firstSaleAt);
        }
      });
    } catch(e) {}
  }

  // saveGame呼び出し時に経過時間を更新
  function tick() {
    try {
      _update(r => {
        r.endAt      = Date.now();
        r.durationSec = Math.round((r.endAt - r.startAt) / 1000);
      });
    } catch(e) {}
  }

  // 帰還後「まとめて出品」ボタン使用を記録（KPI計測用）
  function quickList(listedCount) {
    try {
      _update(r => {
        if(!r.quickList) r.quickList = { used: 0, totalListed: 0 };
        r.quickList.used++;
        r.quickList.totalListed += listedCount || 0;
      });
    } catch(e) {}
  }

  return { init, guideCompleted, guideSkipped, firstEnter, firstReturn, firstSale, tick, quickList };
})();

// ─────────────────────────────────────────
// セーブ/ロード
// ─────────────────────────────────────────
function saveGame() {
  gs.meta.lastSave = Date.now();
  try { localStorage.setItem("shinentrade_v1", JSON.stringify(gs)); } catch(e){}
  try { localStorage.setItem("shinentrade_logs", JSON.stringify(ALL_LOGS)); } catch(e){}
  Analytics.tick(); // セーブのたびに経過時間を更新
}

function loadGame() {
  try {
    const d = localStorage.getItem("shinentrade_v1");
    if(d) {
      gs = JSON.parse(d);
      if(!gs.shop.demand) gs.shop.demand = {};
      if(!gs.shop.trend)  gs.shop.trend = { type:null, label:null, endsAt:0 };
      if(!gs.shop.blackmarket) gs.shop.blackmarket = { unlocked:false, slot:null, buyer:null, nextBuyerAt:0, raidRisk:0 };
      if(!gs.shop.staff)       gs.shop.staff = [];
      if(!gs.shop.investment)  gs.shop.investment = { amount:0, lastReturnAt:0 };
      if(!gs.shop.guildReward) gs.shop.guildReward = { mins:0, lastTickAt:0, totalItems:0 };
      // ギルド支給品構造マイグレーション（旧:accumulated→新:mins）
      if(gs.shop.guildReward.accumulated !== undefined && gs.shop.guildReward.mins === undefined) {
        gs.shop.guildReward.mins = 0;
        gs.shop.guildReward.totalItems = gs.shop.guildReward.totalItems || 0;
        delete gs.shop.guildReward.accumulated;
      }
      if(gs.shop.lastIncomeAt === undefined) gs.shop.lastIncomeAt = Date.now();
      if(!gs.shop.earnings)    gs.shop.earnings = { shopIncome:0, staff:0, investment:0, guild:0 };
      if(gs.shop.earnings.guildItems === undefined) gs.shop.earnings.guildItems = 0;
      if(!gs.shop.autoShelfRarities) gs.shop.autoShelfRarities = [];
      if(!gs.shop.autoShelfTypes)    gs.shop.autoShelfTypes    = [];
      gs.inventory.forEach(i=>{ if(i.enhLv===undefined) i.enhLv=0; if(i.statOverride===undefined) i.statOverride=null; });
      gs.shop.staff.forEach(s=>{ if(s.lv===undefined) s.lv=1; });
      if(!gs.shop.demandHistory) gs.shop.demandHistory = [];
      if(!gs.shop.regulars) gs.shop.regulars = [];
      // 階層データ整合性：floorがclearedFloorを下回っている場合を修正
      if(gs.dungeon && !gs.dungeon.active) {
        const cf = gs.dungeon.clearedFloor || 0;
        if((gs.dungeon.floor || 1) < cf + 1) {
          gs.dungeon.floor = cf + 1;
        }
      }
      if(isNaN(gs.player.gold)) gs.player.gold = 0;
      if(gs.dungeon.clearedFloor === undefined) gs.dungeon.clearedFloor = gs.dungeon.floor - 1;
      if(gs.dungeon.ng === undefined) gs.dungeon.ng = 0;
      if(gs.dungeon.selectedFloor === undefined) gs.dungeon.selectedFloor = gs.dungeon.floor;
      if(gs.dungeon.activeFloor === undefined) gs.dungeon.activeFloor = gs.dungeon.floor;
      if(!gs.dungeon.attempts) gs.dungeon.attempts = {};
      if(gs.dungeon._omenActive === undefined) gs.dungeon._omenActive = false;
      if(gs.dungeon._omenType  === undefined) gs.dungeon._omenType  = null;
      // 冒険録マイグレーション（案P：既存進捗を maxEnh に変換して引き継ぎ）
      if(!gs.collection) gs.collection = { entries:[], completed:[], maxEnh:{} };
      if(!Array.isArray(gs.collection.entries))   gs.collection.entries   = [];
      if(!Array.isArray(gs.collection.completed)) gs.collection.completed = [];
      if(!gs.collection.maxEnh || typeof gs.collection.maxEnh !== 'object') gs.collection.maxEnh = {};

      // ── 旧 entries（"itemId_rarity" 形式）→ maxEnh[key]=0 に変換 ──
      for(const entry of gs.collection.entries) {
        // 旧形式は末尾に _[数字] がない
        if(!/^\w+_(normal|rare|epic|legendary)$/.test(entry)) continue;
        if(!(entry in gs.collection.maxEnh)) gs.collection.maxEnh[entry] = 0;
      }

      // ── 装備中アイテムを maxEnh に反映（強化値込み） ──
      const EQUIP_TYPES_MIG = EQUIP_TYPES_COL;
      Object.values(gs.equipped || {}).forEach(uid => {
        if(!uid) return;
        const item = (gs.inventory || []).find(i => i.uid === uid);
        if(!item || !item.identified) return;
        const _m = ITEM_MASTER[item.itemId];
        if(!_m || !EQUIP_TYPES_MIG.has(_m.type)) return;
        const _key = item.itemId + '_' + item.rarity;
        const enh  = item.enhLv || 0;
        if((gs.collection.maxEnh[_key] ?? -1) < enh) gs.collection.maxEnh[_key] = enh;
      });

      // ── 棚のアイテムを maxEnh に反映 ──
      (gs.shop?.shelves || []).forEach(slot => {
        if(!slot?.item) return;
        const item = slot.item;
        if(!item.identified) return;
        const _m = ITEM_MASTER[item.itemId];
        if(!_m || !EQUIP_TYPES_MIG.has(_m.type)) return;
        const _key = item.itemId + '_' + item.rarity;
        const enh  = item.enhLv || 0;
        if((gs.collection.maxEnh[_key] ?? -1) < enh) gs.collection.maxEnh[_key] = enh;
      });

      // ── maxEnh から completed を全件再計算 ──
      gs.collection.completed = [];
      {
        const RARITIES_MIG = ["normal","rare","epic","legendary"];
        for(const themeId of Object.keys(COLLECTION_THEME)) {
          const theme = COLLECTION_THEME[themeId];
          for(const rarity of RARITIES_MIG) {
            const parts = (theme.isAcc || theme.isSlot) ? ["all"] : ["weapon","armor","acc","all"];
            for(const part of parts) {
              // accパートを持たないテーマはaccをスキップ
              if(part === "acc" && !theme.acc) continue;
              // ★0〜★12を順に確認（前段階達成が条件）
              for(let step = 0; step <= ENHANCE_MAX; step++) {
                const colId = makeColId(themeId, part, rarity, step);
                if(gs.collection.completed.includes(colId)) continue;
                // 前段階が未達成なら打ち切り
                if(step > 0 && !gs.collection.completed.includes(makeColId(themeId, part, rarity, step - 1))) break;
                const result   = checkCollection(themeId, rarity, step);
                const achieved = part === "weapon" ? result.weapon
                               : part === "armor"  ? result.armor
                               : part === "acc"    ? result.acc
                               : result.all;
                if(!achieved) break; // 達成できなければ以降の★も不可
                gs.collection.completed.push(colId);
              }
            }
          }
        }
      }
      if(gs.dungeon.poisoned === undefined) gs.dungeon.poisoned = false;
      if(gs.dungeon.burned  === undefined) gs.dungeon.burned   = false;
      if(!gs.dungeon.consumables) gs.dungeon.consumables = {};
      // consumables を新構造（等級別配列）に変換
      // 旧: { herb:{count,rarity} } → 新: { herb:[{count,rarity},...] }
      const CARRY_SET = new Set(["herb","potion","antidote","omamori"]);
      Object.keys(gs.dungeon.consumables).forEach(id => {
        const v = gs.dungeon.consumables[id];
        if(!Array.isArray(v)) {
          gs.dungeon.consumables[id] = v && v.count > 0
            ? [{ count: v.count, rarity: v.rarity || "normal" }] : [];
        }
        gs.dungeon.consumables[id] = gs.dungeon.consumables[id].filter(s => s.count > 0);
        if(gs.dungeon.consumables[id].length === 0) delete gs.dungeon.consumables[id];
      });
      // lootに混在している消耗品をconsumablesへ移行
      gs.dungeon.loot = gs.dungeon.loot.filter(i => {
        if(!CARRY_SET.has(i.itemId)) return true;
        const arr = gs.dungeon.consumables[i.itemId] || [];
        const ex = arr.find(s => s.rarity === (i.rarity||"normal"));
        if(ex) ex.count++; else arr.push({ count:1, rarity: i.rarity||"normal" });
        gs.dungeon.consumables[i.itemId] = arr;
        return false;
      });
      // ロックフラグの初期化
      gs.inventory.forEach(i => { if(i.locked === undefined) i.locked = false; });
      // 棚データの整合性チェック（item未定義の棚をクリア）
      if(gs.shop.shelves) {
        gs.shop.shelves = gs.shop.shelves.map(s => {
          if(!s) return null;
          if(!s.item || !ITEM_MASTER[s.item.itemId]) return null;
          return s;
        });
      }
      // 実績システムのマイグレーション
      if(!gs.achievements) gs.achievements = { claimed:[], stats:{} };
      if(!gs.achievements.claimed) gs.achievements.claimed = [];
      if(!gs.achievements.stats)   gs.achievements.stats   = {};
      const _achStats = gs.achievements.stats;
      if(_achStats.enemyKills   === undefined) _achStats.enemyKills   = 0;
      if(_achStats.bossKills    === undefined) _achStats.bossKills    = 0;
      if(_achStats.totalEnhance === undefined) _achStats.totalEnhance = 0;
      if(_achStats.totalPurify  === undefined) _achStats.totalPurify  = 0;
      if(_achStats.totalReforge === undefined) _achStats.totalReforge = 0;
      if(_achStats.totalGradeUp === undefined) _achStats.totalGradeUp = 0;
      if(_achStats.mercUsed        === undefined) _achStats.mercUsed        = 0;
      if(_achStats.totalBrew       === undefined) _achStats.totalBrew       = 0;
      if(_achStats.totalDungeonEnter=== undefined) _achStats.totalDungeonEnter= 0;
      if(_achStats.totalBmSales    === undefined) _achStats.totalBmSales    = 0;
      if(_achStats.poisonKills     === undefined) _achStats.poisonKills     = 0;
      if(_achStats.legendaryFound  === undefined) _achStats.legendaryFound  = 0;
      if(_achStats.totalRegularBuys=== undefined) _achStats.totalRegularBuys= 0;
      if(_achStats.totalBulkEnhance=== undefined) _achStats.totalBulkEnhance= 0;
      if(_achStats.totalColStar    === undefined) _achStats.totalColStar    = 0;
      // 新装備スロットのマイグレーション（旧セーブデータ互換）
      if(gs.equipped.sub      === undefined) gs.equipped.sub      = null;
      if(gs.player.fatigue     === undefined) gs.player.fatigue    = null;
      if(gs.dungeon.omamoriPriority === undefined) gs.dungeon.omamoriPriority = "low";
      if(gs.dungeon.autoHeal          === undefined) gs.dungeon.autoHeal = { enabled:false, threshold:30 };
      // S52: 祠バフフィールドのマイグレーション
      if(gs.dungeon._shrineAtkBuff === undefined) gs.dungeon._shrineAtkBuff = false;
      if(gs.dungeon._shrineLukBuff === undefined) gs.dungeon._shrineLukBuff = false;
      if(gs.dungeon._relicAtkBuff  === undefined) gs.dungeon._relicAtkBuff  = false; // S82
      if(gs.dungeon._relicDefBuff  === undefined) gs.dungeon._relicDefBuff  = false; // S82
      // S53: rb_apex/rb_hoard/rb_transcend は REBIRTH_SKILL_MASTER 参照なので追加マイグレーション不要
      if(gs.dungeon.autoRun           === undefined) gs.dungeon.autoRun  = null;
      if(gs.equipped.cloak    === undefined) gs.equipped.cloak    = null;
      if(gs.equipped.seal     === undefined) gs.equipped.seal     = null;
      // 沼の結晶・魔晶石をRareに統一（等級変更マイグレーション）
      // 宝石→Rare / 古代金貨→Epic / 竜の牙→Legendary に統一
      const FIXED_RARITY_MIG = {
        magic_crystal:"epic",
        gem:"rare", ancient_coin:"epic", dragon_fang:"legendary",
      };
      let migCount = 0;
      const _applyFixedRarity = arr => arr && arr.forEach(i => {
        const fixedR = FIXED_RARITY_MIG[i.itemId];
        if(fixedR && i.rarity !== fixedR) { i.rarity = fixedR; i.identified = true; migCount++; }
      });
      _applyFixedRarity(gs.inventory);
      _applyFixedRarity(gs.dungeon?.loot);
      // swamp_crystal廃止マイグレーション：magic_crystalに変換
      const _convertSwamp = arr => arr && arr.forEach(i => {
        if(i.itemId === "swamp_crystal") { i.itemId = "magic_crystal"; i.rarity = "epic"; i.identified = true; migCount++; }
      });
      _convertSwamp(gs.inventory);
      _convertSwamp(gs.dungeon?.loot);
      // ITEM_MASTERに存在しないitemIdを持つアイテムを除去（安全弁）
      gs.inventory = gs.inventory.filter(i => !!ITEM_MASTER[i.itemId]);
      if(gs.dungeon?.loot) gs.dungeon.loot = gs.dungeon.loot.filter(i => !!ITEM_MASTER[i.itemId]);
      if(migCount > 0) { saveGame(); }
      if(gs.quests) {
        const maxBossFloor = Math.max(...Object.values(BOSS_MASTER).map(b => b.floor));
        gs.quests = gs.quests.filter(q => q.type !== "explore" || q.floor <= maxBossFloor);
      }
      // スキルツリー初期化（遡及：既存セーブはlevel-1分のSPを付与）
      if(!gs.player.skills) gs.player.skills = [];
      if(gs.player.skillPoints === undefined) {
        gs.player.skillPoints = Math.max(0, gs.player.level - 1);
      }
      // 転生システム初期化
      if(gs.player.worldRank     === undefined) gs.player.worldRank     = 0;
      if(gs.player.rebirthPoints === undefined) gs.player.rebirthPoints = 0;
      if(!gs.player.rebirthSkills) gs.player.rebirthSkills = [];
      if(gs.player.lootSlots === undefined) gs.player.lootSlots = 0;
      if(gs.player.abyssFloorCleared === undefined) gs.player.abyssFloorCleared = 0;
      // 装備スロット移行（旧armor→body, accessory→neck）
      if(gs.equipped.armor !== undefined)     { gs.equipped.body = gs.equipped.armor; delete gs.equipped.armor; }
      if(gs.equipped.accessory !== undefined) { gs.equipped.neck = gs.equipped.accessory; delete gs.equipped.accessory; }
      // 新スロット初期化
      ["weapon","head","body","legs","arms","feet","neck","bracelet","ring"].forEach(k=>{
        if(gs.equipped[k] === undefined) gs.equipped[k] = null;
      });
      // 装備中アイテムのtypeが実際のスロットと合っていない場合は正しいスロットへ移動
      Object.entries(gs.equipped).forEach(([slot, uid])=>{
        if(!uid) return;
        const item = gs.inventory.find(i=>i.uid===uid);
        if(!item) return;
        const m = ITEM_MASTER[item.itemId];
        if(!m) return;
        if(m.type !== slot) {
          gs.equipped[slot] = null;        // 誤ったスロットを空に
          gs.equipped[m.type] = uid;       // 正しいスロットへ
        }
      });
      // shelves旧形式（アイテムオブジェクト直置き）→新形式（{item,listedAt,sellDuration}）に変換
      gs.shop.shelves = gs.shop.shelves.map(s => {
        if(!s) return null;
        if(s.item) {
          // 新形式：specialType / onSale フィールドの補完（S29以前のセーブデータ互換）
          if(s.specialType === undefined) s.specialType = null;
          if(s.onSale      === undefined) s.onSale      = false;
          return s;
        }
        // 旧形式: sがアイテムオブジェクト直接
        return { item: s, listedAt: Date.now(), sellDuration: 60000, specialType: null, onSale: false };
      });

      // 陳列済みアイテムがinventoryに残っている矛盾データを修復
      const listedUids = new Set(
        gs.shop.shelves.filter(Boolean).map(s => s.item?.uid).filter(Boolean)
      );
      gs.inventory = gs.inventory.filter(i => !listedUids.has(i.uid));

      retroCheckAchievements();
      // 既存セーブにisFirstPlayがない場合はfalseを補完（既存プレイヤーはガイド不要）
      if(gs.meta.isFirstPlay === undefined) gs.meta.isFirstPlay = false;
      // B1-DAILY: デイリーミッション補完（旧セーブ互換）
      if(!Array.isArray(gs.meta.dailyMissions)) gs.meta.dailyMissions = [];
      if(!gs.meta.dailyResetAt) gs.meta.dailyResetAt = 0;
      return true;
    }
  } catch(e){}
  return false;
}

const LOOT_LIMIT_BASE = 8;
const LOOT_SLOT_UPGRADES = [500, 2000, 8000, 32000]; // +2枠ごとのコスト（最大4段階=+8枠）
function getLootLimit() {
  const rebirthBonus = (gs?.player?.rebirthSkills||[]).reduce((acc,id) => {
    const sk = REBIRTH_SKILL_MASTER[id];
    return acc + (sk?.effect?.extraLoot || 0);
  }, 0);
  const slotBonus = (gs?.player?.lootSlots || 0) * 2;
  return LOOT_LIMIT_BASE + rebirthBonus + slotBonus;
}

const QUEST_TYPES = {
  sell_item: {
    label: "納品",
    icon: "📦",
    gen(ng) {

      return { type:"sell_item", itemId, rarity, count, progress:0, reward:Math.floor(reward),
               desc:`【${m.name}】(${RARITY_MASTER[rarity].label})を${count}個売る` };
    },
    check(q) { return q.progress >= q.count; }
  },
  earn_gold: {
    label: "売上",
    icon: "💰",
    gen(ng) {
      const target = (1000 + Math.floor(Math.random() * 2000)) * (1 + ng * 0.5);
      const reward = Math.floor(target * 0.3 + 300);
      return { type:"earn_gold", target:Math.floor(target), progress:0, reward,
               desc:`売上 ${Math.floor(target).toLocaleString()}G 達成` };
    },
    check(q) { return q.progress >= q.target; }
  },
  shelf_rarity: {
    label: "出荷",

    gen(ng) {
      const rarity = ng >= 3 ? "epic" : ng >= 1 ? "rare" : "normal";
      const count = 2 + Math.floor(Math.random() * 2);
      const reward = 400 + count * 200 + Math.floor(ng * 300);
      return { type:"shelf_rarity", rarity, count, reward,
               desc:`${RARITY_MASTER[rarity].label}以上を${count}個同時展示` };
    },
    check(q) {
      const shelfItems = gs.shop.shelves.filter(Boolean).map(s => s.item).filter(Boolean);
      const rarityOrder = {normal:0,rare:1,epic:2,legendary:3};
      return shelfItems.filter(i => (rarityOrder[i.rarity]||0) >= (rarityOrder[q.rarity]||0)).length >= q.count;
