    </div>
    <div style="margin-top:16px;font-size:12px;color:var(--muted)">
      スキルポイント: <span style="color:var(--gold);font-weight:700">${p.skillPoints} SP</span>
    </div>
    <button class="lvup-skill-btn" onclick="openSkillTree()">🌟 スキルツリーを開く</button>
  `;
  document.body.appendChild(overlay);
}

// スキルツリー：タブ状態保持
let _skillTreeTab = "atk";
// ステータス：タブ状態保持
let _statusTab = "player";


function openCollectionModal(initTab) {
  document.querySelector(".modal-overlay")?.remove();
  let _colTab = initTab || "collection";

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.cssText = "height:85vh;display:flex;flex-direction:column;overflow:hidden;padding:0;";
  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  const RARITIES    = ["normal","rare","epic","legendary"];
  const RARITY_LABEL = RARITY_SHORT_LABEL; // S76: グローバル定数を参照
  const RARITY_COLS  = { normal:"var(--text-mid)", rare:"var(--info)", epic:"var(--epic)", legendary:"var(--legendary-bright)" };

  // ── 固定ヘッダー（進捗バー）──
  const header = document.createElement("div");
  header.style.cssText = "flex-shrink:0;padding:14px 16px 0;border-bottom:1px solid var(--border)";
  mc.appendChild(header);

  // ── タブバー（固定）──
  const tabBar = document.createElement("div");
  tabBar.style.cssText = "flex-shrink:0;display:flex;gap:6px;padding:0 16px;background:var(--card);border-bottom:1px solid var(--border)";
  mc.appendChild(tabBar);

  // ── スクロール本体（可変）──
  const body = document.createElement("div");
  body.style.cssText = "flex:1;overflow-y:auto;padding:12px 16px";
  mc.appendChild(body);

  // ── フッター（固定）──
  const footer = document.createElement("div");
  footer.style.cssText = "flex-shrink:0;padding:10px 16px 14px;border-top:1px solid var(--border)";
  footer.innerHTML = `<button class="btn btn-secondary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">閉じる</button>`;
  mc.appendChild(footer);

  function renderHeader() {
    const done    = gs.collection?.completed || [];
    const _abyssUnlocked = (gs.player.abyssFloorCleared || 0) >= 6;
    const _abyssThemes = new Set([
      "void_tier","specter_tier","colossus_tier","sovereign_tier","will_tier",
      "void_jewelry","specter_jewelry","colossus_jewelry","sovereign_jewelry","will_jewelry",
    ]);
    // 全テーマ × 全part × 全rarity × 13段階（★0〜★12）
    // 真エンド未解禁テーマは集計から除外
    const total   = Object.entries(COLLECTION_THEME).reduce((acc, [tid, theme]) => {
      if(_abyssThemes.has(tid) && !_abyssUnlocked) return acc;
      const parts = (theme.isAcc || theme.isSlot) ? 1 : (theme.acc ? 4 : 3);
      return acc + parts * 4 * (ENHANCE_MAX + 1);
    }, 0);
    const progPct = total > 0 ? Math.min(100, done.length / total * 100).toFixed(1) : 0;
    header.innerHTML = `
      <div style="font-family:'Cinzel',serif;font-size:16px;color:var(--accent2);margin-bottom:2px">📖 冒険録</div>
      <div style="display:flex;align-items:center;gap:8px;margin:4px 0 8px">
        <div style="flex:1;background:var(--surface-deep);border-radius:6px;height:7px;overflow:hidden">
          <div style="height:100%;width:${progPct}%;background:var(--accent2);border-radius:6px;transition:width 0.4s"></div>
        </div>
        <span style="font-size:11px;color:var(--muted);white-space:nowrap">${done.length} / ${total}</span>
      </div>`;
  }

  function renderTabBar() {
    tabBar.innerHTML = [
      { key:"collection", label:"🏆 コレクション" },
      { key:"bonus",      label:"⚔ 効果一覧" },
    ].map(t => `
      <button onclick="switchColTab('${t.key}')"
        style="flex:1;padding:8px 4px;border:none;border-bottom:2px solid ${_colTab===t.key?'var(--accent2)':'transparent'};
          background:transparent;color:${_colTab===t.key?'var(--accent2)':'var(--muted)'};
          font-size:12px;font-weight:${_colTab===t.key?'700':'400'};cursor:pointer;transition:all 0.15s">
        ${t.label}
      </button>`).join("");
  }

  function renderBody(preserveScroll) {
    const savedTop = preserveScroll ? body.scrollTop : 0;
    body.scrollTop = 0;
    if(_colTab === "collection") {
      const done   = gs.collection?.completed || [];
      const maxEnh = gs.collection?.maxEnh    || {};
      // テーマごとの展開状態（テーマ名タップで達成履歴を表示）
      if(!window._colExpanded)     window._colExpanded     = {};
      if(!window._colCardExpanded) window._colCardExpanded = {};

      // カード展開エリアHTML生成（items: 対象アイテムIDリスト, rarity, targetStep）
      const makeDetailArea = (themeId, part, rarity, items, targetStep) => {
        const _ck = `${themeId}|${part}|${rarity}`;
        if(!window._colCardExpanded[_ck]) return '';
        // 格納庫の在庫をあらかじめ集計（itemId_rarityごとの最大enhLv）
        const invMap = {};
        gs.inventory.forEach(i => {
          const k = `${i.itemId}_${i.rarity}`;
          if((invMap[k] ?? -1) < (i.enhLv||0)) invMap[k] = (i.enhLv||0);
        });
        // 装備中も含める
        Object.values(gs.equipped).forEach(uid => {
          const i = gs.inventory.find(x => x.uid === uid);
          if(!i) return;
          const k = `${i.itemId}_${i.rarity}`;
          if((invMap[k] ?? -1) < (i.enhLv||0)) invMap[k] = (i.enhLv||0);
        });
        const rCol = RARITY_MASTER[rarity]?.color || 'var(--text-light)';
        const rows = items.map(itemId => {
          const m      = ITEM_MASTER[itemId];
          if(!m) return '';
          const mKey   = `${itemId}_${rarity}`;
          const colEnh = gs.collection?.maxEnh?.[mKey] ?? -1; // 収集済み最高強化値
          const invEnh = invMap[mKey] ?? -1;                  // 格納庫在庫最高強化値
          const goal   = targetStep || 0;

          // 収集状態
          let colMark, colCol;
          if(colEnh < 0) {
            colMark = '✗ 未収集'; colCol = 'var(--text-disabled)';
          } else if(colEnh >= goal) {
            colMark = `✓ +${colEnh}`; colCol = goal > 0 ? 'var(--info)' : '#44cc88';
          } else {
            colMark = `△ +${colEnh}（★${goal}目標未達）`; colCol = '#cc9933';
          }

          // 格納庫在庫
          let invMark;
          if(invEnh < 0)        invMark = `<span style="color:var(--border-subtle)">在庫なし</span>`;
          else if(invEnh >= goal) invMark = `<span style="color:#44aa44">格納庫 +${invEnh}</span>`;
          else                   invMark = `<span style="color:#cc9933">格納庫 +${invEnh}（不足）</span>`;

          return `<div style="display:flex;justify-content:space-between;align-items:center;
            padding:3px 0;border-bottom:1px solid var(--border-list);font-size:10px">
            <span style="color:${rCol};min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${m.name}</span>
            <span style="color:${colCol};flex-shrink:0;margin:0 8px;white-space:nowrap">${colMark}</span>
            ${invMark}
          </div>`;
        }).join('');
        return `<div style="background:var(--bg-canvas);border:1px solid #2a2a44;border-radius:5px;
          padding:5px 8px;margin-top:2px;margin-bottom:4px">${rows}</div>`;
      };

      // カード1枚分のHTMLを生成するヘルパー
      // step: 表示する★段階（-1=進行中モード、0〜12=達成済み履歴表示）
      const makeCard = (themeId, theme, c, rarity, rLbl, step, isHistory) => {
        const DONE_COL = "var(--info)";
        const GOLD_COL = "var(--legendary-bright)";
        const WIP_COL  = "#cc9933";
        const partLbl  = (theme.isAcc||theme.isSlot) ? "" : c.label;

        if(isHistory) {
          // 達成済み履歴カード（★0〜★maxAchievedStep）
          const colId = makeColId(themeId, c.part, rarity, step);
          const isMax = step >= ENHANCE_MAX;
          const col   = isMax ? GOLD_COL : DONE_COL;
          const rw    = getColReward(colId) || {};
          const rwStr = Object.entries(rw).map(([k,v]) => {
            const kl = {str:"STR",def:"DEF",agi:"AGI",vit:"VIT",luk:"LUK",int:"INT",
                        critRate:"クリ率",maxHpPct:"HP",escapeBonus:"逃走",poisonDmg:"毒"}[k];
            return kl ? kl+"+"+(v)+(["critRate","maxHpPct","escapeBonus","poisonDmg"].includes(k)?"%":"") : "";
          }).filter(Boolean).join(" ");
          const label = step === 0 ? `[${rLbl}]${partLbl}` : `[${rLbl}]${partLbl} ★${step}`;
          const _ck = `${themeId}|${c.part}|${rarity}`;
          const _ckOpen = !!window._colCardExpanded[_ck];
          return `<div style="flex:1;padding:5px 6px;border-radius:5px;border:1px solid ${col};
              background:${isMax?'#1a1400':'#0d1a2e'};min-width:0;opacity:0.75;cursor:pointer"
              onclick="window._colCardToggle('${themeId}','${c.part}','${rarity}')">
            <div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">
              <span style="font-size:10px;font-weight:700;color:${col}">${label}</span>
              <span style="font-size:9px;color:${_ckOpen?'var(--text-subtle)':col};margin-left:auto">${_ckOpen?'▼':'▶'}</span>
            </div>
            <div style="background:var(--bg-deep);border-radius:3px;height:3px;margin-bottom:3px;overflow:hidden">
              <div style="height:100%;width:100%;background:${col};border-radius:3px"></div>
            </div>
            <div style="font-size:9px;color:${isMax?'#e6c84a':'#88aaff'}">${rwStr||"—"}</div>
          </div>`;
        } else {
          // 進行中カード（次の目標★段階）
          const targetStep = step; // 次の目標★（0=未着手、1〜12=★N収集中）
          const gotCount = c.items.filter(id => (maxEnh[id+"_"+rarity] ?? -1) >= targetStep).length;
          const progW    = Math.min(100, gotCount / c.items.length * 100).toFixed(0);
          const inProgress = gotCount > 0;
          const borderCol  = inProgress ? WIP_COL : 'var(--text-disabled)';
          const bgCol      = inProgress ? '#1a1500' : 'var(--bg-deep)';
          const labelCol   = inProgress ? WIP_COL : 'var(--text-subtle)';
          const barCol     = inProgress ? WIP_COL : 'var(--text-faint)';
          const rwCol      = inProgress ? '#aa8833' : 'var(--text-mid)';
          const label      = targetStep === 0
            ? `[${rLbl}]${partLbl}`
            : `[${rLbl}]${partLbl} ★${targetStep}`;
          const rw    = getColCumulativeReward(themeId, c.part, rarity, targetStep);
          const rwStr = Object.entries(rw).map(([k,v]) => {
            const kl = {str:"STR",def:"DEF",agi:"AGI",vit:"VIT",luk:"LUK",int:"INT",
                        critRate:"クリ率",maxHpPct:"HP",escapeBonus:"逃走",poisonDmg:"毒"}[k];
            return kl ? kl+"+"+(v)+(["critRate","maxHpPct","escapeBonus","poisonDmg"].includes(k)?"%":"") : "";
          }).filter(Boolean).join(" ");
          const _ck2 = `${themeId}|${c.part}|${rarity}`;
          const _ck2Open = !!window._colCardExpanded[_ck2];
          return `<div style="flex:1;padding:5px 6px;border-radius:5px;border:1px solid ${borderCol};
              background:${bgCol};min-width:0;cursor:pointer"
              onclick="window._colCardToggle('${themeId}','${c.part}','${rarity}')">
            <div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">
              <span style="font-size:10px;font-weight:700;color:${labelCol}">${label}</span>
              <span style="font-size:9px;color:${inProgress?WIP_COL:'#999'};margin-left:auto">${gotCount}/${c.items.length} ${_ck2Open?'▼':'▶'}</span>
            </div>
            <div style="background:var(--bg-deep);border-radius:3px;height:3px;margin-bottom:3px;overflow:hidden">
              <div style="height:100%;width:${progW}%;background:${barCol};border-radius:3px"></div>
            </div>
            <div style="font-size:9px;color:${rwCol}">${rwStr||""}</div>
          </div>`;
        }
      };

      // 真エンドフロアテーマの表示判定
      // abyssFloorCleared >= 6 になって初めて表示する対象テーマ
      const ABYSS_THEMES = new Set([
        "void_tier","specter_tier","colossus_tier","sovereign_tier","will_tier",
        "void_jewelry","specter_jewelry","colossus_jewelry","sovereign_jewelry","will_jewelry",
      ]);
      const abyssUnlocked = (gs.player.abyssFloorCleared || 0) >= 6;

      let h = "";
      for(const [themeId, theme] of Object.entries(COLLECTION_THEME)) {
        // 真エンドフェーズ未解禁の場合、対象テーマをスキップ
        if(ABYSS_THEMES.has(themeId) && !abyssUnlocked) continue;
        const expanded = !!window._colExpanded[themeId];

        // テーマ内の全達成状況をまとめて把握（バッジ用）
        const RARITIES4 = ["normal","rare","epic","legendary"];
        const cols = (theme.isAcc || theme.isSlot)
          ? [{ part:"all", label:"", items:theme.items }]
          : theme.acc
          ? [
              { part:"weapon", label:"武具",   items:theme.weapon },
              { part:"armor",  label:"防具",   items:theme.armor  },
              { part:"acc",    label:"装身具", items:theme.acc    },
              { part:"all",    label:"全て",   items:[...theme.weapon,...theme.armor,...theme.acc] },
            ]
          : [
              { part:"weapon", label:"武具", items:theme.weapon },
              { part:"armor",  label:"防具", items:theme.armor  },
              { part:"all",    label:"全て", items:[...theme.weapon,...theme.armor] },
            ];

        // テーマ内の最高達成★（バッジ表示用）
        let themeMaxStep = -1;
        for(const r4 of RARITIES4) {
          for(const c4 of cols) {
            for(let s = ENHANCE_MAX; s >= 0; s--) {
              if(done.includes(makeColId(themeId, c4.part, r4, s))) {
                if(s > themeMaxStep) themeMaxStep = s;
                break;
              }
            }
          }
        }
        const hasDone   = themeMaxStep >= 0;
        const allMax    = themeMaxStep >= ENHANCE_MAX;
        const badgeCol  = allMax ? "var(--legendary-bright)" : hasDone ? "var(--info)" : "transparent";
        const badge     = hasDone
          ? `<span style="font-size:10px;color:${badgeCol};margin-left:6px">★${themeMaxStep}${allMax?' 🏆':''}</span>`
          : '';
        const arrow     = hasDone
          ? `<span style="font-size:10px;color:var(--text-faint);margin-left:auto">${expanded ? '▼' : '▶'}</span>`
          : '';
        const clickable = hasDone ? `onclick="window._colToggle('${themeId}')"` : '';

        h += `<div style="margin-bottom:14px">
          <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;
            display:flex;align-items:center;${hasDone?'cursor:pointer;user-select:none':''}"
            ${clickable}>
            <span>${theme.icon} ${theme.title}</span>${badge}${arrow}
          </div>`;

        if(expanded && hasDone) {
          // ── 展開時：達成済み履歴 + 進行中カードを1ブロックで描画、通常ループは使わない ──
          if(theme.isAcc || theme.isSlot) {
            // アクセ・部位横断：★段階ごとに4レアリティを1行で表示
            const c = cols[0];
            const maxStepPerRarity = RARITIES.map(rarity => {
              for(let s = ENHANCE_MAX; s >= 0; s--) {
                if(done.includes(makeColId(themeId, c.part, rarity, s))) return s;
              }
              return -1;
            });
            const overallMax = Math.max(...maxStepPerRarity);
            for(let s = 0; s <= overallMax; s++) {
              const rowParts = RARITIES.map((rarity, ri) => {
                const rLbl = RARITY_LABEL[rarity];
                if(done.includes(makeColId(themeId, c.part, rarity, s))) {
                  return makeCard(themeId, theme, c, rarity, rLbl, s, true);
                }
                return makeCard(themeId, theme, c, rarity, rLbl, s, false);
              }).join("");
              h += `<div style="display:flex;gap:4px;margin-bottom:0">${rowParts}</div>`;
              RARITIES.forEach(rarity => h += makeDetailArea(themeId, c.part, rarity, c.items, s));
              h += `<div style="margin-bottom:3px"></div>`;
            }
            // 次の目標★段階
            const nextStep = overallMax + 1;
            if(nextStep <= ENHANCE_MAX) {
              const rowParts = RARITIES.map((rarity, ri) => {
                const rLbl = RARITY_LABEL[rarity];
                if(maxStepPerRarity[ri] >= nextStep) return '';
                return makeCard(themeId, theme, c, rarity, rLbl, nextStep, false);
              }).filter(Boolean).join("");
              if(rowParts) {
                h += `<div style="display:flex;gap:4px;margin-bottom:0">${rowParts}</div>`;
                RARITIES.forEach(rarity => h += makeDetailArea(themeId, c.part, rarity, c.items, nextStep));
                h += `<div style="margin-bottom:4px"></div>`;
              }
            }
          } else {
            for(const rarity of RARITIES) {
              const rLbl = RARITY_LABEL[rarity];
              const maxSteps = cols.map(c => {
                for(let s = ENHANCE_MAX; s >= 0; s--) {
                  if(done.includes(makeColId(themeId, c.part, rarity, s))) return s;
                }
                return -1;
              });
              const rarityHasAny = maxSteps.some(s => s >= 0);
              if(!rarityHasAny) {
                const rowParts = cols.map(c => makeCard(themeId, theme, c, rarity, rLbl, 0, false)).join("");
                h += `<div style="display:flex;gap:4px;margin-bottom:4px">${rowParts}</div>`;
                continue;
              }
              const overallMax = Math.max(...maxSteps);
              for(let s = 0; s <= overallMax; s++) {
                const rowParts = cols.map((c, i) => {
                  if(done.includes(makeColId(themeId, c.part, rarity, s))) {
                    return makeCard(themeId, theme, c, rarity, rLbl, s, true);
                  }
                  return makeCard(themeId, theme, c, rarity, rLbl, s, false);
                }).join("");
                h += `<div style="display:flex;gap:4px;margin-bottom:0">${rowParts}</div>`;
                cols.forEach(c => h += makeDetailArea(themeId, c.part, rarity, c.items, s));
                h += `<div style="margin-bottom:3px"></div>`;
              }
              const nextStep = overallMax + 1;
              if(nextStep <= ENHANCE_MAX) {
                const rowParts = cols.map((c, i) => {
                  if(maxSteps[i] >= nextStep) return '';
                  return makeCard(themeId, theme, c, rarity, rLbl, nextStep, false);
                }).filter(Boolean).join("");
                if(rowParts) {
                  h += `<div style="display:flex;gap:4px;margin-bottom:0">${rowParts}</div>`;
                  cols.forEach(c => h += makeDetailArea(themeId, c.part, rarity, c.items, nextStep));
                  h += `<div style="margin-bottom:4px"></div>`;
                }
              }
            }
          }
          h += `<div style="height:4px"></div>`;
        } else {
          // ── 非展開時：進行中の★段階カードのみ表示 ──
          if(theme.isAcc || theme.isSlot) {
            // アクセ・部位横断：4レアリティを1行に並べる
            const c = cols[0];
            const rowParts = RARITIES.map(rarity => {
              const rLbl = RARITY_LABEL[rarity];
              let maxS = -1;
              for(let s = ENHANCE_MAX; s >= 0; s--) {
                if(done.includes(makeColId(themeId, c.part, rarity, s))) { maxS = s; break; }
              }
              const nextS = maxS + 1;
              if(nextS > ENHANCE_MAX) return makeCard(themeId, theme, c, rarity, rLbl, ENHANCE_MAX, true);
              return makeCard(themeId, theme, c, rarity, rLbl, nextS, false);
            }).join("");
            h += `<div style="display:flex;gap:4px;margin-bottom:0">${rowParts}</div>`;
            RARITIES.forEach(rarity => {
              const maxS = (() => { for(let s=ENHANCE_MAX;s>=0;s--) { if(done.includes(makeColId(themeId,c.part,rarity,s))) return s; } return -1; })();
              const goal = maxS+1 <= ENHANCE_MAX ? maxS+1 : ENHANCE_MAX;
              h += makeDetailArea(themeId, c.part, rarity, c.items, goal);
            });
            h += `<div style="margin-bottom:4px"></div>`;
          } else {
          for(const rarity of RARITIES) {
            const rLbl = RARITY_LABEL[rarity];
            const maxSteps = cols.map(c => {
              for(let s = ENHANCE_MAX; s >= 0; s--) {
                if(done.includes(makeColId(themeId, c.part, rarity, s))) return s;
              }
              return -1;
            });
            const rowParts = cols.map((c, i) => {
              const maxS = maxSteps[i];
              const nextS = maxS + 1;
              if(nextS > ENHANCE_MAX) return makeCard(themeId, theme, c, rarity, rLbl, ENHANCE_MAX, true);
              return makeCard(themeId, theme, c, rarity, rLbl, nextS, false);
            }).join("");
            h += `<div style="display:flex;gap:4px;margin-bottom:0">${rowParts}</div>`;
            // 各partの展開エリア
            cols.forEach(c => {
              const maxS2 = (() => { for(let s=ENHANCE_MAX;s>=0;s--) { if(done.includes(makeColId(themeId,c.part,rarity,s))) return s; } return -1; })();
              const goal2 = maxS2 + 1 <= ENHANCE_MAX ? maxS2 + 1 : ENHANCE_MAX;
              h += makeDetailArea(themeId, c.part, rarity, c.items, goal2);
            });
            h += `<div style="margin-bottom:4px"></div>`;
          }
          } // end else (通常テーマ)
        }
        h += `</div>`;
      }
      body.innerHTML = h;
      if(preserveScroll) body.scrollTop = savedTop;
    } else {
      const _col = calcCollectionBonus();
      const effects = [
        { label:"STR",    val:_col.str,              show:_col.str>0 },
        { label:"DEF",    val:_col.def,              show:_col.def>0 },
        { label:"AGI",    val:_col.agi,              show:_col.agi>0 },
        { label:"VIT",    val:_col.vit,              show:_col.vit>0 },
        { label:"LUK",    val:_col.luk,              show:_col.luk>0 },

            </div>`).join("")}
          </div>`;
    }
  }

  window._colToggle = (themeId) => {
    if(!window._colExpanded) window._colExpanded = {};
    window._colExpanded[themeId] = !window._colExpanded[themeId];
    renderBody(true); // スクロール位置を保持
  };
  window._colCardToggle = (themeId, part, rarity) => {
    if(!window._colCardExpanded) window._colCardExpanded = {};
    const key = `${themeId}|${part}|${rarity}`;

  window.switchColTab = (tab) => {
    _colTab = tab;

  renderHeader();

function learnSkill(id) {
  const sk = SKILL_MASTER[id];
  if(!sk) return;
  const p = gs.player;
  if(p.skills.includes(id)) return;
  if(!sk.requires.every(r=>p.skills.includes(r))) return;
  if(p.skillPoints < sk.cost) return;
  p.skills.push(id);
  p.skillPoints -= sk.cost;
  recalcHpMp(gs);
  saveGame();
  openSkillTree(_skillTreeTab);
  addLog("item", `🌟 スキル「${sk.name}」を習得した！`);
}

function resetSkill(id) {
  const sk = SKILL_MASTER[id];
  if(!sk) return;
  const p = gs.player;
  if(!p.skills.includes(id)) return;
  // 他スキルの前提になっている場合はリセット不可
  const dependents = Object.entries(SKILL_MASTER)
    .filter(([sid, s]) => s.requires.includes(id) && p.skills.includes(sid))
    .map(([sid]) => SKILL_MASTER[sid].name);
  if(dependents.length > 0) {
    addLog("item", `✕ 「${sk.name}」は【${dependents.join("・")}】の前提スキルのためリセット不可`);
    saveGame(); openSkillTree(_skillTreeTab); return;
  }
  const cost = SKILL_RESET_COST[sk.cost] || 500;
  if(gs.player.gold < cost) {
    addLog("item", `✕ Gold不足（${cost.toLocaleString()}G必要）`);
    saveGame(); openSkillTree(_skillTreeTab); return;
  }
  gs.player.gold -= cost;
  p.skills = p.skills.filter(s => s !== id);
  p.skillPoints += sk.cost;
  recalcHpMp(gs);
  saveGame();
  openSkillTree(_skillTreeTab);
  addLog("item", `🔄 スキル「${sk.name}」をリセットした（-${cost.toLocaleString()}G、SP+${sk.cost}）`);
}

function updateTabVisibility() {
  const inDungeon = gs.dungeon.active;
  document.querySelectorAll(".tab").forEach(t=>{
    const tab = t.dataset.tab;
    if(tab === "shop")      t.style.display = inDungeon ? "none" : "";
    if(tab === "inventory") t.style.display = inDungeon ? "none" : "";
    if(tab === "loot")      t.style.display = inDungeon ? "" : "none";
  });
  // 冒険中にショップ・格納庫にいたら冒険タブへ戻す
  if(inDungeon && (currentTab === "shop" || currentTab === "inventory")) {
    currentTab = "dungeon";
  }
  // 帰還後に獲得品タブにいたら格納庫へ戻す
  if(!inDungeon && currentTab === "loot") {
    currentTab = "inventory";
  }
}

function switchTab(tab) {
  // 周回中はショップ・格納庫への遷移をガード
  if((tab === "shop" || tab === "inventory") && gs.dungeon.autoRun?.active) return;
  // 冒険中はショップ・格納庫への遷移をガード
  if((tab === "shop" || tab === "inventory") && gs.dungeon.active) return;
  // 帰還中は獲得品タブへの遷移をガード
  if(tab === "loot" && !gs.dungeon.active) return;
  // ショップタブ切替時に売却通知バッジをクリア（S48-SALE）
  if(tab === "shop") { _pendingSaleCount = 0; _updateShopTabBadge(); }
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.toggle("active", t.dataset.tab===tab);
  });
  // ログボタン：ステータスタブと冒険タブでは非表示
  const logBtn = document.getElementById("tabLogBtn");
  if(logBtn) logBtn.style.display = (tab === "status" || tab === "dungeon") ? "none" : "flex";
  render();
}

// ─────────────────────────────────────────
// 初期化
// ─────────────────────────────────────────
// D1継続率改善：タブタイトル変更フック (S49-D1)
// タブを離れた瞬間に「次に来たくなる」情報をブラウザタブタイトルに表示する。
// visibilitychange のみ使用。beforeunload は使わない（UX破壊のため）。
// init() 末尾から1回だけ呼び出す。
// ─────────────────────────────────────────
function _initTabTitleHook() {
  const TITLE_DEFAULT = "深淵商会";

  document.addEventListener("visibilitychange", () => {
    // 安全ガード：gs または shop / dungeon が未初期化の場合は何もしない
    if (!gs || !gs.shop || !gs.dungeon) {
      document.title = TITLE_DEFAULT;
      return;
    }

    // タブに戻ったら必ずデフォルトタイトルに戻す
    if (!document.hidden) {
      document.title = TITLE_DEFAULT;
      return;
    }

    // ダンジョン探索中・周回中はショップ情報が変動しないため表示しない
    if (gs.dungeon.active || gs.dungeon.autoRun?.active) {
      document.title = TITLE_DEFAULT;
      return;
    }

    // 出品中の棚から「最も早く売れる棚」の残り時間を計算
    // filter(Boolean)では { item:null, specialType:'weapon' } のような
    // 棚設定済み・商品未出品エントリが混入するため、s.item の存在を必ず確認する
    const now = Date.now();
    const activeShelves = (gs.shop.shelves || []).filter(s => s && s.item);

    if (activeShelves.length === 0) {
      // 商品が出品されていない：冒険を促す
      const floor = gs.dungeon.selectedFloor || gs.dungeon.floor || 1;
      document.title = `⚔ ${floor}階層へ潜ろう — ${TITLE_DEFAULT}`;
      return;
    }

    // 最短売却残り時間（ミリ秒）を求める
    // s.listedAt が undefined の旧データにも対応（|| now でフォールバック）
    const minRemaining = Math.min(
      ...activeShelves.map(s => {
        const elapsed   = now - (s.listedAt || now);
        const remaining = (s.sellDuration || 0) - elapsed;
        return Math.max(0, remaining);
      })
    );

    if (minRemaining <= 0) {
      // 売却タイマーがすでに0：次の checkShopSales で処理される直前の状態
      document.title = `🏪 お客さんが来ている！ — ${TITLE_DEFAULT}`;
      return;
    }

    // 残り時間を「X分」または「X秒」表示に変換
    // floor を使い「実際より長く表示する」誤りを防ぐ（ceil だと61秒→「約2分後」になる）
    const remainingSec = Math.ceil(minRemaining / 1000);
    const timeLabel = remainingSec >= 60
      ? `約${Math.floor(remainingSec / 60)}分後`
      : `${remainingSec}秒後`;

    document.title = `🏪 ${timeLabel}に売れそう — ${TITLE_DEFAULT}`;
  });
}

      step: "STEP 1",
      title: "まず潜ろう",
      body: "「1階層へ潜入」を押してダンジョンへ。<br>敵を倒して装備品を拾おう。<br><b style=\"color:var(--accent2)\">帰還ボタンでいつでも戻れる。</b>",
      tip: "💡 深く潜るほど強い装備が出るよ",
    },
    {
      icon: "🔍",
      step: "STEP 2",
      title: "鑑定して売ろう",
      body: "帰還後は格納庫タブで未鑑定品を鑑定。<br>ショップの棚に並べれば<br><b style=\"color:var(--accent2)\">時間が経つと自動で売れる。</b>",
      tip: "💡「まとめて出品」ボタンが便利！",
    },
    {
      icon: "💰",
      step: "STEP 3",
      title: "稼いで強くなろう",
      body: "売上でレベルアップ・装備強化。<br>より深い階層へ潜るほど<br><b style=\"color:var(--accent2)\">レアな装備が手に入る。</b>",
      tip: "💡 転生でさらに強くなれる",
    },
    {
      icon: "⛩",
      step: "STEP 4",
      title: "祠と消耗品を活用",
      body: "ダンジョン内の<b style=\"color:var(--accent2)\">⛩ 祠マス</b>に触れると<br>EXP・回復・鑑定など様々な恩恵が。<br>消耗品（回復薬・解毒薬）も持参しよう。",
      tip: "💡 格納庫→持ち物から事前準備できる",
    },
  ];

  let page = 0;

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.style.cssText = "z-index:500;align-items:center;"; // 既存z-index(100)より上・中央配置

  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.cssText = [
    "border-radius:16px",
    "padding:28px 20px 20px",
    "max-width:360px",
    "width:calc(100% - 32px)",
    "margin:auto",
    "text-align:center",
  ].join(";");
  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  function renderPage() {
    const p = PAGES[page];
    const isLast = page === PAGES.length - 1;

    // ドットインジケーター
    const dots = PAGES.map((_, i) =>
      `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 3px;
        background:${i === page ? "var(--accent2)" : "var(--border)"};
        transform:${i === page ? "scale(1.3)" : "scale(1)"};
        transition:background 0.2s,transform 0.2s"></span>`
    ).join("");

    // ステップカラーマップ
    const stepColors = ["var(--accent)","var(--green)","var(--gold)","#cc88ff"];
    const stepCol = stepColors[page] || "var(--accent2)";

    mc.innerHTML = `
      <div style="font-size:48px;margin-bottom:8px;
        filter:drop-shadow(0 0 12px ${stepCol}66)">${p.icon}</div>
      <div style="font-size:10px;letter-spacing:2px;color:${stepCol};margin-bottom:6px;font-weight:700">${p.step}</div>
      <div style="font-family:'Cinzel',serif;font-size:18px;font-weight:700;
        color:var(--text);margin-bottom:12px">${p.title}</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.9;margin-bottom:12px">${p.body}</div>
      ${p.tip ? `<div style="font-size:11px;color:${stepCol};background:#1a1a26;border:1px solid ${stepCol}44;
        border-radius:8px;padding:7px 12px;margin-bottom:14px;text-align:left">${p.tip}</div>` : ""}
      <div style="margin-bottom:18px">${dots}</div>
      <div style="display:flex;gap:8px">
        ${page === 0
          ? `<button id="_fgSkip" class="btn btn-secondary" style="flex:1;font-size:12px">スキップ</button>`
          : `<button id="_fgPrev" class="btn btn-secondary" style="flex:1">← 戻る</button>`
        }
        <button id="_fgNext" class="btn btn-primary" style="flex:2">
          ${isLast ? "🎮 はじめる！" : "次へ →"}
        </button>
      </div>
    `;

    // ボタンイベント
    mc.querySelector("#_fgNext").addEventListener("click", () => {
      if(isLast) {
        _closeGuideCompleted(); // 完読フック経由で閉じる
      } else {
        page++;
        renderPage();
      }
    });
    const skipBtn = mc.querySelector("#_fgSkip");
    if(skipBtn) skipBtn.addEventListener("click", () => {
      if(!forceShow) Analytics.guideSkipped(page); // 初回のみ計測
      _closeGuide();
    });
    const prevBtn = mc.querySelector("#_fgPrev");
    if(prevBtn) prevBtn.addEventListener("click", () => { page--; renderPage(); });
  }

  function _closeGuide() {
    if(!forceShow) {
      // 初回フラグを落とす（再表示時は変更しない）
      gs.meta.isFirstPlay = false;
      saveGame();
    }
    overlay.remove();
  }

  function _closeGuideCompleted() {
    if(!forceShow) Analytics.guideCompleted(); // 最後まで読んで「はじめる！」を押した（初回のみ計測）
    _closeGuide();
  }

  renderPage();
}

// ─────────────────────────────────────────
// SNS共有 (S49-SHARE)
// ボス撃破・転生節目・legendary販売の3箇所に設置する。
// ─────────────────────────────────────────

// シェアテキストを組み立てる
function buildShareText(type, payload) {
  const tag  = "#深淵商会";
  // hash(#)とquery(?)を除去。file://のローカルURLは共有しても無意味なため除外
  const rawUrl = location.href.split("?")[0].split("#")[0];
  const url  = rawUrl.startsWith("file://") ? "" : rawUrl;
  const rank = gs.player.worldRank || 0;
  const lv   = gs.player.level;
  switch(type) {
    case "boss":
      return `${tag}\n⚔ ${payload.bossName}を討伐！\n転生${rank}周目 / Lv${lv}${url ? "\n" + url : ""}`;
    case "rebirth":
      return `${tag}\n🌟 転生${rank}回達成！深淵への挑戦は続く…${url ? "\n" + url : ""}`;
    case "legendary":
      return `${tag}\n💎 Legendary「${payload.name}」を入手！\nLv${lv}${url ? "\n" + url : ""}`;
    default:
      return `${tag}${url ? "\n" + url : ""}`;
  }
}

// X（Twitter）の投稿ウィンドウを開く
function openShareDialog(type, payload) {
  const text = encodeURIComponent(buildShareText(type, payload || {}));
  window.open(
    "https://twitter.com/intent/tweet?text=" + text,
    "_blank",
    "noopener,noreferrer,width=560,height=360"
  );
}

// legendary販売後のシェア誘導モーダル（バナーはpointer-events:noneのため独立モーダルで表示）
function _showLegendaryShareModal(item) {
  // ショップタブ以外では出さない（1秒遅延中にタブ切替された場合の対策）
  if(currentTab !== "shop") return;
  // LvUp演出・ボスイントロ・他モーダルが出ている間は表示しない（体験を汚さない）
  if(document.querySelector(".modal-overlay, .boss-result-overlay, .lvup-overlay, .boss-intro-overlay")) return;
  const m = item ? ITEM_MASTER[item.itemId] : null;
  if(!m) return;
  const baseName = item.identified ? m.name : "謎の品";
  const enhSuffix = (item.identified && item.enhLv > 0) ? `+${item.enhLv}` : "";
  const displayName = baseName + enhSuffix;

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.style.cssText = "z-index:8500;align-items:center;background:rgba(0,0,0,0.6);";
  const mc = document.createElement("div");
  mc.className = "modal-content";
  mc.style.cssText = [
    "max-width:320px", "width:calc(100% - 32px)", "margin:auto",
    "border-radius:16px", "padding:24px 20px 20px", "text-align:center",
    "border:1px solid var(--legendary)",
  ].join(";");
  mc.innerHTML = `
    <div style="font-size:36px;margin-bottom:8px">💎</div>
    <div style="font-size:12px;letter-spacing:1px;color:var(--legendary);margin-bottom:4px">LEGENDARY</div>
    <div style="font-size:16px;font-weight:700;color:var(--gold);margin-bottom:16px">${displayName}</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button id="_lgShareBtn" class="btn btn-secondary"
        style="border-color:var(--twitter);color:var(--twitter);font-size:13px">
        𝕏 シェアする
      </button>
      <button id="_lgCloseBtn" class="btn btn-secondary"
        style="font-size:12px;color:var(--muted)">
        閉じる
      </button>
    </div>
  `;
  overlay.appendChild(mc);
  document.body.appendChild(overlay);

  mc.querySelector("#_lgShareBtn").addEventListener("click", () => {
    openShareDialog("legendary", { name: displayName });
  });
  mc.querySelector("#_lgCloseBtn").addEventListener("click", () => overlay.remove());
  // 背景クリックでも閉じる
  overlay.addEventListener("click", e => { if(e.target === overlay) overlay.remove(); });
}

function init() {
  if(!loadGame()) {
    gs = DEFAULT_STATE();
    recalcHpMp(gs);
    gs.player.hp = gs.player.maxHp;
    gs.player.mp = gs.player.maxMp;
    addLog("item","ようこそ、深淵商会へ。冒険を始めよう。");
    saveGame();
    Analytics.init(true);  // 新規プレイヤー
  } else {
    // ログを復元
    try {
      const savedLogs = localStorage.getItem("shinentrade_logs");
      if(savedLogs) {
        const parsed = JSON.parse(savedLogs);
        ALL_LOGS.length = 0;
        parsed.forEach(l => ALL_LOGS.push(l));
      }
    } catch(e){}
    recalcHpMp(gs);
    addLog("item","セーブデータを読み込みました。");
    Analytics.init(false); // 既存プレイヤー
  }

  document.querySelectorAll(".tab").forEach(t=>{
    t.addEventListener("click",()=>switchTab(t.dataset.tab));
  });

  render();
  // 初回起動時のみファーストガイドを表示（render()後にDOMが確定してから呼ぶ）
  if(gs.meta.isFirstPlay) showFirstGuideModal();
  // B1-DAILY: デイリーミッション初期化・リセット判定
  // 自動受取が発生した場合はtopBar gold表示を更新するためrender()を追加呼び出し
  // BUG-3: ダンジョン戦闘中はrender()を抑制（openQuestModal側・setInterval側と条件を統一）
  if(initDailyMissions() && !gs.dungeon.active) render();
  setInterval(()=>{
    checkShopSales();
    checkBlackmarket();
    checkQuestProgress("shelf_check");
    checkShopIncome();
    checkStaffIncome();
    checkInvestmentReturn();
    checkGuildReward();
    // B1-DAILY: バックグラウンドリセット検出（開きっぱなしで日付変更された場合に対応）
    // initDailyMissions()はsaveGame()を含むため、日付変更の瞬間だけ発火させる
    if(Date.now() >= (gs.meta.dailyResetAt || 0)) {
      const _dailyClaimed = initDailyMissions();
      // ダンジョン戦闘中はrender()を抑制（00:00の瞬間に戦闘ログが消えるのを防ぐ）
      if(_dailyClaimed && !gs.dungeon.active) render();
    }
    if(currentTab==="shop") updateShopTick();
  }, 1000);

  // demand自然回復（30秒ごとに+1%）
  setInterval(()=>{ recoverDemand(); }, 30000);

  // 自発的需要波動（30秒ごと）
  setInterval(fluctuateDemand, 30000);

  // 需要履歴スナップショット（5分ごと）
  setInterval(takeDemandSnapshot, MARKET_SNAPSHOT_INTERVAL);

  // 常連客：定期来訪（5秒ごとにチェック）・注文発生（1秒ごと）
  setInterval(checkRegularVisits, 5000);
  setInterval(checkRegularOrders, 1000);

  // オートセーブ（30秒ごと）
  setInterval(saveGame, 30000);

  // D1継続率改善：タブタイトル変更フック（S49-D1）
  _initTabTitleHook();
}

init();
</script>
